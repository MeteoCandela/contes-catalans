<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contes Catalans · Bona Nit</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0a1a;
    --surface: #16112b;
    --surface2: #1e1738;
    --surface3: #261e45;
    --gold: #e8b84b;
    --gold-light: #f5d07a;
    --gold-dim: #a07c2a;
    --text: #f0e8d8;
    --text-dim: #b8a88a;
    --text-muted: #7a6a5a;
    --star: #fff8e7;
    --accent: #c46b3a;
    --accent2: #7b5ea7;
    --radius: 16px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lora', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── Stars background ─── */
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(1px 1px at 10% 15%, #fff9 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, #fff7 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 8%, #fffb 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 30%, #fff8 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 18%, #fff6 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 80% 45%, #fffa 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 10%, #fff9 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 70%, #fff5 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 85%, #fff6 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 60% 65%, #fff8 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 78%, #fff7 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 60%, #fff9 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 50%, #fff6 0%, transparent 100%),
      radial-gradient(1px 1px at 48% 55%, #fff4 0%, transparent 100%),
      radial-gradient(2px 2px at 20% 25%, #ffe8886a 0%, transparent 100%);
  }

  /* ─── Header ─── */
  header {
    position: relative; z-index: 10;
    text-align: center;
    padding: 3rem 1rem 2rem;
    background: linear-gradient(180deg, #0d0a1a 0%, transparent 100%);
  }

  .moon {
    font-size: 3.5rem;
    display: block;
    animation: moonFloat 4s ease-in-out infinite;
    filter: drop-shadow(0 0 20px #e8b84b88);
  }
  @keyframes moonFloat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    color: var(--gold-light);
    text-shadow: 0 0 40px #e8b84b55;
    margin: 0.5rem 0 0.3rem;
    letter-spacing: -0.5px;
  }
  header p {
    color: var(--text-dim);
    font-style: italic;
    font-size: 1.05rem;
  }

  /* ─── Main layout ─── */
  .app { position: relative; z-index: 5; max-width: 1100px; margin: 0 auto; padding: 0 1.2rem 4rem; }

  /* ─── Search ─── */
  .search-wrap {
    margin: 1.5rem 0 1.2rem;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--surface3);
    border-radius: 50px;
    padding: 0.9rem 1.5rem 0.9rem 3rem;
    color: var(--text);
    font-family: 'Lora', serif;
    font-size: 1rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .search-wrap input::placeholder { color: var(--text-muted); }
  .search-wrap input:focus {
    border-color: var(--gold-dim);
    box-shadow: 0 0 0 3px #e8b84b22;
  }
  .search-wrap .icon {
    position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-size: 1.1rem; pointer-events: none;
  }

  /* ─── Category pills ─── */
  .cats {
    display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem;
  }
  .cat-pill {
    background: var(--surface);
    border: 1.5px solid var(--surface3);
    color: var(--text-dim);
    border-radius: 50px;
    padding: 0.35rem 1rem;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all .18s;
    font-family: 'Lora', serif;
  }
  .cat-pill:hover { border-color: var(--gold-dim); color: var(--gold-light); }
  .cat-pill.active {
    background: linear-gradient(135deg, #a07c2a, #e8b84b);
    border-color: var(--gold);
    color: #1a1200;
    font-weight: 600;
  }

  /* ─── Stats bar ─── */
  .stats { color: var(--text-muted); font-size: 0.82rem; margin-bottom: 1rem; }

  /* ─── Grid ─── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 1rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--surface3);
    border-radius: var(--radius);
    padding: 1.2rem 1.3rem;
    cursor: pointer;
    transition: transform .2s, border-color .2s, box-shadow .2s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #e8b84b06, transparent);
    opacity: 0; transition: opacity .2s;
  }
  .card:hover { transform: translateY(-3px); border-color: var(--gold-dim); box-shadow: 0 8px 30px #00000060; }
  .card:hover::before { opacity: 1; }

  .card-emoji { font-size: 2rem; margin-bottom: 0.5rem; display: block; }
  .card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--gold-light);
    margin-bottom: 0.3rem;
    line-height: 1.3;
  }
  .card-meta {
    display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.5rem;
  }
  .badge {
    font-size: 0.7rem;
    background: var(--surface2);
    border: 1px solid var(--surface3);
    color: var(--text-muted);
    border-radius: 4px;
    padding: 0.15rem 0.5rem;
  }
  .badge.theme { color: var(--accent2); border-color: #7b5ea733; background: #7b5ea710; }
  .card p { font-size: 0.82rem; color: var(--text-dim); line-height: 1.5; font-style: italic; }

  /* ─── READER MODAL ─── */
  .overlay {
    display: none;
    position: fixed; inset: 0; z-index: 100;
    background: #00000099;
    backdrop-filter: blur(6px);
    align-items: center; justify-content: center;
    padding: 1rem;
    animation: fadeIn .25s;
  }
  .overlay.open { display: flex; }
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

  .modal {
    background: linear-gradient(160deg, #16112b, #0d0a1a);
    border: 1px solid var(--surface3);
    border-radius: 20px;
    max-width: 720px; width: 100%;
    max-height: 92vh;
    display: flex; flex-direction: column;
    box-shadow: 0 25px 80px #000000cc;
    animation: slideUp .3s cubic-bezier(.22,.61,.36,1);
  }
  @keyframes slideUp { from { transform: translateY(30px); opacity:0 } }

  .modal-head {
    padding: 1.5rem 1.8rem 1rem;
    border-bottom: 1px solid var(--surface3);
    display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem;
  }
  .modal-title-wrap .modal-emoji { font-size: 2.5rem; }
  .modal-title-wrap h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.3rem, 3vw, 1.8rem);
    color: var(--gold-light);
    margin: 0.2rem 0 0.4rem;
  }
  .modal-head .badges { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .btn-close {
    background: var(--surface2);
    border: 1px solid var(--surface3);
    color: var(--text-dim);
    border-radius: 50%;
    width: 36px; height: 36px;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all .15s;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-close:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ─── Audio controls ─── */
  .audio-bar {
    padding: 0.8rem 1.8rem;
    background: var(--surface2);
    display: flex; align-items: center; gap: 1rem;
    flex-wrap: wrap;
  }
  .audio-btn {
    background: linear-gradient(135deg, #a07c2a, #e8b84b);
    border: none;
    color: #1a1200;
    border-radius: 50px;
    padding: 0.5rem 1.3rem;
    font-family: 'Lora', serif;
    font-weight: 600;
    font-size: 0.88rem;
    cursor: pointer;
    transition: opacity .15s, transform .15s;
    display: flex; align-items: center; gap: 0.4rem;
  }
  .audio-btn:hover { opacity: 0.88; transform: scale(1.03); }
  .audio-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .speed-label { color: var(--text-muted); font-size: 0.8rem; }
  .speed-select {
    background: var(--surface3);
    border: 1px solid #ffffff22;
    color: var(--text-dim);
    border-radius: 6px;
    padding: 0.3rem 0.5rem;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .progress-wrap { flex: 1; min-width: 120px; }
  .progress-bar {
    width: 100%;
    height: 4px;
    background: var(--surface3);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    border-radius: 4px;
    width: 0%;
    transition: width .5s linear;
  }

  /* ─── Story body ─── */
  .modal-body {
    padding: 1.5rem 1.8rem 2rem;
    overflow-y: auto;
    flex: 1;
    scroll-behavior: smooth;
  }
  .modal-body::-webkit-scrollbar { width: 6px; }
  .modal-body::-webkit-scrollbar-track { background: transparent; }
  .modal-body::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

  .story-text {
    font-size: 1.05rem;
    line-height: 1.9;
    color: var(--text);
  }
  .story-text p { margin-bottom: 1.1em; }
  .story-text p:first-child::first-letter {
    font-family: 'Playfair Display', serif;
    font-size: 3.2em;
    float: left;
    line-height: 0.8;
    margin: 0.05em 0.1em 0 0;
    color: var(--gold);
    text-shadow: 0 0 20px #e8b84b55;
  }
  .reading-word { background: #e8b84b33; border-radius: 3px; transition: background .1s; }

  .no-results {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--text-muted);
    font-style: italic;
    font-size: 1.1rem;
  }
  .no-results .big { font-size: 3rem; display: block; margin-bottom: 1rem; }

  @media (max-width: 600px) {
    .modal-head { padding: 1rem; }
    .modal-body { padding: 1rem; }
    .audio-bar { padding: 0.6rem 1rem; }
    .grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 400px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="stars"></div>

<header>
  <span class="moon">🌙</span>
  <h1>Contes Catalans</h1>
  <p>Històries de la tradició per a somiar amb els més petits</p>
</header>

<div class="app">
  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Busca un conte pel títol, personatge o paraula clau…">
  </div>

  <div class="cats" id="catBar"></div>
  <div class="stats" id="stats"></div>
  <div class="grid" id="grid"></div>
</div>

<!-- Reader modal -->
<div class="overlay" id="overlay">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <div class="modal-title-wrap">
        <div class="modal-emoji" id="mEmoji"></div>
        <h2 id="mTitle"></h2>
        <div class="badges" id="mBadges"></div>
      </div>
      <button class="btn-close" id="btnClose" aria-label="Tancar">✕</button>
    </div>
    <div class="audio-bar">
      <button class="audio-btn" id="btnPlay">▶ Escoltar</button>
      <button class="audio-btn" id="btnStop" style="background:var(--surface3);color:var(--text-dim);">■ Parar</button>
      <span class="speed-label">Velocitat:</span>
      <select class="speed-select" id="speedSel">
        <option value="0.75">Lenta</option>
        <option value="0.9" selected>Normal</option>
        <option value="1.1">Ràpida</option>
      </select>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>
    </div>
    <div class="modal-body">
      <div class="story-text" id="storyText"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// DATA: 100+ contes tradicionals catalans
// ═══════════════════════════════════════════════════════
const contes = [
  {
    id:1, emoji:'🐺', title:'En Patufet',
    tema:'Aventura', tags:['nen petit','salsitxa','bou'],
    resum:'El noi més petit del món que cap a la panxa d\'una vaca.',
    text:`<p>En Patufet era un nen tan petit, tan petit, que cabia dins d'una closca de cargol. La seva mare sempre li deia: «Patufet, fill meu, no vagis mai al mercat tot sol, que et pot passar alguna desgràcia.» Però en Patufet era molt valent i volia ajudar la família.</p>
<p>Un dia la mare va preparar una cistella de salsitxes per vendre, i en Patufet va demanar de portar-les. La mare, tot i els seus neguits, va acceptar. El nen va caminar tantes hores que quan va arribar al mercat ja era ben tard.</p>
<p>De tornada, va trobar un bou enorme enmig del camí. «Bou, bou, deixa'm passar!» va cridar. El bou, sense voler, el va engolit d'una llambregada. Allà dins fosca i calentor hi havia en Patufet, que cridava: «Mare, mare, sóc aquí dins!»</p>
<p>La mare, desesperada, buscava el fill per tot el poble. Quan va sentir aquella veueta sortir de la panxa del bou, va córrer a buscar el pastor. Entre tots van fer sortir en Patufet san i estalvi.</p>
<p>Des d'aleshores, la mare sempre l'acompanyava al mercat, i en Patufet mai més va anar sol pels camins. I van viure molts anys contents i feliços.</p>`
  },
  {
    id:2, emoji:'🐺', title:'La Caputxeta Vermella',
    tema:'Aventura', tags:['llop','bosc','àvia'],
    resum:'La nena del barret vermell que porta pastissos a l\'àvia i es troba el llop.',
    text:`<p>Hi havia una vegada una nena que tothom anomenava la Caputxeta Vermella perquè sempre portava una capa vermella amb caputxa que li havia fet la seva àvia. Un dia, la mare li va preparar una cistella amb pastissos i pa de sègol. «Porta-ho a l'àvia que viu al bosc, però no t'aturis a jugar.»</p>
<p>La Caputxeta va entrar al bosc cantant. Aviat va topar amb el llop. «On vas, nena?» «A casa l'àvia!» El llop va córrer per un drecera mentre la Caputxeta s'entretenia collint flors.</p>
<p>El llop va arribar primer a casa l'àvia, la va tancar a l'armari i es va posar al llit disfressat. Quan va arribar la Caputxeta va trobar estranyes les orelles, els ulls i les dents tan grosses que tenia "l'àvia"... fins que el llop va saltar per menjar-se-la!</p>
<p>Per sort, un llenyataire que passava va sentir els crits. Va entrar corrents, va fer fugir el llop i va alliberar l'àvia de l'armari. La Caputxeta, abraçada a la seva àvia, va prometre escoltar sempre la seva mare.</p>`
  },
  {
    id:3, emoji:'🏠', title:'Els Tres Porquets',
    tema:'Aventura', tags:['llop','cases','palla fusta maons'],
    resum:'Tres germans construeixen les seves cases i el llop intenta enderrocar-les.',
    text:`<p>Tres porquets germans van decidir marxar de casa els seus pares per construir les seves pròpies llars. El primer, molt mandrós, va fer la seva casa de palla en un matí. El segon va tardar un dia a fer-la de fusta. El tercer, el més treballador, va trigar una setmana a construir una sòlida casa de maons.</p>
<p>Al cap de poc va arribar el llop, famolenc i astut. S'acostà a la casa de palla: «Buffaré i buffaré i la casa t'ensorraré!» I amb un gran buf se la va endur. El primer porquet va fugir a casa del seu germà.</p>
<p>El llop va arribar a la casa de fusta i va fer el mateix. I amb dos bufs va fer caure aquella casa també. Els dos porquets van fugir a casa del germà petit, la casa de maons.</p>
<p>El llop va bufar i bufar fins a quedar-se sense alè, però la casa de maons ni es va moure. Enfadat, va intentar baixar per la xemeneia. Però els tres porquets havien preparat una olla d'aigua bullint a sota. El llop va sortir corrent i no va tornar mai més.</p>
<p>Els tres germans van aprendre que val més fer les coses bé que de pressa.</p>`
  },
  {
    id:4, emoji:'🐢', title:'La Llebre i la Tortuga',
    tema:'Valors', tags:['carrera','perseverança','vanitat'],
    resum:'Una cursa entre la llebre presumida i la tortuga constant.',
    text:`<p>La Llebre era l'animal més ràpid del bosc i tothom ho sabia, però ella s'encarregava de recordar-ho a cada moment. Un dia, la Tortuga, cansada de les fanfarroneries, la va reptar a una cursa fins al roure vell de la muntanya.</p>
<p>Tots els animals del bosc van aplaudir quan es va donar la sortida. La Llebre va arrencar com un llamp i al cap d'uns minuts ja era a mig camí, mentre la Tortuga avançava a passets petits però sense parar.</p>
<p>«Quina pressa me corre?» es va dir la Llebre, i va decidir descansar a l'ombra d'un arbre. L'aire fresc i l'herba tova la van adormir de seguida. Va roncar i va roncar mentre el sol pujava i baixava pel cel.</p>
<p>Mentrestant, la Tortuga, pas a pas, no s'aturava mai. Va passar per al costat de la Llebre dormida sense fer soroll i va continuar pujant la muntanya. Quan la Llebre es va despertar sobresaltada, va córrer amb totes les seves forces, però era massa tard: la Tortuga ja tocava el roure vell amb una pota.</p>
<p>Des d'aleshores, ningú al bosc no es fia de la velocitat sense constància.</p>`
  },
  {
    id:5, emoji:'🌹', title:'La Bella Dorment',
    tema:'Màgia', tags:['princesa','bruixa','son','príncep'],
    resum:'Una princesa que dorm cent anys fins que un petó la desperta.',
    text:`<p>Quan va néixer la princesa Aurora, el rei i la reina van convidar totes les fades del regne. Però van oblidar la fada vella del bosc fosc, que va aparèixer furiosa i va llançar un malefici: «La princesa es punxarà el dit amb un fus i dormirà cent anys!»</p>
<p>Una fada bona va suavitzar el malefici: dormiria, sí, però un petó d'amor verdader la despertaria. El rei va manar cremar tots els fusos del regne, però el dia del setze aniversari de la princesa, ella va trobar una sala secreta amb una vella filadora i... es va punxar el dit.</p>
<p>Tot el castell va caure en un son profund. Al voltant van créixer matolls i bardisses tan espesses que semblaven una muralla verda. Cent anys van passar.</p>
<p>Un jove príncep que havia sentit llegir la llegenda va arriscar-se a entrar al bosc encantat. Les bardisses li van obrir camí, com si l'esperessin. Va trobar el castell silenciós, va pujar les escales i va arribar a la cambra de la princesa. Li va donar un petó suau i Aurora va obrir els ulls.</p>
<p>Tot el castell es va despertar alhora: cuiners, cavallers, gossos i ocells. I la princesa i el príncep van viure feliços molts anys.</p>`
  },
  {
    id:6, emoji:'👠', title:'La Ventafocs',
    tema:'Màgia', tags:['ball','sabata','fada','príncep'],
    resum:'Una noia bondadosa que amb ajuda de la fada va al ball del príncep.',
    text:`<p>La Ventafocs vivia amb la seva madrastra i dues germanastres que la feien fer tota la feina de la casa. Quan van arribar les invitacions al gran ball del palau, les germanastres s'hi van preparar durant dies, mentre ella havia de fregar i cosir.</p>
<p>La nit del ball, trista i sola vora la llar, li va aparèixer la seva fada padrina. Amb un toc de vareta, va transformar una carbassa en una carrossa daurada, els ratolins en cavalls blancs i el vestit vell en un de seda blau ple d'estels. I als peus, unes sabates de vidre.</p>
<p>«Però recorda: a les dotze de la nit tot desapareix!» la va avisar la fada. Al ball, el príncep no va tenir ulls per a ningú més. Van ballar tota la nit. Però quan van sonar les dotze campanades, ella va sortir corrents i va perdre una sabata de vidre a les escales.</p>
<p>L'endemà, el príncep va buscar per tot el regne la noia a qui li cabia la sabata. Quan va arribar a la casa de la Ventafocs, les germanastres van provar-la, però no els entrava. Llavors la Ventafocs va avançar tímidament i la sabata li va calçar com si fos feta per a ella.</p>
<p>El príncep la va reconèixer a l'instant i va demanar-li que es casés amb ell. I van ser molt feliços.</p>`
  },
  {
    id:7, emoji:'🐸', title:'La Princesa i la Granota',
    tema:'Màgia', tags:['princesa','granota','príncep encantat','pou'],
    resum:'Una princesa fa promeses a una granota que li recupera la pilota daurada.',
    text:`<p>La princesa jugava cada tarda vora el pou del jardí amb la seva pilota daurada. Un dia se li va relliscar de les mans i va caure al pou fosc. La princesa va posar-se a plorar quan una veu suau li va dir: «Princesa, puc recuperar la teva pilota si em fas una promesa.»</p>

// ═══════════════════════════════════════════════════════
// APP LOGIC
// ═══════════════════════════════════════════════════════
const temes = ['Tots', ...new Set(contes.map(c => c.tema))];
let temaActiu = 'Tots';
let searchQuery = '';

function filteredContes() {
  return contes.filter(c => {
    const matchTema = temaActiu === 'Tots' || c.tema === temaActiu;
    const q = searchQuery.toLowerCase();
    const matchSearch = !q || c.title.toLowerCase().includes(q)
      || c.resum.toLowerCase().includes(q)
      || c.tags.some(t => t.toLowerCase().includes(q))
      || c.tema.toLowerCase().includes(q);
    return matchTema && matchSearch;
  });
}

function renderCats() {
  const bar = document.getElementById('catBar');
  bar.innerHTML = temes.map(t => `
    <button class="cat-pill ${t===temaActiu?'active':''}" data-tema="${t}">${t}</button>
  `).join('');
  bar.querySelectorAll('.cat-pill').forEach(btn => {
    btn.onclick = () => { temaActiu = btn.dataset.tema; renderAll(); };
  });
}

const temaEmojis = {Tots:'📚',Aventura:'⚔️',Màgia:'✨',Valors:'💛',Natura:'🌿',Llegenda:'🏔️',Enginy:'💡',Imaginació:'🎨',Son:'💤'};

function renderGrid() {
  const list = filteredContes();
  const grid = document.getElementById('grid');
  const stats = document.getElementById('stats');
  stats.textContent = `${list.length} conte${list.length!==1?'s':''} trobat${list.length!==1?'s':''}`;
  if (!list.length) {
    grid.innerHTML = `<div class="no-results" style="grid-column:1/-1"><span class="big">🔍</span>No hem trobat cap conte per «${searchQuery}»</div>`;
    return;
  }
  grid.innerHTML = list.map(c => `
    <div class="card" data-id="${c.id}">
      <span class="card-emoji">${c.emoji}</span>
      <h3>${c.title}</h3>
      <div class="card-meta">
        <span class="badge theme">${temaEmojis[c.tema]||'📖'} ${c.tema}</span>
        <span class="badge">~3 min</span>
      </div>
      <p>${c.resum}</p>
    </div>
  `).join('');
  grid.querySelectorAll('.card').forEach(card => {
    card.onclick = () => openConte(+card.dataset.id);
  });
}

function renderAll() {
  renderCats();
  renderGrid();
}

// ─── Modal / Reader ───
let currentConte = null;
let synth = window.speechSynthesis;
let utterance = null;
let words = [];
let wordIndex = 0;

function openConte(id) {
  currentConte = contes.find(c => c.id === id);
  if (!currentConte) return;
  document.getElementById('mEmoji').textContent = currentConte.emoji;
  document.getElementById('mTitle').textContent = currentConte.title;
  document.getElementById('mBadges').innerHTML = `
    <span class="badge theme">${temaEmojis[currentConte.tema]||'📖'} ${currentConte.tema}</span>
    ${currentConte.tags.map(t=>`<span class="badge">${t}</span>`).join('')}
  `;
  document.getElementById('storyText').innerHTML = currentConte.text;
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('overlay').classList.add('open');
  stopSpeech();
}

function closeConte() {
  document.getElementById('overlay').classList.remove('open');
  stopSpeech();
}

function stopSpeech() {
  if (synth) synth.cancel();
  utterance = null;
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('btnPlay').textContent = '▶ Escoltar';
}

document.getElementById('btnClose').onclick = closeConte;
document.getElementById('overlay').onclick = (e) => { if(e.target===e.currentTarget) closeConte(); };

document.getElementById('btnPlay').onclick = () => {
  if (!currentConte) return;
  if (synth.speaking && !synth.paused) {
    synth.pause();
    document.getElementById('btnPlay').textContent = '▶ Continuar';
    return;
  }
  if (synth.paused) {
    synth.resume();
    document.getElementById('btnPlay').textContent = '⏸ Pausa';
    return;
  }
  // Start
  const text = document.getElementById('storyText').innerText;
  utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'ca-ES';
  utterance.rate = parseFloat(document.getElementById('speedSel').value);

  const totalChars = text.length;
  utterance.onboundary = (e) => {
    if (e.name === 'word') {
      const pct = Math.min(100, (e.charIndex / totalChars) * 100);
      document.getElementById('progressFill').style.width = pct + '%';
    }
  };
  utterance.onend = () => {
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('btnPlay').textContent = '▶ Escoltar';
  };
  utterance.onerror = () => {
    document.getElementById('btnPlay').textContent = '▶ Escoltar';
  };

  synth.speak(utterance);
  document.getElementById('btnPlay').textContent = '⏸ Pausa';
};

document.getElementById('btnStop').onclick = stopSpeech;

document.getElementById('speedSel').onchange = () => {
  if (synth.speaking) {
    stopSpeech();
    document.getElementById('btnPlay').click();
  }
};

// Search
document.getElementById('searchInput').oninput = (e) => {
  searchQuery = e.target.value;
  renderGrid();
};

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeConte();
});

renderAll();
</script>
