    id:14, emoji:'🧂', title:'L\'Amor és com la Sal',
    tema:'Valors', tags:['rei','filla','sal','amor','saviesa','gust'],
    resum:'Una princesa sàvia diu al seu pare que l\'estima com la sal, i ell aprèn el valor d\'allò senzill.',
    text:`<p>En un regne pròsper i benestant, envoltat de camps fèrtils i mercats animats, hi havia un rei vell que havia governat amb justícia durant molts anys. Tenia tres filles, totes tres belles i educades, però tan diferents entre elles com tres estacions de l'any. La gran era ambiciosa i calculadora. La mitjana era vanidosa i capritxosa. La petita, que es deia Mireia, era senzilla, directa i tenia aquella rara qualitat de dir sempre el que pensava de debò, sense adornaments ni exageracions.</p>

<p>El rei, que envellint s'havia tornat sentimental i necessitava afirmació, va convocar les tres filles al saló del tron un dia de tardor. «Filles meves», va dir des del seu seient elevat, «sóc vell i els dies s'acurten. Vull saber quant m'estimeu, cada una de vosaltres. Parleu.»</p>

<p>La gran va avançar amb el seu vestit de brocats daurats. «Pare, t'estimo tant com l'or del teu tresor. Tant com les joies de la corona. Tant com totes les riqueses del món juntes.» El rei va somriure satisfet. La gran era la seva favorita en aquells moments.</p>

<p>La mitjana va avançar amb el seu ventall de plomes. «Pare, t'estimo tant com la llum del sol. Tant com les flors del jardí. Tant com tot allò que és bonic i brillant en aquest món.» El rei va aplaudir. Paraules boniques per a una filla bonica.</p>

<p>La Mireia va avançar amb les mans entrellaçades i els ulls clars que no parpellejaven. Va pensar un moment, com sempre feia quan volia dir alguna cosa de veritat. «Pare», va dir finalment, «t'estimo tant com la sal.»</p>

<p>Silenci. Un silenci llarg i incòmode que es va omplir lentament de la perplelxitat del rei, que es va convertir en indignació. «¿La sal? ¿La sal? Una cosa tan barata, tan banal, tan ordinàri? ¿Això és tot el que sents per al teu pare?» La veu li havia pujat de to i s'havia aixecat del seient. «La sal és el que posen els criats a la cuina! No és res!»</p>

<p>La Mireia no va recular ni un mil·límetre. «La sal és essencial, pare. Sense sal, el menjar no sap a res. Sense sal, el cos no funciona. Sense sal, la vida és diferent. T'estimo com la sal: d'una manera que potser no veus perquè sempre hi és, però que sentiries moltíssim si un dia desaparegués.»</p>

<p>El rei, encegat per l'orgull ferit, va veure en aquelles paraules una humiliació. «Fora dels meus dominis», va dir. «Si et sembla que l'amor d'un pare val tan poc com la sal, no cal que visquis sota el meu sostre.» Les germanes van mirar la Mireia amb una barreja de compassió i alleujament: si el pare s'enfadava amb ella, deixava d'estar enfadat amb elles.</p>

<p>La Mireia va marxar sense plorar, amb la seva roba senzilla i una bossa petita de pertinences. Va anar a viure a un poble llunyà on ningú no la coneixia i va treballar de cuinera en un hostal. Era bona cuinera i aviat el seu menjar era conegut a tota la comarca.</p>

<p>Al palau, mesos després, el rei va emmalaltir. No era una malaltia de les que es curen amb medecines: era una malaltia del cos que es manifesta quan el cor no és feliç. Va perdre l'apetit. El cuiner del palau feia els plats més refinats que coneixia, però el rei no menjava. Tot li semblava insípid, sense sabor, sense vida.</p>

<p>Un dia el metge va descobrir l'error: el cuiner, en un malentès amb un criat nou, havia deixat d'usar sal en tots els àpats reials feia setmanes. Van tornar a posar sal al brou del rei i ell el va beure d'una tirada. «Finalment!» va dir. «Finalment sap a alguna cosa!»</p>

<p>En aquell moment, amb el gust de la sal a la boca, les paraules de la seva filla petita li van tornar a la memòria amb una nitidesa que el va colpir. Havia dit que l'estimava com la sal. I ell no havia vist la profunditat d'aquelles paraules fins ara, quan havia viscut sense la sal i havia comprès el que significava la seva absència.</p>

<p>Va enviar missatgers per tot el regne a buscar la Mireia. La van trobar a l'hostal, amb les mans florides de cuinar i una expressió serena al rostre. Quan va arribar al palau, el rei va baixar les escales ell mateix a rebre-la, cosa que mai no havia fet per a ningú.</p>

<p>«Tenies raó», va dir, i les paraules li costaven però eren sinceres. «L'amor que no es veu perquè sempre hi és... és el més gran de tots.» La Mireia el va abraçar i el rei, per primer cop en molt de temps, va sentir que la panxa li satisfia no per la menjar sinó per la presència de la seva filla.</p>

<p>Aquella nit van sopar tots quatre junts, amb tots els plats ben saonats, i el rei va trobar el menjar el millor que havia tastat en anys. Però sabia que no era la sal del cuiner el que ho feia especial.</p>`
  },
  {
    id:15, emoji:'🐐', title:'El Llop i les Set Cabretes',
    tema:'Aventura', tags:['llop','cabretes','mare','engany','astúcia'],
    resum:'Una mare cabra avisa els set fills del llop, però el llop les enganya amb una treta.',
    text:`<p>A la vora d'un prat verd i fèrtil, als peus d'una serralada de muntanyes blaves, hi havia una casa blanca amb finestres petites i un jardí de farigola i menta. Hi vivien una cabra mare i les seves set cabretes: totes blanques com la neu, amb els ulls daurats i les banyes petites just sortint. La mare les estimava amb bogeria i les cabretes estimaven la mare, però com totes les criatures joves, a vegades la desobeïen quan els semblava que les normes eren massa estrictes.</p>

<p>Un matí d'aquells en que la llum entra obliqua i daurada per les finestres i fa ganes de sortir, la mare va reunir les set cabretes al saló. «Avui he d'anar al mercat del poble a comprar menjar. Estaré fora fins al migdia. Mentre no hi soc, heu de tancar la porta amb forrellat i no obrir a ningú, ni per res del món.» Les cabretes van escoltar amb les orelles dretes.</p>

<p>«Però com sabem que ets tu quan tornis?» va preguntar la tercera, que era la més pràctica. «Coneixereu la meva veu», va dir la mare, «i si sou a la finestra, veureu les meves potes blanques. El llop té la veu ronca i les potes negres. No us deixeu enganyar.» Les cabretes van prometre. La mare va sortir cap al mercat.</p>

<p>Al bosc proper, el llop Grifo portava dies observant la casa. Era astut i pacient, i havia après que la pressa és l'enemic de l'èxit. Havia escoltat la conversa de la mare. Quan va veure-la marxar, va esperar una hora i va anar a la porta. Va picar amb força. «Obriu, filletes, soc la mare que torno del mercat!»</p>

<p>La primera cabreta va enganxar l'orella a la porta. La veu era molt ronca, res a veure amb la veu suau de la seva mare. «No ets la nostra mare! La nostra mare té la veu suau i tu la tens aspra com pedra!» El llop va marxar rabiüt. Va anar a un apotecari del poble i va demanar mel i suc de llimona per fer-se la veu més clara. Va prendre'n tant que la seva veu es va tornar sorprenentment suau.</p>

<p>Va tornar a la porta. «Obriu, filletes, soc la mare!» La veu era suau. Dues cabretes van anar a la finestra a mirar les potes. Eren negres. «No ets la nostra mare! La nostra mare té les potes blanques i les teves són negres!» El llop va marxar rabiüt per segona vegada. Va anar a una pastisseria i es va untar les potes de farina blanca de dalt a baix fins que van quedar blanques com la neu.</p>

<p>Va tornar per tercera vegada. Va picar suaument. Va parlar amb la veu mel·losa. Les cabretes van mirar per la finestra: potes blanques. Van escoltar: veu suau. Sis de les set cabretes van córrer a descorrre el forrellat. Només la setena, la més petita, va dir: «Espereu! Mireu-li els ulls!» Però les altres ja havien obert la porta.</p>

<p>El llop va entrar com un llamp. Les cabretes van fugir en totes direccions, amagar-se sota la taula, dins l'armari, sota el llit, darrere la cortina. El llop les va anar trobant una per una i se les va empescar totes... menys la setena, la petita, que havia tingut temps de ficar-se dins del rellotge de paret que hi havia al rebedor. El llop no la va trobar i va marxar amb la panxa plena a descansar a la riba del riu.</p>

<p>Quan la mare va tornar, va trobar la porta oberta i la casa en silenci. El cor li va caure als peus. «Cabretes! On sou?» Va sentir una veueta des del rellotge. La setena cabretes va sortir plorant i va explicar-ho tot. La mare va abraçar-la fort i va respirar profundament. «Molt bé, filla. Ara anem a buscar les teves germanes.»</p>

<p>Van anar a la riba del riu. El llop dormia estirat a l'herba roncant. Es veia que la seva panxa es movia: les cabretes eren vives. La mare va treure unes tisores afilades de la bossa del mercat i va obrir curosament la panxa del llop. Una per una, les sis cabretes van sortir sanes i estalves. La mare va omplir la panxa del llop de pedres grosses del riu i la va cosir de nou amb fil resistent.</p>

<p>Aquell any la fam havia estat terrible a tot el territori. Les collites havien fallat, els preus pujaven, i a casa del llenyataire les racions eren cada cop més petites. Una nit, en Hansel i la Gretel, que no podien dormir de gana, van sentir la conversa dels seus pares al saló. La madrastra deia: «Si continuem així, morirem tots quatre. Hem de dur els nens al bosc i deixar-los-hi. Ells ja buscaran el seu camí.» El pare es resistia, plorava, deia que no podia fer-ho. Però la madrastra insistia i insistia fins que el pare, trencat per l'esgotament, va dir que sí.</p>

<p>Quan van arribar a un lloc dens i ombrívol, el pare va encendre un foc. «Descanseu aquí. Anem a tallar llenya i tornem.» Van marxar. Els nens van esperar hores. El foc es va anar apagant. La nit va arribar i el bosc es va omplir de sorolls. Però quan va sortir la lluna, les pedres blanques brillaven al terra com una colla d'estrelles petites, assenyalant el camí de tornada.</p>

<p>En Hansel i la Gretel van seguir el camí de pedres i van arribar a casa a l'alba. El pare els va abraçar amb llàgrimes als ulls. La madrastra va posar cara sèria però no va dir res.</p>

<p>Després de setmanes, la bruixa va perdre la paciència. «Estigui gras o magre, el enfornaré avui!» Va dir a la Gretel que encengués el forn gran. Quan el forn era calent, la bruixa va demanar a la Gretel que comprovés si ja era prou calent ficant el cap a dins. La Gretel, que havia estat observant i esperant el moment, va dir: «No sé com es fa. M'ho mostreu vós?» La bruixa es va ajupir davant del forn oberto per ensenyar-li... i la Gretel la va empènyer a dins amb totes les seves forces i va tancar la porta del forn.</p>

    text:`<p>En Kai i la Gerda vivien en cases veïnes, i entre les seves finestres penjaven llosses de flors que a l'estiu es tocaven i formaven un arc de colors. Es coneixien des de petits i eren els millors amics del món, d'aquells amics que no cal explicar-los com et sents perquè ja ho saben.</p>

<p>La Gerda va arribar al palau de gel. Les guàrdies de neu, que eren ferotges, van intentar aturar-la, però les llàgrimes de la Gerda, calentes com brases, feien fondre la neu al seu voltant i obrien un camí. Va entrar al palau, que era buit i silenciós, i va trobar en Kai en una sala enorme intentant formar una paraula amb trossos de gel blau.</p>

<p>Van tornar a casa. Els jardins de les seves finestres floriren. I aquella primavera, les roses que s'entrellacaven entre les dues finestres eren les més boniques que mai s'havien vist al carrer.</p>`

    text:`<p>Al fons del mar, on la llum del sol arriba tènuement i es converteix en un joc de blaus i verds, hi havia el palau del rei del mar. Tenia sis filles, totes belles, totes dotades de cants meravellosos, totes estimant el seu món submarí. Però la més petita, la més jove, la de la cua color malva i els ulls blau profund, mirava sempre amunt, cap a la superfície, cap al món de dalt que no coneixia.</p>

<p>Quan va complir quinze anys, com dictava el costum, va tenir permís per pujar a la superfície per primera vegada. Va néixer de les ones una nit de tempesta i el primer que va veure va ser un vaixell que lluitava contra les onades gegants. A la coberta, aferrat a una corda, hi havia un jove príncep de cabells negres i ulls castanys que cridava ordres a la tripulació intentant salvar el vaixell.</p>

<p>El vaixell va enfonsar-se. La sireneta va bussejar i va agafar el príncep que s'ennegava, el va portar a la superfície i va nedar fins a una cala de sorra blanca on el va deixar. Va quedar-se al seu costat tota la nit mentre el príncep estava inconscient, escoltant el ritme de la seva respiració. A l'alba, va sentir veus que s'acostaven i va lliscar de nou al mar. El príncep es va despertar i va veure una noia del poble que el va ajudar. Va pensar que havia estat ella qui l'havia salvat.</p>

<p>La sireneta va tornar al palau, però res no era igual. Pensava en el príncep constantment, en la seva rialla, en la manera com s'havia aferrat a la corda amb tanta determinació. Va anar a visitar la bruixa del mar, que vivia en un indret fosc ple de serps i ossos de peix. «Vull tenir cames», va dir. «Vull viure al món de dalt.»</p>

<p>La bruixa li va explicar les condicions: li donaria les cames, però cada pas que donés seria com caminar sobre vidres trencats. A canvi de les cames, la sireneta li havia de donar la seva veu, la seva veu preciosa que era el seu do més gran. I si el príncep es casava amb una altra, ella es convertiria en escuma de mar el mateix matí de les noces.</p>

<p>La sireneta va acceptar. Va beure la poció i va sentir un dolor terrible. Va néixer de les ones al peu d'un penya-segat, amb unes cames llargues que mai no havia usat. Cada pas era, en efecte, com caminar sobre cristalls, però ella no va queixar-se mai. Va aprendre a caminar, a córrer, a ballar, tot en silenci perquè no tenia veu.</p>

<p>El príncep la va trobar, la va acollir al palau, li va posar un nom. Passaven hores junts i ella el feia riure amb el seu humor gestual i la seva mirada expressiva. El príncep la estimava, però d'un amor que no era el que ella necessitava. Un dia li va dir: «Hi ha una noia que va salvar-me d'una tempesta. Si la trobés, me la casaria. Ets tan bonica com ella, però ella va ser qui em va salvar.»</p>

<p>La sireneta no podia explicar-li la veritat. La veritat era que ella l'havia salvat, però no hi havia manera de dir-ho sense paraules.</p>

<p>El príncep es va casar amb una princesa estrangera que va creure que era la noia de la platja. La nit de les noces, les germanes de la sireneta van pujar a la superfície. Havien donat els seus cabells a la bruixa a canvi d'un ganivet. «Mata el príncep», van dir amb llàgrimes als ulls. «Si la seva sang toca els teus peus, tornaràs a ser sirena i viuràs.»</p>

<p>La sireneta va agafar el ganivet. Va entrar a la cambra nupcial i va mirar el príncep dormit, serè, feliç. No podia fer-ho. El va estimar massa per fer-li mal. Va llençar el ganivet al mar i va esperar l'alba a la coberta del vaixell.</p>

    resum:'El conte de com la lluna i el sol es van repartir el cel per cuidar millor el món.',
    text:`<p>Al principi del món, quan tot just s'havia creat i la terra era nova i fragant com pa acabat de coure, el Sol i la Lluna compartien el cel de la manera més desordenada imaginable. Tots dos brillaven alhora, tots dos volien ser el centre, tots dos tenien opinions fermes sobre com hauria de funcionar el cosmos, i el resultat era un caos de llum i calor que no permetia descansar a ningú.</p>

<p>El Sol era poderós, ardent, generós però una mica egocèntric. Creia que la llum i la calor eren les coses més importants del món i que sense ell res no podia viure. Tenia raó en part, però ho deia amb tanta insistència que resultava cansat. La Lluna era diferent: serena, fresca, contemplativa, amb una bellesa que no necessitava cridar per ser vista. Era platejada on el Sol era daurat, reflexiva on el Sol era directe, nocturna on el Sol era diari.</p>

<p>El problema era que quan brillaven alhora, les plantes no sabien quan créixer i quan descansar. Els animals no sabien quan dormir i quan estar desperts. Les marees s'embolicaven i els ocells cantaven a hores impossibles. Tota la natura estava desorientada.</p>

<p>Un dia la Terra, que observava tot des de baix amb la paciència infinita dels éssers antics, va parlar. La seva veu era profunda com els terratremols i suau com la brisa: «Fills meus, heu de trobar un acord. Jo necessito dos moments: un de llum i calor per créixer, i un de frescor i quietud per descansar. Sense els dos, em moriré a poc a poc.»</p>

<p>El Sol i la Lluna es van mirar. No era la primera vegada que sentien aquelles paraules, però aquell dia les van escoltar de debò. Van asseure's als dos extrems del cel i van parlar. El Sol va dir que no podia deixar de brillar, que era la seva naturalesa. La Lluna va dir que no volia desaparèixer, que tenia dret a existir. Estaven bloquejats.</p>

<p>Llavors les Estrelles, que havien estat escoltant en silenci des dels seus llocs al fons fosc del cel, van parlar totes alhora: «I si us turneuu? El Sol de dia, quan la vida necessita energia i moviment. La Lluna de nit, quan la vida necessita quietud i somni. I cada matí i cada vespre, quan es creuen, el cel es pinta de colors per celebrar el moment.»</p>

<p>El Sol i la Lluna van reflexionar. Era una solució sàvia. «D'acord», va dir el Sol. «Jo prendré el dia.» «Jo prendré la nit», va dir la Lluna. Van provar el primer torn aquella mateixa tarda: el Sol va baixar a poc a poc per l'oest, i mentre baixava el cel es va anar tenyint de taronja, rosa i porpra. I quan finalment va desaparèixer, la Lluna va pujar per l'est, plateada i serena, i darrere d'ella les Estrelles van aparèixer una per una.</p>

<p>La Terra va respirar profundament. Els animals van anar als seus caus. Les flors van tancar els pètals. Els ocells van callar. I va ser la primera nit de la historia del món: tranquil·la, fresca, plena d'una quietud que mai no havia existit abans.</p>

<p>Des d'aleshores, el Sol i la Lluna es veuen dues vegades al dia: a l'alba i al capvespre, quan el cel es pinta de colors per celebrar el seu breu encontre. I la Terra, ben cuidada pels seus dos fills, pot descansar i créixer, descansar i créixer, com ho fa des del principi dels temps.</p>`

    text:`<p>En un temps llunyà, en un país de boscos antics i castells de pedra grisa, hi havia un mercader que havia tingut fortuna i l'havia perduda. Tenia tres filles: les dues grans eren vanidoses i materialist es, i la petita, que es deia Bella, era senzilla, llegia molt i estimava les coses simples. Quan el mercader va perdre els seus vaixells en una tempesta, van haver de marxar a viure a una casa petita al camp, i les dues grans es van queixar amargament mentre la Bella s'hi adaptava amb bona disposició.</p>

<p>Un dia el mercader va saber que un dels seus vaixells havia aparegut, carregat, en un port llunyà. Va sortir a recuperar la mercaderia. Les filles grans van demanar vestits i joies. La Bella va demanar una sola cosa: «Porta'm una rosa.» Era hivern i no n'hi havia al jardí.</p>

<p>El mercader va recollir la mercaderia, però en el viatge de tornada, una nevada el va sorprendre al bosc. Perdut i glaçat, va trobar les llums d'un castell entre els arbres. Va entrar. Estava buit però preparades les taules amb el millor menjar, les llars enceses, les cambres prestes. Va menjar i va dormir com si fos a casa seva, sense veure ningú.</p>

<p>Al matí, al jardí del castell, va veure roses vermelles en ple hivern. Va tallar una per a la Bella. En aquell moment va sentir un rugit que va fer tremolar les parets. Una figura enorme, aterridora, meitat home meitat bèstia, va aparèixer. «M'has acollit, et vaig donar menjar i llit, i ara em robs la rosa!» La veu era profunda com un tro. «Moriràs per això.»</p>

<p>El mercader va implorar, va explicar que era per a la seva filla. «Doncs tornarà en el teu lloc en tres dies», va dir la Bèstia. «O tornes tu a morir.» El mercader va tornar a casa amb la rosa i ho va explicar tot. La Bella va dir immediatament: «Jo vaig a anar. No et posaràs en perill per mi.»</p>

<p>Al castell, la Bèstia va rebre la Bella amb una fredor que amagava una nerviositat profunda. Li va assignar la millor habitació, li va dir que podia accedir a totes les biblioteques i jardins, i li va imposar una sola condició: sopar junts cada nit. La Bella va acceptar.</p>

<p>Els primers dies van ser difícils. La Bèstia era brusca, s'expressava malament, no sabia tenir converses suaus. Però la Bella, que llegia molt i pensava molt, va anar descobrint que darrere les paraules torpes hi havia idees interessants, que darrere la cara fereste hi havia uns ulls que brillaven quan ella deia alguna cosa que el feia pensar. La Bèstia tenia una biblioteca enorme i la deixava usar lliurement. Li portava flors cada dia. Li demanava opinió sobre qualsevol tema.</p>

<p>Cada nit, al sopar, la Bèstia li feia la mateixa pregunta: «Bella, et casaries amb mi?» I cada nit, la Bella deia que no. Però cada nit, la seva resposta era menys segura que el dia anterior.</p>

<p>Un dia, mirant al mirall màgic que la Bèstia li havia regalat per que pogués veure el seu pare, va veure que el pare era malalt. Va demanar permís per anar a casa. La Bèstia li va donar un anell màgic. «Gira'l tres vegades i apareixeràs a casa. Però torna en set dies, Bella. Si no tornes...» No va acabar la frase. Però la Bella va veure a la seva mirada que si no tornava, la Bèstia moriria de pena.</p>

<p>Va anar a casa, va cuidar el seu pare. Les germanes, envejoses de la seva vida al castell, van amagar el rellotge perquè no sabés el pas del temps. Van passar els set dies sense que ella se n'adonés. La nit del vuitè dia va tenir un somni terrible: la Bèstia estava moribunda al jardí del castell, estirada sobre les roses.</p>

<p>Va agafar l'anell, el va girar tres vegades i va aparèixer al jardí. La Bèstia hi era, inconscient, respirant amb dificultat. La Bella es va agenollar al seu costat. «No moris, si us plau. M'adono que t'estimo. T'estimo de debò.» Va agafar-li la mà enorme entre les seves mans petites i va plorar.</p>

<p>Una llum es va estendre pel jardí. Lentament, la figura terrible de la Bèstia va canviar: es va fer més petita, va perdre les urpes i el pelatge, i on havia estat la Bèstia hi havia un jove príncep de cabells foscos i ulls castanys, feble però viu. Un encanteri l'havia transformat anys enrere, per un acte de superficialitat i crueltat. Només l'amor sincer d'algú que el conegués tal com era podia trencar l'encanteri.</p>

<p>Van viure junts al castell, que va tornar a la seva esplendor. La Bella va fer portar el seu pare a viure amb ells. I cada nit, al sopar, el príncep li portava una rosa vermella, recordant el que havia costat arribar fins allà.</p>`
  },

    id:21, emoji:'🍄', title:'Els Gnoms del Bosc',
    tema:'Màgia', tags:['gnoms','bosc','tresor','nens','secrets','Sant Joan'],
    resum:'La Marta i el seu germà Pau descobreixen el secret dels gnoms que viuen sota els bolets.',
    text:`<p>Al bosc que hi havia darrere de can Puig, la masia més antiga del poble, hi havia una zona que els adults evitaven sense saber ben bé per qué. No era un lloc fosc ni perillós: era simplement diferent. Els arbres hi creixien d'una manera que semblava una mica massa ordenada per ser natural. Els bolets que hi sortien eren perfectament rodons i d'un vermell massa viu. I quan bufava el vent en aquella direcció, portava de vegades un so que s'assemblava molt a campanes molt petites i molt llunyanes.</p>

<p>La Marta, que tenia onze anys i llegeria molta menys que el seu germà Pau de nou, havia sentit la llegenda dels gnoms des que era petita. La iaia n'explicava les histories mentre feia mitja vora del foc: éssers petits com la mà d'un home gran, amb barrets rodons de colors, que vivien sota la terra i sortien de nit per treballar. Guardaven els tresors del bosc, cuidaven les arrels dels arbres i sabien on brotarien les fonts. No eren ni bons ni dolents: eren els del bosc, i prou.</p>

<p>Pau era escèptic. «Són llegendes de gent que no tenia televisió», deia. Però la nit de Sant Joan, quan la iaia va dir que si algú passava la nit al bosc podria veure-ho, Pau va acceptar l'envit. «D'acord. Anem i demostrem que no hi ha res.»</p>

<p>Van demanar permís als pares, que van dir que sí amb la condició de no allunyar-se de la vora del bosc. Van portar mantes, cistella amb pa i fruita, i una llanterna petita. Es van asseure darrere d'un roure gran, ben amagats, mirant cap a la zona dels bolets vermells. La foguera de Sant Joan del poble es veia lluny, i de tant en tant n'arribava la música.</p>

<p>Les hores van passar. Pau s'estava adormint. Marta s'aguantava els ulls oberts amb la força de la voluntat. L'una de la matinada. Les dues. Pau roncava suaument. Les tres. Marta estava a punt de cedir quan va veure la primera llum.</p>

<p>No era la llum de la foguera ni de cap llanterna: era una llum verda i tènue que sortia de la base d'un dels bolets grossos. Marta va sacsejar el germà. «Pau! Mira!» Pau va obrir els ulls somicant i va emmudir.</p>

<p>De la base de cinc bolets diferents sortien les llums, i amb les llums sortien figures. Eren petites, no més grans que una ampolla, amb barrets còncavs d'un roig intens i roba de color de molsa. Portaven eines minúscules: rastells, pales, cistelles. I mentre treballaven, cantaven alguna cosa que des de la distància sonava com el xipolleig d'un rierol.</p>

<p>Van treballar durant hores, fins que l'alba va començar a pàl·lidar el cel. Llavors van recollir les eines, van tornar als seus bolets i les llums es van apagar. El bosc va quedar en silenci. La Marta i el Pau es van mirar. Cap dels dos no va dir res durant una bona estona.</p>

<p>«D'acord», va dir Pau finalment. «Hi ha gnoms.» La Marta va somriure però no va dir "ja t'ho deia". El camí de tornada a casa el van fer en silenci, processant el que havien vist. La iaia els esperava a la cuina amb xocolata calenta.</p>

<p>Aquell matí, la Marta va deixar una galeta de mel i un trosset de formatge vora el bolet més gran. L'endemà, la galeta i el formatge havien desaparegut i al seu lloc hi havia una pedra verda, llisa i brillant com si l'haguessin polida durant anys. La Marta la va guardar a la bossa. El vell del poble, quan li va ensenyar, va dir: «La pedra verda del gnoms porta prosperitat a qui guarda els seus secrets.»</p>

<p>La Marta i el Pau mai van parlar d'aquella nit a ningú que no fos la iaia. I la pedra verda va quedar sobre la finestra de la Marta, captant la llum del matí, any rere any, brillant com un secret viu.</p>`
  },

    id:22, emoji:'🐓', title:'El Gall de Sant Pere',
    tema:'Llegenda', tags:['gall','Sant Jaume','miracle','pelegrí','Camí de Santiago'],
    resum:'La llegenda del gall rostit que va ressuscitar per demostrar la innocència d\'un pelegrí.',
    text:`<p>Fa molts segles, en els temps en que el Camí de Sant Jaume estava ple de pelegrins que caminaven des de tots els racons d'Europa cap a Compostel·la, un pare i un fill de terra alemanya havien emprès el llarg viatge. Caminaven des de feia mesos, amb les boques i el cor plens de pregàries, dormint als hostals del camí i menjant el que els donaven de caritat.</p>

<p>Un vespre van arribar a la vila de Jaca, als Pirineus aragonesos. Era una vila gran i animada, plena de pelegrins de totes les procedències. Van trobar hostal a la posada del Gall Ros, un establiment de bona fama. El posader els va donar sopar i llit per uns quants diners, i van descansar del cansament del camí.</p>

<p>Però durant la nit, la filla del posader, que s'havia encapritxat del jove pelegrí, va ficar dins la motxilla del noi una copa de plata de la posada. Quan al matí el posader va descobrir que faltava la copa i la va trobar a la motxilla del pelegrí, va cridar els guàrdies. El jove va ser acusat de robatori. A aquells temps, el robatori en una posada es pagava amb la mort.</p>

<p>El pare suplicava la innocència del seu fill. El fill jurat que no havia robat res. Però l'evidència era la copa a la motxilla i la paraula de la filla del posader. El jutge va condemnar el noi a morir penjat aquell mateix dia. El pare, desesperats, no sabia on anar. Va anar a l'església i va pregar a Sant Jaume amb tota l'ànima.</p>

<p>Mentre pregava, li va semblar sentir una veu que li deia: «Vés al jutge i diga-li: "El meu fill és tan innocent com viu és aquell gall rostit que teniu a la taula."» El pare va aixecar el cap sorprès. Era una idea absurda. El gall era rostit, havia estat al forn hores, estava damunt de la taula del jutge llest per ser menjat. Però la veu era tan clara i ferma que el pare va decidir obeir.</p>

<p>El jutge estava assegut a taula amb la família, a punt de començar el dinar. El gall rostit, perfumat de romaní i all, era al centre de la taula. El pare va entrar, es va agenollar i va dir les paraules que li havia dit la veu. El jutge va mirar el gall, va mirar el pare, va riure. «Vell, estàs desesperat. Un gall rostit no pot viure.» Va alçar el ganivet per tallar el primer tros.</p>

<p>En aquell moment, el gall va sacsejar les ales. El jutge va deixar caure el ganivet. La família va pegar un crit i va recular. El gall es va posar dret sobre la safata, va batre les ales tres vegades i va cantar tres cops. Era viu, rostit i tot, viu amb aquella vitalitat impossible que no pot tenir cap explicació racional.</p>

<p>El jutge va quedar pàl·lid com un llençol. Va manar parar l'execució immediata, va alliberar el jove pelegrí i va fer una investigació que va revelar aviat que la culpable era la filla que havia col·locat la copa. El pare i el fill van continuar el seu camí cap a Compostel·la, amb el cor ple d'aquell miracle que havien viscut.</p>

<p>Des d'aquell dia, la llegenda del Gall de Sant Jaume és una de les més famoses del Camí. A moltes esglésies que voregen la ruta de pelegrins hi ha un gall de metall o ceràmica al campanar o al portal. I els pelegrins que ho saben, quan passen, miren el gall i recorden que la fe pot fer viure allò que semblava mort per sempre.</p>`
  },

    id:23, emoji:'🐉', title:'Sant Jordi i el Drac',
    tema:'Llegenda', tags:['drac','princesa','cavaller','rosa','Catalunya','23 d\'abril'],
    resum:'El cavaller Jordi allibera la princesa de Montblanc del drac que aterroritzava la comarca.',
    text:`<p>A les terres del Penedès i el Camp de Tarragona, als peus de la Conca de Barberà, s'alça la vila de Montblanc amb les seves muralles medievals que semblen haver sortit d'un altre temps. I és precisament allà, o prop d'allà, on la llegenda de Sant Jordi i el drac va tenir lloc, en aquells segles obscurs en que el bé i el mal s'enfrontaven d'una manera directa i sense matisos.</p>

<p>El drac havia arribat a la comarca feia una generació. Era enorme, amb escates de color de ferro rovellat, ales que podien cobrir un camp de blat quan les estenia, i un buf de foc que podia abrasar una granja en qüestió de minuts. S'havia instal·lat en una cova vora el llac que hi havia a l'est de la vila i des d'allà sortia a devastar els camps, cremar els masos i terroritzar la gent.</p>

<p>Al principi el poble va intentar lluitar. Van enviar cavallers armats, però el drac era invulnerable a les llances i espases convencionals. Van intentar enverinar l'aigua del llac, però el drac no en bevia. Van intentar incendiar la cova, però el foc era el seu element i el feia riure. Finalment, desesperats, van fer un acord terrible: cada any sacrificarien dos joves al drac, tirats a la cova, i el drac es comprometia a no atacar el poble durant aquells dotze mesos.</p>

<p>Durant anys aquest acord funest es va mantenir. Cada tardor se sortejaven dos noms i els infortunats eren portats a la cova enmig del plor de tota la seva família. El rei de Montblanc havia intentat canviar la situació, havia enviat missatgers a demanar ajuda a d'altres regnes, però ningú no venia a lluitar contra un drac per un poble llunyà.</p>

<p>Un any terrible, el sorteig va recaure sobre la princesa mateixa. Era l'única filla del rei, i tot el poble va quedar colpit de dolor. El rei va oferir totes les riqueses del regne a qui salvés la seva filla. Ningú no es va presentar. El dia fixat, la princesa va ser vestida amb roba blanca i portada en processó fins a la roca prop de la cova on el drac esperava.</p>

<p>Era una tarda de tardor amb el cel baix i gris. La princesa estava encadenada a la roca i el poble s'havia allunyat. De sobte, el soroll de cascos sobre pedra va fer-se sentir des del camí. Un cavaller de cavall blanc apareixia pel revolt. Portava armadura clara i un escut amb una creu vermella sobre fons blanc. Era Jordi, un oficial de l'exèrcit romà de religió cristiana que viatjava cap al sud.</p>

<p>Va veure la princesa encadenada, va aturar el cavall i li va preguntar el que passava. Ella li va dir que marxés, que el drac no tardaria. «No me'n vaig», va dir Jordi. Va ajudar la princesa a deslligar-se i li va demanar que aguantés el seu cavall mentre ell esperava el drac.</p>

<p>El drac va sortir de la cova com un terratrèmol, rugint, bufant foc. Jordi va carregar contra ell amb la llança. La primera passada va ferir el drac a l'ala. El drac va respondre amb un raig de foc que va cremar el broquel del cavaller però no va tocar l'home. Jordi va girar el cavall i va carregar de nou. La llança va penetrar entre les escates del coll del drac.</p>

<p>La batalla va durar una bona estona. El drac era enorme i fort, i Jordi sabia que no podia perdre la concentració ni un instant. Finalment, amb un darrer esforç, la llança de Jordi va travessar el punt feble del drac, just darrere del cap, i el monstre va caure amb un darrer rugit que va fer tremolar els murs de Montblanc.</p>

<p>De la sang del drac que queia a terra van brotar flors vermelles. Jordi en va recollir una, la primera rosa que naixia d'aquella sang, i la va oferir a la princesa. El poble, que havia vist tot des de lluny, va sortir corrent a celebrar. El rei va voler omplir Jordi d'or i títols, però el cavaller va declinar. «Faig el que és just. No cal recompensa.» Va pujar al cavall i va continuar el seu camí cap al sud.</p>

<p>Aquell any, a la tardor, es va conèixer que Jordi havia sigut martiritzat a terres llunyanes per la seva fe. Però la seva memòria va quedar-se per sempre a Catalunya, i el poble va fer-lo patró. Cada vint-i-tres d'abril, els homes regalen roses i les dones llibres: les roses, en record d'aquella primera rosa que va brotar de la sang del drac; els llibres, perquè en aquell dia va morir Cervantes i Shakespeare, i perquè la cultura és l'altra manera de vèncer els dracs.</p>`
  },

    id:24, emoji:'⛰️', title:'La Llegenda de Montserrat',
    tema:'Llegenda', tags:['muntanya','Moreneta','pastors','llum','Catalunya'],
    resum:'La llegenda de com uns pastors van descobrir la imatge de la Mare de Déu de Montserrat.',
    text:`<p>La muntanya de Montserrat, amb els seus pics de pedra grisa tallada com dents de serra gegants, ha estat sempre un lloc que invita a la contemplació. Des dels temps antics, els habitants de les terres del voltant sentien que aquells cims tenien quelcom especial, una presència difícil de descriure però impossible d'ignorar: un silenci diferent del silenci dels altres llocs, una qualitat de la llum que no era del tot natural, una sensació que el temps fluïa d'una altra manera entre aquelles roques.</p>

<p>Corria l'any 880, aproximadament, quan tot va passar. Era un dissabte a la tarda i uns pastors que guardaven els ramats als marges del Llobregat van veure, des de baix, una llum que baixava del cel cap a les roques escarpades de la muntanya. No era la llum del sol ni la de cap foc conegut: era una llum blanquinosa i quieta, acompanyada d'una música que semblava venir de molt lluny i molt a prop alhora, una música sense instruments identificables, suau i persistent.</p>

<p>Els pastors, espantats i meravellats alhora, van baixar corrents al poble de Manresa a explicar-ho al bisbe Gondemar. El bisbe els va escoltar amb atenció. Era un home de fe profunda però al mateix temps pràctic, i no volia enganyar-se ni enganyar els altres amb visions que podrien tenir una explicació racional. Va decidir pujar a la muntanya amb un grup de clergues i els propis pastors per investigar.</p>

<p>Aquell dissabte al vespre van pujar els camins de pedra de Montserrat. No era un pujada fàcil: la muntanya era escarpada i els camins estrets i perillosos. Però quan van arribar a l'indret que els pastors havien senyalat, van sentir ells mateixos la música i van veure la llum, que semblava concentrar-se en una cova estreta entre les roques.</p>

<p>Van entrar a la cova amb les llanternes i al fons, en un nínxol de pedra natural, van trobar la imatge. Era una talla de fusta, fosca de l'edat i la humitat, petita, no més alta d'un braç de nen. Representava la Mare de Déu asseguda amb el nen Jesús als braços. La cara era serena i grave, i tenia aquella expressió que no és exactament alegria ni tristesa, sinó alguna cosa molt més profunda i difícil de nomenar.</p>

<p>El bisbe Gondemar va quedar en silenci davant de la imatge durant llarga estona. Finalment va dir: «Baixem-la a Manresa. Li construirem una capella digna.» Van agafar la imatge amb tota la reverència possible i van iniciar el descens. Però quan van arribar a un cert punt del camí, la imatge es va tornar tan pesada que quatre homes forts no la podien moure ni un centímetre.</p>

<p>La van deixar reposar. Al cap d'una estona l'agafaren de nou i era lleugera com sempre. Però quan tornaven a arribar a aquell punt del camí, altra vegada immòbil, altra vegada pesant com una roca. Ho van intentar tres vegades. La tercera, el bisbe va comprendre el missatge.</p>

<p>«La Verge vol quedar-se a la muntanya», va dir. «No és nosaltres qui l'acollim: és ella qui ens acull a nosaltres. Construirem la capella aquí dalt.» Van tornar la imatge a la cova i van baixar a organitzar la construcció. Al principi va ser una capella petita de pedra. Al llarg dels segles, generació rere generació, la capella va créixer fins a convertir-se en el monestir enorme que coneixem avui.</p>

<p>La imatge, que la gent va batejar la Moreneta per la seva fusta fosca, va ser proclamada patrona de Catalunya al segle XIX. Cada any, milers i milers de persones pugen a Montserrat: alguns per fe, alguns per curiositat, alguns per la bellesa del paisatge. Però tots senten aquella qualitat especial de la llum i del silenci que els pastors van notar aquell dissabte de l'any 880. I molts, sense saber-ho, estan repetint el mateix gest: aixecar els ulls cap a quelcom que els supera i que, misteriosament, els acull.</p>`
  },
{
    id:25, emoji:'⚔️', title:'El Rei Artús i l\'Espasa a la Roca',
    tema:'Aventura', tags:['rei','espasa','Excalibur','cavaller','Merlí'],
    resum:'El jove Artús treu l\'espasa Excalibur de la roca i descobreix el seu destí de rei.',
    text:`<p>Anglaterra estava sumida en el caos. El rei Uther Pendragon havia mort sense declarar successor i els senyors feudals s'havien llançat els uns contra els altres en guerres que devastaven els camps i buidaven els pobles. La gent patia, els camins eren perillosos i la justícia havia desaparegut de moltes terres.</p>

<p>El savi Merlí, que coneixia el passat i veia parts del futur amb una claredat que ell mateix sovint trobava pesada, va fer el que va considerar necessari: va portar l'hereu legítim, el fill secret d'Uther, a criar amb un bon cavaller de províncies perquè creixés com un nen normal, sense saber qui era. El nen es deia Artús.</p>

<p>Artús va créixer com el fill petit d'un cavaller honrat. El seu germà adoptiu Kay era impulsiu i valent, sempre preparat per a la batalla. Artús era diferent: observador, reflexiu, curiós sobre tot, amb un sentit de la justícia que semblava nat amb ell. Quan el cavaller adoptiu el renyava per defensar el fill del moliner contra els fills dels nobles, Artús deia simplement: «Tenia raó ell.»</p>

<p>Quan Artús tenia disset anys, Merlí va fer difondre la notícia per tot el regne: a la plaça de Londres hi havia una roca, i clavada a la roca hi havia una espasa magnífica. Al costat de l'espasa, una inscripció deia: «Qui tregui aquesta espasa d'aquesta roca és el legítim rei d'Anglaterra.» Cavallers de tot el país van venir a provar-ho. Senyors poderosos, guerrers famosos, homes forts com roures. Ningú no va poder moure l'espasa ni un mil·límetre.</p>

<p>Un dia de Nadal, el cavaller adoptiu va dur Kay i Artús a un torneig a Londres. Kay havia oblidat la seva espasa a la posada. Artús va oferir-se a anar a buscar-la, però la posada estava tancada per la festa. Caminant de tornada, va veure l'espasa a la roca de la plaça. «Aquí n'hi ha una que ningú no sembla voler», va pensar. Va agafar-la amb les dues mans, va fer una tirada i l'espasa va sortir com si mai no hagués estat encastada.</p>

<p>Quan Kay va veure l'espasa va quedar mut. Quan el pare va llegir la inscripció a la roca va quedar mut també. Van córrer a Merlí, que esperava tranquil·lament a la taverna del costat. «Ho sabia», va dir el savi. «Porten el noi davant dels senyors del regne.»</p>

<p>Artús va ser presentat davant de tots els grans senyors d'Anglaterra. Molts es van negar a acceptar que un noi desconegut, criat per un cavaller de poca importància, pogués ser el rei. Van exigir que tornés a clavar l'espasa a la roca i que tothom provés de nou. Artús ho va fer. Cada gran senyor va intentar treure-la. Cap va poder. Artús la va treure sense esforç aparent, davant de cent testimonis.</p>

<p>Va ser coronat en una cerimònia que els cronistes diuen que va durar tres dies. Artús, en el seu discurs de coronació, va dir quelcom que ningú no havia dit mai cap rei d'Anglaterra: «Governaré per a tots, no per als poderosos. La justícia no tindrà dos pesos ni dues mesures. I reuniré tots els cavallers del regne en una taula rodona on ningú no estigui per damunt de ningú.»</p>

<p>La Taula Rodona va ser creada i al voltant d'ella es van aplegar els cavallers més lleials, justos i valents del regne. Van emprendre aventures llegendàries, van enfrontar-se als tirans, van protegir els febles. I el nom del rei Artús va perdurar segles i segles, no per l'espasa ni per les batalles, sinó per aquella idea simple i revolucionària: que tots els que seuen a una taula mereixen el mateix respecte.</p>`
  },

    id:26, emoji:'🦢', title:'El Patito Lleig',
    tema:'Valors', tags:['anec','cigne','diferència','acceptació','transformació'],
    resum:'Un pollet que tothom rebutja per ser diferent i descobreix que és un cigne magnífic.',
    text:`<p>A la vora d'un estany tranquil, entre canyes i nenúfars, una àneda de plomatge marró i ulls daurats covava set ous durant un llarg juny de calor humida. Cada matí els girava amb el bec, cada tarda els escalfava amb el cos, cada nit vetllava perquè cap predador no s'hi acostés. Finalment, un dilluns de juliol, el primer ou va esquerdar-se.</p>

<p>Els sis primers polls van néixer idèntics: rodons, grocs, amb els becalls plans i els ulls negres brillants. Perfectament ànecs, perfectament bonics per a una mare àneda. El setè ou tardava més. Quan finalment va esquerdar-se, el pollet que en va sortir era diferent: gran, amb les potes llargues i torpes, el plomatge gris fosc en lloc de groc, el coll llarg on els altres tenien el coll curt.</p>

<p>La mare el va mirar un moment amb aquella mirada analítica que tenen les mares. «Bé», va dir, «és meu i l'estimo.» I el va empollar igual que als altres.</p>

<p>Però els problemes van arribar aviat. Als altres animals de l'estany, el pollet gris no els semblava un ànec. Les ànedes velles el picaven quan passava. Els polls de gallina s'apartaven quan s'apropava. Fins als seus propis germans deien: «Per qué ets tan gran? Per qué tens el coll tan llarg? Per qué no sembles normal?» El pollet intentava no fer cas, però les paraules feien mal igual que les picades.</p>

<p>Un dia la mare el va portar a nedar amb els altres i el pollet va descobrir que nadava millor que tots ells. Estirava el coll i lliscava per l'aigua d'una manera elegant que els ànecs no podien imitar. Però en comptes d'alegrar-se, els altres se'n van burlar: «Mira com nedà! Sembla que vol imitar els cignes!» I tots van riure.</p>

<p>Aquell tardor, quan les fulles van caure i l'aire es va tornar fred, el pollet va decidir marxar. No podia continuar vivint en un lloc on li recordaven constantment que era diferent i que la diferència era un defecte. Va marxar de nit, quan els altres dormien.</p>

<p>L'hivern va ser llarg i duríssim. Va intentar viure amb uns ànecs salvatges al llac congelat, però l'acabaven rebutjant. Va trobar refugi en una granja, però el gat el perseguia i el gall el picava. Va sobreviure l'hivern sol, menjant el poc que trobava, dormint a la vora dels rierols on l'aigua no es glaçava del tot.</p>

<p>Moltes nits, quan el fred era tan intens que les llàgrimes li glaçaven a les galtes, volia rendir-se. Però alguna cosa al fons del seu cos, alguna memòria cel·lular més antiga que ell, li deia que resistís. Que esperés.</p>

<p>Va arribar la primavera. Els arbres van brotar. L'estany es va desgelar. El pollet, que ja no era un pollet sinó quelcom entre la criatura que havia sigut i la que seria, va arrossegar-se fins a la vora de l'estany. Va veure que uns animals blancs i elegants nedaven al centre: llargs, graciosos, amb el coll arquejat en aquella forma inconfundible. Cignes.</p>

<p>Va pensar que s'allunyarien o el rebutjarien, com tots els altres. Va baixar el cap per no veure el seu propi rebuig reflectit als seus ulls. Però quan va mirar l'aigua, no va veure el pollet gris i torpe. Va veure un cigne. Blanc, elegant, amb el coll llarg i arquejat i les ales que si les estenia cobrien mig estany.</p>

<p>Els cignes s'hi van apropar i el van envoltar. «Benvingut, germà», va dir el més gran. «Semblava que t'havíem perdut.» I en aquell moment el cigne va entendre que no havia sigut mai un ànec lleig. Havia sigut un cigne que havia nascut en el lloc equivocat, entre persones que no podien reconèixer-lo perquè mai no n'havien vist cap d'igual.</p>

<p>Va aprendre a volar aquella primavera, i quan va estendre les ales per primera vegada i va pujar al cel sobre l'estany, va veure des de dalt tota la seva vida: el dolor, el rebuig, l'hivern solitari. I va entendre que tot aquell patiment havia estat necessari per arribar a saber qui era de debò.</p>`
  },

    id:27, emoji:'🎻', title:'El Violinista Màgic',
    tema:'Màgia', tags:['violí','música','dansa','justícia','encanteri'],
    resum:'Un violinista descobreix que el seu instrument té el poder de fer ballar qualsevol persona.',
    text:`<p>En el poblet de Calaf hi havia un músic de nom Miquel que tocava el violí des dels cinc anys. Li havia ensenyat el seu avi, un vell músic que havia recorregut tota Europa tocant a les fires i als palaus, i que havia tornat al poble amb una memòria plena de músiques i un violí vell que havia pertangut, deia, a un músic de Budapest que havia pastat les seves cançons amb esperit de duende.</p>

<p>El violí era vell i tenia algunes esquerdes als costats, però sonava amb una riquesa i una profunditat que cap instrument nou podia igualar. Miquel el cuidava com si fos un ésser viu: l'afinava cada matí, el guardava en una capsa forrada de vellut, el nettejava amb un drap especial que el seu avi li havia deixat.</p>

<p>Va descobrir el poder del violí per casualitat. Un tarda que tocava a la plaça del mercat, va veure que l'avar del poble, un home que no havia ballat mai en la seva vida i que feia anys que no somreia, caminava d'una manera estranya: els seus peus es movien al ritme de la música sense que ell semblés controlar-los. Va intentar aturar-se. No va poder. Va ballat tota la melodia, vermell com un tomàquet, i quan Miquel va parar de tocar, l'avar va quedar plantat enmig de la plaça bufant i mirant-se els peus com si fossin traïdors.</p>

<p>Miquel ho va provar de nou. Quan tocava, la gent havia de ballar. No podien evitar-ho: fos quina fos la seva dignitat o el seu rang, si escoltaven el violí de Miquel els peus els seguien. Però quan parava, l'efecte s'acabava immediatament.</p>

<p>Va usar el poder amb prudència i generalment per alegrar la gent. Però un dia el jutge del districte, un home corrupt que havia enviat a la presó un home innocent per embutxacar-se les terres del condemnat, va venir a reclamar una deute injust al pare de Miquel. Miquel va treure el violí i va tocar.</p>

<p>El jutge va ballar. Va ballar al mig del carrer, davant de tot el poble. Va ballar fins que va caure de genolls suplican que parés. Miquel va parar. El jutge, esgotat i humiliat, va dit que renunciava al deute fals. Però quan es va recuperar, va convocar Miquel davant del tribunal per usar-lo per "brujeria". El processava ell mateix.</p>

<p>Al judici, el jutge va demanar a Miquel que demonstrés el poder del violí davant de testimonis. «D'acord», va dir Miquel, i va tocar. El jutge va saltar de la cadira i va ballar. Els guàrdies van ballar. El secretari del tribunal va ballar escrivint al mateix temps, cosa que va produir un document de condemna absolutament il·legible. Quan Miquel va parar, tot el tribunal era un caos de persones esgotades i desconcertades.</p>

<p>El jutge, que havia provat en carn pròpia el que era no poder controlar el propi cos, va comprendre la ironia profunda de la situació. Havia volgut condemnar un home per fer-li perdre el control... i ell mateix havia perdut el control davant de tothom. Va absoldre Miquel, va alliberar el pres innocent i, diuen, va ser molt més just en les seves sentències durant els anys que li quedaven de vida.</p>

<p>Miquel va continuar tocant el violí als mercats i a les fires, fent ballar la gent quan la situació ho requeria i deixant-la quiet quan era millor. El violí del seu avi, carregat d'aquell esperit de duende que venia de Budapest, sonava cada nit al poblet de Calaf mentre la gent s'adormia escoltant-lo des dels llits.</p>`
  },

    id:28, emoji:'🏔️', title:'El Comte Mal',
    tema:'Llegenda', tags:['comte','diable','Pirineus','Conflent','llegenda'],
    resum:'La llegenda del comte del Conflent que va pactar amb el diable a canvi de poder.',
    text:`<p>Als Pirineus catalans, al cor del Conflent, s'alça el castell de Joch sobre una roca de granit que domina la plana i la vall del Tet. És un lloc que al vespre, quan la llum daura les pedres velles, sembla un lloc de contes. Però els que viuen en aquelles terres saben que el castell guarda una llegenda fosca, la de l'home que va vendre la seva ànima per tenir poder sobre tothom.</p>

<p>El Comte de Joch era un senyor poderós però mai content. Tenia terres extenses, un castell inexpugnable, vassalls obedients i més or del que podia gastar. Però volia més: volia que tots els comtes dels Pirineus s'inclinessin davant d'ell, volia que el rei de França l'anomenés el seu principal conseller, volia que el seu nom ressonés per tota la cristiandat.</p>

<p>Diuen que en una nit de tempesta d'hivern, quan els llamps queien a la vista del castell i el vent bramava pels corredors de pedra, un visitant va arribar a les portes. Era alt, prim, ben vestit, amb ulls de color de brasa i una sonrisa que no deixava de ser amable però que inquietava sense que se sabés per qué. Va demanar hostal i va ser admès.</p>

<p>Aquella nit el comte i el visitant van parlar llargament al saló del foc. El visitant coneixia tot el que el comte desitjava, com si hagués llegit el seu cor. Li va oferir poder, glòria i por per part dels seus enemics. El preu era l'ànima del comte, a recollir al moment de la mort. El comte, que no creia en les ànimes, va signar el contracte sense dubtar.</p>

<p>Durant anys, les coses van anar exactament com el visitant havia promès. El comte va créixer en poder i influència. Altres senyors li demanaven consell. El rei el va convidar a la cort. La seva fama s'estenia. Però el comte notava que alguna cosa havia canviat: cada victòria el satisfeia menys que l'anterior. Cada nova adquisició de poder deixava un buit que la següent havia d'omplir. Era com beure aigua salada: quanta més en bevia, més set tenia.</p>

<p>Quan va sentir que s'acostava la mort, va intentar escapar del pacte. Va consultar bruixots, va fer peregrinacions, va construir esglésies. Res no funcionava. La nit que va morir, el poble de Joch va veure llums estranyes al castell i va escoltar sorolls que cap explicació racional podia cobrir.</p>

<p>Al matí el castell estava buit. El comte havia desaparegut. No hi havia rastre del cos ni de cap mort natural. Però diuen que aquella nit i totes les nits de tempesta des d'aleshores, quan el vent baixa dels Pirineus amb aquella força particular que fa tremolar les portes i apa les llanternes, es sent una veu que no és el vent. Una veu que gemega i crida, que busca sense trobar, que no pot descansar perquè ja no té res propi ni aquí ni en cap altre lloc.</p>

<p>Els pares de la Vall del Conflent ensenyen als seus fills la llegenda del Comte Mal: que l'ambició desmesurada no té fons ni satisfacció possible, i que el que es guanya venent allò que ets de debò és una victòria que es converteix en cadena.</p>`
  },
  {
    id:29, emoji:'🐐', title:'Els Tres Cabrots i el Trol',
    tema:'Aventura', tags:['pont','trol','cabrots','astúcia','coratge'],
    resum:'Tres cabrots han de creuar el pont on viu un trol perillós per arribar a la pastura.',
    text:`<p>A les terres del nord, on els fjords es tallen entre muntanyes i els prats verds surten directament de l'aigua com a promeses de color en un paisatge dur, hi havia tres cabrots germans que s'havien passat l'hivern menjant l'herba seca del costat de ponent de la muntanya. Eren el Cabrot Petit, el Cabrot Mitjà i el Cabrot Gran, i tots tres tenien el mateix somni: arribar a la pastura de l'est, on l'herba era tendra i verda i creixia fins a les genolls.</p>

<p>El problema era el pont. Entre les dues ribes del riu que separava les pastures hi havia un pont de pedra vell, amb molsa als costats i l'arc central una mica escantonat per les pedres que baixaven amb les riuades de primavera. Era un pont perfectament funcional, o ho hauria sigut si no fos per el Trol.</p>

<p>El Trol vivia a sota del pont, en un espai humit i ombrívol entre les pedres i l'aigua. Era enorme, verd fosc com l'algues, amb unes mans com pales de paleta i uns ulls grocs que brillaven a la foscor. I tenia fam sempre. Qualsevol que intentés creuar el pont es trobava amb el Trol sortint de sota com un fantasma terrible, reclamant el peatge amb la seva veu com un tro: o donaves el que tenia de valor o acabaves a la seva panxa.</p>

<p>Els tres cabrots van deliberar. Creuar el pont era necessari: sense herba fresca a la primavera es debilitarien i l'hivern vinent podria ser fatal. Però enfrontar-se al Trol directament semblava suïcida. Va ser el Cabrot Petit, el més jove, el qui va proposar el pla.</p>

<p>El Cabrot Petit va ser el primer a apropar-se al pont. Les seves peülles feien un repic lleuger sobre les pedres. Trip-trap, trip-trap. De sota del pont va sortir el Trol com un volcà. «QUI VA PEL MEU PONT?» «Soc jo, el Cabrot Petit», va dir la veu prima. «I on vas?» «A l'altra riba a menjar herba fresca.» El Trol va ensenyar les dents. «Doncs me't menjaré a tu.»</p>

<p>«Però per qué perdríeu el temps amb mi, que soc tan petit i prim? Espereu el meu germà mitjà, que és molt més gras i saborós.» El Trol va pensar. Tenia lògica. «Passa, doncs, Cabrot Petit. Però que vingui l'altre.»</p>

<p>El Cabrot Petit va creuar i va córrer a l'herba. Al cap d'una estona, el Cabrot Mitjà s'apropà al pont. Trip-trap, trip-trap, però amb més pes. El Trol va sortir. «QUI VA PEL MEU PONT?» «Jo, el Cabrot Mitjà.» «T'esperava. Ara et menjaré.» «Però per qué gastar-vos amb mi, que soc medià, si el meu germà gran és molt, molt més gros?» El Trol va calcular. Millor esperar al gran. «Passa, Cabrot Mitjà.»</p>

<p>El Cabrot Mitjà va creuar i es va afegir al germà a l'herba tendra. Finalment, el Cabrot Gran s'acostà al pont. Les seves peülles feien un soroll com tambors: TRIP-TRAP, TRIP-TRAP. El pont trontollava. El Trol va sortir amb més confiança que mai. «FINALMENT! UN ÀPAT DECENT! QUI ETS?» «Soc el Cabrot Gran», va dir una veu profunda com un barril. «I t'aviso que tinc dues banyes afilades i unes peülles dures com el ferro.»</p>

<p>El Trol va riure. «Les banyes i les peülles no em fan por!» Va saltar sobre el pont. El Cabrot Gran el va esperar ferm. Quan el Trol va arribar a tocar-lo, el Cabrot Gran va abaixar el cap i va embestir amb totes les seves forces. Les dues banyes van clavar-se al pit del Trol i van llençar-lo a l'aire. El Trol va caure al riu amb un esplac enorme i la corrent forta el va portar riu avall, lluny del pont, i ningú del país no el va veure mai més.</p>

<p>El Cabrot Gran va creuar el pont tranquil·lament i es va reunir amb els seus germans a la pastura. Van menjar herba tendra tota la primavera i l'estiu, van engreixar-se i van créixer. I el pont, alliberat del Trol, va servir per creuar el riu a tothom que necessités fer-ho, i les seves pedres ja no van tornar a ser una font de por sinó simplement un camí sobre l'aigua.</p>`
  },
  {
    id:30, emoji:'⭐', title:'El Nen Estel',
    tema:'Valors', tags:['estel','vanitat','humilitat','mare','bellesa interior'],
    resum:'Un nen que es creu fill d\'un estel i aprèn que la veritable noblesa és la bondat.',
    text:`<p>Al bosc que hi havia al nord del poble, una tardor plujosa, un llenyataire va trobar sota un roure un embolcall de seda daurada que no podia ser d'allà. La va obrir amb cura i hi va trobar un nen petit i bellíssim que dormia, envoltats de fulles d'or. El llenyataire, que era bon home i tenia el cor gran, va portar el nen a casa seva malgrat que ja tenia cinc fills i la vida no era fàcil.</p>

<p>El nen va créixer i era d'una bellesa que no era d'aquell món: el cabell ros com la llum del sol, els ulls del color del cel, la pell blanca i clara. Però amb la bellesa va créixer l'orgull. Convençut que la seda daurada en que havia sigut trobat era prova del seu origen celestial, el nen va decidir que era fill d'un estel i que per tant estava per damunt dels humans normals.</p>

<p>Va deixar de tractar el llenyataire com a pare. Renyava els seus germans adoptius quan no li feien cas. Insultava els nens pobres al poble, deia que les seves robes eren brutes i la seva manera de parlar era vulgar. Quan passava una mendicant pel carrer, creuava al costat contrari fent una expressió de fàstic.</p>

<p>Un dia que una vella pelada i bruta li va demanar un tros de pa al mercat, el nen la va empènyer dient: «Fora d'aquí, que m'embrutes la roba.» La vella va caure al terra. La gent va quedar horroritzada.</p>

<p>L'endemà al matí, quan el nen es va mirar al pou, va veure que la seva cara havia canviat: estava coberta de taques i berrugues, i el seu cabell brillant havia perdut tot el color. Era lleig com mai havia imaginat que es podia ser. Va sortir corrent al carrer però la gent fugia d'ell. El llenyataire el va mirar i no el va reconèixer. Els seus germans adoptius van tancar la porta.</p>

<p>Va caminar durant dies per terres llunyanes buscant els seus parents estelars. Va trobar un home que deia conèixer el seu origen i el va vendre com a esclau. Va ser comprat i revenuts tres vegades, cada cop en pitjors condicions. Finalment, lliure per un golpe de fortuna, va vagarejar per boscos i camins, dormint a la intempèrie i menjant el que podia trobar.</p>

<p>Un dia va trobar un leprós tirat al mig d'un sender. La seva primera reacció va ser el fàstic, però va recordar la vella que havia empès i va aturar-se. Amb un esforç enorme sobre si mateix, va ajudar el leprós a aixecar-se, li va compartir el pa i l'aigua que portava i el va acompanyar fins a un abric.</p>

<p>El leprós el va mirar als ulls. I de sob te, on hi havia hagut un leprós, hi havia un home dret i noble amb roba rica. Era el rei d'un país llunyà que havia sigut encantat per una bruixa. El nen, sense saber-ho, havia trencat l'encanteri amb el seu acte de compassió.</p>

<p>El rei li va dir: «Ets el meu fill, perdut fa anys.» I era veritat: havia sigut robat de nadó i abandonat al bosc. Però el nen, en lloc d'alegrar-se immediatament, va demanar temps. Va tornar primer al poble del llenyataire. Va agenollar-se davant d'aquell home bo que l'havia criat i li va demanar perdó. Va buscar la vella que havia empès i li va portar menjar durant dies fins que va estar bé.</p>

<p>Quan finalment va anar amb el seu pare real al seu país, havia canviat tan profundament que la bellesa li havia tornat: no la bellesa superficial d'abans, sinó una bellesa diferent, la que dóna als ulls d'una persona el fet d'haver après a veure els altres de debò.</p>`
  },
  {
    id:31, emoji:'🌺', title:'La Fada del Bosc Verd',
    tema:'Màgia', tags:['fada','bosc','nena','natura','orientació'],
    resum:'Una nena es perd al bosc i una fada li ensenya a llegir els senyals de la natura.',
    text:`<p>La Júlia tenia deu anys i una curiositat que els seus pares admiraven i temien alhora. Era la nena que sempre volia saber per qué, la que llegia les etiquetes dels pots a la cuina, la que demanava als pescadors el nom de cada peix. El seu pare deia que seria científica, la seva mare deia que seria periodista, i la iaia deia que seria bruixa, i ho deia somrient.</p>

<p>La casa de les vacances estava al costat d'un bosc extens que s'estenia fins on no arribava la vista. La mare havia dit moltes vegades que no s'hi endinsés sola. Però un matí de juliol, mentre la mare dormia la migdiada, la Júlia va veure des de la finestra una papallona d'un blau que mai havia vist. Gran, lluminosa, d'un blau que semblava tenir llum pròpia.</p>

<p>Va sortir a buscar-la. La papallona entrava al bosc. La Júlia la seguia. El bosc era fresc i olorós, ple de sorolls d'ocells i la remor d'algun rierol llunyà. La papallona pujava i baixava, voltava entre les branques, i la Júlia la seguia talment fascinada que no adonava del temps ni del camí.</p>

<p>Quan la papallona va desaparèixer entre les fulles, la Júlia va aturar-se i va mirar al voltant. Tots els arbres semblaven iguals. El sol no era visible per les branques espesses. No sentia l'aigua del rierol. No reconeixia cap arbre, cap pedra. El cor li va créixer als pecs.</p>

<p>Va intentar tornar per on creia que havia vingut. Va caminar uns minuts. Res familiar. Va provar una altra direcció. Tampoc. Va seure a la base d'un roure gran i es va permetre deu segons de por. Deu segons exactes, va comptar. Després va respirar profundament i va pensar: «Bé. Estic perduda. Quines coses sé?»</p>

<p>En aquell moment va notar que de l'escorça del roure sortia una llum verda i tènue. No era un llum fort, era gairebé res, però en la foscor relativa del bosc s'hi veia. I d'aquella llum va sortir una veu, suau com el so de les fulles: «No ploris.»</p>

<p>La Júlia va mirar millor. A l'escorça del roure, el que semblava un noiot de llum verda amb cabells de molsa i ulls del color de les fulles joves la mirava. «Soc la Fada del Bosc Verd», va dir. «I no sempre ajudo als qui es perden aquí, però tu has fet quelcom interessant: en lloc de córrer i cridar, t'has aturat a pensar.»</p>

<p>«Tinc por», va admetre la Júlia. «Tothom en té», va dir la fada. «La qüestió és el que fas amb la por. Vine, t'ensenyaré alguna cosa.» Va assenyalar el rierol que es sentia llunyà. «L'aigua sempre baixa cap al poble i cap al mar. Si segueixes l'aigua, arribes a la gent.» Va assenyalar els ocells. «Els ocells que canten als arbres més alts miren cap on surt el sol, perquè busquen la llum. Al matí miren a l'est. Al vespre miren a l'oest.» Va assenyalar la molsa als arbres. «La molsa creix preferentment al costat nord dels troncs, on hi ha menys sol. Si saps on és el nord, saps on és tot.»</p>

<p>La Júlia va aprendre cada cosa amb atenció, repetint-la en veu alta per gravar-la a la memòria. La fada la va guiar fins al límit del bosc, assenyalant-li a cada pas el que hauria d'observar per trobar el camí sola si tornava a passar.</p>

<p>«Pots tornar al bosc sempre que vulguis», va dir la fada quan ja es veia la casa. «Però ara ja saps llegir-lo. Un bosc que es pot llegir no és perillós: és un amic molt gran que parla un idioma que has d'aprendre.» Va desaparèixer quan la Júlia va girar el cap un instant.</p>

<p>Des d'aleshores, la Júlia va entrar al bosc cada dia de les vacances. Va aprendre els noms de les plantes, els ocells per la veu, el camí de les fonts. I mai més no va tenir por en un bosc, perquè sabia que el bosc parlava constantment a qui sabia escoltar.</p>`
  },
  {
    id:32, emoji:'🍎', title:'Blancaneu',
    tema:'Màgia', tags:['mirall màgic','bruixa','set nans','poma enverinada','amor'],
    resum:'Una princesa fuig de la seva madrastra envejosa i viu amb els set nans al bosc.',
    text:`<p>Quan la princesa va néixer, la seva mare va mirar per la finestra la neu que queia sobre les roses del jardí i va fer un desig: «Que la meva filla tingui la pell blanca com la neu, els llavis vermells com les roses i els cabells negres com el marc de fusta de la finestra.» El desig es va complir, i per recorda-ho la van batejar Blancaneu.</p>

<p>La mare va morir quan la nena era petita. El rei es va casar de nou amb una dona de gran bellesa exterior i ànima freda, que portava consigo un mirall màgic que li havia donat un mag anys enrere. El mirall tenia el poder de dir sempre la veritat, i la nova reina li preguntava cada dia: «Mirall, mirall de la paret, qui és la més bella del reialme?» I el mirall responia: «Vós, reina, sou la més bella del país.»</p>

<p>Blancaneu va créixer i va ser-se guapa amb una naturalitat que no buscava ni presumia. Un dia, quan tenia set anys, el mirall va respondre diferent: «Reina, sou bonica, és veritat, però Blancaneu és mil vegades més bella que vós.» La reina va quedar rígida davant del mirall. La ira i l'enveja la van consumir des d'aquell moment.</p>

<p>Va cridar el seu caçador. «Porta la nena al bosc i mata-la. Com a prova, porta'm el seu cor.» El caçador va agafar Blancaneu de la mà i la va endur al bosc. Però quan va treure el ganivet i va veure els ulls clars de la nena mirant-lo sense por, no va poder. «Corre», va dir. «No tornis. Busca refugi lluny d'aquí.» Va matar un cèrvol i va portar el cor a la reina.</p>

<p>Blancaneu va córrer pel bosc fins que les cames no la podien aguantar. Quan va caure exhausta, estava davant d'una caseta petita que semblava feta per a persones molt petites: la porta era baixa, les cadires eren baixes, la taula tenia set plats petits i set tassetes. Va entrar, va menjar una mica de cada plat, va beure una mica de cada tassa, va pujar a la cambra i va trobar set llits petits. Es va estirar al setè i es va adormir.</p>

<p>Quan van tornar els set nans miners, que treballaven a les mines de la muntanya des de l'alba fins al capvespre, van trobar la caseta una mica desordenada i una nena dormint al llit del setè. Blancaneu es va despertar sobresaltada. Els nans van escoltar la seva historia i van decidir acollir-la. «Pots quedar-te si cuines i netges mentre nosaltres treballem.» Blancaneu va acceptar de bon cor.</p>

<p>Però la reina va demanar al mirall de nou i el mirall va respondre que Blancaneu vivia als set nans i era encara la més bella. Furiosa, la reina va disfressar-se tres vegades per intentar matar-la. La primera vegada de venedora de cordons de vestit: la va estrènyer tant que Blancaneu es va desmaiar, però els nans la van salvar. La segona vegada de peinadora amb pintes enverinades: els nans van treure-li la pinta. La tercera vegada de venedora de pomes: va vendre a Blancaneu una poma de la qual la meitat era sana i l'altra meitat era enverinada.</p>

<p>Blancaneu va mossegar la part enverinada i va caure morta. Els nans la van plorar amargament. Estava tan bella que no van poder enterrar-la: li van fer un taüt de vidre on la van posar al mig del bosc, i van anar a visitar-la cada dia.</p>

<p>Passat un temps, un príncep que caçava al bosc va veure el taüt de vidre. Va quedar tan meravellat per aquella bellesa immòbil que va demanar als nans que li deixessin emportar el taüt al seu castell. Mentre el transportaven, el taüt va trontollar i el tros de poma enverinada que havia quedat a la gola de Blancaneu va sortir. La noia va obrir els ulls i es va trobar mirant el cel blau i la cara sorpresa del príncep.</p>

<p>La reina, quan el mirall li va dir que Blancaneu era viva i es casava amb un príncep, va entrar en tal furor que va trencar el mirall i va sortir a interrompre el casament. Però quan va arribar al palau, els convidats la van reconèixer i la van agarrotar. Va ser jutjada pels seus crims i la justícia va fer el seu curs.</p>

<p>Blancaneu i el príncep van viure llargues vides juntes, i cada any a la tardor visitaven els set nans a la caseta del bosc i menjaven i cantaven fins a la nit. Perquè Blancaneu mai no va oblidar que els que l'havien estimada quan no tenia res eren la seva veritable família.</p>`
  },

    resum:'La jove esposa d\'un home misteriós descobreix el secret terrible que guarda la porta prohibida.',
    text:`<p>En un territori de boscos ombrívols i carrers empedrats, hi havia un home ric i poderós conegut per la seva barba de color blau fosc, que donava a la seva cara una expressió alhora impressionant i inquietant. La gent del voltant l'anomenava Barba Blava i parlava d'ell amb la veu baixa amb que es parla de les coses que fan por. Havia tingut moltes esposes i totes havien desaparegut. Ningú no sabia on eren.</p>

<p>Però Barba Blava era ric i polit quan volia ser-ho, i un noble del país va donar-li la seva filla en matrimoni. La jove s'hi va casar amb el cor inquiet però esperançat: potser les rumors no eren veritat, potser era simplement un home solitari que havia tingut mala sort.</p>

<p>La mansió de Barba Blava era enorme i plena de meravelles. Barba Blava li va donar tot el maner de claus: les de les cambres d'or, les de la sala de joies, les del celler de vi, les de les cambres dels hostes. Cada clau obria un espai ple de riqueses. I finalment li va lliurar una clau petita, desgastada, diferent de les altres. «Aquesta clau obre la porta de la torre del fons. Pots obrir totes les altres portes que vulguis. Però aquesta no. Mai.»</p>

<p>I va marxar de viatge. La jove va explorar la mansió durant dies, obrint totes les portes, descobrint sales plenes de tapisseries, sales plenes de llibres, sales plenes d'escultures. Però la curiositat per l'única porta prohibida creixia cada dia com una ferida petita que no acabava de curar.</p>

<p>Al setè dia va agafar la clau petita i va baixar al soterrani fins a la porta de la torre. La mà li tremolava. Però la curiositat era més forta que la por. Va introduir la clau al pany. Va girar. La porta va cedir.</p>

<p>El que va veure a dins era tan terrible que no ho descriurem amb detall: les esposes anteriors de Barba Blava, tot el misteri resolt d'una vegada. Va quedar paralitzada. La clau li va relliscar de les mans, va caure al terra sanguinolent i quan la va recollir estava tacada. Va intentar netejar-la però la taca no s'esborrava, per molt que fregava.</p>

<p>Va tornar dalt quan Barba Blava va arribar inesperat del viatge. Va intentar amagar la clau, però Barba Blava la va reclamar. Va veure la taca. «Has desobeït», va dir amb una veu que ja no tenia cap de la politesa anterior. «Moriràs.»</p>

<p>La jove va demanar temps per resar. Barba Blava va concedir una hora. Ella va córrer a una finestra alta i va enviar un senyal als seus germans, dos cavallers que l'anaven a visitar aquell dia. «Veniu! De pressa!»</p>

<p>Barba Blava va cridar-la. Ella va baixar l'escala a poc a poc, guanyant minuts. Quan Barba Blava aixecava el ganivet, el soroll de cascos al pati va fer-se sentir. Els dos germans van entrar espasa en mà i van interposar-se. Barba Blava, per primer cop, va recular davant de l'oposició directa. La lluita va ser breu i Barba Blava va caure.</p>

<p>La jove va heretar les seves riqueses. Va tancar per sempre la torre del soterrani. Va fer trucar un sacerdot per als qui hi havia amagats. I va viure la resta de la seva vida amb els seus germans i la seva família, mai no oblidant la lliçó doble d'aquella experiència: que la curiositat de vegades porta a llocs de no retorn, però que els secrets de la gent que estima no haurien de tenir portes prohibides.</p>`

    tema:'Natura', tags:['jardí','malaltia','amistat','curar','natura'],
    resum:'Una nena malaltissa descobreix un jardí abandonat i amb ell recupera la salut i la vida.',
    text:`<p>La Maria tenia deu anys i vivia en una casa gran i freda que era massa gran per a ella sola. La seva mare havia mort quan era petita i el seu pare passava la meitat de l'any viatjant per negocis. La cuidaven una cuinera severa i un jardiner vell que no li deia mai res. La Maria es passava els dies a la seva habitació, llegint o mirant per la finestra, i havia après a no esperar gran cosa del dia.</p>

<p>Sempre havia sigut "la nena malaltissa". Tenia mals de cap, cansament, dificultats per respirar. El metge venia cada dues setmanes i la revisava i deia que havia de reposar. La Maria reposava molt, i com més reposava pitjor es trobava. Però ningú no li deia que sortís, que corregués, que jugués a l'herba.</p>

<p>Un hivern, mirant per la finestra, va veure un mur de pedra cobert d'heura al fons del jardí. Havia notat el mur sempre, però mai li havia prestat atenció. Aquell dia, no sap per qué, va veure que darrere el mur hi havia quelcom. Va preguntar a la cuinera. La cuinera va dir que no ho sabia. Va preguntar al jardiner. El jardiner va deixar de rastellar, va quedar-se quiet un moment i va dir: «Aquell jardí és tancat des de que va morir la seva mare. No en parlem.»</p>

<p>La Maria no va poder treure la idea del cap. Durant dies va buscar per la casa fins que va trobar, amagada al fons d'un calaix de l'estudi del seu pare, una clau vella de ferro que semblava no haver-se usat en molt de temps. Va sortir al jardí de nit, va buscar la porta del mur coberta d'heura i va provar la clau. Va girar.</p>

<p>El jardí era un caos meravellós. Deu anys d'abandonament havien fet que la natura s'hi esplaiés sense restriccions: les roses havien crescut fins a cobrir els camins, les herbes pujaven fins als genolls, els arbres fruiters s'havien entrelaçat en arcs naturals, i tot plegat tenia aquella bellesa salvatge que té el que creix sense que ningú li digui com ha de fer-ho.</p>

<p>La Maria va seure a terra al mig del jardí i va mirar al cel. Era el primer cop en molt de temps que estava fora, fent res, sense cap adult al costat. Va respirar l'aire humit i fred i va sentir quelcom que no sabia nomenar: l'inici d'alguna cosa.</p>

<p>Va tornar cada dia. Al principi només mirava. Després va tocar les plantes, va aprendre a reconèixer les que eren herbes i les que eren males herbes. Va trobar un cul de cullera a terra i va començar a cavar. Va descobrir que cavar era satisfactori d'una manera inesperada, que el contacte amb la terra humida era una cosa diferent de tot el que havia experimentat.</p>

<p>Un dia un nen del poble va saltar la paret perseguint un gat. Es van mirar sorpresos. El nen, en Dickon, coneixia les plantes com ningú, parlava amb els animals i tenia aquella vitalitat que les persones que passen moltes hores a l'aire lliure acostumen a tenir. Van fer-se amics.</p>

<p>Junts van posar ordre al jardí: van podar, van plantar noves llavors, van crear camins. El jardí anava revivint, i amb el jardí la Maria anava revivint. Les seves galtes van agafar color, va deixar de tenir mal de cap, respirava millor. El metge, en la seva visita quinzenal, la va mirar sorprès. «Nena, sembla que esteu creixent.»</p>

<p>Quan el seu pare va tornar d'un viatge i va trobar la seva filla corrent per un jardí que ell havia tancat de pena deu anys enrere, va quedar parat a la porta. La Maria va córrer cap a ell i l'hi va agafar la mà. «Vine a veure el que hem fet.» El va portar al jardí i el pare va veure florir davant d'ell allò que havia enterrat: el record de la seva esposa, que estimava aquell jardí, convertit en alguna cosa nova i viva que la seva filla havia ressuscitat.</p>

<p>Va plorar, i era un plor que feia falta des de feia deu anys. I la Maria, que el va abraçar sense dir res, va entendre que curar un jardí és una manera de curar les persones, i que la millor medicina és a vegades la terra entre les mans i el cel obert sobre el cap.</p>`

    id:35, emoji:'🎠', title:'El Cavall de Cartró',
    tema:'Imaginació', tags:['nen','imaginació','cavall','aventures','creativitat'],
    resum:'Un nen pobre que juga amb un cavall de cartró i viu les aventures més increïbles.',
    text:`<p>En Tomàs era fill d'un fuster de barri i havia crescut en un carrer estret d'una ciutat antiga on els nens jugaven al carrer fins que les mares els cridaven per sopar. El seu pare li havia fet, amb taules de pi i pintura marró i una mica de llana negra per a la crinera, un cavall de cartró que era la joia de Tomàs. No tenia rodes ni mecanismes: era simplement una forma que s'assemblava a un cavall, però per a en Tomàs era el cavall més ràpid, valent i intel·ligent del món.</p>

<p>Els nens rics del final del carrer tenien cavalls de fusta pintada amb mecanismes de molla que els feien moure. Quan veien el cavall de cartró d'en Tomàs, se'n reien. «Ni tan sols és de fusta!» «Sembla un cavall de pa de pessic!» En Tomàs no s'enfadava. Els mirava amb una expressió serena que no entendrien fins molts anys més tard: la d'algú que ja sap que el que importa no és la qualitat del material sinó la qualitat de la imaginació.</p>

<p>Cada tarda, al solar abandonat darrere la botiga del seu pare, en Tomàs cavalcava. El cavall de cartró tenia un nom diferent cada dia: Vent del Nord, Llamp Daurat, Estel de la Tarda. Amb aquell cavall, en Tomàs havia batalles medievals on les forces del bé guanyaven sempre justa. Havia explorat continents sense nom on els animals parlaven i els arbres caminaven. Havia salvat presoners de torres impossibles i havia navegat mars de núvols blancs fins a illes que brillaven de lluny.</p>

<p>Un estiu van arribar al barri uns titiritaires amb un espectacle de figures i animals exòtics. En Tomàs els va anar a veure cada dia i al final es va quedar ajudant a desmuntar el decorat. El director del grup, un home gran amb bigoti gris i ulls vius, va veure el cavall de cartró que en Tomàs portava sempre sota el braç i li va preguntar per ell.</p>

<p>En Tomàs li va explicar les aventures del cavall. El director l'escoltà amb l'atenció que mereixia. «Noi», va dir quan en Tomàs havia acabat, «has de saber una cosa: jo he viatjat per mig món i he vist espectacles fets amb or i plata que no valien res. I he vist espectacles fets amb papers pintats que canviaven la vida de la gent que els veia. La diferència no era el material. Era la imaginació del qui el feia.»</p>

<p>En Tomàs va creixer. Va estudiar, va treballar, va tenir èxits i fracassos. Va escriure llibres d'aventures que llegien nens de tot el país. El seu primer llibre publicat, dedicat «al fuster del carrer estret i al cavall de cartró que em va ensenyar que tot és possible amb la imaginació adequada», es va convertir en un clàssic. A l'escriptori on treballava, entre els premis i les cartes dels lectors, hi havia sempre el cavall de cartró, una mica esquerdat i decolorat, amb la crinera de llana negra quasi tota perduda.</p>

<p>Quan els periodistes li preguntaven pel seu procés creatiu, en Tomàs sempre deia el mateix: «Primer tanco els ulls, agafo el cavall de cartró de l'escriptori i pregunto: avui, on anem?»</p>`
