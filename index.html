    id:36, emoji:'🌈', title:'L\'Arc de Sant Martí',
    tema:'Natura', tags:['colors','pluja','sol','llegenda','Catalunya'],
    resum:'La llegenda de com va néixer l\'arc de Sant Martí i per qué apareix just quan para de ploure.',
    text:`<p>En els primers temps del món, quan la terra era jove i els elements encara estaven aprenent les seves funcions, el cel era d'un sol color: el gris plat de les nuvolades contínues. El Sol i la Pluja no s'entenien bé: el Sol volia brillar sempre, la Pluja volia caure sempre, i el resultat era un cel que mai no estava del tot clar ni del tot plujós, sempre en aquell estat intermedi que no satisfeia ningú.</p>

<p>Sant Martí era el sant de la tardor, aquell soldat romà que un hivern fred havia dividit la seva capa amb un pobre que tremolava a la porta de la ciutat. No esperava cap recompensa quan ho va fer: simplement no podia deixar passar aquell home sense fer res. Era el seu caràcter: veure la necessitat i respondre.</p>

<p>Un dia Sant Martí va trobar la Pluja i el Sol en una de les seves baralles habituals. La Pluja caia tan fort que l'havia xopat fins als ossos. El Sol sortia entre les nuvolades i en pocs minuts l'assecava. La Pluja tornava. El Sol tornava. Era una baralla circular i absurda.</p>

<p>Sant Martí es va aturar a mig camí i els va cridar. «Atureu-vos un moment.» Eren insistents però no eren maleducats, i es van aturar per respecte al sant. «Mireu», va dir Sant Martí, «porteu tants anys barallant-vos que heu oblidat que el món necessita els dos. No l'un o l'altre: els dos, però en el moment adequat.»</p>

<p>La Pluja i el Sol es van mirar. Era la primera vegada que algun de fora els ho deia. «Però si els dos som aquí alhora», va dir la Pluja, «la gent es confon.» «Doncs que un vagi primer i l'altre darrere», va dir Sant Martí simplement. «I per indicar el canvi, feu quelcom especial.»</p>

<p>Van pensar. Era una bona idea però necessitaven saber com fer el senyal. Va ser la llum del Sol, filtrada per les últimes gotes de la Pluja que queien mentre ell sortia, que va trobar la solució sola: quan la llum travessa l'aigua, es descomposa en colors. Un per un, els colors de la llum van aparèixer al cel per primera vegada: vermell, taronja, groc, verd, blau, anyil i violeta, desplegats en arc d'un horitzó a l'altre.</p>

<p>La Pluja i el Sol van quedar bocabadats. Tota la terra va quedar bocabadada. Els animals van parar de fer el que feien i van alçar el cap. Les persones van sortir a les portes i a les finestres. Era quelcom tan inesperadament bonic que ningú no tenia paraules per descriure-ho.</p>

<p>«Això és el senyal», va dir la Pluja. «Quan jo acabo i tu comences.» «I si l'altra vegada que és al revés, tu fas el senyal quan comences?» va proposar el Sol. Van acordar que sempre que s'alternaven, l'arc apareixeria com a promesa de que la bona estona venia.</p>

<p>Des d'aleshores, quan para de ploure i surt el sol, l'arc de Sant Martí apareix al cel durant uns minuts, just el temps suficient per que la gent el vegi i comprengui: la tempesta ha passat, el sol arriba. I qui el veu sap que si mira ràpid i bé, de vegades al final de l'arc hi ha quelcom brillant, perquè l'arc és en si mateix la millor promesa que el cel pot fer a la terra.</p>`
  },
{
    id:37, emoji:'🌊', title:'El Corall Vermell',
    tema:'Natura', tags:['mar','pesca','corall','Costa Brava','llegenda'],
    resum:'La llegenda del pescador que va descobrir el corall vermell de les costes catalanes.',
    text:`<p>Als temps en que els pescadors de la Costa Brava sortien de nit amb llanternes penjades a la proa, quan el mar era negre i el cel ple d'estrelles i les barques eren de fusta calafatejada amb brea, hi havia al port de Palamós un pescador de nom Jaume Coral que era conegut a tota la costa per la seva destresa amb les xarxes i per la seva por de les pedres del fons. Deia que les pedres del fons guardessin secrets que els homes no havien d'intentar desvetllar.</p>

<p>Una nit de tardor, quan la tramuntana acabava d'amainar i el mar estava calmat amb aquella quietud vidriosa que ve sempre después de les grans ventades, en Jaume va llençar les xarxes més al fons que de costum. Havia vist des de la barca una coloració estranya de l'aigua en aquell punt, un to vermell fosc que no s'assembalva als reflexos normals de la lluna ni al color de les algues que coneixia.</p>

<p>Quan va recollir les xarxes al matí, venien pesades d'una manera inusual. Peixos n'hi havia pocs. Però enganxada entre les malles hi havia una branca d'una cosa que en Jaume no havia vist mai: dura com la pedra, ramificada com un arbre en miniatura, d'un color vermell intens que a la llum del sol naixent semblava que tingués foc a dins. Era preciosa i estranya alhora, i en Jaume la va agafar amb cura extraordinària, com si fos un objecte sagrat.</p>

<p>Va tornar al port abans que els altres pescadors. La gent que estava al moll preparant les barques per sortir es va acostar a mirar. Ningú no havia vist mai res igual. El vell Fideu, que tenia vuitanta anys i n'havia passat seixanta al mar, va tocar-la amb un dit i va dir: «Corall. Corall vermell. Els meus avis en parlaven com d'una llegenda. Deien que creixia al fons del nostre mar però que ningú no el trobava perquè vivia massa avall.»</p>

<p>En Jaume va portar la branca de corall a casa seva i la va posar a la finestra. Aquell mateix dia van venir a veure-la el batlle, el rector i un mercader de Girona que deia que podria vendre-la a les corts d'Europa per una fortuna. «A Roma», deia el mercader fregant-se les mans, «el corall vermell del Mediterrani val el seu pes en or. Les dames nobles el volen per als collars i els reis el volen per als ornaments del tron.»</p>

<p>En Jaume va escoltar el mercader, va mirar la branca de corall a la finestra, va mirar el mar lluny, i va dir que no. El mercader va pujar el preu. En Jaume va tornar a dir que no. «Per qué?» va preguntar el mercader, incomprensiu. En Jaume va trigar a respondre: «Perquè no és meva. La vaig trobar al mar, però el mar no me la va regalar: me la va deixar veure. Ja sé on viu. Ja sé que existeix. Amb això n'hi ha prou.»</p>

<p>El mercader va marxar sense la peça. En Jaume va baixar a la riba aquella tarda, va entrar al mar fins als genolls i va tornar a llençar la branca de corall a l'aigua. Va caure amb un splash petit i va desaparèixer a les profunditats verdes.</p>

<p>La nit següent, en Jaume va sortir a pescar al mateix lloc. Les xarxes van venir plenes com mai: merlans, déntols, llagostes grosses com el braç. Va ser la millor pesca de la seva vida, i ho va ser durant tots els anys que li quedaven de pescar. El vell Fideu, quan ho va saber, va dir: «El mar recorda als que el respecten.»</p>

<p>La llegenda del corall vermell de la Costa Brava es va estendre pels ports de la costa. Els pescadors van aprendre a buscar-lo amb respecte, a no arrabassar-lo sinó a collir-ne només el que necessitaven, i a tornar al mar el que no necessitaven. I diuen que fins avui, en les nits clares de tardor quan la tramuntana ha parat, si te n'acostes a la vora i mires prou avall, pots veure als fons del mar una coloració vermella que parpelleja com un foc secret.</p>`
  },
  {
    id:38, emoji:'🐜', title:'La Formiga i la Cigala',
    tema:'Valors', tags:['formiga','cigala','hivern','previsió','treball'],
    resum:'La cigala que canta tot l\'estiu i la formiga que treballa, i la lliçó que aprenen les dues.',
    text:`<p>A les riberes d'un riu on els oms i els pollancres feien una ombra espessa i fresca a l'estiu, hi havia una colònia de formigues que era famosa a tota la comarca per la seva organització i la qualitat de les seves provisions. Treballaven des de l'alba fins al capvespre, portant grans, llavors, bocins de fruit sec, tota mena de coses comestibles, i les portaven al formiguer que tenien excavat sota les arrels d'un alzinar vell. Era un formiguer de cinc pisos, escalfat per les arrels i protegit de la pluja per tres capes de terra compacta.</p>

<p>A la branca més alta del pollancre que hi havia just sobre el formiguer vivia la Cigala, un insecte de cos verd fosc i ales transparents que tenia la veu més potent i melodiosa de tot el bosc de ribera. Des de primera hora del matí fins al capvespre, la Cigala cantava. El seu cant omplida l'aire de ribera d'una música que feia aturar els passants al camí i que, diuen alguns, feia créixer millor l'herba.</p>

<p>Cada dia, pujant i baixant per l'arbre, la Formiga passava per la branca on la Cigala cantava. I cada dia la Cigala li preguntava el mateix: «Formiga, Formiga, per qué treballes tant? L'estiu és per gaudir, per cantar, per estimar-se! Per qué no t'atures i escoltes la música?»</p>

<p>I cada dia la Formiga responia el mateix: «Perquè l'hivern ve, Cigala. I l'hivern no canta.» I continuava pujant o baixant sense aturar-se.</p>

<p>La Cigala s'ho prenia amb filosofia. «L'hivern és lluny! Avui tenim sol i flors i el riu que canta. Deixa el demà per al demà.» I continuava cantant.</p>

<p>L'estiu va ser llarg i generós aquell any. L'herba era alta, els fruits eren grans, el riu baixava clar i abundant. La Cigala va cantar cada dia sense oblidar-ne cap. La Formiga va treballar cada dia sense descansar cap tarda. Quan van arribar les primeres pluges de setembre, el formiguer estava tan ple de provisions que havien hagut d'obrir un sisè pis.</p>

<p>Octubre. Novembre. Les fulles van caure. El riu va baixar i es va tornar gris i fred. La Cigala, que havia passat tota la vida a les branques altes, va descobrir que les branques nues de l'hivern no eren el mateix que les branques plenes de fulles de l'estiu. El fred la feia tremolar. I el pitjor: les flors i les fruites que menjava a l'estiu havien desaparegut.</p>

<p>Un matí de novembre, tremolant i famolenca, la Cigala va baixar de l'arbre i va trucar a la porta del formiguer. La Formiga va obrir. Van quedar-se mirant l'una a l'altra un moment.</p>

<p>«Formiga», va dir la Cigala amb la veu petita que no s'assemblava gens a la veu gran de l'estiu, «no tinc menjar. He cantat tot l'estiu i ara no tinc res. Em pots ajudar?»</p>

<p>La Formiga va mirar la Cigala. Era la primera vegada que la veia de prop: sense la llum de l'estiu, sense la música, era un insecte petit i vulnerable com qualsevol altre. Va pensar en tot el que la Cigala havia cantat aquell estiu: les matinades que els seus cants l'havien acompanyat mentre pujava carregada, les tardes que la seva música havia fet el treball menys pesat.</p>

<p>«Entra», va dir la Formiga. «Però has de saber una cosa: a l'hivern tots treballem. No hi ha ningú que no faci res aquí dins.» La Cigala va entrar. Era càlid i sec i l'olor de les provisions guardades era meravellosa. «Qué puc fer jo?» va preguntar. «Cantar», va dir la Formiga. «A l'hivern, quan és tot fosc i fred, la música fa que les hores passin millor. Has de cantar per a les que treballen.»</p>

<p>I la Cigala va cantar tot l'hivern per a les formigues, i les formigues van compartir les provisions amb la Cigala. Va ser el primer hivern en la història del formiguer que les treballadores xiulaven mentre feien la feina. I a la primavera, quan la Cigala va sortir a l'exterior i va pujar al pollancre, la seva cançó tenia una profunditat nova, com si l'hivern li hagués afegit quelcom que no tenia abans.</p>

<p>Des d'aleshores la Formiga i la Cigala van tenir un acord: a l'estiu, la Formiga guardava provisions per a les dues, i la Cigala cantava per a totes. I cap de les dues no va tornar a pensar que la feina de l'altra no tenia valor.</p>`
  },

    id:39, emoji:'🐦', title:'L\'Ocell de Foc',
    tema:'Màgia', tags:['fènix','foc','renéixer','esperança','llegenda'],
    resum:'La llegenda de l\'ocell que mor i ressorgeix de les cendres amb nova vida.',
    text:`<p>Als boscos de l'orient llunyà, en un temps en que els viatges duraven anys i les distàncies eren misteris, els savis i els poetes parlaven d'un ocell que ningú no havia vist però que tothom creia que existia. L'anomenaven el Fènix, i deien que vivia cinc-cents anys, que tenia les plomes daurades i vermelles com les flames d'un foc viu, que el seu cant era tan bonic que qui el sentia no podia plorar durant una setmana sencera, i que l'únic que el feia especial per damunt de tots els altres ocells del món era una cosa sola: quan moria, no desapareixia.</p>

<p>El savi Pau de Tars, que havia viatjat per tot el món antic recollint llegendes i sabers, va escriure el que havia après sobre el Fènix en un pergamí que va arribar fins als monestirs de Catalunya per camins que ningú no recorda. Deia: «Quan el Fènix sent que la seva vida s'acaba, s'allunya de tots els altres éssers i busca un lloc alt i solitari. Allà construeix un niu amb les branques més oloroses que pot trobar: cinamom, mirra, nard i encens. S'hi posa dins i espera. I quan el sol colpeja el niu a la hora justa, el niu s'encén i l'ocell crema amb ell. Però de les cendres, al cap de tres dies, surt un ou. I de l'ou, un ocell nou.»</p>

<p>Un rei de les terres de ponent va sentir la llegenda i va decidir que volia el Fènix per a ell. Va enviar els millors caçadors i els homes més ràpids del seu exèrcit. Van recórrer els boscos de l'orient durant mesos. De tant en tant algú deia que havia vist una llum al cel que s'assemblava a un ocell de foc. Però quan s'hi acostaven, no hi havia res.</p>

<p>Un dels caçadors, un home jove de nom Berenguer, va acabar per separar-se del grup. Estava cansat de la cacera inútil i sentia que perseguir el Fènix era una falta de respecte envers un ésser que potser no volia ser capturat. Va asseure's a la vora d'un riu i va esperar, sense saber ben bé el que esperava.</p>

<p>Al tercer dia d'espera, va sentir un so al crepuscle que no s'assemblava a res que hagués sentit mai: no era exactament música ni exactament cant, era quelcom entre els dos, com si la veu i la llum haguessin decidit ser la mateixa cosa durant un moment. Va alçar els ulls i va veure, a la cima d'un arbre altíssim, una figura que brillava amb una llum pròpia. No era gran. Era un ocell de mida normal, però les seves plomes capturaven i multiplicaven la llum del capvespre fins que semblava tenir foc a l'interior.</p>

<p>Berenguer no es va moure. Va quedar-se quiet, respirant suaument, sense fer cap gest que pogués espantar l'ocell. El Fènix el va mirar des de dalt amb uns ulls que semblaven molt vells. I lentament, molt lentament, va baixar branca per branca fins a quedar-se a l'altura dels ulls de Berenguer.</p>

<p>Van estar-se mirant un bon rato. Llavors el Fènix va obrir les ales, va deixar caure al terra una sola ploma vermella i daurada, i va tornar a pujar. Va volar fins a desaparèixer al cel del capvespre.</p>

<p>Berenguer va agafar la ploma. Era calenta com si acabés de sortir d'un foc, però no cremava. Va tornar al rei amb la ploma i sense l'ocell. «No el vaig poder capturar», va dir. El rei va intentar agafar-li la ploma, però en la mà del rei estava freda i era només una ploma. En la mà de Berenguer seguia calenta i lluminosa.</p>

<p>El rei va entendre que hi havia coses que no es podien posseir, sinó únicament merèixer. Va deixar de buscar el Fènix. I Berenguer va guardar la ploma tota la vida, i diuen que en els moments de desesperació més profunda, quan tot semblava perdut, la ploma es tornava calenta entre els dits i li recordava que fins i tot de les cendres pot néixer quelcom nou.</p>`
  },

    id:40, emoji:'🏰', title:'El Castell de les Set Torres',
    tema:'Aventura', tags:['castell','princesa','set reptes','príncep','saviesa'],
    resum:'Un príncep ha de superar set reptes en set torres per alliberar la princesa Estel.',
    text:`<p>Al cim de la muntanya que dominava la plana del Bages, allà on el vent bufa sempre i les pedres semblen tallades per gegants, s'alçava el Castell de les Set Torres. Cada torre era d'una pedra diferent: la primera de granit gris, la segona de marbre blanc, la tercera de pissarra negra, la quarta de calcari groguenc, la cinquena de basalt fosc, la sisena d'alabastre translúcid i la setena, la més alta, de pedra vermella que al capvespre semblava de brasa.</p>

<p>La llegenda deia que la princesa Estel hi vivia empresonada per un encanteri antic, i que per alliberar-la un pretendent havia de superar una prova diferent a cada torre. Molts ho havien intentat al llarg dels anys. Tots havien fallat en alguna de les proves, i quan fallaven tornaven al pla canviats d'una manera difícil de descriure: més callats, més pensatius, com si haguessin vist quelcom a les torres que els havia donat una comprensió nova però dolorosa del món.</p>

<p>El príncep Arnau va arribar al peu de la muntanya una tarda d'octubre. No portava exèrcit ni escorta: havia decidit que aquella era una prova que havia de fer sol. Va pujar el sender de pedra fins a la porta del castell, que s'obrí sola quan hi posà la mà.</p>

<p>A la primera torre l'esperava una sala buida amb una sola cadira i una veu que deia: «Diga'm una cosa vertadera que t'costi dir.» El príncep va seure. Va pensar llargament. Finalment va dir: «De vegades tinc por de no ser suficientment bo per al que em demana la vida.» La porta de la torre s'obrí.</p>

<p>A la segona torre hi havia un lleó encadenat que rugía i esgarrapava l'aire. La veu va dir: «Allibera'l.» El príncep va mirar el lleó als ulls. Veia furor però també veia por: el lleó tenia tant de por com ell. Va avançar lentament, va treure la cadena amb mans fermes però suaus, i va quedar-se quiet. El lleó va olorar-lo, va fer un so suau com un ronc i es va estirar als seus peus. La porta s'obrí.</p>

<p>A la tercera torre hi havia una taula plena de llibres i una veu que li va plantejar un enigma de paraules tan complex que el príncep va trigar hores a resoldre'l. Quan va dir la resposta correcta, la veu va afegir: «I saps per qué és la resposta correcta?» El príncep ho va explicar. La porta s'obrí.</p>

<p>A la quarta torre hi havia una cadira al mig d'una sala buida i la veu va dir: «Espera.» El príncep es va asseure. Va passar una hora. Dues. Cinc. Un dia sencer. Sense menjar, sense beure, sense res que fer. Quan estava a punt de rendir-se per desesperació, va trobar una pau profunda a l'interior, la que ve quan s'accepta que l'espera és part del camí. La porta s'obrí al cap de tres dies.</p>

<p>A la cinquena torre hi havia un pobre ancià assegut al terra, i un cofre ple d'or al costat. La veu va dir: «Pots quedar-te l'or o donar-lo al vell. Si te'l quedes, passes.» El príncep va mirar l'or. Va mirar l'ancià. Va donar l'or a l'ancià i va avançar. La porta s'obrí sense que la veu digués res.</p>

<p>A la sisena torre hi havia un mirall. La veu va dir: «Mira't i digues qui ets.» El príncep es va mirar llargament. Va veure les seves forces i els seus defectes alhora. Va dir: «Soc algú que intenta fer el bé però que falla sovint. Soc algú que aprèn.» La porta s'obrí.</p>

<p>A la setena torre, la de pedra vermella, no hi havia res. Només la princesa Estel asseguda a la finestra mirant la plana. Es va girar quan va entrar el príncep. «Has superat les sis proves», va dir. «Però l'encanteri no es trenca amb les proves. Es trenca amb la setena cosa.» «Quina?» El príncep va pensar en tot el que havia après pujant les torres. «Demanar perdó per un error del passat», va dir finalment.</p>

<p>Va recordar un moment de la seva joventut en que havia tractat malament un servent per orgull. Va dir en veu alta: «Em penedeixo d'aquella injustícia. I si pogués, l'esmen daria.» Una llum va omplir la torre i l'encanteri es va trencar.</p>

<p>La princesa Estel el va mirar amb aquells ulls que havien vist molt. «Les proves no eren per a tu», va dir. «Eren per a mi. Necessitava saber quin home volia al meu costat. I ara ho sé.» Van baixar junts la muntanya, i el vent que bufa sempre a aquell cim aquell dia va callar per primer cop.</p>`
  },

    id:41, emoji:'🦊', title:'La Guineu i el Corb',
    tema:'Valors', tags:['guineu','corb','formatge','astúcia','vanitat','elogis'],
    resum:'Una guineu astuta aconsegueix el formatge d\'un corb vanidós amb falsos elogis.',
    text:`<p>Al bosc del Montgrí, on els pins creixen entre roques de pedra calcària blanca i el vent del mar porta sempre una mica de sal a l'aire, hi havia un corb que era la bèstia més orgullosa de tot l'entorn. Era gran, negre com la nit sense lluna, amb el plomatge que brillava amb reflexos blaus i verds quan el sol hi donava. Sabia que era impressionant i s'encarregava de recordar-ho a tothom amb la seva presència altiva i el seu vol circular sobre els altres animals del bosc.</p>

<p>Un dimarts al matí, el corb havia fet una troballa excepcional: al costat d'un mas abandonat havia trobat un tros de formatge que els masovers devien haver deixat. Era un formatge curat, amb una crosta daurada i una olor que anava lluny portada pel vent. El corb l'havia agafat amb el bec amb tota la delicadesa que pot tenir un bec i havia volat fins a la branca més alta del pi més gran del bosc, on es disposava a menjar-lo tranquil·lament i en exclusiva.</p>

<p>La Guineu Roja, que aquell matí anava al trot baix pel sender de sota els pins buscant quelcom per omplir l'estómac que protestava des de la nit anterior, va olfactejar l'aire i va aturar-se en sec. Formatge. Formatge curat. Va alçar el musell i va veure el corb a la branca alta amb el formatge al bec. Va seure a la base del pi i va pensar.</p>

<p>La guineu coneixia el corb. Sabia del seu orgull. I sabia que l'orgull és la porta per la qual entren totes les manipulacions del món. Va composar una expressió d'admiració sincera al rostre, que era una expressió que sabia fer molt convincentment, i va parlar cap amunt.</p>

<p>«Oh, senyor Corb! Quina sort trobar-vos aquí!» La veu de la Guineu era càlida i plena de meravella genuïna simulada. El Corb va obrir un ull i la va mirar des de dalt amb condescendència. «Havia sentit parlar del vostre plomatge», va continuar la Guineu, «però veure'l de prop és una altra cosa. Quin negre tan profund! Quin brillantor! Sembla que tingueu el cel de la nit a les plomes.» El Corb va inflar una mica el pit. Era veritat el que deia la Guineu, i era agradable sentir-ho.</p>

<p>«I aquells ulls!» va continuar la Guineu sense parar. «Tan intel·ligents, tan vius. Es veu que sou un ocell de gran categoria, senyor Corb. No com els pardals vulgars que omplen el bosc. Vós teniu classe.» El Corb va inflar una mica més el pit. Era, indubtablement, un ocell de classe.</p>

<p>«I la veu!» va dir la Guineu, i aquí va abaixar la veu com si fos un secret reverencial. «Diuen que la vostra veu és la més bonica del bosc. Diuen que quan canteu, els arbres escolten. Jo mai us he sentit cantar i us juro que és el meu gran desig. Si us plau, senyor Corb, canteu-me alguna cosa. Just una cançó petita. Serà el moment més meravellós de la meva vida.»</p>

<p>El Corb va quedar-se en un estat de benestar i orgull que rarament havia experimentat. Tothom el respectava però ningú li demanava de cantar. Que li demanaven de cantar era la prova que la seva veu era especial. Va obrir el bec, va inflar el pit al màxim i va treure el cant que tenia: «CRAAAC!»</p>

<p>El formatge va caure. La Guineu el va agafar al vol amb una precisió que suggeria que aquella maniobra l'havia practicada mentalment des que havia vist el Corb a la branca. Va fer tres passes ràpides, es va girar i va mirar el Corb amb una expressió de simpatia amable. «Gràcies pel concert, senyor Corb. I pel formatge.» Va marxar al trot amb el formatge a la boca.</p>

<p>El Corb va quedar a la branca en silenci. La humiliació era considerable, però el que duia més era la comprensió sobtada de que havia sigut víctima del seu propi orgull. Va quedar-se allà dalt una bona estona pensant, i quan finalment va baixar a beure al rierol, alguna cosa havia canviat a la seva manera de mirar les coses.</p>

<p>Des d'aleshores, cada vegada que algú li feia elogis, el Corb es preguntava primer: «Qué vol?» No es va tornar desconfiat de tothom, però va aprendre a separar l'admiració sincera de la manipulació disfressada d'admiració. I mai més cap guineu va aconseguir el seu formatge.</p>`
  },

    id:42, emoji:'🌙', title:'El Nin de la Lluna',
    tema:'Màgia', tags:['lluna','nen','somni','estrelles','aventura nocturna'],
    resum:'Un nen que cada nit puja per un raig de lluna a jugar amb els estels.',
    text:`<p>En Pau vivia en una casa petita al capdamunt d'un carrer empinada d'un poble de muntanya on a l'hivern les gelades eren fortes i a l'estiu les nits eren tan clares que semblava que les estrelles eren a tocar. La seva habitació tenia una finestra que donava directament al cel del nord, i des d'aquella finestra, cada nit, en Pau contemplava el cel durant hores abans d'adormir-se.</p>

<p>La seva mare li havia dit moltes vegades que havia d'apagar la llum i tancar els ulls. «El son és important», deia. «El cel sempre hi serà demà.» En Pau sabia que tenia raó, però cada nit, quan la mare apagava la llum i ell tanmcat els ulls, l'atracció del cel era més forta que la son. Escoltava el silenci de la muntanya i imaginava que les estrelles tenien noms i que la lluna el coneixia.</p>

<p>Una nit de juliol, quan la lluna plena omplia tota la finestra d'una llum blanca i quieta, en Pau va tenir una experiència que no sabria mai si havia sigut real o somniada. Va veure que un raig de lluna entrava per la finestra i tocava el terra de la seva habitació. No era la llum normal de la lluna: era sòlida, o quasi sòlida, com una escala feta de vidre o de gelatina lluminosa.</p>

<p>En Pau va posar el peu. Va aguantar el pes. Va fer un pas, i un altre, i de sobte estava pujant per la llum de la lluna cap al cel. El poble queia avall, les cases es feien petites, els camps i els boscos eren quadres de colors foscos, i dalt... dalt hi havia la lluna, que era molt més gran del que semblava des de la finestra i tenia una superfície suau i grisa com el pelatge d'un gat vell.</p>

<p>Les estrelles, a prop, eren punts de llum càlida que pampellejaven rítmicament. En Pau va estirar la mà i va tocar la més propera: era calenta, com una brasa que no cremava, i el seu tacte li va omplir la mà d'una sensació de formigueig agradable que va pujar fins al cor. «Hola», va dir en Pau, sense saber molt bé per qué.</p>

<p>«Hola», va respondre l'estrella. No amb paraules, sinó amb una pulsació de llum que en Pau va entendre directament, com si la comunicació hagués anat directa de l'estrella al seu cervell sense passar per les orelles. «Fa temps que et veiem per la finestra», va dir l'estrella-pulsació. «Ets del pocs que miren de debò.»</p>

<p>En Pau va passar la nit entre les estrelles. Va aprendre que cada estrella tenia una temperatura diferent, que les blaves eren les més joves i calentes i les vermelles les més velles, que algunes tenien planetes al voltant i en alguns d'aquells planetes potser hi havia nens que miraven cap al cel com feia ell. Va aprendre que la llum de les estrelles que veia tenia milers d'anys, que havia sortit de l'estrella quan els avis dels avis dels seus avis eren vius, i que ell estava rebent un missatge molt antic.</p>

<p>Quan l'alba va començar a pal·lidir el cel a l'est, l'escala de llum va tornar a la finestra i en Pau va baixar. Es va trobar al llit, amb les sabates posades i la mà dreta tèbia. A la finestra, la lluna s'acomiadava baixant a l'horitzó.</p>

<p>Va intentar tornar-hi altres nits. De vegades l'escala apareixia, de vegades no. Però allò que havia après aquella nit va quedar-se amb ell per sempre: que el cel no és un fons decoratiu, sinó un lloc ple d'história i vida que espera que algú el miri de debò per revelar els seus secrets.</p>`
  },

    id:43, emoji:'🎭', title:'El Gegant i el Nan',
    tema:'Enginy', tags:['gegant','nan','intel·ligència','força','astúcia'],
    resum:'Un nan petit supera un gegant enorme en cinc proves gràcies a la seva intel·ligència.',
    text:`<p>Al pas de la muntanya que separava dos territoris antics hi havia un pont de pedra que era l'única manera de creuar el riu caudalós que baixava dels Pirineus. I al peu d'aquell pont vivia el gegant Goliard, que media quatre metres d'alçada i tenia les espatlles com la porta d'un graner i les mans com pales de paleta. Feia pagar peatge a tothom que volia creuar: si tenies or, donaves or; si no en tenies, el gegant et feia treballar per a ell durant una temporada.</p>

<p>El gegant no era malèvol per naturalesa, però havia après que la seva mida li donava avantatge en qualsevol situació i havia deixat d'esforçar-se a ser just. L'avantatge de la força és seductor: quan sempre guanyes, deixes de pensar en la qualitat del que fas.</p>

<p>Un dia de primavera va arribar al peu del pont un home que feia tanta graci al gegant que va trigar uns moments a adonar-se que era un home de debò: era tan petit que no li arribava ni al genoll. Era el Bernadet, fill d'un sabater de la plana, que anava a l'altra banda de la muntanya a buscar feina.</p>

<p>El gegant va esclatar a riure. Una riallada que feia tremolar les pedres del pont. «¿I tu qui ets, homenet?» «Bernadet», va dir el nan amb tota la dignitat que cap en un cos de seixanta centímetres. «I vull creuar el pont.» «El peatge és una moneda d'or o un mes de treball.» «No tinc or i no tinc temps per treballar. Però et proposo una cosa: cinc proves. Si en guanyo tres, passo lliure. Si no, treballo per a tu dos mesos.»</p>

<p>El gegant va riure més fort. «D'acord, homenet. Això serà divertit.»</p>

<p>Primera prova: qui llança una pedra més lluny. El gegant va agafar una roca com un cap de persona i la va llençar cent metres. Bernadet va treure del sarró un ocell que portava, li va posar la pedra petita lligada a la pota i el va alliberar. L'ocell va volar fins a perdre's de vista. «La meva pedra ha anat més lluny que la teva», va dir Bernadet. El gegant no va poder negar-ho.</p>

<p>Segona prova: qui porta un arbre més gran. El gegant va arrencar un pi centenari d'arrel. Bernadet va dir: «Espera't, que porto tot el bosc d'una vegada. Quan passem d'aquí, no vull haver de tornar a buscar llenya.» El gegant va mirar el bosc i va entendre que no podia portar tot el bosc de cap manera. Bernadet: dos, gegant: zero.</p>

<p>Tercera prova: qui menja més. Van posar dues taules amb menjar. El gegant va menjar com un gegant, és a dir, enormement. Bernadet portava un sac cosit sota la camisa i hi ficava el menjar mentre simulava menjar-lo. Quan el sac estava ple, va treure un ganivet i va dir: «Ara mira.» Va clavar el ganivet al sac i el menjar va sortir. «Si el ventre et fa nosa, pots fer el mateix.» El gegant va mirar el ganivet, va mirar el seu propi ventre i va entendre que no podia fer el mateix. Bernadet: tres, gegant: zero.</p>

<p>El gegant va quedar-se assegut davant del pont sense dir res durant una bona estona. Bernadet va esperar pacientment. Finalment el gegant va dir: «Passa, Bernadet.» I mentre el nan creuava el pont a passes petites i decidides, el gegant va afegir: «I torna quan vulguis. Que el pont és lliure per a tu.»</p>

<p>Bernadet va fer una reverència petita i va continuar el seu camí. El gegant es va quedar pensant en les cinc proves. Va passar dies donant-hi voltes. I al final va arribar a la conclusió que havia perdut no perquè el nan fos més fort, sinó perquè era més llest. I que la força sense intel·ligència és com un riu sense llera: molt sorollosa però que no porta enlloc de manera útil.</p>

<p>Es diu que des d'aleshores el gegant Goliard va deixar de cobrar peatge al pont i va demanar al Bernadet, quan va tornar, que li ensenyés a jugar a endevinalles.</p>`

    tema:'Natura', tags:['planta','Montseny','herbolaris','curar','Sant Joan'],
    resum:'La llegenda de la planta del Montseny que cura les febres i que només floreix la nit de Sant Joan.',
    text:`<p>Al Montseny, aquella massa forestal que s'aixeca entre el Vallès i la Selva com una illa verda enmig de les planes, els herbolaris de les masies properes guardaven un secret de generació en generació: hi havia, a les roques dels llocs més inaccessibles, una planta que no apareixia en cap recull botànic, que les àvies coneixien per tradició oral i que els metges de les ciutats haurien negat que existia. La planta de la febre, l'anomenaven simplement. Creixia enganxada a les roques de granit dels cingles alts i floría una sola vegada a l'any: la nit de Sant Joan, quan el foc i la llum i l'herba beneïda eren les protagonistes de la celebració.</p>

<p>Les seves flors groguenques tenien una olor acre i medicinal, i les àvies herbolàries deien que preparades en infusió trencaven les febres més altes, les que no cedien amb res i que en altre temps havien matat nens i vells a milers. No en calia gaire: tres flors en una tassa d'aigua bullent, deixada reposar fins que l'aigua prenia color de mel, i la febre baixava al cap de poques hores.</p>

<p>La Joana, filla d'una herbolària de la Garriga, tenia quinze anys quan va decidir anar a buscar la planta ella sola per primera vegada. El seu germà petit tenia una febre des de feia quatre dies que no baixava, i la mare, que normalment hauria anat ella mateixa, estava massa malalta per fer la pujada al cingles del Montseny.</p>

<p>Va sortir de casa al capvespre de la nit de Sant Joan, quan les fogueres del poble s'encenien i la música de les festes s'escampava per l'aire càlid de juny. Va pujar pel sender de pedra que coneixia fins als primers alzinars, i des d'allà va continuar per un camí de cabres que la seva mare li havia descrit moltes vegades però que ella no havia fet mai.</p>

<p>El Montseny de nit és un lloc diferent. Els sorolls que de dia passen desapercebuts prenen protagonisme: el brunzit dels insectes, el cant dels mussols, el trencament d'una branca a la fosca. La Joana havia portat una llanterna de mà però la llum li semblava insuficient davant de la profunditat de la foscor del bosc.</p>

<p>Al cap d'una hora de pujada va arribar a un replà de roques on el bosc s'obria i la nit plena d'estrelles s'estenia sobre el seu cap. I allà, assegut sobre una pedra plana com si esperés algú, hi havia un vell que la va saludar sense sorpresa. «Joana», va dir. Ella es va aturar. «Em coneixeu?» «Conec totes les que pugen aquí de nit de Sant Joan.»</p>

<p>El vell li va explicar el que la seva mare ja li havia dit: la planta creixia a les escletxes de les roques del cingle de sobre, floría aquella nit i s'havia de collir just quan la flor estava oberta del tot però abans que comencés a marcir-se, que era qüestió d'hores. Li va ensenyar a reconèixer-la per la forma de la fulla, per l'olor de la tija i per la manera com reflectia la llum de la lluna.</p>

<p>«I recordeu», va dir el vell, «que no en preneu mai més del que necessiteu. La planta és del Montseny, no de ningú. Si en preneu massa, no creixerà l'any que ve i els que vindran darrere vostre no la trobaran.»</p>

<p>La Joana va trobar la planta al cingle, va collir amb cura sis flors obertes, en va deixar moltes més sense tocar, i va baixar a casa de pressa. Va preparar la infusió com li havien ensenyat. Al matí el seu germà havia baixat la febre i dormia tranquil.</p>

<p>Des d'aleshores, la Joana va pujar al Montseny cada nit de Sant Joan. L'home de les roques l'esperava sempre. I quan la Joana va tenir filles, les va portar a conèixer el camí, el cingle i la planta. Perquè hi ha coneixements que no es poden escriure en cap llibre: s'han de pujar a peu, de nit, amb una llanterna petita i el cor obert.</p>`
  },

    id:45, emoji:'👣', title:'Les Petjades de Gegant',
    tema:'Llegenda', tags:['gegant','roca','Pirineus','llegenda','pastors'],
    resum:'La llegenda de les petjades gegants que es veuen a les roques dels Pirineus.',
    text:`<p>Als Pirineus, si puges per certs senders de la Cerdanya o el Pallars i saps on mirar, trobaràs a les roques planes que assolellen als cims unes depressions que semblen petjades humanes però molt més grans: quatre vegades, cinc vegades la mida d'un peu normal. Estan allà des de sempre, i els geòlegs de les ciutats en diuen que és l'erosió de l'aigua i el gel durant mil·lennis. Però els pastors i els pagesos d'aquelles terres, els qui hi han viscut tota la vida i coneixien els seus avis i els avis dels seus avis, diuen una altra cosa.</p>

<p>Diuen que les petjades les va deixar el gegant Uriel en els primers temps del món, quan les muntanyes eren joves i els homes encara no havien arribat a aquelles altures. Uriel era tan alt que els Pirineus li arribaven als genolls, i caminava pels cims com si fossin una avinguda plana, amb passos llargs i tranquils que feien ressonar les pedres.</p>

<p>No era un gegant violent ni cruel: era simplement gran, amb tot el que això implica. Quan s'asseia a descansar, l'ombra del seu cos cobria una vall sencera. Quan estornudava, el vent tirava els pins. Quan reia, el so s'escampava per tota la serralada i la gent dels pobles de la plana pensava que era un tro llunya.</p>

<p>Un any, a la tardor, els pastors que pujaven amb els ramats als ports d'estiu per baixar-los al pla van trobar el camí bloquejat per una allau de pedres que havia caigut d'una manera estranya. No semblava una allau natural: les pedres estaven disposades com si algú les hagués acumulat allà, i al mig hi havia una ovella que havia quedat atrapada i bel·lava aterrada.</p>

<p>Un pastor vell va dir: «Uriel deu haver passat per aquí i no s'ha adonat del que ha fet.» Van treballar hores per moure les pedres i alliberar l'ovella, que afortunadament estava sana. I mentre treballaven van veure, a les lloses de pedra properes, les petjades immenses que confirmaven el que havia dit el pastor vell.</p>

<p>Aquella nit, el pastor vell va fer quelcom que ningú del grup no esperava: va pujar al cim de la roca més alta, va esperar que la nit caigués i la lluna sortís, i va cridar cap al cel amb totes les forces de la seva veu vella: «Uriel! Uriel del Pirineu! Has bloquejat el camí dels pastors! Vine a netejar el que has deixat!»</p>

<p>La nit va ser silenciosa durant una bona estona. Llavors, lluny a l'est, un so com un tro molt lent i profund va recórrer la serralada. I al matí, quan els pastors es van despertar, les pedres del camí havien estat mogudes durant la nit. El camí estava lliure.</p>

<p>«Ho ha netejat», va dir el pastor vell simplement. «Els gegants no vénen si no els crides. Però si els crides amb respecte, escolten.» Va recollir el seu bastó i va continuar camí avall amb el ramat.</p>

<p>Les petjades van quedar a les roques, i cada generació de pastors les ensenyava als fills com a prova que les muntanyes no sempre han sigut llocs silenciosos. Que hi va haver una época en que hi vivien essers enormes que no eren malvats, simplement grans, i que el respecte mutu entre la persona i la muntanya ha sigut sempre la base de tot el que funciona als Pirineus.</p>`
  },

    id:46, emoji:'🦅', title:'L\'Àliga i la Serp',
    tema:'Natura', tags:['àliga','serp','cel','terra','equilibri'],
    resum:'La rivalitat eterna entre l\'àliga del cel i la serp de la terra, i com aprenen a coexistir.',
    text:`<p>Des del principi dels temps, l'Àliga i la Serp han mantingut una relació que no és exactament amistat ni exactament enemistat, sinó alguna cosa més complexa i més antiga que les dues: un reconeixement mutu de que cadascuna representa quelcom que l'altra no pot ser. L'Àliga regna el cel amb les seves ales de dos metres d'envergadura i els ulls que veuen un conill a dos quilòmetres de distància. La Serp coneix cada secret de la terra, cada pedra, cada arrel, cada amagatall on la vida es refugia quan el fred arriba.</p>

<p>La rivalitat va tenir un origen concret, diuen les llegendes velles. Va ser un dia en que totes dues anaven a caçar al mateix prat i la seva presència simultània va espantar tota la presa. L'Àliga va acusar la Serp de fer-li nosa. La Serp va acusar l'Àliga de la mateixa cosa. Van barallarse d'aquella manera particular en que les criatures antigues es barallen: no amb atacs directes, sinó amb mirades llargues i gestos plens d'implicació.</p>

<p>Un savi vell que havia passat la vida observant la natura va trobar-les enmig de la confrontació. Era un home de pocs mots, que havia après que la majoria de les disputes entre animals i entre persones vénen d'una mateixa font: la confusió entre el territori propi i el territori de l'altre. Va seure sobre una pedra i va esperar que les dues s'aturin.</p>

<p>«Porteu-me el tresor que estimeu més», va dir finalment. L'Àliga va volar fins al seu niu a l'alta roca i va tornar amb una ploma daurada de la seva pròpia ala. La Serp va desaparèixer entre les arrels i va tornar amb una pedra verda i brillant que havia trobat al fons d'una cova. El savi va mirar les dues coses.</p>

<p>«Àliga», va dir, «si et posem al fons de la terra, quant de temps aguantes?» «Poc», va admetre l'Àliga. «Necessito l'aire i la llum.» «Serp», va dir, «si et posem a l'aire lliure sense terra sota el cos, quant de temps aguantes?» «Poc», va admetre la Serp. «Necessito el contacte de la terra.»</p>

<p>«Doncs ningú de les dues pot existir sense el que governa l'altra», va dir el savi. «L'Àliga necessita la terra per menjar i per nidificar. La Serp necessita l'aire per respirar i la pluja del cel per beure. Sou rivals que es necessiten.» Va posar les dues peces al costat. «I mireu: la ploma daurada i la pedra verda, juntes, fan quelcom que cap de les dues no pot fer sola. Poseu-les a la llum.»</p>

<p>Quan la llum del sol va tocar les dues peces juntes, la ploma va reflectir la llum sobre la pedra i la pedra va multiplicar-la en cent colors que van omplir l'aire de raigs de color. Era quelcom que ni la ploma sola ni la pedra sola haguessin pogut fer.</p>

<p>L'Àliga i la Serp van mirar aquells colors en silenci. Era difícil seguir barallant-se davant de quelcom tan bonic que havia nascut de la seva unió. Des d'aleshores van mantenir una distància respectuosa: l'Àliga no baixava al territori de la Serp sense necessitat, i la Serp no s'acostava al niu de l'Àliga sense raó. I els seus escuts, pintats junts en moltes banderes antigues, recorden que el cel i la terra, per oposats que siguin, es necessiten l'un a l'altre per tenir sentit.</p>`
  },

    id:47, emoji:'🌺', title:'La Rosa de Jericó',
    tema:'Màgia', tags:['rosa','desert','vida','miracle','agua'],
    resum:'La llegenda de la planta del desert que ressuscita quan toca l\'aigua.',
    text:`<p>Hi ha una planta que els botànics anomenen Anastatica hierochuntica però que tothom que la coneix per tradició oral anomena la Rosa de Jericó o la Planta de la Resurrecció. Viu als deserts de l'orient, als llocs on la pluja és un event rarissim i la vida és un miracle continu. Quan la terra s'asseca del tot, la planta deixa de créixer, arronsa les seves branques cap a dins, deixa anar les arrels i es converteix en una pilota seca i dura, gairebé irreconeixible com a planta, que el vent porta d'un lloc a l'altre durant anys, dècades, sense que res la pugui matar de tot.</p>

<p>La llegenda diu que una caravana de pelegrins que anava de Jerusalem a les terres del nil va trobar en el camí una d'aquelles pilotes seques. El guia de la caravana, un home pràctic i sense sentit de la meravella, la va prémer amb el peu i va continuar caminant. Però una nena que anava a la caravana, filla d'un comerciant de teles, la va recollir del terra sense saber per qué. Li semblava que quelcom hi havia dins que no estava ben mort.</p>

<p>La nena es deia Míriam i tenia deu anys i aquella curiositat particular que té la gent que mira el món sense els filtres que els adults posen davant dels ulls a mesura que creixen. Va portar la pilota seca durant dies, guardada a la seva bossa entre els seus estris personals. Semblava un pes inútil i la seva mare li deia que la llencés. Míriam deia que no.</p>

<p>Quan van arribar a un oasi, Míriam va fer quelcom que no li havia demanat ningú i que li va venir per instint: va posar la pilota seca dins del petit estany de l'oasi, a l'aigual fresca i tranquil·la. I va esperar.</p>

<p>Les hores passaven. La caravana descansava, els camells bevien, els adults dormien la migdiada. Míriam estava asseguda vora l'estany mirant la pilota. I lentament, molt lentament, com si el temps d'aquella planta fos un altre temps diferent del dels humans, les branques van començar a desenrotllar-se. Primer un centímetre, dos. Llavors amb més confiança, estirant-se cap a fora, reverdint mentre absorbien l'aigua.</p>

<p>Al capvespre, on havia hagut una pilota seca i morta, hi havia una planta petita però perfecta, amb les fulles obertes i un color verd lluminós que no semblava de cosa que acabava de néixer sinó de cosa que acabava de recordar qui era.</p>

<p>El guia de la caravana, el mateix que l'havia xafat amb el peu, la va mirar llargament. «Impossible», va dir. El comerciant pare de Míriam la va mirar i no va saber qué dir. El vell sacerdot que acompanyava el grup va acotar el cap en silenci, com si reconegués quelcom que sabia d'avant.</p>

<p>«El que sembla mort de vegades simplement espera», va dir finalment el sacerdot. «Espera les condicions adequades. Espera que algú cregui que val la pena donar-li una oportunitat.»</p>

<p>Míriam va portar la planta fins a la seva casa, que era a molts dies de viatge. La va plantar en un test de terrissa i la va cuidar. Quan la terra s'assecava, la planta s'arronçava i es feia pilota de nou. Míriam li donava aigua i tornava a obrir-se. Aquesta dansa va durar anys. I cada vegada que la planta es tancava i tornava a obrir-se, Míriam pensava en totes les coses de la vida que semblen mortes i que potser simplement esperen la seva gota d'aigua.</p>`
  },

    id:48, emoji:'🎪', title:'El Circ de les Meravelles',
    tema:'Imaginació', tags:['circ','màgia','acròbates','somnis','miracle'],
    resum:'Un nen descobreix un circ màgic que apareix una sola nit a l\'any i fa miracles.',
    text:`<p>En Marc tenia dotze anys i vivia en un carrer ample d'una ciutat de mida mitjana, d'aquelles ciutats que no surten a les guies de viatge però que per als que hi han nascut contenen tot el món. El camp que hi havia a l'extrem del seu carrer era el lloc on jugaven els nens del barri, on els adolescents s'asseien a la nit a parlar de les seves coses, i on de tant en tant s'instal·lava el mercat setmanal.</p>

<p>La primera nit que en Marc va sentir la música de flauta eren les dotze en punt, i ell estava al llit completament despert perquè feia massa calor per dormir. La música era suau i llunyana, i tenia una qualitat particular que les músiques normals no tenien: semblava que sortís de dins la seva pròpia ment i alhora que vingués de lluny. Va aixecar-se, va acostar-se a la finestra i va quedar paralitzat.</p>

<p>Al camp del final del carrer, on unes hores abans no hi havia res, hi havia un circ. No un circ normal: les tendes eren de tela de colors tan intensos que brillaven en la foscor de la nit sense necessitat de llum exterior, de vermell i daurat i blau fosc. La carpa central era altíssima i del seu cim sortia una llum que no era elèctrica ni de foc, sinó quelcom intermedi, càlid i viu. I de dins en sortia la música de flauta i sorolls d'activitat.</p>

<p>En Marc va baixar al carrer en pijama i sabates. Les portes del circ estaven obertes. Va entrar.</p>

<p>A dins, el primer que va veure va ser les acròbates. Eren tres, dues dones i un home, i feien coses que eren físicament impossibles: volaven d'una trapezi a l'altra sense que les trapezis es balancessin, quedaven suspesos a l'aire uns instants de massa, giraven en l'aire d'una manera que desafiava la gravetat d'una manera que els físics trobarien problemàtica. Però el més estrany no era el que feien: era que quan les miraves, tenies la sensació que podia ser tu qui ho feia, que el cos humà era capaç d'aquelles coses si simplement s'ho creia de debò.</p>

<p>Els cavalls que ballaven al ring central ho feien al compàs d'una música que ningú no tocava visiblement, però que tots sentien perfectament. El pallasso que feia aparèixer flors de no-res les regalava als espectadors, i cada persona rebia la flor que més necessitava en aquell moment: una rosa vermella per a una dona que enyorava algú, una margarida blanca per a un nen que tenia por, una branca de llorer per a un home que havia perdut la confiança en si mateix.</p>

<p>Al centre de tot actuava el Mag. Era vell, amb cabells blancs i ulls del color del cel quan s'acaba la tempesta. Posava les mans oberts davant de les persones i els demanava que hi posin els seus somnis. La gent, sense saber per qué, obeïa: posaven les mans obertes sobre les seves i tancaven els ulls, i en Marc veia com una cosa lluminosa passava de les mans de la gent a les mans del Mag.</p>

<p>El Mag posava aquella llum en un sac de vellut i quan el sac estava ple, l'obria i llançava la llum a l'aire. I la llum, transformada, tornava als seus propietaris d'una manera diferent: no com un somni frustrat sinó com una direcció, un camí, una comprensió de com arribar-hi.</p>

<p>En Marc va veure el seu veí del segon pis, aquell home trist que havia perdut el fill en un accident anys enrere, posar les mans davant del Mag i plorar. I la llum que li va tornar el feia somriure d'una manera que en Marc no li havia vist mai.</p>

<p>A l'alba, quan en Marc va sortir de la carpa, el camp era buit. Cap clau, cap petja a la terra, cap resta. Com si el circ mai no hagués existit. Però a la mà dreta d'en Marc hi havia una margarida petita i blanca que ningú no li havia vist posar.</p>

<p>Va buscar informació durant setmanes. Ningú al barri semblava recordar el circ, o si ho recordaven no en volien parlar. Cada any, la primera nit de l'estiu, en Marc esperava despert. Alguns anys el circ tornava. Altres no. Però cada vegada que sentia música de flauta a mitjanit, sabia que quelcom meravellós estava passant en algun camp d'algun carrer d'algun lloc del món.</p>`

{
    id:49, emoji:'🦁', title:'El Lleó i el Ratolí',
    tema:'Valors', tags:['lleó','ratolí','amistat','gratitud','ajuda'],
    resum:'Un ratolí minúscul salva la vida del lleó poderós que un dia el va perdonar.',
    text:`<p>Al cor de la selva africana, en un temps en que els animals encara recordaven les lleis antigues que els obligaven a respectar-se, vivia un lleó que era el rei indiscutible de tota la contrada. Es deia Simba d'Or, no per vanitat sinó perquè la seva crinera era realment d'un color daurat extraordinari que al sol sembla que ardís. Era fort, just i respectat, i els altres animals sabien que mentre ell era al tron del seu territori les coses tenien un ordre que protegia a tothom.</p>

<p>Un migdia de la canícula, quan el calor feia que fins i tot els gossos de caça s'estiressin a l'ombra i que els ocells s'aturaren de cantar, el Simba d'Or dormia a l'ombra d'un baobab centenari amb la cap posada sobre les potes davanteres. Dormia amb aquella profunditat particular dels animals poderosos que no temen res mentre reposen, i la seva respiració era lenta i profunda com el batec de la terra.</p>

<p>El Ratolí Bru, que s'havia aventurat lluny del seu forat en busca de llavors, va topar literalment amb la pota davantera del lleó. Va quedar paralitzat. Es va mirar a si mateix, minúscul, de no res, i va mirar el lleó, enorme, i va pensar que aquella era la última cosa que veuria en la seva vida.</p>

<p>El lleó va obrir un ull. Va mirar el ratolí. Va tancar l'ull. El va tornar a obrir. El ratolí seguia allà, paralitzat de terror. El lleó podia simplement aplafar-lo amb la pota i continuar dormint: no hauria sigut ni un berenar. Però quelcom en la mirada del ratolí, potser la valentia desesperada de quedar-se quiet en lloc de sortir corrent, va interessar el lleó.</p>

<p>Va alçar la pota enorme. El ratolí va tancar els ulls. Però la pota no va baixar sobre ell: va quedar-se aixecada. «Per qué t'has aturat?» va preguntar el lleó. El ratolí va obrir un ull. «Perquè córrer seria inútil. Ets molt més ràpid que jo.» El lleó va bufar quelcom que s'assemblava a un riure suau. «Tens raó. I ara, qué proposes?»</p>

<p>El ratolí va pensar durant uns segons que van semblar-li molt llargs. «Us demano que m'allibereu. I us prometo que un dia us tornaré el favor.» El lleó va riure de debò, una rialla de lleó que va fer tremolar les fulles del baobab. «Qué pot fer un ratolí per a un lleó? Ets la criatura més ridícula que he vist en trenta anys.» Va baixar la pota. «Però m'has divertit. Vés.»</p>

<p>El ratolí va marxar corrent sense girar-se. El lleó va tornar a adormir-se somrient.</p>

<p>Dos mesos més tard, durant la temporada de pluges, uns caçadors humans van entrar al territori del Simba d'Or. Portaven xarxes de corda gruixuda que tensaven entre els arbres als llocs on els animals passaven. Una tarda, el lleó va quedar atrapat en una d'aquelles xarxes: havia anat a beure al rierol i la xarxa havia caigut sobre ell d'una manera que no havia vist venir.</p>

<p>Va rugir. Va intentar moure's. Cada moviment tensava més la xarxa i les cordes es feien més estretes. Va cridar durant hores, però els caçadors havien marxat i tornarien l'endemà al matí. Al bosc que l'envoltava, els altres animals sentien els seus rugits però cap no s'atrevia a acostar-se.</p>

<p>A la nit, quan el lleó ja estava exhaust de lluitar contra la xarxa, va sentir un so petit prop de l'orella. Era el Ratolí Bru, que havia seguit el so dels rugits des del seu forat. «Recordeu-me?» va dir el ratolí. El lleó el va mirar. «El ratolí ridícul.» «El mateix», va dir el ratolí. «I ara recordeu el que vaig prometre?»</p>

<p>Sense esperar resposta, el ratolí va posar-se a rosegar les cordes. Les seves dents eren petites però afilades i la seva paciència era infinita. Corda per corda, nus per nus, va anar alliberant el lleó. Va trigar tota la nit. A l'alba, quan els caçadors van tornar, la xarxa estava buida i a terra, tallada en desenes de trossos petits.</p>

<p>El lleó va trobar el ratolí assegut exhaust sobre la xarxa. «Tenies raó», va dir el lleó. «Un ratolí pot fer molt per a un lleó.» El ratolí va somriure. «I un lleó pot fer molt per a un ratolí. Ara som iguals.» Des d'aleshores van ser els amics més improbables de la selva, i el lleó va ordenar que cap animal del seu territori molestés mai un ratolí.</p>`

    resum:'Un noi intel·ligent de deu anys salva el seu poble d\'una gran inundació.',
    text:`<p>El poble de Riufort estava construït, com el seu nom indicava, a la vora d'un riu que en temps normals era mansuet i útil per al reg dels camps, però que cada vint o trenta anys recordava que era un riu de debò i inundava tot el que li havia donat la gana construir-se a les seves ribes. La memòria col·lectiva del poble guardava tres inundacions grans en els darrers cent anys, i cada vegada el dany havia sigut considerable.</p>

<p>Aquell any de tardor les pluges no paraven. Feien quatre dies que plovia sense parar i el riu havia pujat fins a la vora dels marges. El Consell del poble estava reunit a l'ajuntament en sessió d'emergència. Havien cridat els enginyers de la capital, però no arribarien fins l'endemà i el riu no esperava.</p>

<p>L'alcalde, un home pràctic però desbordat per la situació, anava i venia per la sala de reunions proposant coses que no acabaven de funcionar. Que si posaven sacs de sorra, però no n'hi havia prou. Que si desviaven el curs, però el riu era massa caudalós. Que si avisaven la gent per evacuar, però molts no podien o no volien marxar.</p>

<p>A la porta de l'ajuntament, sense que ningú li hagués dit res, esperava en Guimet, fill del moliner. Tenia deu anys i un quadern de dibuixos sota el braç on havia fet mapes de tot el territori del voltant del poble, inclosos els rierols i les basses i les canalitzacions, perquè era el tipus de nen que passava les tardes mirant el terreny i apuntant coses.</p>

<p>Va demanar parlar. El guàrdia de la porta li va dir que no era moment per a nens. Va demanar de nou. El guàrdia va dir que marxés. La tercera vegada, el guàrdia estava a punt de cridar-li quan l'alcalde va sortir a prendre l'aire i va veure el nen.</p>

<p>«Qué vols, noi?» «Crec que sé com aturar el riu.» L'alcalde va mirar el nen. Va mirar el quadern de dibuixos. Va mirar el riu que s'acostava perillosament als marges. «Parla.»</p>

<p>En Guimet va obrir el quadern i va mostrar un mapa. «Aquí», va assenyalar, «hi ha una bassa antiga que fa temps que no s'usa. Era del molí del meu pare però ara ells no la necessiten. Comunica amb el riu per un canal lateral que es va tapar fa anys amb brossa. Si destapem el canal, l'excés d'aigua del riu va a la bassa en lloc de desborda-se al poble.»</p>

<p>Silenci a la sala. Els adults van mirar el mapa. Era un mapa fet a mà per un nen de deu anys, però era sorprenentment precís. L'enginyer municipal, que coneixia el terreny, va reconèixer la bassa i el canal. «El canal és allà», va confirmar. «Podria funcionar.»</p>

<p>Van treballar quatre hores per obrir el canal: primer a pala, traient la brossa i el fang acumulat, i finalment amb una màquina petita que van poder portar per un camí de terra. Quan l'obstació va cedir, l'aigua del riu va trobar la nova sortida i va davallar cap a la bassa amb un so de cascada. El nivell del riu va baixar visiblement en menys d'una hora.</p>

<p>El poble va quedar-se sec. L'endemà, quan van arribar els enginyers de la capital i van veure la solució, es van quedar impressionats per la senzillesa. «Qui ho va pensar?» van preguntar. L'alcalde va assenyalar en Guimet, que estava jugant a la plaça amb uns amics. Els enginyers van anar a parlar amb ell i van quedar sorpresos per la claredat dels seus raonaments.</p>

<p>Molts anys després, en Guimet va estudiar enginyeria hidràulica i va dedicar la seva vida a gestionar riuades i protegir pobles. Però sempre deia als seus estudiants: «La solució més elegant és sovint la més senzilla. I les solucions senzilles sovint les veuen els qui han mirat el terreny sense prejudicis, que sovint són els nens.»</p>`

    resum:'La història d\'una eruga que aprèn que la lluita per sortir de la crisàlide és el que dona força.',
    text:`<p>A la vora d'un camp de trèvol, on el sol donava la major part del dia i l'ombra dels pins de la riba era prou propera per refugiar-s'hi a migdia, vivia una eruga de nom Pepita que era la més curiosa de totes les que habitaven aquella fulla de llorer on havia nascut. Les altres erugues menjaven i dormien i de tant en tant es movien una mica. Pepita menjava i dormia com les altres, però entre menjada i menjada es passava el temps observant el món amb una intensitat que les seves germanes trobaven excessiva.</p>

<p>El que més li cridava l'atenció eren les papallones. N'hi havia de grogues, de taronges, de blaves, de blanques amb punts negres. Volaven amb una lleugeresa que Pepita observava des de la fulla amb quelcom que s'assemblava a l'admiració barrejada amb una punxada de tristesa. «Jo no podré mai fer això», pensava. «Soc una eruga. Soc lenta, pesada, i la meva manera de moure'm no té res d'elegant.»</p>

<p>Un dia va aterrar a la seva fulla una papallona gran de color ataronjat amb les vores de les ales orlades de negre. Pepita li va preguntar, sense massa esperança: «Com heu après a volar?» La papallona va doblar les ales lentament i va mirar Pepita amb aquells ulls compostos que veuen el món de cent maneres alhora. «No he après», va dir. «Sempre he sabut. Simplement no sempre ho sabia.»</p>

<p>Pepita va quedar-se pensant en aquella resposta durant dies. I un matí, sense saber per qué, va sentir un impuls que venia de molt endins, de la part d'ella que no pensava sinó que simplement sabia: havia de fer-se una crisàlide. Era un instint tan fort que no va poder ignorar-lo.</p>

<p>Va buscar una branca ferma, es va enganxar amb un fil de seda i va anar teixint al seu voltant una closca dura i fosca. Des de fora, la crisàlide semblava una cosa morta, una bolsa inert penjada d'una branca. Per dins, Pepita vivia el procés més desconcertant de la seva vida: el seu cos es desfeia i es tornava a formar d'una manera que si ho hagués pogut contemplar des de fora hauria trobat aterradora.</p>

<p>Hi havia un nen que l'observava cada dia des del jardí. Es deia Andreu i tenia vuit anys, i havia decidit que aquella crisàlide era el projecte científic més interessant que havia vist. Cada matí venia i apuntava en un quadern el que observava. Quan van passar dues setmanes i la crisàlide semblava que s'iniciava un moviment, Andreu va decidir ajudar.</p>

<p>Amb unes tisores petites va fer un tall a la crisàlide per facilitar la sortida. Va sortir una papallona, sí, però amb les ales tan dèbils que no podia volar. Andreu, desesperat, va córrer a explicar-ho al seu avi que era naturalista.</p>

<p>L'avi va venir, va veure la papallona de les ales dèbils i va sospirara profundament. «La lluita per sortir de la crisàlide», va explicar a Andreu amb una veu tranquil·la però seriosa, «és el que dona força a les ales. Cada cop que la papallona empeny, els fluids del cos passen a les ales i les enforteixen. Si ajudes la papallona a sortir, li treus l'oportunitat d'enfortir-se.»</p>

<p>Andreu va plorar una mica. La papallona de les ales dèbils no va poder volar mai. Però Andreu, que era intel·ligent, va guardar aquella lliçó. I anys més tard, quan tenia fills i li demanaven ajuda en coses que ells podien fer sols, recordava la papallona i esperava. Perquè havia après que de vegades la millor ajuda és deixar que la persona faci la seva lluita sola.</p>`

    resum:'Un flautista allibera el poble de les rates però l\'alcalde trenca la seva promesa.',
    text:`<p>El poble d'Hamelin, als marges d'un riu de terra alemanya, era un lloc pròsper i net on les cases estaven pintades de colors clars i les dones netejaven els carrers cada matí. Però un any, ningú no sap com ni d'on, van arribar les rates. No una ni dues: milers. Sortien dels soterranis, de les clavegueres, de les fissures de les parets. Menjaven el gra dels molins i el pa de les forns. Rosegaven les cordes dels bressols on dormien els nadons. Propagaven malalties que feien emmalaltir els vells.</p>

<p>L'alcalde va prometre cent monedes d'or a qui fos capaç d'alliberar el poble de les rates. Molts van intentar-ho: verins que les rates evitaven, trampes que no eren prou, gossos que les rates superaven en nombre. Res no funcionava. El poble estava desesperant.</p>

<p>Un dia va arribar a la plaça un home d'aspecte peculiar: portava una capa de colors vius, barrejats com les plomes d'un ocell exòtic, i duia penjada al coll una flauta de fusta clara que semblava molt més senzilla del que era en realitat. L'home va parlar amb l'alcalde. «Puc treure les rates del poble», va dir. «El preu és cent monedes d'or.» L'alcalde, que havia gastat ja molts diners en solucions fallides, va acceptar de pressa.</p>

<p>El flautista va sortir a la plaça i va posar-se a tocar. La melodia que sortia de la flauta era d'una subtilesa extraordinaria: a les orelles humanes semblava gairebé inaudible, un xiuxiueig suau que potser era el vent. Però a les orelles de les rates era quelcom completament diferent.</p>

<p>Des de tots els racons del poble van sortir rates. Rates de tots els colors i mides, rates velles i joves, rates gordetes i rates primes. Sortien en columnes ordenades, seguint el flautista que caminava cap al riu. La gent mirava des de les finestres amb la boca oberta. El flautista va entrar al riu fins als genolls i va continuar tocant. Les rates el van seguir i l'aigua se les va emportar.</p>

<p>En una hora el poble estava lliure de rates. Cap no va quedar. L'alcalde era tan feliç que va convocar la gent a la plaça i va fer un discurs. Però quan el flautista va venir a demanar les cent monedes, l'alcalde va canviar de to. «Cent monedes és massa per tocar una flauta», va dir. «T'en donarem deu i prou.»</p>

<p>El flautista el va mirar llargament. «Una promesa és una promesa, alcalde.» «Una promesa feta en situació d'urgència no és vàlida», va respondre l'alcalde, que tenia una llarga experiència a trobar excuses per no complir el que prometia.</p>

<p>El flautista no va discutir. Va aixecar la flauta i va tornar a tocar. Però aquesta vegada la melodia era diferent: més alegre, més saltironera, com una cançó de festa. I de les cases van sortir els nens. Tots els nens del poble, rient i saltant, van seguir el flautista com si anés en processó de carnestoltes. Van sortir del poble i van anar cap a la muntanya.</p>

<p>L'alcalde va cridar. Les mares van córrer. Però els nens seguien el flautista sense mirar enrere. El flautista s'aturà a la porta d'una cova a la muntanya. Va mirar l'alcalde que havia corregut fins allà. «Les promeses», va dir, «s'han de complir sempre. Si no, res no funciona: ni els acords entre veïns, ni els contractes entre mercaders, ni les lleis entre governants i governats. Quan les persones deixen de complir la paraula, el poble comença a morir d'una manera que no es veu però que s'endevina.»</p>

<p>Va fer una pausa. «Et torno els nens. Però recorda aquest dia cada vegada que sigu temptat de no complir el que has promès.» Va tocar la flauta una última vegada i els nens van sortir de la cova, una mica confosos però sans i contents. El flautista va marxar i mai no es va saber on va anar. Però l'alcalde d'Hamelin, des d'aquell dia, va complir sempre les seves promeses. I el poble va ser molt millor lloc per viure.</p>`

    resum:'Un noi que puja per una planta de mongetes màgiques fins a un castell entre els núvols.',
    text:`<p>La mare d'en Joan era una dona que havia lluitado tota la vida i que al final de la lluita tenia una vaca, quatre gallides, una casa petita i un fill al que estimava més que tot el reste. El pare havia mort quan en Joan era petit i des d'aleshores les coses havien anat a poc a poc a pitjor: primer van perdre les gallides, llavors el hort, i aquell any de sequera la vaca era l'última cosa que quedava de valor a la casa.</p>

<p>«Joan», va dir la mare un matí, «has de portar la vaca al mercat i vendre-la. Amb els diners comprarem pa per a l'hivern.» En Joan sabia el que aquella decisió costava a la seva mare: la vaca era com de la família. Va agafar-la pel ronzal i va marxar cap al mercat del poble veí.</p>

<p>Pel camí va trobar un vell de barba blanca que descansava a la vora del camí. «On vas amb aquesta vaca tan bonica?» «Al mercat, a vendre-la.» El vell va treure de la butxaca una bosseta i la va obrir: a dins hi havia cinc mongetes de colors, cada una d'un color diferent. «Et canvio les mongetes per la vaca. Són mongetes màgiques.»</p>

<p>En Joan va mirar les mongetes. Eren boniques. Va mirar la vaca. Va tornar a mirar les mongetes. Era un noi curiós i aquella paraula, màgiques, havia encès una llum a la seva ment. Va fer el canvi.</p>

<p>Quan va tornar a casa sense diners i amb cinc mongetes, la seva mare va plorar de ràbia i de dolor. Va agafar les mongetes i les va llençar per la finestra. «Mongetes màgiques! Quina idiotesa! Ara com viurem?» Va tancar la porta de la seva cambra i no va sopar.</p>

<p>L'endemà al matí, en Joan va obrir la finestra i va quedar-se sense paraules: del terra del jardí havia crescut durant la nit una planta de mongetes tan alta que la capa dels núvols. Les seves tiges eren gruixudes com el tronc d'un pi i les fulles eren grans com taules. Pujava en espiral, oferint branca per branca com una escala natural.</p>

<p>En Joan va escalar. Va pujar molt de temps, fins que el poble era un punt diminut avall i els núvols el van embolcar com una boira càlida. Sobre els núvols hi havia un camí de pedra blanca que portava a un castell enorme, tan gran que el poble sencer hauria cabut al seu pati interior.</p>

<p>Va entrar. Tot era enorme: les cadires, les taules, els plats, els gots. I d'una habitació del fons venia un soroll de passes que feia tremolar el terra. Una veu de tro va dir: «OLORO SANG HUMANA!» El gegant va entrar a la cuina. En Joan va amagar-se a dins d'un dels grans pots de la cuina.</p>

<p>El gegant va menjar, va comptar les seves monedes d'or i va adormir-se. En Joan va sortir del pot, va agafar tantes monedes com va poder portar i va córrer cap a la planta. Va baixar de pressa. La mare, quan va veure les monedes, no va poder creure-ho.</p>

<p>En Joan va pujar tres vegades al castell. La primera va portar les monedes. La segon una gallina que ponia ous d'or. La tercera vegada el gegant estava mig despert i va sentir els seus passos. Va perseguir-lo fins a la planta. En Joan va baixar ràpidament, va agafar una destral i va tallar la planta. El gegant va caure i la terra el va engolir.</p>

<p>Amb les monedes i la gallina que ponia ous d'or, en Joan i la seva mare van viure bé la resta de la seva vida. La mare mai no va tornar a renyar el seu fill per ser curiós. I en Joan mai no va deixar de mirar el cel preguntant-se qué hi havia amunt, més amunt del que es podia veure.</p>`

    resum:'Un vell llenyataire crida la Mort però quan arriba, descobreix que la vida val la pena.',
    text:`<p>El llenyataire Vicenç tenia setanta-tres anys i quaranta-cinc d'ells els havia passat al bosc tallant llenya. Les seves mans eren tan dures que podia agafar una roca calenta sense cremar-se, i la seva esquena, que havia portat feixos de llenya des dels disset anys, estava tan corbada que quan caminava semblava que mirava el terra buscant alguna cosa perduda. I de fet buscava quelcom: la pau. Aquell dia concret, un dimecres de novembre amb la pluja que queia freda i la boira que impedia veure a deu metres de distància, el vell Vicenç havia aixecat un feix de llenya tan pesat que les cames li havien fallat i havia caigut de genolls a la terra humida del bosc.</p>

<p>Havia quedat allà, de genolls, amb les mans que s'enfonsaven en el fang, i havia sentit aquell cansament que va més enllà dels músculs: el cansament de l'ànima, el de qui ha treballat molt durant molt de temps i se sent esgotat fins al fons. Va alçar el cap cap al cel gris i va dir en veu alta, sense pensar-s'ho: «Mort, vine. Ja n'hi ha prou. No puc més.»</p>

<p>El bosc va quedar-se en silenci. Fins i tot la pluja va semblar aturar-se un instant. I llavors, entre els arbres, va apareixer una figura. No era el que la gent imagina quan pensa en la Mort: no era esquelètica ni portava una dalla. Era una dona de mitjana edat, de presència tranquil·la, amb un abric gris i unes botes de caminar, que s'acostà sense fer soroll i es va aturar davant del vell Vicenç.</p>

<p>«M'has cridat?» va dir la seva veu, que era suau i directa alhora, com la veu d'algú que no necessita adornar el que diu perquè les seves paraules ja porten tot el que cal. El vell Vicenç la va mirar. En la seva imaginació, havia cridat la Mort moltes vegades en pensament, però mai havia esperat que vingués de debò. Ara que era davant d'ell, quelcom va canviar dins seu.</p>

<p>Perquè en el moment en que la Mort va aparèixer, totes les coses que estimava van presentar-se a la seva ment com si li haguessin estat esperant per dir-li adeu. El net petit, en Pau, que li havia dit «avi» per primera vegada el mes passat amb aquella veu de meravella dels nens que acaben de descobrir una paraula nova. El gust del vi negre de la collita del seu cunyat, que bevia cada diumenge a la seva taula. La calor de la llar de foc de casa seva, aquella calor particular de la llenya de roure que és diferent de tota altra llenya. La veu de la seva filla cantant a la cuina mentre feia el sopar. El color del cel a la tarda quan para de ploure i surt el sol entre els núvols.</p>

<p>«Sí», va dir finalment, «t'he cridat. Però...» Va fer una pausa llarga. «Podeu ajudar-me a aixecar el feix de llenya?» La Mort el va mirar un moment amb aquells ulls que havien vist moltes coses. Va agafar el feix de llenya amb les dues mans i el va posar a l'esquena del vell Vicenç amb una delicadesa sorprenent.</p>

<p>«Quan sigui el moment», va dir la Mort, «tornaré.» Va fer mitja volta i va desaparèixer entre els arbres tan silenciosament com havia arribat.</p>

<p>El vell Vicenç va tornar a casa amb el feix de llenya. Aquella nit va sopar amb la seva família i va parlar més del que acostumava: va explicar a la filla que la seva veu era bonica quan cantava, va dir al gendre que el vi d'aquell any era el millor que havia tastat, va agafar el net petit i l'ha abraçat fins que el nen va riure de ganes. I quan tothom se'n va anar a dormir, el vell Vicenç es va asseure vora la llar i va mirar les flames de la llenya de roure que cremava, i va pensar que el dia havia sigut llarg però que havia valgut la pena viure'l.</p>`

    id:55, emoji:'🌺', title:'El Roser de la Paret',
    tema:'Natura', tags:['roses','primavera','memòria','temps','estimació'],
    resum:'Un roser centenari guarda la memòria de totes les primaveres i de tots els que han estimat.',
    text:`<p>Al pati interior de la casa dels Mas, una casa de planta baixa i pis en un carrer estret del barri vell, hi havia un roser que ningú no recordava qui havia plantat ni quan. El tronc era tan gruixut com el canell d'un home adult, retorçut per dècades de creixement i retallat i creixement de nou, i les branques s'estenien per tota la paret sud del pati en una xarxa de fusta i fulles i espines que a la primavera es cobria de roses de color rosa pàl·lid, d'una delicadesa que feia mal als ulls.</p>

<p>La Laia tenia deu anys i vivia amb els seus pares i la seva iaia a aquella casa. La iaia tenia vuitanta-dos anys i una relació amb el roser que la Laia havia observat sempre sense acabar d'entendre: la iaia li parlava. No continuadament, no de manera que semblés bogeria, però quan sortia al pati i el roser estava en flor, s'hi acostava, tocava una branca amb els dits i deia coses en veu baixa, molt baixa, que la Laia no podia sentir des de la finestra.</p>

<p>Un dia la Laia li va preguntar directament: «Iaia, per qué parles al roser?» La iaia va somriure d'aquella manera particular que té la gent gran quan una pregunta toca quelcom antic i profund. «Perquè m'escolta», va dir. «I perquè guarda el que li digo.»</p>

<p>La Laia va quedar pensativa. «Les plantes no senten.» «Com saps el que senten i el que no senten les plantes?» va respondre la iaia, no agressivament sinó amb una pregunta genuïna. La Laia no va tenir resposta.</p>

<p>Aquella tarda va sortir al pati sola. Va mirar el roser. Era principis de primavera i els botons dels nous brots acabaven d'obrir-se, rosa pàl·lid i humit com si acabessin de naixer. La Laia es va asseure a la cadira de ferro del pati i va dir, molt baixet, sentint-se una mica ridícula: «Hola.» El roser no va fer res visible. El vent va bellugar suaument les fulles.</p>

<p>«La meva iaia diu que sents», va continuar la Laia. «Si és veritat, hauries de saber que l'estimo molt. I que de vegades tinc por que es mori, perquè és molt vella.» El vent va moure les branques d'una manera que la Laia va trobar que semblava una resposta, tot i saber que probablement era simplement el vent.</p>

<p>Aquella nit va preguntar a la iaia quan havia plantat el roser. «Abans que jo nasqués», va dir la iaia. «El va plantar la meva àvia quan es va casar. Li van dir que un roser a la paret de la casa porta amor a la família mentre creix.» «I ha portat amor?» «Molt.» La veu de la iaia ho deia de manera que la Laia va entendre que darrere d'aquella paraula hi havia coses que no s'explicaven en cinc minuts.</p>

<p>Aquell estiu la iaia va emmalaltir. No va ser grave, però va estar setmanes sense poder sortir al pati. La Laia, cada matí, li portava una branca del roser amb dos o tres roses obertes i les posava al gerro de la seva cambra. La iaia les mirava i deia: «Gràcies, roser.» Com si la Laia fos simplement el mitjà i el roser el donant.</p>

<p>Quan la iaia es va recuperar i va poder tornar al pati, es va asseure davant del roser un bon rato. Llavors va dir a la Laia: «Quand jo ja no sigui, has de cuidar-lo tu. Un roser necessita ser estimat, igual que la gent. I si l'estimes, t'ho torna.» La Laia va prometra que sí. I molts anys més tard, quan era ella qui estava asseguda al pati de vella, va explicar a la seva néta la mateixa historia que li havia explicat la iaia, mentre el roser, que seguia allà, floria una vegada més en aquell rosa pàl·lid que semblava sempre acabat de néixer.</p>`
  },

    id:56, emoji:'🐝', title:'L\'Abella Reina',
    tema:'Natura', tags:['abella','mel','rusc','cooperació','comunitat'],
    resum:'La història de com les abelles van aprendre a treballar juntes per primera vegada.',
    text:`<p>En el primer estiu del món, quan les flors eren noves i el seu nèctar era tan abundant que sobreeixia dels pètals com un riu petit i dolç, les abelles vivien de manera completament diferent de com ho fan ara. Cadascuna anava per lliure: sola, de flor en flor, bevien el nèctar que trobaven i dormien on podien. Eren felices en aquell estiu generós, però no tenien previsió ni comunitat ni res que les lligués les unes a les altres.</p>

<p>L'estiu va ser llarg però va acabar. La tardor va arribar amb les seves pluges i els dies més curts, i les flors van tancar-se. I llavors va arribar l'hivern, i les abelles van descobrir que no tenien res guardat, que l'estiu s'havia acabat i no havien pensat en el que vindrà després. Moltes van morir de fred i de fam.</p>

<p>Les que van sobreviure a l'hivern van sortir a la primavera canviades. Una d'elles, més gran que les altres i amb les ales striades d'or i negre d'una manera diferent de la resta, va reunir les sobrevivents en un ametller florit. «L'any passat no ens vam preparar i moltes de les nostres no han sobreviscut», va dir. «Hem de canviar la manera de viure.»</p>

<p>Les altres abelles l'escoltaven. Algunes estaven d'acord, altres tenien por del canvi, i unes poques deien que elles preferien la llibertat de la vida solitaria. «Pots continuar sola si vols», va dir l'abella gran. «Però pensa en l'hivern passat.»</p>

<p>Aquell estiu, les que van decidir unir-se van construir per primera vegada un rusc. Van trigar molts intents a entendre com s'havia de fer: provant formes, materials, sistemes. Van descobrir que la cera que produïen els seus propis cossos era el millor material de construcció. Van aprendre a dividir les tasques: unes recollien el nèctar, altres el transformaven en mel, altres construïen les cel·les hexagonals, altres guardaven la porta, altres ventilaven el rusc amb les ales.</p>

<p>Van descobrir que treballant juntes feien en un dia el que soles haurien tardat una setmana. Van descobrir que la mel que guardaven era millor que el nèctar fresc que havien begut sempre, perquè el procés de transformació concentrava el dolç i n'eliminava l'excés d'aigua. Van descobrir que el rusc era càlid a l'hivern i fresc a l'estiu si el ventilaven bé.</p>

<p>Al final de l'estiu, el rusc estava ple de mel per a tot l'hivern. Quan va arribar el fred, totes les abelles del rusc sobreviviren. Les que havien escollit la vida solitaria van tornar a patir com l'any anterior.</p>

<p>La primavera següent, l'abella gran, que havia sigut des del primer dia la que organitzava i donava les instruccions i buscava solucions, va ser reconeguda com a Reina per les altres. No per un vot formal ni per una conquesta: simplement perquè tothom sabia que era ella qui havia tingut la idea que els havia salvat la vida.</p>

<p>Des d'aleshores, les abelles viuen en comunitat. I la mel que produeixen, dolça i persistent i duradora, és el producte d'aquella primera decisió de fer les coses juntes en lloc de soles. I quan una abella vola de flor en flor, no recull per a ella: recull per al rusc, per a totes.</p>`
  },
