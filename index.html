    tema:'Màgia', tags:['granota','príncep','estany','promesa','encanteri'],
    resum:'Una granota que espera pacientment que algú la vegi amb ulls de cor i no d\'aparença.',
    text:`<p>A la vora d'un estany tranquil que hi havia al mig del bosc de Can Puig, entre nenúfars i canyes i el so continu de les granotes en les nits de primavera, vivia una granota que era diferent de les altres. Era més gran, per a començar: quasi el doble que una granota normal. I tenia aquells ulls daurats que les granotes no solen tenir, uns ulls que semblaven massa profunds per ser simplement els d'un amfibi.</p>

<p>La filla del moliner, que es deia Marta i tenia catorze anys, anava a l'estany cada tarda perquè era el lloc del bosc on es trobava millor. No hi anava a nedar ni a pescar: simplement s'asseia a la riba, treia un llibre i llegia mentre escoltava els sons de l'estany. De vegades els ocells. De vegades el vent entre les canyes. De vegades aquella granota gran que la mirava des de la pedra del mig de l'estany amb aquells ulls daurats tan poc habituals.</p>

<p>Un dia, mentre llegia, va sentir una veu que deia el seu nom. Va alçar els ulls del llibre. No hi havia ningú. Va tornar a llegir. «Marta.» De nou. Va mirar i va veure la granota gran a la pedra, mirant-la. «Has sigut tu?» va dir, sentint-se una mica ridícula. «Sí», va dir la granota. La veu era suau i profunda alhora, molt diferent del que s'esperaria d'una granota.</p>

<p>Marta va tancar el llibre. Havia llegit prou contes per saber que les granotes que parlen solen tenir histories interessants. «Qui ets?» «Em dic Bernat», va dir la granota. «Soc el fill del duc de Palol. Una bruixa em va transformar fa cinc anys.» «Per qué?» «Per ser superficial. Em vaig burlar d'una dona lletja al mercat. La dona era la bruixa disfressada. Va dir que viuria com allò que havia menyspreat fins que algú em veiés per allò que era realment i no per allò que semblava.»</p>

<p>Marta va reflexionar sobre aquella historia. «I qué has de fer per tornar a ser tu?» «No ho sé exactament. La bruixa va dir simplement que algú havia de veure'm de debò. No vaig entendre qué volia dir.» «Jo us veig cada tarda», va dir Marta. «Us veig assegut a la pedra i em sembla que penseu coses. I ara sé que és veritat.»</p>

<p>Van parlar llargament aquella tarda i moltes tardes més. Marta llegia, la granota escoltava i de vegades parlaven. La granota li explicava records del temps en que era persona: les festes al castell del seu pare, els viatges que havia fet, les coses que havia après. I li explicava la soledat de cinc anys a l'estany, sense ningú amb qui parlar, veient com les estacions passaven i preguntant-se si alguna vegada sortiria d'aquell encant.</p>

<p>Un vespre de primavera, quan l'aire era tèpid i les granotes de l'estany cantaven a ple pulmó, Marta va deixar el llibre i va dir: «He estat pensant en el que va dir la bruixa. Que algú havia de veure't per allò que ets i no per allò que sembla. Doncs us he vist com un ésser intel·ligent i bo que ha après de la soledat. No com una granota. Com algú que m'interessa.»</p>

<p>La llum al voltant de la pedra va canviar. La granota va créixer i va canviar de forma, i on havia sigut s'asseia un jove de cabells foscos i ulls daurats, amb la roba una mica humida de l'estany però intacta. Va quedar assegut a la pedra del mig de l'estany mirant les seves pròpies mans.</p>

<p>«Funciona», va dir amb una veu que era la mateixa de la granota però ara plena i completa. Va nedar fins a la riba i va sortir de l'estany. Marta el va mirar. Era el mateix que havia conegut a la pedra, simplement en la forma que hauria hagut de tenir sempre. «Gràcies», va dir. «Cinc anys esperant que algú no em veiés com una granota sinó com allò que hi havia a dins.»</p>

<p>Van ser amics llargs anys. Quan Bernat va tornar al castell del seu pare i va recuperar la vida que li corresponia, va convidar Marta i el seu pare el moliner a viure prop seu. I cada any, la tarda del dia en que s'havien conegut, tornaven a l'estany i Marta llegia en veu alta mentre Bernat escoltava assegut a la riba, recordant els cinc anys en que aquella pedra havia sigut el seu món.</p>`
  },

    id:78, emoji:'🦅', title:'L\'Àguila i els Polls',
    tema:'Valors', tags:['àguila','polls','volar','aprendre','independència'],
    resum:'Una mare àguila que ensenya als seus fills la única manera real d\'aprendre a volar.',
    text:`<p>Al cim del penyal de granit que dominava tota la vall del Llobregat, on el vent bufava sempre i les nuvolades passaven per sota dels peus en els dies de boira baixa, la mare àguila Nura havia construït el seu niu la primavera anterior. Era un niu gran i sòlid, fet de branques, herba seca i llana de xai que havia recollit al llarg de mesos, reforçat any rere any fins que era una plataforma estable que podia aguantar el pes d'una àguila adulta més el dels polls que hi naixen.</p>

<p>Aquella primavera n'hi havien nascut dos: la gran, la Volta, que era impulsiva i gran i tenia les ales més llargues de l'espècie que Nura havia vist en molt de temps. El petit, l'Alà, era més reflexiu i observador, i passava les hores mirant com la seva mare volava, intentant entendre el mecanisme de quelcom que hauria d'arribar per si sol però que la seva ment curiosa volia comprendre d'endavant.</p>

<p>Nura els portava menjar cada dia: llebres, conills, de vegades algun peix dels rius de la vall. Els polls menjaven i creixien i les seves ales es feia cada cop més grans i fortes. Però els polls no volaven: estaven còmodes al niu, el menjar venia sol, i la mida i la seguretat del niu eren molt millors que l'incertesa de l'aire.</p>

<p>La Volta, la gran, preguntava de tant en tant: «Quan volarem, mare?» Nura deia: «Quan estiguis llesta.» La Volta deia: «Ja estic llesta.» Nura no responia. L'Alà observava aquesta conversa i observava les ales de la seva germana i les seves pròpies i feia càlculs silenciosos.</p>

<p>Un dia de finals de juliol, Nura va arribar al niu amb les mans buides. Sense menjar. Els polls la van mirar expectants. «On és el menjar?» va dir la Volta. «Avui no n'hi ha», va dir Nura. «Tampoc demà. Ni passat demà.» «Per qué?» «Perquè a partir d'ara el menjar l'heu de buscar vosaltres.» La Volta va obrir el bec per protestar. «Però si no sabem volar!» «Doncs aprendreu.»</p>

<p>Va quedar-se al niu aquell dia i el següent, però va quedar-se quiet i no va anar a caçar. El tercer dia, la Volta tenia tanta gana que va acostar-se a la vora del niu i va mirar avall. Era molt avall. Però la gana era molt forta. Va estendre les ales, i sense pensar-s'hi massa va saltar.</p>

<p>Va caure durant un moment que li va semblar etern. Llavors les ales van agafar el vent i va planejar, torçant i girant mentre aprenia en temps real com funcionaven aquells músculs que mai havia usat. Va caure de nou, va recuperar l'alçada, va volar uns metres, va perdre el control, va tornar a trobar-lo. Al final de la tarda havia caçat un conill petit i havia tornat al niu exahusta però amb el cap ple d'una eufòria que mai havia sentit.</p>

<p>L'Alà va sortir a volar el dia següent. Havia observat la seva germana tan atentament que els seus primers vols tenien una precisió que la Volta no havia tingut: sabia on girar les ales per canviar de direcció, sabia com usar les corrents d'aire càlid per pujar sense esforç. Va trigar menys a caçar el primer conill.</p>

<p>Nura els va observar des de dalt durant totes aquelles hores. Havia sentit moltes vegades la temptació d'intervenir, d'ensenyar-los, d'ajudar-los quan caien. Però havia après, dels seus propis pares i de molts anys de criar polls, que les ales s'enforteixen amb la lluita i no amb l'ajuda. L'ajuda que sembla protecció és sovint el pitjor que pots fer a un ésser que ha de volar.</p>

<p>Al final de l'estiu, els dos polls eren àguiles adultes que caçaven soles i volaven amb la seguretat que dóna saber que el cos et respon perquè has après tu sol a fer-lo respondre. Nura va volar al seu costat una última tarda i llavors els va deixar anar cap als seus propis territoris. Era el moment. Era l'única cosa que podia fer per ells que valgués de debò.</p>`
  },

    id:79, emoji:'🔑', title:'Les Tres Claus d\'Or',
    tema:'Valors', tags:['claus','tresor','fills','treball','terra','llegat'],
    resum:'Un pare vell deixa als fills un enigmàtic llegat que resulta ser el treball de la terra.',
    text:`<p>Al peu de les Gavarres, en un mas de pedra que havia vist quatre generacions de la mateixa família, un pagès de nom Jaume Colomer estava morint. Ho feia amb la serenitat dels que han viscut prou per acceptar que tot té final, però amb la preocupació concreta de qui té tres fills que no han après el que haurien d'haver après mentre tenien temps d'aprendre-ho.</p>

<p>Els tres fills, en Pere, en Pau i en Joan, havien crescut amb la comoditat que dona un mas pròsper i un pare treballador. No havien passat gana, no havien hagut de lluitar per res essencial, i el resultat era que els tres havien desenvolupat aquella relació complicada amb la feina que té la gent que no l'ha necessitat mai del tot: la feien quan calia però sense convicció, preferien qualsevol altra activitat, i tenien una tendència a considerar que les coses bones de la vida arribarien soles d'una manera o altra.</p>

<p>Jaume els va cridar al costat del llit. «Fills», va dir amb la veu que li quedava, «he treballat tota la vida i he acumulat quelcom valuós. No us ho diré tot ara: us diré simplement que al camp hi ha tres claus d'or amagades. Quan les trobeu, sabreu el que val aquell camp.» I va morir aquella mateixa nit, en pau.</p>

<p>Els tres fills van quedar-se amb el secret i la terra. La terra no era poca: vuit hectàrees de secà al peu de la serra, amb oliveres centenàries, un tros de vinya i una part de cereal. Era una herència decent si es treballava. El problema era precisament aquell: calia treballar-la.</p>

<p>Però les tres claus d'or van canviar el càlcul. Si eren al camp, calia trobar-les. I per trobar-les calia llaurar i cavar i remoure la terra amb atenció. Els tres germans van dividir el camp en tres parts i van començar a treballar amb una diligència que mai no havien demostrat en tota la seva vida: cavaven, llauraven, rastrejaven palme a palme. Buscaven les claus d'or però feien, sense saber-ho, el que la terra necessitava.</p>

<p>Van treballar tot l'estiu. No van trobar cap clau. Però aquella tardor, el camp va donar la millor collita en molts anys: les oliveres que havien quedat abandonades van produir olives grosses i madures, la vinya que havia crescut silvestre va donar raïms dolços, el cereal va omplir el graner. Va ser un any de feina i un any d'abundància.</p>

<p>L'any següent van tornar a llaurar buscant les claus. Altra vegada res. Altra vegada excel·lent collita. El tercer any, en Pere, el gran, va dir als seus germans: «Crec que sé on són les claus.» Els altres dos el van mirar. «Aquí», va dir en Pere, i va mostrar les seves pròpies mans, calloses i fortes des de tres anys de feina. «I aquí», va dir assenyalant el camp que els envoltava, ple i verd i productiu. «El nostre pare no va amagar tres claus d'or al camp. Ens va amagar el camp.»</p>

<p>Van quedar en silenci els tres. Van mirar el camp. Van mirar-se les mans. En Pau, el del mig, va riure primer: «Era el camp. La terra ben treballada era el tresor.» En Joan, el petit, va seure a terra i va agafar un grapat de terra entre les mans. «I les claus», va dir, «eren nosaltres. Quan les usem, el camp s'obre.»</p>

<p>Van anar a la tomba del seu pare aquell vespre i li van portar la primera fruita de la collita. No calia dir res. El vell havia sabut el que feia quan havia inventat les tres claus d'or. Havia sabut que els fills no treballarien per la terra, però que treballarien per un tresor. I la terra era un tresor: simplement calia descobrir-ho per un mateix.</p>`
  },

    id:80, emoji:'🌊', title:'La Sirena de la Costa Brava',
    tema:'Llegenda', tags:['sirena','mar','pescadors','Costa Brava','protecció'],
    resum:'La llegenda de la sirena que protegeix els pescadors de la Costa Brava de les tempestes.',
    text:`<p>Als ports de la Costa Brava, aquella franja de costa de penya-segats i cales amagades que va del Cap de Creus fins a Blanes, hi ha una llegenda que els pescadors vells explicaven als fills i els fills als néts, en veu baixa, com es parla de les coses que es creuen però no es poden demostrar: la llegenda de la Sirena de Norfeu.</p>

<p>Diuen els pescadors que a la punta de Cap Norfeu, aquell promontori de granit rosat que entra al mar entre Roses i l'Escala, hi ha una roca submergida que a baix marea sobresurt just mig metre de l'aigua. A aquella roca, en les tardes de calma quan el mar és pla i el sol cau obliqua, es pot veure de vegades una figura asseguda que sembla una dona però que té la meitat inferior del cos com un peix: la cua daurada i brillant que penja de la roca cap a l'aigua.</p>

<p>La primera vegada que es va veure, diuen, va ser fa molts segles. Un pescador de Cadaqués de nom Esperit va quedar-se endarrerit en una jornada de pesca i va trobar-se al capvespre en mig del mar quan una tramuntana forta va aixecar-se sense avís. La tramuntana al Cap de Creus és una força que els que no l'han vista no poden imaginar: arriba de sobte, fa onades que canvien de direcció constantment i crea remolins d'aire que donen voltes a les barques. En Esperit no tenia manera de saber on era la costa en la foscor creixent i la tempesta.</p>

<p>Llavors va veure una llum. No la llum d'un far, que no n'hi havia en aquell temps, sinó una llum suau i daurada que parpellejava a l'horitzó. Va remejar cap a ella. La llum es movia, però sempre a la mateixa distancia, com si estigués guiant-lo. Va seguir-la durant dues hores, remant contra el vent, fins que la barca va tocar fons a una cala arrecerada que coneixia: la cala Montjoi, protegida per les roques de la tramuntana. Va passar allà la nit i al matí va tornar a Cadaqués sa i estalvi.</p>

<p>Va explicar la historia al port. Alguns van creure'l, d'altres van dir que havia sigut una estrella o un peix lluminós. Però el jove pescador Miquel de l'Escala, que havia passat per una experiència similar uns mesos enrere, va reconèixer immediatament la descripció de la llum daurada que es movia però no s'acostava mai.</p>

<p>Des d'aleshores la llegenda va créixer. Els pescadors de tota la costa parlaven de la Sirena de Norfeu: un ésser que vivia a les profunditats de cap Norfeu i que sortia les nits de tempesta per guiar als pescadors que s'havien quedat endarrerits. No era perillosa ni malèvola, al contrari: era protectora. Però era esquiva: ningú no l'havia vist de prop, ningú no havia tingut temps de parlar-li.</p>

<p>En Miquel, el pescador de l'Escala, va dedicar vint anys a intentar trobar-la quan el mar estava en calma. Va aprendre a bussejar entre les roques de Norfeu, va explorar cada cala i cada escletxa de la punta. Mai no la va trobar directament. Però va trobar, enganxades a les roques del fons a l'oest del promontori, unes petxines de colors impossibles que no existien en cap guia de malacologia que havia consultat: grogues i daurades com la llum que guiava els pescadors.</p>

<p>Va portar les petxines al port i les va mostrar al mestre pescador vell. L'home les va mirar i va dir: «Són les petxines del seu niu. Ha existit aquí molt abans que nosaltres i existirà molt després. Deixeu-les on les heu trobat.» Miquel les va tornar al fons. I des d'aleshores, cada tardor, quan la temporada de pesca estava a punt d'acabar, llençava al mar davant de cap Norfeu una corona de flors com a agraïment per tots els pescadors que havien tornat a port gràcies a aquella llum daurada a la nit.</p>`
  },
  {
    id:81, emoji:'🌿', title:'L\'Arbre Generós',
    tema:'Valors', tags:['arbre','nen','donar','estimació','gratitud'],
    resum:'Un arbre que dóna tot el que té a un nen que estima, i la felicitat que en troba.',
    text:`<p>Al costat d'un camp de blat, prop d'un camí de terra que portava d'un poble petit a un altre poble petit, hi havia un pomera vell que devia tenir cent anys si en tenia un. El seu tronc era tan gruixut que dos nens amb els braços oberts no haurien pogut abraçar-lo, les branques s'estenien tan ample que la seva ombra cobria un radi de deu metres, i a la primavera, quan floreixia, els viatgers del camí s'aturaven per respirar aquella olor particular de la poma en flor que fa pensar en la infantesa.</p>

<p>Un nen del poble proper, en Tomàs, havia descobert l'arbre quan tenia cinc anys i havia decidit que era seu. No en el sentit legal, que l'arbre era d'un camp que pertanyia a algú, sinó en aquell sentit profund que tenen els nens quan troben un lloc que els parla: l'arbre era seu perquè hi havia una connexió entre ells dos que no necessitava explicació.</p>

<p>Jugava a l'arbre cada tarda: pujava a les branques baixes, menjava les pomes que queien al terra, dormia a l'ombra les tardes de calor, i de vegades simplement s'asseia al peu i escoltava el so del vent entre les fulles. L'arbre no feia res d'especial. Era simplement un arbre. Però en Tomàs creia que l'arbre sabia que era allà, i l'arbre, si els arbres poguessin tenir opinions, hauria dit el mateix d'en Tomàs.</p>

<p>Els anys van passar. En Tomàs va créixer, va tenir coses que ocupaven el seu temps: l'escola, els amics, les preocupacions de l'adolescència. Va anar menys a l'arbre. Però quan tenia un problema gran, sovint acabava assegut al seu peu sense saber per qué exactament, i el soroll del vent entre les fulles seguia sent el que havia sigut sempre: una mena de companyia sense paraules.</p>

<p>Quan tenia vint anys i necessitava diners per a un viatge important, va pensar en l'arbre. Les pomes que produïa eren bones i abundants: si les venia al mercat, podia guanyar prou. L'arbre va donar les pomes i en Tomàs va fer el viatge. Va tornar canviat, amb noves idees i noves energies, i per un temps va pensar en l'arbre amb gratitud.</p>

<p>Quan es va casar i va tenir fills i va voler construir una casa gran, va pensar de nou en l'arbre. Les seves branques eren fusta excel·lent. Va tallar les branques més grans i va construir la casa. L'arbre va quedar amb el tronc i les branques petites, i en Tomàs va passar anys sense visitar-lo.</p>

<p>Quan era vell i els fills havien crescut i marxat i necessitava un lloc tranquil i una manera de descansar i viatjar una última vegada, va pensar en l'arbre. Va anar-hi. El tronc seguia allà, gruixut i sòlid, però sense la majoria de les branques. Va dir: «Necessito una barca per veure el mar una vegada.» L'arbre no podia donar-li les branques que ja no tenia, però el seu tronc era prou dret i sòlid. En Tomàs ho va entendre i va tallar el tronc i va construir una barca petita i va veure el mar.</p>

<p>Quan va tornar, va anar al que quedava de l'arbre: un tocó baix i fort, però viu. Es va seure al tocó. Va passar molt de temps assegut allà. L'herba creixia al voltant, els ocells de vegades s'hi posaven. En Tomàs va entendre que havia pres tot el que li havia estat donat, i que el tocó no li retreia res. I va sentir, per primera vegada en molts anys, la pau que havia sentit de nen assegut al peu del pomera gran. El tocó la donava igual que l'arbre. Perquè la generositat no depèn de la mida: depèn de si el que dones ho dones de cor.</p>`
  },
  {
    id:82, emoji:'🎶', title:'El Cant dels Ocells',
    tema:'Natura', tags:['ocells','música','alba','natura','origen'],
    resum:'La llegenda de com els ocells van aprendre a cantar a l\'alba per primera vegada.',
    text:`<p>En el primer any del món, quan tot acabava de ser creat i les coses provaven per primera vegada les seves funcions, els ocells volaven en silenci. Tenien el bec, tenien les ales, tenien la vista aguda i les plomes de tots els colors, però de la seva gola no sortia cap so. Eren els éssers més silenciosos del cel, i el cel, que estava acostumat al soroll del vent i de la pluja i del tro, trobava aquell silenci dels ocells una mica desconcertant.</p>

<p>El Sol, que en aquells primers temps era jove i tenia una relació molt directa i personal amb tot el que havia creat, sortia cada matí a l'alba i es trobava el cel ple d'ocells que volaven en silenci. El Sol estimava els ocells: les seves plomes captaven i reflectien la seva llum de maneres meravelloses. Però aquell silenci l'entristeïa.</p>

<p>«Per qué no canteu?» els va preguntar un dia. Els ocells el van mirar sense entendre la pregunta. No sabien el que era cantar. Tenien goles que podien produir sons, però cap d'ells ho havia intentat mai, i a més no tenien clar qué calia fer per produir un so de la gola que no fos simplement el soroll del vent passant per un forat.</p>

<p>El Sol va decidir que els ensenyaria. Però com s'ensenya a cantar a algú que no ha sentit mai música? Va pensar molt. Finalment va decidir que la manera era mostrar-ho, no explicar-ho. Un matí va sortir a l'alba i va posar tota la seva energia, tota la seva llum i tota la calor en un raig concentrat que va enviar cap a un ocell petit i vermell que dormia a una branca de cirerer.</p>

<p>L'ocell es va despertar amb aquell raig de llum al pit. La calor del Sol li va escalfar el cor i des del cor va pujar per la gola i va sortir: un triol. Tres notes. L'ocell no sabia qué havia fet. Va parar. Va tornar a provar. Va sortir un altre triol, lleugerament diferent. Va provar de nou. Cada vegada el so era diferent, però sempre era un so ple i vibrant que venia d'endins.</p>

<p>Els altres ocells al cirerer van obrir els ulls i van mirar l'ocell petit i vermell. Mai no havien sentit un so com aquell. Cada animal, instintivament, va voler reproduir-lo. Van obrir els becs i van provar. De les goles van sortir sons de tota mena: alguns aguts, alguns greus, alguns tèbols i alguns cristal·lins. Era el primer concert de la historia del món, improvisat al matí d'un dia de primavera sobre un cirerer en flor.</p>

<p>El Sol va quedar tan content que va brillar més fort aquell matí que cap altre. I els ocells, en sentir aquella resposta de llum, van entendre el que havien de fer: havien de cantar cada matí per donar la benvinguda al Sol, que en resposta brillaria amb tota la seva força.</p>

<p>Des d'aquell primer dia, cada espècie va trobar el seu cant particular. Els merles amb aquell fluir melòdic. Les orenetes amb els seus xiulets ràpids. Les caderneres amb les variacions i els ornaments. Els tudons amb aquella nota profunda i repetida. El rossinyol, que havia escoltat tots els altres i havia après de tots, va crear el cant més complex i bonic de tots, el que la gent sent a les nits de primavera i que fa aturar el caminar i quedar-se quiet escoltant.</p>

<p>I ara, cada alba, quan el cel comença a clarejar i el primer ocell trenca el silenci de la nit, no fa res diferent del que va fer aquell ocell petit i vermell al cirerer del primer any del món: dóna la benvinguda al Sol i li diu que el món continua aquí, viu, ple de plomes i colors i sons que esperen la llum per mostrar-se.</p>`
  },
  {
    id:83, emoji:'🧙', title:'El Mag i l\'Aprenent',
    tema:'Màgia', tags:['mag','aprenent','escombra','màgia sense saber','conseqüències'],
    resum:'Un aprenent de mag que usa la màgia del mestre sense conèixer-ne les conseqüències.',
    text:`<p>Al taller del mag Melquior, que estava situat al tercer pis d'una torre de pedra al costat d'un riu, hi havia prou coses interessants per mantenir ocupada la curiositat d'un noi jove durant anys: estanteries plenes de pots i fioles amb substàncies de colors impossibles, armaris plens de pergamins coberts de símbols, eines i instruments d'objectius misteriosos, i a la cantonada, una escombra de brou negre que semblava perfectament normal però que el mag tractava amb un respecte desproporcionat per a una eina de neteja.</p>

<p>En Pau, l'aprenent, tenia quinze anys i dos anys de feina al taller. Havia après moltes coses en aquells dos anys: com preparar les poques herbes i substàncies que el mag li encarregava preparar, com copiar les fórmules dels pergamins vells sense equivocar-se en cap lletra, com mantenir l'ordre d'un espai de treball que el mag volia en un ordre específic que no sempre semblava tenir sentit però que era sagrat. El que no havia après, perquè el mag no li havia ensenyat, era fer màgia de debò.</p>

<p>Un dimecres al migdia, el mag va sortir a fer un encàrrec que diria que trigaria tota la tarda. «Neteja el taller i omple el dipòsit d'aigua», va dir. «I no toquis l'escombra.» Va sortir. La porta es va tancar. En Pau va quedar sol al taller.</p>

<p>Va nedar la pols de les estanteries. Va ordenar les fioles que s'havien descol·locat. I quan va haver de portar l'aigua del pou al dipòsit, que estava al tercer pis i requeria molts viatges amb les galledes pesades, va mirar l'escombra a la cantonada i va pensar el que qualsevol aprenent de mag hauria pensat en aquella situació.</p>

<p>Havia escoltat el mag ritar en diverses ocasions una fórmula breu quan li encomanava a l'escombra alguna feina menor. La recordava perfectament. Va agafar l'escombra, va recitar la fórmula en veu baixa, i va dir: «Omple el dipòsit d'aigua.»</p>

<p>L'escombra va moure les seves branques com si fos un conjunt de cames, va agafar una galleda, va baixar al pou, va pujar les escales, va abocar l'aigua al dipòsit i va tornar a baixar. En Pau va quedar bocabadat. Va tornar a pujar. Va abocar. Va baixar. Va tornar a pujar. El dipòsit es va omplir.</p>

<p>I l'escombra va tornar a baixar. Va pujar. Va abocar. El dipòsit estava ple però l'escombra no ho sabia. Va baixar. Va pujar. L'aigua va começar a desbordarse del dipòsit. Va baixar. Va pujar. L'aigua queia per les escales. En Pau va intentar aturar l'escombra agafant-la: l'escombra se li va escapar. Va intentar dir la fórmula al revés: no va passar res. Va intentar agafar la galleda: l'escombra en va buscar una altra.</p>

<p>El taller s'inundava ràpidament. En Pau va prendre una destral de la paret i va tallar l'escombra per la meitat. Dos trossos. Dos trossos amb cames cadascun. Dos escombres que portaven el doble de galledes. L'aigua pujava.</p>

<p>La porta del taller es va obrir. El mag Melquior va entrar i en un segon va veure la situació. Va alçar la mà, va dir una paraula, i les dues escombres van quedar immòbils. Va dir una altra paraula i l'aigua va desaparèixer. Va dir una tercera i les escombres es van tornar a unir i va tornar a la cantonada.</p>

<p>Va mirar en Pau, que estava al mig del taller sec i perfecte, pàl·lid com la paret. «Ja sé el que vas pensar», va dir el mag amb una veu que no era de ràbia sinó de cansament. «I entenc que ho pensessis. Però has de saber una cosa sobre la màgia: és una força que obeeix l'ordre que li dones, no el resultat que vols. Si no saps exactament com formular l'ordre, amb totes les condicions necessàries, la força farà exactament el que li has demanat fins que algú la pari. I jo soc l'únic que sabia parar-la.»</p>

<p>Va asseure's a la cadira del taller. «Per qué us he dit que no toqueu l'escombra?» En Pau va respondre: «Perquè no sé tot el que cal saber per usar-la.» «Exactament. I aquí comença la saviesa: saber el que no saps.»</p>`
  },
  {
    id:84, emoji:'🦊', title:'La Guineu i el Corb: La Revanxa',
    tema:'Enginy', tags:['guineu','corb','pedra','astúcia','aprendre','revanxa'],
    resum:'El corb, après la lliçó del formatge, aplica la seva nova intel·ligència amb la guineu.',
    text:`<p>Havien passat dos anys des de l'incident del formatge. El Corb Negre, que havia sigut el protagonista d'aquella humiliació memorable al bosc del Montgrí, havia passat aquells dos anys reflexionant, observant i aprenent d'una manera que els altres animals del bosc no sabien que estava fent. La superficie del Corb seguia sent la mateixa: el plomatge negre i brillant, el vol circular alt sobre els arbres, la presència altiva. Però per dins, el Corb havia fet alguna cosa valuosa amb la vergonya: l'havia convertit en comprensió.</p>

<p>Havia après a llegir els gestos dels animals que l'envoltaven. Havia après que la Guineu Mireia, quan s'acostava amb aquell posat particularment amable, volia quelcom. Havia après que els elogis excessius i inesperats eren sempre la introducció d'una demanda. I havia après, el que era potser el més important, que la gràcia davant d'una manipulació no era la ràbia sinó la resposta inesperada.</p>

<p>Una tarda de finals d'estiu, el Corb estava assegut a una branca del seu pi habitual menjant un tros d'embotit que havia trobat prop d'un mas. No era formatge, però era decent. La Guineu va aparèixer al peu del pi amb aquella expressió que el Corb ja reconeixia: massa amable, massa casual, massa casual per ser casual.</p>

<p>«Bon dia, Corb!» va dir la Guineu amb un to d'alegria genuïna perfectament simulada. «Quina casualitat trobar-vos aquí!» El Corb la va mirar des de dalt amb un ull. «Hola, Guineu.» «Qué bonics que esteu avui! El plomatge us brilla especialment.» El Corb va notar l'estructura familiar. Va decidir jugar. «Gràcies», va dir amb una sinceritat completament plana.</p>

<p>La Guineu va hesitar. Normalment aquí venia la inflació de pit. El Corb no va inflar res. La Guineu va continuar: «I quina veu tan potent que teniu. Diuen que la vostra veu s'escolta des de molt lluny.» «Sí, prou lluny», va dir el Corb amb la mateixa plana sinceritat. «Necessites quelcom, Guineu?»</p>

<p>La Guineu va quedar descolocada. Li havia tallat l'estructura de l'estratègia. Va decidir ser directa: «He vist que teniu alguna cosa per menjar. Tenia gana.» «Ah», va dir el Corb. «Per qué no ho has dit directament?» «Perquè normalment funciona millor d'una altra manera.» «Amb mi ja no», va dir el Corb. «Amb mi ara funciona millor dir exactament el que necessites.»</p>

<p>Va partir el tros d'embotit en dos, va agafar la seva meitat i va deixar caure l'altra a terra prop de la Guineu. «Aquí tens. Sense elogis necessaris.» La Guineu va mirar l'embotit, va mirar el Corb, i quelcom va canviar a la seva expressió: la màscara de l'estratègia va caure i aparegué quelcom que potser era simplement la Guineu sense cobertura. «Gràcies», va dir.</p>

<p>«De res», va dir el Corb. «I Guineu: sé que ets molt intel·ligent. No em cal que ho demostris amb mi. Si vols quelcom, demana-ho. Si puc donar-ho, ho faré.» Va acabar-se la seva meitat de l'embotit. La Guineu va menjar la seva en silenci.</p>

<p>Quan va acabar, la Guineu va dir: «Fa dos anys et vaig fer un mal favor.» «Sí», va dir el Corb. «Però m'hi ha anat bé. He après coses.» «Jo he après coses amb la conversa d'avui», va dir la Guineu. «Que la directesa és més eficient que l'estratègia quan l'altre sap llegir l'estratègia.» «I probablement en general», va dir el Corb. La Guineu el va mirar. «Potser», va dir, i era la primera vegada que deia una cosa tan poc conclusiva i tan honesta alhora. Van quedar en silenci uns moments. Era un silenci còmode, que és el tipus de silenci que marca el principi d'una relació diferent.</p>`
  },
{
    id:85, emoji:'🌸', title:'El Príncep de les Roses',
    tema:'Màgia', tags:['roses','hivern','amor','príncep','jardí'],
    resum:'Un príncep que té el poder de fer florir les roses fins i tot a l\'hivern, per amor.',
    text:`<p>Al comtat de Roselles, a les terres de ponent dels Pirineus, hi havia una familia noble que des de feia generacions tenia fama de tenir una relació especial amb les plantes. La llegenda deia que la primera senyora de Roselles havia rebut d'una fada el do de fer créixer les roses en qualsevol estació, i que aquell do s'havia transmès als descendents d'una manera irregular: de vegades saltava una generació, de vegades es manifestava en el fill menor, de vegades en la filla gran.</p>

<p>El príncep Artau tenia vint-i-dos anys quan va descobrir que havia heretat el do. Va ser un hivern, tocant sense voler la branca morta d'un roser del jardí del palau: la branca va verdejar al seu contacte, va treure brots i al cap d'uns minuts havia florit amb una rosa d'un vermell intens que contrastava extraordinàriament amb la neu que cobria el jardí. Artau es va quedar mirant la rosa en silenci durant un bon rato.</p>

<p>Va aprendre a controlar el do gradualment: no podia fer florir qualsevol planta, sinó específicament les rosàcies, i no en qualsevol moment, sinó quan concentrava la seva atenció d'una manera particular. Era com cantar: podia fer-ho quan volia però requeria disposició i intenció.</p>

<p>La Cèlia era filla del jardiner del palau i havia crescut entre les plantes del jardí reial. Coneixia cada roser pel nom que li havia donat la seva mare, sabia en quina lluna s'havia de podar cada varietat, i tenia aquella relació amb les plantes que té la gent que les ha estimat des de petita sense que ningú els hagi dit que ho fes. Quan l'hivern va arribar i el jardí va morir, la Cèlia ho vivia com una pèrdua que es renovava cada any i mai del tot s'acceptava.</p>

<p>El príncep Artau va veure la Cèlia al jardí un matí de desembre. Estava mirant els rosers nus amb aquella expressió de qui estima quelcom que no pot tenir ara. Va acostar-s'hi. «Les roses tornaran a la primavera», va dir. La Cèlia va alçar el cap. «Ho sé. Però la primavera és lluny.» Va mirar-lo als ulls un moment, amb aquella mirada directa que no tothom es permet quan parla amb un príncep, i va tornar a mirar el roser.</p>

<p>Artau va posar la mà a la branca del roser que tenia al davant. Va concentrar l'atenció d'aquella manera que havia après. I la branca va verdejar, va treure brots, i al cap d'uns minuts la rosa va obrir els seus pètals d'un vermell intens sobre el fons blanc de la neu. La Cèlia va quedar immòbil.</p>

<p>«Com...?» «Una cosa que he après a fer», va dir Artau simplement. «Volíeu una rosa i la rosa era lluny.» La Cèlia va mirar la rosa i va mirar el príncep. No va dir res, però al cap d'un moment va alçar la mà i va tocar la rosa amb un dit, molt suaument, com si tingués por de que desaparegués. No va desaparèixer.</p>

<p>Des d'aquell dia, les setmanes d'hivern van tenir un ritual nou: el príncep Artau deixava roses vermelles sobre la neu del jardí. No sempre quan la Cèlia era allà, de vegades quan no hi era. Un mati ella en trobava tres al peu del roser de la seva mare. Un altre dia una sola, a la pedra on solia asseure's. Una setmana van aparèixer seguint un camí des de la porta del jardí fins a la font central, com una guia de petals vermells sobre la neu blanca.</p>

<p>La Cèlia sabia qui les posava. El príncep sabia que ella sabia. Però cap dels dos no deia res, com si les paraules trenquessin quelcom que mentre es quedava no dit podia continuar sent meravellós i incert i ple de possibilitats.</p>

<p>A finals de febrer, la Cèlia va arribar al jardí una tarda i va trobar el príncep Artau assegut al banc de pedra al costat del roser de la seva mare, amb una sola rosa vermella a la mà. Va asseure's al seu costat. Van quedar en silenci uns moments. «Per qué ho feu?» va preguntar finalment. Artau va mirar la rosa que tenia a la mà. «Perquè el jardí és trist a l'hivern», va dir. «I perquè vosaltres estimeu les roses. I perquè donar quelcom que algú estima és la millor manera que conec de dir que aquella persona m'importa.»</p>

<p>La Cèlia va agafar la rosa que ell tenia a la mà. «Gràcies per tot l'hivern», va dir. Artau va somriure. I quan la primavera va arribar i tots els rosers del jardí van florir sols, la manera com tota aquella bellesa multiplicada els mirava era la mateixa que havien tingut les roses vermelles sobre la neu: com un regal que ningú no havia demanat però que havia sigut exactament el que falta.</p>`
  },
  {
    id:86, emoji:'🌊', title:'La Barca de Pedra',
    tema:'Llegenda', tags:['sant','barca','pedra','miracle','costa catalana'],
    resum:'La llegenda del sant ermità que va arribar a les costes catalanes en una barca de pedra.',
    text:`<p>A les cales escarpades de la costa mediterrània catalana, on els penya-segats cauen directament al mar i l'únic accés a molts racons és per via marítima, hi ha una llegenda que es resisteix a desaparèixer malgrat els segles: la llegenda del sant que va arribar per mar en una barca impossible i que va viure entre les roques fins que el seu cos va tornar a la terra i el seu record va quedar per sempre a les pedres.</p>

<p>Era el temps en que la persecució dels cristians al nord d'Àfrica havia expulsat molts monjos i ermitans cap a les costes del Mediterrani. Un d'ells, de nom Guerau, era un home d'oració profunda i vida austera que havia estat caminant setmanes buscant un lloc on establir-se. Va arribar a la costa nord d'Àfrica sense res: sense diners, sense provisions, sense embarcació.</p>

<p>Va pregar llargament a la vora del mar. En la seva pregària no demanava un miracle: demanava direcció, que no és el mateix. Quan va acabar, va obrir els ulls i va veure al seu costat, a la riba, una barca. Era una barca petita i llisa, d'un gris fosc, que no s'assemblava a cap barca de fusta que hagués vist. Va tocar-la amb la mà i va entendre: era de pedra. Una barca de pedra que hauria d'enfonsar-se immediatament a l'aigua.</p>

<p>Va embarcar. La barca no s'enfonsà. Va navegar. La barca es va moure sola, sense rems i sense vela, a una velocitat que no era la del vent que bufava aquell dia. Va navegar tota la nit i quan l'alba va arribar, la barca va aturar-se a una cala entre penya-segats que Guerau no coneixia però que va reconèixer immediatament com al lloc que havia estat buscant. La barca va tocar la riba suaument i Guerau va baixar. La barca va tornar al mar i va enfonsar-se.</p>

<p>Guerau va construir una petita cel·la entre les roques, tan discreta que des del mar no es veia. Va viure d'herbes, de peixos que queia a les seves mans quan pregava a la vora del mar, i de l'aigua d'una font que brotava just sota la seva cel·la. No buscava ser conegut, però els pescadors de les cales properes van descobrir-lo de mica en mica, i va anar-hi la gent amb malalties i problemes que el sant no sempre podia resoldre però que escoltava amb aquella atenció completa que és en si mateixa una cura.</p>

<p>Va viure a la cala trenta anys. Quan va morir, uns pescadors que passaven van trobar la cel·la buida i el cos de l'ermità estès a la roca del mar, amb una expressió tan serena que va fer plorar homes que no havien plorat en molt de temps.</p>

<p>Van voler portar-lo al poble per donar-li sepultura cristiana. Però quan van intentar moure el cos, era tan pesat que quatre homes no el podien aixecar. Van provar amb sis, amb vuit. Res. Un pescador vell va dir: «Potser vol quedar-se aquí.» Van construir una petita capella sobre la roca mateixa on havia mort, i allà el van enterrar.</p>

<p>Al cap d'uns anys, uns pescadors que buscaven musclos a les roques del fons de la cala van trobar quelcom. La van pujar i la van mostrar al rector del poble. Era una barca, petita i llisa, d'un gris fosc. De pedra. Intacta, com si acabés d'arribar del mar.</p>

<p>La van posar davant de la capella. I cada any, els pescadors de la cala i de les cales veïnes feien una processó marítima fins allà i llençaven flors al mar, en record del sant que havia vingut per mar sense rems i sense vela, en una barca que no hauria de flotar però que havia flotada perquè portava quelcom que el mar va decidir respectar.</p>`
  },
  {
    id:87, emoji:'🔮', title:'El Mirall de les Veritats',
    tema:'Valors', tags:['mirall','veritat','rei','interior','canvi'],
    resum:'Un rei arrogant troba un mirall màgic que mostra com és per dins, i allò el transforma.',
    text:`<p>El rei Balduí del Pla governava un regne pròsper des d'un palau gran i sumptuós on els cortesans li deien sempre el que volia sentir i mai el que necessitava saber. Era un rei intel·ligent en el sentit tàctic: sabia fer aliances, sabia quan declarar la guerra i quan firmar la pau. Però era intel·ligent com algú que ha après a jugar bé als escacs: tècnicament competent però sense comprensió profunda de les motivacions i els sentiments dels éssers humans que governava.</p>

<p>El mirall va arribar al palau d'una manera poc dramatica: el va portar un mercader de pas que deia haver-lo trobat en un mercat de terres orientals. El mercader no sabia exactament qué era, però l'havia comprat perquè era bell i inusual. Era redó, d'uns seixanta centímetres de diàmetre, emmarcat en bronze daurat, i la seva superfície no reflectia la imatge física del que tenia davant sinó quelcom diferent.</p>

<p>Quan el rei Balduí es va mirar al mirall per primera vegada, va quedar desconcertat. El reflex no mostrava un rei amb corona i mantell. Mostrava un home de mida normal, amb els ulls una mica massa petits per la seva cara, amb les espatlles una mica caigudes i una expressió que barrejava la seguretat superficial amb una inseguretat profunda molt difícil d'amagar quan quelcom la revela. No era lletja la figura del mirall. Era simplement honesta.</p>

<p>«Que és esto?» va dir el rei al seu chambellan. El chambellan es va mirar al mirall i va veure quelcom semblant: no la seva imatge impecable i lleial, sinó una figura que tenia la lleialtat barrejada amb la por i la por barrejada amb el càlcul sobre com mantenir la posició privilegiada. Va recular. «Majestat, és un mirall estrany.»</p>

<p>El rei va fer portar la gent del palau un per un davant del mirall. El resultat era sempre el mateix: no el que semblaven ser, sinó el que eren per dins. Un conseller cor romput mostrava al mirall la corrupció com una taca al pit. Una criada bondadosa mostrava al mirall una llum neta i càlida que feia que el rei la mirés per primera vegada de debò. Un general valent mostrava al mirall la valentia però també el gust per la violència que ningú no volia admetre però que estava allà.</p>

<p>El rei va fer treure el mirall de la sala pública i el va posar a la seva cambra privada. I cada nit, sol, es mirava al mirall durant una estona. Va ser una experiència incòmoda i necessaria: el mirall no jutjava, simplement mostrava. I el que mostrava del rei canviava lleument d'un dia a l'altre, no perquè el mirall canviés sinó perquè el rei anava canviant.</p>

<p>Va descobrir que quan tractava un criat amb gentilesa genuïna en lloc de condescendència, el seu reflex al mirall aquella nit tenia una mica menys d'aquella inseguretat profunda. Va descobrir que quan prenia una decisió pensant en el bé del poble en lloc del seu propi prestigi, la figura del mirall semblava una mica menys rígida, una mica menys defensiva.</p>

<p>Era lent, el canvi. Els canvis reals ho són sempre. Però al cap d'un any, el rei Balduí prenia decisions que sorprenien els seus consellers per la seva equitat i la seva consideració pels que tenien menys poder. No havia deixat de ser rei, però havia après a ser-ho d'una manera diferent.</p>

<p>El mirall va ser guardat al tresor del palau com un objecte de valor incalculable. No per les seves qualitats artesanes, sinó perquè el rei havia après que la veritat, per incòmoda que sigui, és l'única base sòlida sobre la qual es pot construir quelcom que duri.</p>`
  },
  {
    id:88, emoji:'🎪', title:'El Saltimbanqui de la Lluna',
    tema:'Imaginació', tags:['saltimbanqui','lluna','màgia','espectacle','nit'],
    resum:'Un saltimbanqui que fa espectacles de nit amb la llum de la lluna que semblen tenir poders especials.',
    text:`<p>El saltimbanqui Llorenç havia recorregut mig país portant el seu espectacle de vila en vila, i a cada lloc hi havia gent que deia el mateix: que quan actuava de dia era un bon malabarista, decent però no extraordinari. Però quan actuava de nit, especialment les nits de lluna plena, quelcom en el seu espectacle canviava d'una manera que la gent no podia descriure bé però que clarament sentia.</p>

<p>Llorenç tenia quaranta anys i un aspecte que no impressionava: d'estatura normal, prim, amb els cabells quasi blancs malgrat la seva edat mitjana i una cara que semblava tenir dues expressions diferents depenent de si era de dia o de nit. De dia era simplement un home de fira. De nit, a la llum de la lluna, tenia quelcom als ulls que feia que la gent no pogués deixar de mirar-lo.</p>

<p>El seu espectacle de nit era senzill: tres anelles de metall, cinc pilotes de cuir, una corda llarga. Les eines de qualsevol malabarista. Però quan les anelles pujaven a l'aire a la llum de la lluna, tardaven a baixar una fracció de segon de massa. Quan les pilotes descrivien els seus arcs, semblaven deixar una estela de llum al camí que desapareixia just quan l'ull intentava centrar-se en ella. I la corda, quan Llorenç la llençava al cel i la tensava entre les seves mans, produïa un so que no era exactament un so: era quelcom que es sentida aquí, al pit, no a les orelles.</p>

<p>Un any va arribar a un poble de muntanya una nit de juliol, lluna plena. La plaça era petita i els veïns van sortir a veure l'espectacle amb aquella barreja de curiositat i escepticisme de la gent de muntanya que ha vist molts saltimbanquis de fira. Llorenç va desempaquetar les seves eines en silenci i va esperar que la lluna fos alta.</p>

<p>Quan va començar, la plaça era quieta com mai no és una plaça on hi ha gent. Les anelles pujaven i quedaven un instant suspeses, i en aquell instant tothom podia veure-les d'una manera que normalment no es veuen les coses: com si la llum de la lluna que les banyava reveles una qualitat que la llum del dia amaga. Les pilotes descrivien arcs perfectes que semblaven calculats per alguna geometria diferent de la de la gravetat normal.</p>

<p>Un home del poble, el Francesc, que havia perdut el fill en un accident dos anys enrere i que des d'aleshores vivia en un dol que no acabava de resoldre's, estava a la plaça gairebé sense voler-hi ser. Va mirar les anelles de Llorenç pujar al cel lluminós i va tenir la sensació, impossible d'explicar, de que el seu fill estava en aquell espai on les anelles quedaven suspeses. No com una visió: com una presència. Durant un instant molt breu, va ser com si el dol hagués obert una porta que normalment estava tancada.</p>

<p>Quan l'espectacle va acabar i la gent va dispersar-se, el Francesc va anar a trobar Llorenç que recollida les seves eines. «Com ho feu?» va preguntar. Llorenç el va mirar. «Qué heu vist?» El Francesc va explicar-ho. Llorenç va quedar en silenci un moment. «Jo no faig res especial», va dir finalment. «Llança anelles a l'aire. Però la llum de la lluna fa que l'aire sigui diferent de nit. I l'aire diferent fa que la gent que mira sigui diferent. Obre coses que de dia estan tancades. Jo simplement sé quan i on posar les anelles perquè la llum les trobi en el lloc adequat.»</p>

<p>Va recollir les eines i va posar-les a la mochilla. «No soc malabarista», va dir mentre plegava. «Soc algú que sap fer preguntes a la lluna. Les anelles són les preguntes. El que la gent veu quan les anelles pugen... això ja no és meu.»</p>

<p>Va marxar l'endemà al matí. El Francesc va quedar-se al poble, però amb quelcom lleugerament diferent per dins: com si una finestra que havia sigut tancada s'hagués obert un centímetre, deixant entrar una mica d'aire fresc d'un lloc que no sabia nomenar.</p>`

    resum:'Una planta centenària que guarda els secrets i les històries de totes les generacions d\'una família.',
    text:`<p>La iaia havia dit a la Roser quan tenia sis anys: «Aquesta planta és molt antiga i si la cuides i l'estimes, un dia et contarà els seus secrets.» La planta era una gardènia de tronc llenyós i fulles brillants que estava en un test de terrissa blava al racó de la cuina, i la iaia la tractava amb una deferència que la Roser havia observat sempre sense acabar d'entendre: la regava ella sola, mai no delegava aquella feina als criats, i de vegades la Roser l'havia vist parlar-hi en veu molt baixa quan es creia sola.</p>

<p>La responsabilitat de cuidar la planta va passar a la Roser quan la iaia va morir. Tenia llavors onze anys i la planta era part del llegat que la iaia havia deixat explícitament per a ella. «La gardènia a la Roser», deia el testament, «que sap escoltar.»</p>

<p>La Roser cuidava la planta amb la mateixa deferència que havia vist a la seva iaia. La regava mesurat, la posava a la llum del matí, la treia al jardí els dies temperats de primavera. Quan floría, les flors blanques omplien tota la cuina d'una olor que feia pensar en les nits d'estiu i en les converses de taula llargues. I la Roser li parlava: li explicava el que li havia passat aquell dia, els problemes de l'escola, les alegries petites, les tristeses grans.</p>

<p>La planta no responia, naturalment. Les plantes no responen. Però les seves fulles brillaven una mica més els dies en que la Roser havia passat temps al seu costat, i de vegades, quan la Roser havia tingut un dia molt difícil, les flors s'obrien amb una abundància particularment generosa que semblava, si ho volia veure ainsi, una mena de resposta.</p>

<p>Un matí d'octubre, quan la Roser tenia tretze anys, va passar quelcom que mai va acabar d'explicar bé als altres. Era sola a la cuina, davant de la planta, i havia tingut un dia especialment difícil. Estava plorant sense soroll, d'aquella manera en que ploren els adolescents quan no volen que ningú ho sàpiga, i les llàgrimes li queien al test de la gardènia.</p>

<p>Va sentir quelcom. No una veu, però quelcom semblant a una veu, o potser a una imatge, o potser a una sensació molt complexa que contenia tot allò alhora. Era la seva iaia. No d'una manera sobrenatural: era la seva iaia en el sentit que la planta contenia quelcom de totes les persones que l'havien estimat, i en aquell moment de quietud i atenció aquell quelcom podia passar entre la planta i la Roser d'una manera que no tenia nom però que era real.</p>

<p>Va sentir, sense paraules, la historia de la gardènia: la besàvia que l'havia plantada quan s'havia casat, les converses que havia tingut amb ella mentre cuidava els fills, la por de la guerra i com les arrels de la planta li havien donat una sensació de permanència en els moments de màxima incertesa. La iaia jove plantant els fills al costat de la planta per que la toquessin i aprenguessin que les coses vives necessiten ser ateses. La iaia vella dient a la planta coses que no podia dir a ningú més perquè les plantes no ho expliquen però no obliden res.</p>

<p>La Roser va quedar asseguda davant de la gardènia un bon rato després. Quan va aixecar-se, els ulls encara humits però el cor una mica menys pesat, va entendre el que la seva iaia havia volgut dir amb allò que la planta podria explicar-li els seus secrets. No eren secrets de la planta: eren secrets de la família, guardats en les arrels i les fulles d'un ésser viu que havia crescut al costat de totes aquelles dones.</p>

<p>Va continuar cuidant la gardènia fins que va ser gran i va tenir una casa pròpia. La planta va fer el trasllat bé. I quan la seva filla, anys més tard, va preguntar per la planta, la Roser va dir el que havia dit la seva iaia: «És molt antiga, i si la cuides i l'estimes, un dia et contarà els seus secrets.»</p>`

    id:90, emoji:'🌙', title:'El Noi que Comptava Estrelles',
    tema:'Imaginació', tags:['estrelles','nit','ciència','avi','univers'],
    resum:'Un noi obsessionat amb comptar les estrelles aprèn a conèixer-les pel nom i la seva història.',
    text:`<p>En Marc tenia vuit anys i un problema que els seus pares no sabien com resoldre: no podia dormir fins que l'última estrella visible des de la seva finestra havia quedat tapada pels primers colors de l'alba. Això significava que dormia molt poc, que al matí estava cansat, que a l'escola li costava concentrar-se, i que tots els adults de la seva vida compartien la mateixa preocupació sobre el seu fill i el seu alumne respectivament. En Marc, per part seva, no entenia per qué el son era més important que les estrelles.</p>

<p>Havia intentat comptar-les. Era un projecte ambiciós i, descobriria aviat, tecnicamente impossible: en una nit sense lluna des d'un lloc amb poca contaminació lumínica es poden veure entre dos mil i quatre mil estrelles a simple vista, un nombre que canvia constantment perquè les estrelles surten i es ponen, i perquè l'ull humà no pot fixar-se en un punt prou de temps per comptar mentre el cel gira lentament.</p>

<p>L'avi Esteve, que tenia vuitanta anys i havia sigut mariner de jove, va venir a passar uns dies a casa a la tardor. Va trobar el seu nét al jardí a les dues de la matinada envoltat de quaderns i embolicat en una manta, intentant comptar estrelles amb un mètode que implicava dividir el cel en sectors i comptar cada sector per separat.</p>

<p>«No les pots comptar», va dir l'avi assegunt-se al seu costat. «Per qué no?» «Perquè es mouen. I perquè n'hi ha massa. Les estàs comptant mal.» «Com s'han de comptar bé?» «No es compten. Es coneixen.» En Marc va mirar el seu avi. «Es coneixen?» «Els mariners no comptàvem les estrelles. Les reconeixíem. Saps quin és aquell grup brillant a l'est?»</p>

<p>Va ser el principi d'una educació que l'avi va impartir en tres nits consecutives, asseguts al jardí embolcallats en mantes, amb un got de llet calenta cadascun. Va ensenyar al nét les constel·lacions: l'Óssa Major amb les seves set estrelles, la Petita amb l'Estrella Polar que sempre assenyala el nord, Cassiopea amb la seva forma de M o de W, Orió el caçador amb el seu cinturó de tres estrelles, les Plèiades que els grecs anomenaven les set germanes i que en realitat en contenen centenars.</p>

<p>«Per qué en diuen les set germanes si n'hi ha centenars?» va preguntar en Marc la segona nit. «Perquè els antics veien set», va dir l'avi. «Nosaltres veiem set. Però amb un telescopi se'n veuen moltes més. Depèn dels instruments amb que mires.» En Marc va anotar-ho al quadern.</p>

<p>La tercera nit, l'avi li va dir quelcom que en Marc va gravar a la memòria per sempre: «Aquella estrella que veus allà, la blava que parpelleja, es diu Vega. La seva llum va sortir de l'estrella fa vint-i-cinc anys. Quan tu ets nadó i la teva mare et portava en braços per primera vegada, aquella llum ja estava en camí cap aquí. I ara et toca als ulls.» En Marc va mirar Vega. «Que significa que arriba llum antiga?» «Que quan mires les estrelles, mires el passat. El que veus ara no és el que és ara: és el que era quan la llum va sortir. Algunes estrelles que veus potser ja no existeixen. Hem de mirar el cel amb humilitat, perquè el que veiem és un missatge enviat fa molt de temps del qual potser el remitent ja no existeix.»</p>

<p>En Marc va tancar el quadern de comptes d'estrelles. Va obrir un de nou, on va escriure a la primera pàgina: «Noms i histories.» Va dormir aquella nit millor que en mesos. No perquè hagués deixat d'estimar el cel: perquè havia après a estimar-lo d'una manera diferent, amb noms i histories en lloc de números, que és la manera en que s'estimen les coses que importen de veritat.</p>`

    tema:'Valors', tags:['guineu','cua','orgull','excuses','honradesa'],
    resum:'Una guineu que perd la cua i intenta convèncer les altres que tothom hauria de fer el mateix.',
    text:`<p>La guineu Marta era coneguda a tot el bosc del Montseny per tres coses: la seva velocitat, la seva intel·ligència i la seva cua. La cua era particularment notable: llarga, densa, d'un color rojo-toronja intens amb la punta blanca que la distingia de les altres guineus. Marta en tenia cura: la rentava, la pentinava amb les urpes, la mantenia impol·luta. La cua era part de la seva identitat de la mateixa manera que ho era la intel·ligència.</p>

<p>Un octubre de fred primerenc, Marta va caure en un parany que un caçador havia col·locat prop del rierol. No era un parany de ferro sinó de corda, un llaç que li va agafar la cua quan va passar-hi per sobre sense veure'l en la foscor de l'alba. Va intentar treure-la. Va tirar. Va girar. Va empènyer. La corda era resistent i cada moviment l'estrenyia més.</p>

<p>Quan l'alba va aclarir prou per veure, Marta va entendre la situació: el parany no tenia cap mecanisme d'alliberament visible, i el caçador tornaria. Tenia dues opcions: quedar-se allà i esperar el caçador, o perdre la cua i marxar. Va escollir viure. Va rosegar la cua just per sobre del parany fins que va quedar lliure. Va marxar corrents sense mirar enrere.</p>

<p>Va tornar al bosc coixejant i desorientada. Sense la cua, l'equilibri era diferent, la velocitat era diferent, la sensació de si mateixa era diferent. Va arribar al lloc on les guineus es reunien a la tarda i va esperar. Quan les altres van arribar i la van veure, el silenci va ser diferent del silenci normal: era el silenci de la gent que veu quelcom inesperada i no sap qué dir.</p>

<p>«La vostra cua...» va dir la més jove. Marta va sentir el vermell de la vergonya sota el pèl, que és difícil de notar en una guineu però existeix. Va tenir un impuls fort de mentir, d'inventar una historia heroica, de desviar l'atenció. Però les circumstàncies eren clares: estava al bosc del Montseny sense cua, que no és quelcom que passi per mil causes honroses.</p>

<p>Va fer quelcom que va sorprendre totes les guineus presents, i que la va sorprendre a ella mateixa: va explicar exactament el que havia passat. El parany, la decisió, la rosegada. Sense adorns. Sense heroisme fictici.</p>

<p>Hi va haver un silenci. Llavors la guineu vella Carmeta va dir: «Vas prendre la decisió correcta. Les cues creixen. Les vides no.» Altres van assentir. La guineu jove que havia parlat primer va dir: «Us queda bé, de totes maneres.» Marta la va mirar. «No, no queda bé. Però m'ha quedat la veritat, que és millor que la cua.»</p>

<p>Des d'aleshores, Marta va ser diferent al bosc. No perquè hagués perdut la cua, que va créixer de nou lentament, sinó perquè havia après en aquell moment al bosc que l'autenticitat és més lleugera de portar que la imatge, per molt que pesi el moment d'abandonar-la. I les guineus del bosc del Montseny van aprendre que la persona que admet una veritat incòmoda sense excuses és la persona de qui te'n pots fiar de debò.</p>`

    id:92, emoji:'🌺', title:'El Tresor del Mas Vell',
    tema:'Aventura', tags:['tresor','mas','mapa','memòria familiar','nens'],
    resum:'Dos cosins que troben un vell mapa i descobreixen que el veritable tresor és la memòria familiar.',
    text:`<p>La Laia i el seu cosí Marc passaven cada estiu al mas dels seus avis, una casa de pedra gran al peu d'una serra on les generacions s'acumulaven com les capes de pintura a les parets: una a sobre de l'altra, cadascuna visible si saps on mirar. L'any en que la Laia tenia onze anys i el Marc deu, van fer la descoberta que va canviar aquell estiu en quelcom diferent de tots els anteriors.</p>

<p>Estava al darrere d'un retrat gran que hi havia al passadís, un retrat d'un avantpassat del segle XIX amb bigoti i un aire de serietat que tots els nens de la família havien trobat una mica impressionant. La Laia l'havia escollit com a objecte de la seva recerca perquè tenia un marc inusual, molt més gruixut del que semblava necessari, i aquella tarda calenta de juliol quan els avis dormien la siesta i no hi havia res a fer havia decidit investigar.</p>

<p>Va necessitar Marc per aguantar el pes del retrat mentre ella mirava al darrere. Allà, protegit entre el marc i el paper que cobria la part posterior, hi havia un paper doblat moltes vegades, groguenc per l'edat, que en desdoblar-lo resultà ser un mapa dibuixat a ploma amb una mà segura. Mostrava el mas i el turó que hi havia darrere, amb un sender marcat amb línia de punts que portava fins a una X vermella i les paraules, escrites en una cal·ligrafia antiga: «El tresor de Can Puig.»</p>

<p>Van demanar permís als avis per explorar el turó, que van donar amb la condició de tornar abans de sopar. Van pujar pel sender marcat al mapa, que existia de veritat, tot i que estava molt cobert de vegetació i calia empènyer la bardissa per passar. Catorze passes des de la porta de pedra, girar a la dreta, arribar a la roca plana en forma de cor.</p>

<p>La roca en forma de cor existia. Era gran, de granit, amb aquella forma que si t'hi fixes sembla un cor però que podria ser simplement una roca erosionada. Sota ella, cavant uns centímetres, van trobar una caixa de llauna oxidada tancada amb un pany petit que cedia davant d'un tros de filferro.</p>

<p>Dins: res d'or ni de joies. Unes fotografies en blanc i negre, moltes, mostrant persones en roba antiga al davant del mas. Cartes lligades amb un cordill vermell descolorit. Un rellotge de butxaca de plata amb una inscripció al darrere. Un quadernet petit cobert de lletra menuda i apretada. I un paper doblegat, diferent del mapa, que en obrir-lo deia:</p>

<p>«Per al que trobi aquest tresor: el tresor d'una família no és mai l'or. És la memòria dels qui van estimar aquest lloc i les seves histories. Cuida el que aquí trobaràs com cuidaries les persones que ho van deixar. Firmado: Joan Puig, 1923.»</p>

<p>Van baixar amb la caixa quan el sol ja baixava. Els avis dormien. Van esperar al porxo fins que van sortir, i llavors van mostrar la caixa. L'avi va quedar-se quiet un moment i va agafar la caixa amb les dues mans. Va obrir-la lentament. Va agafar una de les fotografies i la va mirar llargament.</p>

<p>«Aquest és el meu avi Joan», va dir finalment. «I aquesta és la meva àvia, que va morir molt jove.» Va mirar la foto. «Mai no havia vist una foto d'ella.» Va tenir als ulls quelcom que la Laia mai havia vist als ulls del seu avi: una humitat que no era llàgrimes però que ho era per dins.</p>

<p>Van passar la tarda sencera mirant les fotos i les cartes, i l'avi explicant les histories de les persones que hi apareixien. Va ser la tarda millor de tots els estius al mas. I la Laia va entendre aquell dia que les families no s'hereten amb els diners sinó amb les histories, i que les histories necessiten quelcom que les guardi i algú que les expliqui.</p>`
  },

    id:93, emoji:'🎨', title:'El Pintor de Somnis',
    tema:'Imaginació', tags:['pintor','somnis','colors','nit','art'],
    resum:'Un pintor misteriós que treballa de nit pintant els somnis de tota la gent del barri.',
    text:`<p>Al carrer dels Pintors, que era un carrer estret i costerut d'una ciutat vella on les cases estaven tan prop les unes de les altres que de vegades semblava que els edificis es donaven suport mútuament per no caure, hi havia un taller que sempre estava tancat de dia. La porta era de fusta fosca, la finestreta coberta per una cortina espessa, i al rètol de sobre no hi havia cap nom: simplement un pinzell pintat en or sobre fons negre.</p>

<p>Els veïns del carrer havien après a no fer preguntes sobre el taller. Alguns havien intentat averiguar qui vivia allà: ningú no semblava saber-ho. El propietari de l'edifici del costat deia que havia heretat el taller d'un avantpassat i que mai li havia interessat logar-lo perquè el pintor pagava puntualment cada mes d'una manera que el propietari preferia no descriure en detall.</p>

<p>La Neus tenia deu anys i l'habitació donava al carrer. Les nits que no podia dormir —que eren freqüents, perquè era d'aquells nens que pensen massa— sortia de la llum de sota la porta del taller: una llum daurada i càlida que no semblava elèctrica. I de vegades, en el silenci de les dues de la matinada, sentia el so suau d'un pinzell passant sobre tela.</p>

<p>Una nit de desembre, havent decidit que la curiositat era més forta que la prudència, va baixar les escales en silenci i es va acostar a la porta del taller. Va picar suaument. El so del pinzell va aturar-se. Un moment de silenci. Llavors la porta es va obrir.</p>

<p>L'home que la mirava era vell, amb els cabells blancs i les mans taques de tots els colors del món. Tenia aquells ulls clars que de vegades té la gent gran, del color de l'aigua quan és clara de veritat. Va mirar la nena sense sorpresa, com si l'estigués esperant. «Entra», va dir.</p>

<p>El taller era gran per dins del que semblava per fora, una d'aquelles paradoxes arquitecturals que a vegades ocorren en els edificis antics. Les parets estaven cobertes de quadres: centenars de quadres de totes les mides, apilats i penjats i recolzats en totes les superfícies disponibles. La llum venia d'una làmpada de peu que semblava no tenir bombeta però que irradiava aquella llum daurada visible des del carrer.</p>

<p>Els quadres representaven llocs i situations que la Neus reconeixia: la plaça del seu barri però d'una manera que no era exactament com era a la realitat, més lluminosa, amb colors lleugerament impossibles. El parc on jugava, però amb un llac que no existia. La seva escola, però amb les finestres que donaven a un cel diferent del cel real.</p>

<p>«Aquests llocs els conec», va dir. «Sí», va dir el pintor. «És el teu barri.» «Però no és exactament igual.» «No. És el teu barri de nit. Quan dormiu, els llocs que coneixeu agafen una forma una mica diferent.» Va assenyalar un quadre petit. «Ahir a la nit tu vas somiar que la plaça tenia un estany. Ho recordes?»</p>

<p>La Neus va quedar quiet. Sí. Ho recordava. «Voleu dir que pinteu els nostres somnis?» «Pinto el que veig quan la nit és quieta i la gent dorm. No és exactament els somnis. És el que queda en el lloc quan la gent somia: una qualitat de l'aire, una llum que no és la llum del dia. El pinto per no oblidar-ho.»</p>

<p>Va deixar que la Neus mirés els quadres tota la nit. Quan l'alba s'acostava, la va acompanyar fins a la porta. «Per qué no exposeu?» va preguntar la Neus. «Els quadres dels somnis», va dir el pintor, «pertanyen als qui somiaren. Si els exposo, els perdo. Aquí, almenys, els guardo per a vosaltres.» Va tancar la porta.</p>

<p>La Neus va tornar a dormir i va somiar el taller del pintor. L'endemà, quan va baixar al carrer, la porta del taller tenia un quadre nou a la finestreta: una nena amb els cabells desendreçats mirant una paret de quadres en una llum daurada. La Neus el va mirar un moment i va continuar el seu camí cap a l'escola.</p>`

    id:94, emoji:'🌊', title:'L\'Illa dels Ocells',
    tema:'Natura', tags:['illa','ocells','marinera','mar','memòria'],
    resum:'Una pescadora que descobreix una illa secreta habitada per ocells que guarden la memòria del mar.',
    text:`<p>La Teresa pescava sola des que el seu marit Andreu havia desaparegut en una tempesta feia tretze mesos. No hi havia testimonis, no hi havia cos, no hi havia certesa: la barca havia tornat sola a la costa tres dies després de la tempesta, amb les xarxes plenes i sense l'home. La Teresa havia esperat un any per deixar d'esperar, i ara pescava sola, no per necessitat econòmica perquè els fills ja treballaven, sinó perquè el mar era l'únic lloc on se sentia prop d'Andreu.</p>

<p>El dia que va trobar l'illa era un matí de boira de novembre. La boira mediterrània d'hivern és diferent de la boira del nord: no és espessa com la llet, és translúcida com un vel, i té la qualitat de fer que les distàncies perdin tot sentit. La Teresa navegava per on creia que coneixia i quan la boira va aclarejar una mica es va trobar davant d'un pedró de roques que no coneixia, i darrere del pedró, una illa petita que no figurava a cap mapa que ella hagués vist.</p>

<p>Va amarrar la barca a una roca i va pujar. L'illa era petita, de pedra calcària blanca, amb un poc de vegetació a la part alta i una platja de còdols negres a la part baixa. I plena d'ocells. Ocells de totes les espècies: gavines, però també corbs marins, però també coloms d'una varietat que no reconeixia, però també una espècie de papagai petit de plomes verdes que no pertanyia a aquells mars.</p>

<p>Els ocells no van fugir quan la Teresa va arribar. La miraven. Un lloro verd va baixar d'una roca i va caminar fins a ella. «Bona tarda, Teresa», va dir amb una veu que sonava exactament com la d'una persona però que sortia indubtablement del bec d'un ocell.</p>

<p>La Teresa va quedar immòbil. «Saps el meu nom.» «Coneixem el nom de tothom que arriba aquí. No tothom pot trobar l'illa. La boira la protegeix. Però la boira deixa passar els qui ens pertanyen.» «Us pertanyo?» «El vostre marit va passar per aquí.»</p>

<p>La Teresa va seure a les roques. Les cames no la sostenien bé de sobte. «Andreu?» «El seu vaixell va naufragas a dues milles al nord d'aquí. El corrent el va portar a les nostres roques. Vam cuidar-lo tres dies. Estava ferit però viu.» La Teresa va alçar el cap. «Viu? On és?»</p>

<p>«Quan va poder caminar, un vaixell de comerciants el va recollir. No sabien d'on venia. L'han portat al sud. Viu, Teresa. El seu nom es troba en la memòria d'aquell corb marí que hi ha a la roca de dalt: recorda tots els naufragos que ha vist en trenta anys.»</p>

<p>La Teresa va mirar el corb marí, que li va tornar la mirada amb aquells ulls daurats i antics. «Com el trobo?» «Aneu al port de Palerm i pregunteu pels comerciants de seda de Gènova. Ells saben on és.»</p>

<p>Va tornar a la barca. La boira va tornar. Quan va mirar enrere, les roques i l'illa havien desaparegut. Va anar a Palerm. Va trobar els comerciants de seda. I va trobar Andreu, que treballava en una botiga de teles esperant poder pagar el passatge de tornada.</p>

<p>Van tornar junts a casa. I cada any, la Teresa sortia sola amb la barca a la boira de novembre a buscar l'illa. De vegades la trobava. De vegades no. Però sempre llençava pa i peix al mar per als ocells que guardaven la memòria de totes les persones que el mar s'havia emportat i tornat.</p>`
  },
  {
    id:95, emoji:'🌙', title:'El Vigilant de la Nit',
    tema:'Son', tags:['nit','son','somnis','infants','protecció'],
    resum:'L\'ésser invisible que vetlla els somnis dels nens mentre dormen cada nit.',
    text:`<p>Hi ha coses que existeixen sense que es puguin veure, i el Vigilant de la Nit és una d'elles. No és un personatge de les llegendes de llocs concrets: és un d'aquells éssers que les mares de totes les cultures han descrit d'alguna manera als seus fills, amb noms different i aparences different però amb la mateixa funció essencial: cuidar el son dels nens quan les mares no poden estar allà.</p>

<p>El Vigilant no té forma física que pugui ser descrita amb precisió. Els nens que creuen haver-lo vist el descriuen de maneres molt variades: de vegades com una ombra càlida, de vegades com una llum suau que no ve de cap font concreta, de vegades com una presència que s'endevina però no s'identifica. El que tots els nens que creuen en ell coincideixen a descriure és la sensació que produeix: és exactament la sensació d'estar cobert amb una manta quan tens fred, però sense manta.</p>

<p>El Vigilant porta dos sacs. En un, que és de seda blau fosc del color del cel a les dues de la matinada, hi guarda els somnis bons: els de volar, els de les aventures meravelloses, els de trobar les coses que s'han perdut, els de parlar amb els que ja no hi són, els de ser fort i valent i estimat. En l'altre sac, que és de cuir dur i tancat amb set nusos, hi guarda els malsons que han escapades de la nit anterior i que podrien tornar a entrar si no els vigilés.</p>

<p>Sap on és cada nen cada nit. No per cap mecanisme màgic sinó perquè les persones que necessiten un somni específic emeten quelcom que el Vigilant pot detectar: una mena de necessitat silenciosa que no és un desig conscient sinó quelcom més profund. El nen que ha tingut un dia difícil i necessita el somni que li recordi que les dificultats passen. La nena que ha tingut por i necessita el somni de ser valenta. El nen que enyora quelcom i necessita el somni de tenir-ho, almenys per uns instants.</p>

<p>Quan un malsón aconsegueix passar al sac equivocat i s'escola al son d'un nen, el Vigilant ho nota immediatament. La temperatura del son canvia, la respiració del nen canvia. El Vigilant s'hi acosta, torna el malsón al sac de cuir i afegeix un somni bo en el seu lloc. Per això, quan et despertes d'un malsón i tornes a adormir, el que ve a continuació és gairebé sempre millor: no és casualitat, és el Vigilant esmenant l'error.</p>

<p>La manera de facilitar la feina del Vigilant, que qualsevol nen pot aprendre, és senzilla: quan et poses a dormir, respira profundament tres vegades, tanca els ulls, i pensa en una cosa que estimes molt. No en moltes coses: en una sola. El gat. La iaia. El camí del bosc. El gust de la xocolata calenta. Una sola cosa, molt present, molt sentida. Quan el Vigilant detecta aquell pensament, sap exactament quin somni t'ha de posar aquella nit.</p>

<p>El Vigilant treballa tota la nit, totes les nits, per totes les nits que hi ha hagut i per totes les que vindran. No es cansa perquè no és del món dels que es cansen. No demana res a canvi perquè no és del món dels que demanen. És simplement allà, invisible i present, com totes les coses que importen de veritat: el amor dels pares, la calor de la casa, la seguretat de saber que hi ha algú que et cuida mentre dorms.</p>

<p>Bona nit. Que el Vigilant trobi fàcilment el que necessites.</p>`
  },
