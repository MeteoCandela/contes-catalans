<html lang="ca">

<title>Contes Catalans · Bona Nit</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0a1a;--surface:#16112b;--surface2:#1e1738;--surface3:#261e45;--gold:#e8b84b;--gold-light:#f5d07a;--gold-dim:#a07c2a;--text:#f0e8d8;--text-dim:#b8a88a;--text-muted:#7a6a5a;--accent:#c46b3a;--accent2:#7b5ea7;--radius:16px;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Lora',Georgia,serif;min-height:100vh;overflow-x:hidden;}
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(1px 1px at 10% 15%,#fff9 0%,transparent 100%),radial-gradient(1.5px 1.5px at 40% 8%,#fffb 0%,transparent 100%),radial-gradient(1px 1px at 70% 18%,#fff6 0%,transparent 100%),radial-gradient(1.5px 1.5px at 80% 45%,#fffa 0%,transparent 100%),radial-gradient(1px 1px at 15% 70%,#fff5 0%,transparent 100%),radial-gradient(1.5px 1.5px at 60% 65%,#fff8 0%,transparent 100%),radial-gradient(2px 2px at 20% 25%,#ffe8886a 0%,transparent 100%);}
  header{position:relative;z-index:10;text-align:center;padding:3rem 1rem 2rem;background:linear-gradient(180deg,#0d0a1a 0%,transparent 100%);}
  .moon{font-size:3.5rem;display:block;animation:moonFloat 4s ease-in-out infinite;filter:drop-shadow(0 0 20px #e8b84b88);}
  @keyframes moonFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  header h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:700;color:var(--gold-light);text-shadow:0 0 40px #e8b84b55;margin:.5rem 0 .3rem;}
  header p{color:var(--text-dim);font-style:italic;font-size:1.05rem;}
  .app{position:relative;z-index:5;max-width:1100px;margin:0 auto;padding:0 1.2rem 4rem;}
  .search-wrap{margin:1.5rem 0 1.2rem;position:relative;}
  .search-wrap input{width:100%;background:var(--surface);border:1.5px solid var(--surface3);border-radius:50px;padding:.9rem 1.5rem .9rem 3rem;color:var(--text);font-family:'Lora',serif;font-size:1rem;outline:none;transition:border-color .2s,box-shadow .2s;}
  .search-wrap input::placeholder{color:var(--text-muted);}
  .search-wrap input:focus{border-color:var(--gold-dim);box-shadow:0 0 0 3px #e8b84b22;}
  .search-wrap .icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:1.1rem;pointer-events:none;}
  .cats{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem;}
  .cat-pill{background:var(--surface);border:1.5px solid var(--surface3);color:var(--text-dim);border-radius:50px;padding:.35rem 1rem;font-size:.85rem;cursor:pointer;transition:all .18s;font-family:'Lora',serif;}
  .cat-pill:hover{border-color:var(--gold-dim);color:var(--gold-light);}
  .cat-pill.active{background:linear-gradient(135deg,#a07c2a,#e8b84b);border-color:var(--gold);color:#1a1200;font-weight:600;}
  .stats{color:var(--text-muted);font-size:.82rem;margin-bottom:1rem;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1rem;}
  .card{background:var(--surface);border:1px solid var(--surface3);border-radius:var(--radius);padding:1.2rem 1.3rem;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;position:relative;overflow:hidden;}
  .card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#e8b84b06,transparent);opacity:0;transition:opacity .2s;}
  .card:hover{transform:translateY(-3px);border-color:var(--gold-dim);box-shadow:0 8px 30px #00000060;}
  .card:hover::before{opacity:1;}
  .card-emoji{font-size:2rem;margin-bottom:.5rem;display:block;}
  .card h3{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--gold-light);margin-bottom:.3rem;line-height:1.3;}
  .card-meta{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.5rem;}
  .badge{font-size:.7rem;background:var(--surface2);border:1px solid var(--surface3);color:var(--text-muted);border-radius:4px;padding:.15rem .5rem;}
  .badge.theme{color:var(--accent2);border-color:#7b5ea733;background:#7b5ea710;}
  .card p{font-size:.82rem;color:var(--text-dim);line-height:1.5;font-style:italic;}
  .overlay{display:none;position:fixed;inset:0;z-index:100;background:#00000099;backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:1rem;}
  .overlay.open{display:flex;}
  .modal{background:linear-gradient(160deg,#16112b,#0d0a1a);border:1px solid var(--surface3);border-radius:20px;max-width:720px;width:100%;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 25px 80px #000000cc;}
  .modal-head{padding:1.5rem 1.8rem 1rem;border-bottom:1px solid var(--surface3);display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;}
  .modal-title-wrap .modal-emoji{font-size:2.5rem;}
  .modal-title-wrap h2{font-family:'Playfair Display',serif;font-size:clamp(1.3rem,3vw,1.8rem);color:var(--gold-light);margin:.2rem 0 .4rem;}
  .modal-head .badges{display:flex;gap:.4rem;flex-wrap:wrap;}
  .btn-close{background:var(--surface2);border:1px solid var(--surface3);color:var(--text-dim);border-radius:50%;width:36px;height:36px;font-size:1.1rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .btn-close:hover{background:var(--accent);color:#fff;}
  .audio-bar{padding:.8rem 1.8rem;background:var(--surface2);display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
  .audio-btn{background:linear-gradient(135deg,#a07c2a,#e8b84b);border:none;color:#1a1200;border-radius:50px;padding:.5rem 1.3rem;font-family:'Lora',serif;font-weight:600;font-size:.88rem;cursor:pointer;}
  .speed-label{color:var(--text-muted);font-size:.8rem;}
  .speed-select{background:var(--surface3);border:1px solid #ffffff22;color:var(--text-dim);border-radius:6px;padding:.3rem .5rem;font-size:.8rem;cursor:pointer;}
  .progress-wrap{flex:1;min-width:120px;}
  .progress-bar{width:100%;height:4px;background:var(--surface3);border-radius:4px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:4px;width:0%;transition:width .5s linear;}
  .modal-body{padding:1.5rem 1.8rem 2rem;overflow-y:auto;flex:1;}
  .modal-body::-webkit-scrollbar{width:6px;}
  .modal-body::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px;}
  .story-text{font-size:1.08rem;line-height:2;color:var(--text);}
  .story-text p{margin-bottom:1.2em;}
  .story-text p:first-child::first-letter{font-family:'Playfair Display',serif;font-size:3.5em;float:left;line-height:.8;margin:.05em .12em 0 0;color:var(--gold);text-shadow:0 0 20px #e8b84b55;}
  .no-results{text-align:center;padding:4rem 1rem;color:var(--text-muted);font-style:italic;grid-column:1/-1;}
  .no-results .big{font-size:3rem;display:block;margin-bottom:1rem;}
  @media(max-width:600px){.modal-head,.modal-body{padding:1rem;}.audio-bar{padding:.6rem 1rem;}.grid{grid-template-columns:1fr 1fr;}}
  @media(max-width:400px){.grid{grid-template-columns:1fr;}}
  .audio-top{display:flex;align-items:center;gap:.8rem;width:100%;}
  .audio-controls{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;padding-top:.5rem;}
  .audio-bar.collapsed .audio-controls{display:none;}
  .btn-audio-toggle{background:none;border:1px solid var(--surface3);color:var(--text-muted);border-radius:50%;width:28px;height:28px;font-size:.75rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:transform .25s;}
  .audio-bar.collapsed .btn-audio-toggle{transform:rotate(180deg);}
  .pwa-banner{position:fixed;bottom:0;left:0;right:0;z-index:300;background:linear-gradient(135deg,#1e1738,#261e45);border-top:1.5px solid var(--gold-dim);padding:.9rem 1.2rem;display:flex;align-items:center;gap:.8rem;box-shadow:0 -6px 24px #00000070;animation:slideUp .3s ease;}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .pwa-banner.hidden{display:none;}
  .pwa-banner-icon{font-size:1.8rem;flex-shrink:0;}
  .pwa-banner-text{flex:1;}
  .pwa-banner-text strong{color:var(--gold-light);font-size:.9rem;display:block;line-height:1.4;}
  .pwa-banner-text span{color:var(--text-dim);font-size:.78rem;}
  .btn-pwa-install{background:linear-gradient(135deg,#a07c2a,#e8b84b);border:none;color:#1a1200;border-radius:50px;padding:.45rem 1.1rem;font-family:'Lora',serif;font-weight:600;font-size:.82rem;cursor:pointer;white-space:nowrap;}
  .btn-pwa-dismiss{background:none;border:none;color:var(--text-muted);font-size:1.3rem;cursor:pointer;flex-shrink:0;padding:.2rem .4rem;line-height:1;}
</style>
</head>
<body>
<div class="stars"></div>
<header>
  <span class="moon">🌙</span>

<div class="app">

<script>
const contes = [
{
    id:1, emoji:'🧒', title:'En Patufet',
    tema:'Aventura', tags:['nen petit','salsitxa','bou','Barcelona'],
    resum:'El noi més petit del món que cap a la panxa d\'una vaca i torna sa i estalvi.',
    text:`<p>Fa molts anys, en un carreró estret del cor de la ciutat vella, hi vivia una família humil però molt unida. El pare era sabater i la mare brodava mocadors de lli per vendre al mercat. Tenien set fills, i el més petit de tots es deia Joan, però tothom l'anomenava en Patufet perquè era tan petit, tan petit, que cabia de peu dins d'una closca de cargol i dormia en una capsa de mistos folrada de cotó fluix.</p>

<p>En Patufet, malgrat la seva mida minúscula, tenia un cor enormíssim i una valentia que feia enveja als seus germans grans. Mai no es lamentava de ser petit. Al contrari, deia que ser petit tenia molts avantatges: podia amagar-se a qualsevol lloc, escoltar converses sense que el veiessin i passar per forats que cap altra persona no podia travessar.</p>

<p>Un dilluns al matí, la mare va preparar una cistella de salsitxes fumades per vendre al mercat de Sant Antoni. Era una cistella grossa, plena fins a dalt, i l'olor que en sortia era tan bona que feia salivar tothom al carrer. La mare, que estava cansada i tenia moltes feines a casa, va sospirara profundament.</p>

<p>En Patufet, que l'estava observant des de dalt de la taula on s'havia enfilat, va dir amb la seva veueta aguda com un grillet: «Mare, deixa-ho per a mi! Jo porto la cistella al mercat!» La mare el va mirar amb tendresa barrejada de preocupació. «Ai, fill meu, que ets tan petit... Et perdràs pel camí, o et trepitjarà algú sense voler, o et passarà alguna desgràcia.»</p>

<p>Però en Patufet va insistir tant, va posar una cara tan decidida i va prometre tantes vegades que tornaria directe sense entretenir-se, que la mare finalment va cedir. Li va lligar la cistella a l'esquena amb un fil de llana vermella, li va posar el barret de palla i li va donar un petó al front que quasi el tirava a terra de la força. «Vine aviat, que dinem de migdia», li va dir.</p>

<p>En Patufet va sortir al carrer cantant una cançoneta. La gent que passava no el veia i ell havia après a anar per la vorera ben arran de la paret, saltant les pedres i esquivant les sabates i les botes dels passants. La cistella li pesava molt, però ell era tossut com una mula petita i no es queixava.</p>

<p>Va vendre totes les salsitxes al mercat en un tres i no res, perquè la seva veu aguda cridant «Salsitxes! Salsitxes fumades, les millors de la ciutat!» feia riure la gent i li compraven per curiositat. Va plegar els diners en un mocador i va iniciar el camí de tornada ben content.</p>

<p>Però el camí de tornada era llarg i en Patufet s'havia entretingut una mica mirant els estands del mercat. La tarda queia i els carrers anaven quedant-se buits. Va prendre una drecera que no havia fet mai i va arribar a un camí de terra ample que no reconeixia.</p>

<p>De sobte va sentir una remor de campanetes i va veure arribar un ramat de vaques conduït per un pastor adormissat. Les vaques eren grosses com cases per a en Patufet, i ell corria i corria per esquivar-les, però el camí era estret i les bèsties avançaven de paret a paret.</p>

<p>«Bou, bou, deixa'm passar! Soc en Patufet i vaig a casa!» va cridar amb tota la força dels seus pulmons minúsculs. Però les vaques no el sentien o no li feien cas, i una d'elles, la més gran i grassa, que anava mirant les herbes dels marges del camí, va obrir la boca per menjar una gavella d'herba i... va engolit en Patufet d'un cop, cistella, barret, mocador i tot.</p>

<p>A dins de la panxa de la vaca hi feia una calor tèbia i hi havia una foscor absoluta. En Patufet va trigar uns moments a entendre on era. Però en comptes de plorar o desesperarse, va respirar fondo i va pensar. «Bé», va dir en veu alta, «aquí no hi ha llum, però hi soc sencer. El primer que cal fer és fer saber a la mare on soc.»</p>

<p>Va començar a cridar: «Mare! Mare! Soc aquí! Soc a la panxa de la vaca!» La seva veueta sortia apagada per les parets de la bèstia, però en certs moments del silenci del vespre, quan el vent s'aturava, es podia sentir una veueta molt llunyana que cridava des d'un lloc impossible.</p>

<p>La mare, quan va veure que en Patufet no tornava per dinar ni per sopar, va sortir al carrer desesperada. Va recórrer tot el barri cridant el seu nom. Els veïns van sortir a ajudar-la amb llanternes. Van buscar per tots els racons, sota les pedres, dins els canalons, darrera les portes... En Patufet no apareixia.</p>

<p>Finalment, quan la mare plena de llàgrimes creuava el camí de terra, va sentir aquella veueta minúscula que semblava venir del cor d'una vaca que pasturava tranquil·lament al prat del costat. Va parar l'orella. «Mare! Soc aquí! A la panxa!»</p>

<p>La mare no s'ho podia creure. Va córrer a buscar el pastor, que dormia a la pallissa. «La vostra vaca s'ha menjat el meu fill!» El pastor va obrir un ull. «Senyora, les vaques no mengen nens.» «La meva sí! Escolteu!» Van acostar l'orella al flanc de la vaca i van sentir clarament: «Fora d'aquí! Fora! Mare, digues-li que pari de mastegar!»</p>

<p>El pastor, convençut per fi, va donar a la vaca un remei especial que li feia moure les entranyes. La vaca va fer uns sorolls terribles i al cap d'una bona estona, entre herbes i coses que és millor no descriure, va aparèixer en Patufet: brut, olorós, però completament sencer, amb el barret de palla una mica aixafat i el mocador dels diners ben lligat a la mà.</p>

<p>La mare el va agafar, el va netejar amb el davantal i el va abraçar tan fort que en Patufet va haver de demanar-li que el deixés respirar. Els veïns que s'havien aplegat van aplaudir i riure. El pastor va quedar boca badada tota la nit.</p>

<p>Des d'aleshores, en Patufet va continuar sent el més valent de la família, però la mare sempre l'acompanyava fins al mercat i el venia a buscar a la sortida. I en Patufet, cada vegada que passava per davant d'una vaca, la mirava molt de prop als ulls i li deia ben baixet: «Ja saps qui soc. No tornis a provar-ho.»</p>`
  },
  {
    id:2, emoji:'🐺', title:'La Caputxeta Vermella',
    tema:'Aventura', tags:['llop','bosc','àvia','precaució'],
    resum:'La nena del barret vermell que porta pastissos a l\'àvia i es troba el llop al bosc.',
    text:`<p>A la vora d'un bosc espès i antic, en un poblet on les cases tenien les teulades de pissarra i els jardins plens de rosers, hi vivia una nena que tothom estimava molt. Era alegre, curiosa i bondadosa, i tenia uns ulls de color avellana que brillaven quan somreia. La seva mare li havia fet, per l'hivern passat, una capa de llana vermella amb una caputxa gran i còmoda. La nena l'estimava tant que no se la treia mai, ni a l'estiu quan feia calor. Per això tothom al poble l'havia batejada la Caputxeta Vermella, i el seu nom de pila ja quasi ningú el recordava.</p>

<p>Un dissabte al matí, la mare va aixecar-se d'hora i va posar-se a cuinar. Va fer una coca de llardons cruixent, una terrina de confitura de gerds i un pa de pessic amb ametlles torrades. Ho va posar tot dins d'una cistella de vímet amb una tapa i la va cobrir amb un drap de quadres. «Caputxeta», va cridar, «la teva àvia no es troba bé des de fa uns dies i li hem de portar menjar. Aniràs tu, que ets la seva preferida?»</p>

<p>La Caputxeta va aparèixer corrent per les escales amb la capa ja posada. «Sí, sí, sí! Quan marxo?» La mare li va posar la cistella al braç i li va agafar la maneta. «Escolta'm bé: agafa el camí ample que va pel límit del bosc, no el drecera per dins. No t'aturis a parlar amb desconeguts. Deixa la cistella a l'àvia i torna directament. Entès?» «Sí, mare», va dir la Caputxeta, que ja estava mig girada cap a la porta.</p>

<p>El camí fins a casa de l'àvia era d'uns tres quarts d'hora si anaves pel camí ample. La Caputxeta va sortir al sol del matí i va respirar l'aire fresc que venia del bosc. Els ocells cantaven i les papallones volaven entre les flors del marge. Era un dia tan bonic que la Caputxeta anava saltant i cantant, amb la cistella penjant del braç.</p>

<p>Quan va arribar a la vora del bosc, va veure que el camí ample girava i s'allargava molt, mentre que entre els arbres hi havia un sender estret i ombrívol que tallava directe. «Si agafo la drecera», va pensar, «arribaré molt abans i l'àvia estarà contenta.» Va recordar el que havia dit la mare, però el dia era tan clar i els arbres semblaven tan tranquils que va decidir arriscar-se.</p>

<p>Va endinsar-se al bosc. Al principi tot era meravellós: llum filtrada entre les fulles, sorolls de rierols llunyans, molsa suau als peus. Però al cap d'uns minuts va sentir un so just darrere d'un roure gruixut. Una veu profunda i melosa va dir: «Bon dia, Caputxeta. On vas tan de pressa per aquest bosc tan bonic?»</p>

<p>Era un llop gris, enorme, amb els ulls grocs i una cua que es movia lentament d'un costat a l'altre. La Caputxeta, que no havia après encara la prudència que dóna l'experiència, va respondre amb tota la naturalitat del món: «Vaig a casa de la meva àvia! Viu a l'altra banda del bosc, la casa amb els geranis a les finestres. Li porto menjar perquè no es troba bé.»</p>

<p>El llop va somriure mostrant unes dents molt blanques i molt llargues. Per dins estava calculant. «Quina nena més simpàtica», va dir. «I quines flors tan boniques hi ha aquí! La teva àvia segur que s'alegraria de rebre un ram. Per què no en culls mentre jo vaig a saludar-la i li dic que arribes?» La Caputxeta va mirar les flors i va pensar que sí, que l'àvia estimava molt les flors silvestres.</p>

<p>El llop va marxar a pas ràpid, gairebé corrent, mentre la Caputxeta s'entretenia collint margarides, digitalines i campanetes blaves. Va fer un ram tan gran que quasi no el podia subjectar amb una mà mentre portava la cistella amb l'altra.</p>

<p>Mentrestant, el llop havia arribat a la casa de l'àvia. Va trucar a la porta suaument. «Qui és?» va dir una veu dèbil de dins. «Soc la Caputxeta, àvia! T'ho porto el menjar!» La vella va obrir la porta sense pensar-s'hi i el llop va entrar d'un salt. L'àvia va cridar, però el llop era molt ràpid. La va tancar a l'armari de la roba, ben tancada però sencera, i es va posar el seu barret de dormir i es va ficar al llit tapat fins al morro.</p>

<p>Quan va arribar la Caputxeta i va trucar, la veu del llop imitant l'àvia va dir «endavant!». La nena va entrar i va deixar la cistella a la taula. Es va acostar al llit i va veure que l'àvia tenia un aspecte molt estrany. «Àvia, quines orelles tan grans que tens!» «Per sentir-te millor, nena.» «Àvia, quins ulls tan grossos!» «Per veure't millor.» «Àvia, quines mans tan peludes!» «Per abraçar-te millor.» «Àvia... quina boca tan enorme!» «Per...» I el llop va saltar del llit cridant «PER MENJAR-TE MILLOR!»</p>

<p>La Caputxeta va cridar amb totes les forces i va sortir corrent per la porta. El llop la va perseguir però ella corria ràpid. Per sort, un llenyataire que tallava llenya a prop va sentir els crits. Va agafar la destral i va córrer. Quan va veure el llop perseguint la nena, va interposar-se entre els dos. El llop, en veure l'home gran amb la destral, va aturar-se, va girar cua i va fugir bosc endins i no va tornar mai més.</p>

<p>Van alliberar l'àvia de l'armari, que estava espantada però sencera. Van seure tots tres a taula i van menjar la coca de llardons i la confitura de gerds. L'àvia va dir que era el millor menjar que havia tastat en anys, potser perquè el fre de l'ensurt havia agudit tots els sentits.</p>

<p>La Caputxeta va tornar a casa de la mà del llenyataire. La mare l'esperava a la porta morta de preocupació. Quan va sentir la història, la va abraçar molt fort i va plorar una mica. Aquella nit, abans de dormir, la mare li va dir: «¿Entens ara per què et vaig dir que no agafessis la drecera i que no parlessis amb desconeguts?» La Caputxeta va dir que sí amb el cap, i ho deia de veritat. Havia après una lliçó que no oblidaria mai.</p>

<p>Des d'aleshores, la Caputxeta sempre agafava el camí ample, sempre tornava de pressa, i mai no donava informació sobre on anava a cap desconegut, per molt amable que semblés. I l'àvia es va recuperar del tot, ajudada sens dubte per la coca de llardons i la companyia de la seva néta preferida.</p>`

<p>El primer porquet, que es deia Pep i era el més mandrós dels tres, va dir adeu a la mare amb un petó i va marxar saltant i cantant. Quan va trobar un camp de palla seca, va pensar: «Aquí tenim material! Faré la meva casa de palla. És fàcil, és ràpid i podré passar la resta del dia jugant.» En efecte, en poc menys d'un matí va aixecar quatre parets de palla, va posar un sostre de palla, una porta de palla i fins i tot una finestreta de palla. Va entrar content, va estirar-se a la pallassa i es va adormir.</p>

<p>El segon porquet, que es deia Pau i era una mica més treballador que el seu germà però tampoc no volia esforçar-se massa, va trobar un bosc de pins joves i va decidir usar la fusta. «La fusta és molt millor que la palla», es va dir, «serà una casa molt decent.» Va trigar un dia sencer a tallar els troncs, serrar-los i muntar-los. La casa de fusta quedà força presentable, amb una porta de debò i dues finestres amb marc. Va entrar satisfet i es va posar a cuinar un bon sopar.</p>

<p>El tercer porquet, que es deia Pere i era el més reflexiu i treballador dels tres, va buscar durant dies el material adequat. Va trobar una pedrera abandonada i una fàbrica de maons prop del camí. Va calcular quants maons necessitaria, va comprar ciment, va dibuixar uns plànols senzills i va posar-se a treballar. La seva casa va tardar una setmana sencera a construir-se. Tenia fonaments profunds, parets gruixudes de maó vist, un sostre amb teules, una porta reforçada i unes finestres amb porticons. Quan va acabar, estava tan cansat que va caure al llit de dret.</p>

<p>Al cap d'uns dies, va aparèixer pel camí un llop gran i gris, amb les galtes inflades i uns pulmoni com els foles d'una ferreria. Era famolenc i astut, i havia après que la millor manera de capturar porquets era enfonsar primer les seves cases per deixar-los sense refugi.</p>

<p>Va arribar primer a la casa del Pep. Va trucar a la porta. «Porquet, porquet, deixa'm entrar!» «No pas pels pèls del meu mentó!» va respondre el Pep des de dins, rient. El llop va inflar els pulmons tant com va poder i va bufar. Un buf fort, un altre, un tercer... i la casa de palla va volar pels aires com si fos confetti. El Pep va sortir cridant i va córrer com mai havia corregut en la seva vida fins a la casa del Pau.</p>

<p>El llop va anar a la casa de fusta. «Porquets, porquets, deixeu-me entrar!» «No pas pels pèls del nostre mentó!» El llop va bufar. Les parets de fusta resistien millor que la palla, però finalment, amb quatre bufs poderosos, van cedir. Les taules van cruixir, el sostre es va enfonsar i els dos porquets van sortir corrent coll avall cap a casa del Pere.</p>

<p>El llop, una mica cansat però molt decidit, va arribar davant de la casa de maons. Era sòlida, quiet i impressionant. Va trucar. «Porquets, porquets, deixeu-me entrar!» «No pas pels pèls del nostre mentó!» va respondre la veu triple dels tres germans des de dins, i fins i tot s'hi va sentir alguna riallada.</p>

<p>El llop va bufar. Res. Va bufar més fort. Res. Va bufar amb totes les forces que li quedaven, posant-hi els pulmons, l'estómac i les cames... i la casa de maons no es va moure ni un mil·límetre. L'únic que va moure's va ser el llop, que va haver de seure a reprendre l'alè.</p>

<p>Furiós i humiliat, el llop va decidir entrar per la xemeneia. Va enfilar-se al sostre, va mirar dins el fumeral estret i va començar a baixar. Però els tres porquets, que havien sentit els seus passos al sostre, havien preparat una olla enorme d'aigua bullint just sota la xemeneia. Quan el llop va caure a l'olla, va pegar un crit que es va sentir a tres pobles de distància, va sortir disparat per la xemeneia i va marxar corrent sense girar el cap.</p>

<p>Els tres porquets van brindar amb suc de poma i van fer un sopar meravellós. L'endemà, el Pep i el Pau van demanar al seu germà que els ensenyés a construir cases de maons. «Clar que sí», va dir el Pere, «però porteu el ciment vosaltres, que jo ja estic bastant cansat.»</p>

<p>I des d'aleshores, quan es construïen qualsevol cosa, els tres porquets ho feien sempre amb cura, prenent-se el temps necessari i usant els materials adequats. Perquè havien après de primera mà que les presses i la ganduleria costen molt més que la feina ben feta.</p>`

    text:`<p>Al bosc de la Vall Verda, on els animals vivien en una comunitat ordenada i generalment pacífica, hi havia una llebre que tenia una qualitat extraordinària i un defecte igual d'extraordinari. La qualitat era la velocitat: la llebre corria més ràpid que qualsevol altre animal del bosc, amb unes cames llargues i musculades que la portaven d'un extrem a l'altre del bosc en un bategar d'ulls. El defecte era que ella mateixa no podia parar de parlar-ne.</p>

<p>Cada matí, quan els animals es reunien a la font a beure, la llebre trobava la manera de treure el tema. «Ahir vaig fer dues voltes al llac en el temps que el teu fill tardava a arribar a la riba», li deia a la mare ossa. «Podria portar un missatge a l'altra punta del bosc i tornar abans que tu acabis d'esmorzar», li deia al cérvol. I al vespre, quan els animals descansaven, la llebre feia exhibicions de velocitat entre els arbres, saltant i girant i corrent en cercles mentre la resta mirava amb una barreja d'admiració i cansament.</p>

<p>Un dia de tardor, quan les fulles eren daurades i l'aire tenia aquella frescor que anuncia l'hivern, la llebre estava al mig d'un monòleg especialmente llarg sobre les seves proeses quan la tortuga Clàudia, que fins aleshores mai no havia dit res, va aixecar el cap lentament i va parlar.</p>

<p>«T'estic escoltant des de fa mesos», va dir la tortuga amb la seva veu baixa i serena, «i estic una mica cansada de sentir sempre el mateix. Si ets tan ràpida com dius, per qué no ho demostres amb una cursa de debò en lloc de córrer en cercles sola?»</p>

<p>El silenci va caure sobre el grup d'animals com una manta. La llebre va girar-se lentament cap a la tortuga. Tots sabien que la tortuga era l'animal més lent del bosc, que cada pas li costava un esforç considerable i que una volta al llac li podia trigar tot un matí. «¿Una cursa? ¿Tu i jo?» La llebre va esclatar a riure. «Estàs segura? No vull que et facis mal corrent massa.»</p>

<p>«Prou segura», va dir la tortuga, impassible. «Del roure gran fins al turó del pi centenari i tornada. Demà al matí.» Tots els animals van quedar bocabadats. La llebre va acceptar rient, convençuda que seria la cosa més fàcil que havia fet en la seva vida.</p>

<p>Aquella nit, mentre la llebre dormia sense preocupació, la tortuga Clàudia es va quedar desperta una estona pensant. Sabia perfectament que no podria guanyar per velocitat. Però havia observat la llebre durant molt de temps i coneixia el seu defecte principal: l'avorriment. La llebre corria tan ràpid que tot li semblava lent i avorrit, i quan s'avorrida es distreta i s'entretenia.</p>

<p>L'endemà al matí, tots els animals del bosc es van aplegar al peu del roure gran. L'esquirol va fer de jutge. «Preparats?» Els dos corredors es van posar a la línia de sortida. La llebre, estirallant les cames i fent salts de calentament. La tortuga, quieta, respirant profundament. «Tres, dos, un... Ja!»</p>

<p>La llebre va desaparèixer com una fletxa. En trenta segons ja havia deixat enrere la meitat del camí i el turó del pi centenari ja es veia al lluny. La tortuga, darrere seu, havia fet potser cinc passes. Els animals que miravens van xiuxiuejar entre ells.</p>

<p>Però la tortuga no va alçar el cap. Pas a pas, lenta i metòdica, anava avançant. Un pas. Un altre. Un altre. Sempre cap endavant, sempre al mateix ritme, sense parar mai, sense mirar enrere, sense pensar en res més que el següent pas.</p>

<p>La llebre, mentre tant, havia arribat al turó, havia tocat el pi centenari i havia girat. Mirant enrere, va veure la tortuga com un punt minúscul llunyà. Va riure. «Tinc temps de sobres. Faré un petit descans.» Va trobar un llit d'herba tendra a l'ombra d'un faig i s'hi va estirar. «Cinc minuts», es va dir. L'aire suau de la tardor, el soroll dels ocells i la comoditat de l'herba van fer la resta.</p>

<p>La tortuga va arribar al turó. Va tocar el pi centenari. Va girar. Pas a pas, un davant de l'altre, va continuar avançant. Va passar per al costat del faig on la llebre roncava placidament. Va continuar. Pas a pas. Sense aturar-se.</p>

<p>La llebre es va despertar sobresaltada quan va sentir els crits i aplaudiments dels animals. Va obrir els ulls, va veure el sol molt més alt al cel del que hauria de ser i va sortir corrent com un llamp cap a la línia d'arribada. Però quan va arribar, la tortuga ja hi era, quieta i impassible, amb tota la dignitat del món, i l'esquirol ja havia declarat el guanyador.</p>

<p>La llebre va aterrar a pocs centímetres de la línia d'arribada i va quedar-se paralitzada mirant la tortuga. La tortuga la va mirar amb els seus ulls antics i tranquils. «No és qüestió de ser el més ràpid», va dir suament. «És qüestió de no parar mai.»</p>

<p>Des d'aquell dia, la llebre va aprendre a respectar tots els animals del bosc, fossin ràpids o lents, grans o petits. I la tortuga va continuar el seu camí, pas a pas, com sempre, sense presumir de res.</p>`

    text:`<p>En un regne envoltat de muntanyes boscoses, on els rius baixaven cristal·lins i els camps florien dues vegades l'any, el rei i la reina esperaven un fill des de feia molt de temps. Quan finalment va néixer una nena preciosa d'ulls blaus i cabells negres com el carbó, la joia al palau va ser tan gran que es van fer les celebracions més grans que el regne havia vist mai.</p>

<p>El rei va voler convidar totes les fades del regne a la cerimònia de bateig, per tal que la nena rebés els seus dons i la seva protecció. Hi havia tretze fades al regne, però el palau només tenia dotze serveis de plata daurada per als convidats especials, i el rei va cometre l'error de no convidar la tretzena fada, que vivia reclosa en una torre del bosc fosc i que feia anys que no es relacionava amb ningú.</p>

<p>Les dotze fades convidades van anar desfilant davant del bressol de la princesa Aurora i li van atorgar els seus dons: la bellesa, la gràcia, la bondat, la intel·ligència, la veu melodiosa, la valentia, la generositat, la curiositat, la paciència, l'alegria, la saviesa i l'estimació dels animals. Quedava per parlar la dotzena fada quan les portes del saló es van obrir de bat a bat amb un cop de vent fred.</p>

<p>La tretzena fada entrava furiosa, amb el rostre enrogit i els ulls brillants de ràbia. «Com goseu fer una celebració tan gran i no convidar-me a mi!» La seva veu era com un tro dins del saló. Tothom es va quedar paralitzat. La fada s'acostà al bressol i va estendre el braç amb el seu bastó. «La vostra filla rebrà el meu do també: el dia que compleixi setze anys, es punxarà el dit amb el fus d'una filadora... i morirà!»</p>

<p>Un crit va recórrer el saló. La reina va abraçar la criatura al pit. Però la dotzena fada, que no havia parlat encara, va avançar. «No puc desfer completament el que ha dit la meva germana», va dir amb veu ferma, «però sí que puc suavitzar-ho. La princesa no morirà: dormirà un son profund que durarà cent anys, fins que un príncep de cor pur la desperti amb un petó d'amor verdader.»</p>

<p>El rei, desesperats, va manar cremar tots els fusos de filadora de tot el regne. Cada última filadora va ser requisada i destruïda. La princesa Aurora va créixer en un palau on no hi havia cap fus, envoltada de guards i cuidadors, i malgrat totes les precaucions era una nena feliç, alegre i estimada per tothom.</p>

<p>El dia que va complir setze anys es van fer grans festes. Però mentre tots celebraven als jardins, la princesa va explorar les torres del palau, que normalment estaven tancades. A la torre nord, va trobar una porta que no havia vist mai. La va obrir, curiosa, i va pujar per una escala de cargol fins a arribar a una sala petita i circular on una vella filava tranquil·lament.</p>

<p>«Bona tarda», va dir la vella amb un somriure amable. «Que és això?» va preguntar la princesa, fascinada per l'objecte que girava. «Una filadora, princesa. Vols provar-ho?» Aurora va estendre la mà cap al fus brillant sense pensar-se-ho i... en un segon, una punxada al dit i la princesa va caure al terra adormida com una pedra.</p>

<p>La vella va desaparèixer amb una riallada. Era la fada malèfica, que havia esperat setze anys per complir la seva venjança. En aquell instant, tot el palau va caure en un son profund: els guàrdies van adormir-se drets, els cuiners van caure amb les olles a les mans, els gossos es van enroscar als racons, els ocells van parar de volar i van quedar quiets a les branques. I al voltant del palau, en poques hores, va créixer un bosc de bardisses i espines tan dens que semblava una muralla viva.</p>

<p>La llegenda va córrer pel país i pels països veïns. Molts prínceps joves van intentar penetrar aquell bosc d'espines al llarg dels anys. Alguns van perdre el cavall, d'altres es van ferir i van rendir-se, i d'altres simplement no van trobar ni l'entrada. El bosc semblava tenir vida pròpia i rebutjar tots els que s'hi acostaven.</p>

<p>Cent anys justos després del dia que la princesa havia caigut adormida, un príncep de terra llunyana va arribar al bosc. No sabia exactament per quin motiu, però sentia una atracció poderosa cap a aquelles bardisses. Quan va tocar el primer ramell d'espines, alguna cosa extraordinària va passar: les branques es van apartar soles, obrint un camí net i ample, com si l'haguessin esperat.</p>

<p>Va entrar al palau, que estava cobert de pols i teranyines però intacte. Va veure els guàrdies adormits drets, els servents plegats als bancs, els animals quiets als seus llocs. Dalt de la torre va trobar la cambra i dins la cambra, sobre un llit de cortines de seda, la princesa Aurora dormida, bella com el primer dia, sense envellir ni una mica.</p>

<p>El príncep s'hi va acostar lentament, sense saber ben bé el que feia, guiat per alguna cosa que no podia explicar. Li va donar un petó suau i tendre al front. I en aquell instant, la princesa va obrir els ulls.</p>

<p>Tot el palau es va despertar alhora: els guàrdies van acabar les frases que havien deixat a mitges cent anys enrere, els cuiners van continuar remenant les olles, els gossos van sacsejar les orelles i els ocells van continuar el vol. El palau va tornar a omplir-se de vida com si cent anys no haguessin passat.</p>

<p>La princesa Aurora va mirar el príncep i va somriure. Era una mirada nova, amb tota la llum del primer moment. Van parlar llargament i aviat van comprendre que el cor de l'un encaixava perfectament amb el cor de l'altre. Es van casar aquella mateixa tardor, en unes noces que van durar tres dies, i van viure junts molts anys plens de moments meravellosos i ordinaris, que és com han de ser les vides bones.</p>`

    text:`<p>En una mansió gran d'una ciutat antiga hi vivia una noia que havia tingut la desgràcia de perdre la seva mare quan era petita. El seu pare, un home bo però tou de caràcter, es va tornar a casar poc temps després amb una vídua que tenia dues filles de la seva edat. El pare creia que la seva filla tindria company i que la nova esposa la tractaria com a filla pròpia. No havia pogut equivocar-se més.</p>

<p>Quan el pare va morir d'una malaltia sobtada, la madrastra va mostrar la seva veritable cara. Va expulsar la noia de la seva habitació elegant i la va instal·lar a la cuina, al costat de la llar de foc, on havia de dormir sobre un munt de cendres. La feina que li imposaven era impossible: havia de cuinar, netejar, cosir, rentar, treure l'aigua del pou, fregar els terres, cuidar el jardí i atendre les germanes en qualsevol capritx que tinguessin, que eren molts i constants.</p>

<p>Les germanes l'anomenaven la Ventafocs, per les cendres que sempre tenia a la roba i la cara. La noia havia après a no plorar davant d'elles, perquè les llàgrimes les feien riure. Però de nit, quan tothom dormia, s'asseia vora les brases i pensava en la seva mare, en els dies que havia sigut feliç, i a vegades les llàgrimes li queien soles.</p>

<p>Un dia va arribar al poble un herald del palau reial amb una proclama: el príncep havia decidit casar-se i convidava totes les donzelles del regne a un gran ball de tres nits. La madrastra i les germanes van entrar en un frenesí d'alegria i preparatius. Van encarregar vestits nous, sabates de seda, perruca i joies. La Ventafocs va cosir i brodar els vestits de les germanes fins que li van sagnar els dits. Quan va demanar si podia anar al ball, la madrastra va riure burlonament. «Tu? Al ball? Primer has de netejar la golfes, rentar tota la roba i triar un per un els cigrons d'un sac. Quan ho tinguis fet, podràs anar on vulguis.»</p>

<p>La nit del ball, la Ventafocs va acabar les feines impossibles i es va quedar sola a la cuina fosca mentre sentia la carrossa de la madrastra allunyar-se. Aleshores, per primera vegada en molt de temps, es va posar a plorar de debò. Un plor d'esgotament i tristesa profunda.</p>

<p>Quan va alçar el cap, algú estava assegut a l'altre costat de la taula. Era una dona gran amb els ulls vius i un bastó de fusta d'avellaner. «Qui ets?» va preguntar la Ventafocs, espantada. «Soc la teva fada padrina», va dir la dona amb una veu càlida. «I avui anem al ball.»</p>

<p>La fada va fer coses increïbles en pocs minuts. Va agafar la carbassa del jardí i d'un toc de vareta la va convertir en una carrossa daurada. Sis ratolins del rebost es van convertir en sis cavalls blancs. Una sargantana grossa en cotxer. Dos cargols en lacais de librea. I la roba vella i bruta de la Ventafocs en un vestit de seda i lluna, blanc i blau, que brillava com si tingués estrelles cousides als plecs. Als peus, uns escarpin de vidre net com l'aire.</p>

<p>«Però recorda», va dir la fada mentre la noia pujava a la carrossa bocabadada, «a les dotze en punt de la nit tot desapareixerà. Has de tornar abans que les campanes acabin de tocar.»</p>

<p>Al palau, la Ventafocs va entrar i el ball es va aturar. Ningú no la reconeixia. El príncep, que havia ballat educadament amb moltes donzelles sense sentir res especial, va veure-la entrar i va quedar-se quiet al mig de la pista. Va travessar la sala sencer per arribar fins a ella i li va demanar de ballar. Van ballar tota la nit, parlant i rient, mentre les germanes i la madrastra, a tres metres de distància, no reconeixien la noia que sempre els feia les feines.</p>

<p>Quan les campanes van començar a sonar les dotze, la Ventafocs va recordar l'advertència. Va sortir corrent sense donar explicacions, baixant les escales tan de pressa que va perdre un dels escarpins de vidre. El príncep la va perseguir però només va arribar a temps de trobar la sabata a les escales.</p>

<p>L'endemà, el príncep va recórrer tot el regne amb la sabata de vidre. Cada donzella la provava, però era tan petita i tan perfecta que no entrava a ningú. Quan va arribar a la mansió, les germanes van estirar els peus i fer força, però la sabata no cedia. La madrastra els va mirar i va preguntar si hi havia alguna altra dona a la casa. Les germanes van dir que no, però el lacai va veure una porta de la cuina entreduberta.</p>

<p>La Ventafocs va sortir amb el davantal brut i els cabells recollits de qualsevol manera. El príncep li va oferir la sabata. La noia va posar el peu amb tota la naturalitat del món i la sabata va calçar com si hagués nascut per a ella. Aleshores va treure de la butxaca del davantal l'altra sabata i se la va posar. La madrastra i les germanes van empal·lidir.</p>

<p>La Ventafocs va mirar el príncep i ell la va reconèixer als ulls, que eren els mateixos que els de la noia misteriosa del ball. «Ets tu», va dir ell, i no feia falta dir res més. La Ventafocs va perdonar la madrastra i les germanes, perquè havia après que guardar rancúnia és un pes massa feixuc per portar-lo tota la vida. Es va casar amb el príncep en una cerimònia senzilla i meravellosa, i va viure els seus dies amb aquella pau profunda que dóna haver passat per l'adversitat i no haver perdut la bondat pel camí.</p>`

    resum:'Una princesa fa promeses a una granota que li recupera la pilota daurada del pou.',
    text:`<p>Al jardí del palau reial, entre els rosers i els lliris, hi havia un pou vell de pedra amb una vora desgastada de tants anys de servei. L'aigua del pou era freda i clara fins al fons, i a l'estiu, quan el sol picava fort, era el lloc més fresc de tot el jardí. La princesa Matilde hi anava cada tarda a jugar, perquè era el lloc on podia estar sola sense que les mainaderes la seguissin.</p>

<p>La seva joguina preferida era una pilota daurada que brillava al sol com una petita lluna. Era un regal del seu avi, que havia mort quan ella era molt petita, i per tant la pilota tenia un valor sentimental que anava molt més enllà del seu valor material. La princesa la llançava amunt i la recollia, la feia rebotar contra la paret del pou, la feia rodar per la gespa... hores i hores entretinguda sola.</p>

<p>Un vespre de principis d'estiu, quan la llum del sol ja era daurada i obliqua, la princesa va fer una tirada massa forta i la pilota va pujar molt amunt, va tocar la vora del pou i va caure dins. Es va sentir un splash llunyà. La princesa es va acostar a mirar i va veure la pilota al fons del pou, brillant en l'obscuritat de l'aigua. Va ficar el braç tant com va poder, però l'aigua era gèlida i profunda i la pilota estava molt avall.</p>

<p>Va posar-se a plorar. Plora que plora, no sentia res al voltant. Fins que va sentir una veu suau i lleugerament humida que deia: «Princesa, per qué plores?» Va alçar el cap i va veure una granota gran asseguda a la vora del pou, mirant-la amb uns ulls daurats i intel·ligents.</p>

<p>«La meva pilota ha caigut al pou i no puc recuperar-la», va dir la princesa entre els plors. La granota va inclinar el cap. «Puc bussejar i recuperar-la per tu, si vols. Però a canvi necessito que em facis una promesa.» La princesa va eixugar les llàgrimes. «Quina promesa?» «Que em deixaràs seure a la teva taula, menjar del teu plat, beure del teu got i dormir al teu coixí.»</p>

<p>La princesa va pensar un segon i va dir que sí sense gaires escrúpols, perquè en aquell moment el que volia era recuperar la pilota i la promesa li semblava fàcil de complir. La granota va saltar al pou, va desaparèixer a l'obscuritat de l'aigua i al cap d'uns minuts va tornar a la superfície amb la pilota daurada entre les potes de davant.</p>

<p>La princesa va agafar la pilota corrents, va fer un «gràcies!» ràpid i va marxar saltant cap al palau. «Espera! La promesa!» va cridar la granota darrere seu. Però la princesa ja era lluny i feia veure que no sentia res.</p>

<p>A sopar, quan tota la família reial estava asseguda a la gran taula, es va sentir un pum pum pum a la porta principal. Un servent va obrir i va tornar pallid. «Majestat, hi ha una granota que diu que la princesa li ha fet una promesa.» El rei va mirar la seva filla. «¿Pots explicar-m'ho?»</p>

<p>La princesa, vermella com un tomàquet, va explicar la història. El rei va escoltar en silenci. Quan ella va acabar, el rei va dir: «Una promesa és una promesa. La compliras.» «Però, pare, és una granota!» «Una persona de paraula ho és sempre, princesa. Fes-la entrar.»</p>

<p>La granota va entrar saltant i va pujar a la cadira del costat de la princesa. Va menjar del seu plat, va beure del seu got. La princesa ho suportava amb la cara molt seria. A l'hora d'anar a dormir, la granota va dir: «Ara el coixí.» La princesa va fer una ganyota però la va posar al seu coixí.</p>

<p>Però a l'alba, quan la princesa es va despertar, al coixí no hi havia cap granota. Hi havia un jove d'uns divuit anys amb els ulls daurats que la mirava i li deia: «Gràcies.» La princesa va pegar un crit. El jove va explicar que era un príncep d'un regne llunyà que una bruixa havia transformat en granota per un acte d'ingratitud seu. Només el podia alliberar algú que complís una promesa difícil amb ell tot i no voler-ho.</p>

<p>El príncep va marxar al seu regne, però abans li va estrenyerla mà i li va dir: «Has après alguna cosa important aquesta nit. Espero que no ho oblidis.» La princesa va pensar molt en aquelles paraules, i des de llavors mai no va fer una promesa que no pensés complir.</p>`

    tema:'Natura', tags:['hivern','neu','sol','tardor','llegenda'],
    resum:'El conte de com la neu i el gel van arribar per primera vegada al nostre país.',
    text:`<p>Fa tant de temps que gairebé ningú no ho recorda, les terres que ara coneixem com a Catalunya mai no havien vist la neu. Els hiverns eren freds, certament, i la pluja de novembre queia grisa i freda, i la gebre es posava als camps a les matinades de desembre, però aquells flocs blancs i suaus que els pobles del nord descrivien a les seves cançons mai no havien baixat fins als nostres valls i planes.</p>

<p>En aquell temps, els elements del cel tenien vida i voluntat pròpia. El Vent del Nord era un vell rondinaire i poderós que bufava des de les altures dels Pirineus amb tanta força que tombava els arbres. El Vent del Sud era jove i càlid, perfumat de sàlvia i romer, que pujava del Mediterrani carregat de calor i humitat. Tots dos vents s'estimaven i s'odiaven alhora, com passa sovint entre els qui comparteixen el mateix cel.</p>

<p>Un tardor especialment plujosa, el Vent del Nord i el Vent del Sud van barallar-se de manera particularment violenta. El Vent del Nord deia que el fred era necessari per a la terra: «El fred mata les malalties, endureix les plantes, fa descansar la terra per a l'any que ve.» El Vent del Sud responia: «La calor és la vida! Sense calor no hi ha flors, no hi ha fruits, no hi ha colors. El fred és la mort.»</p>

<p>La disputa va durar setmanes i les seves baralles convertien el cel en un caos de núvols grisos i negres. Les persones que vivien als pobles de la plana miraven el cel amb preocupació. «Quan pararàn?» es preguntaven. «Quan s'esgotaran l'un a l'altre?»</p>

<p>Però els vents no s'esgotaven. Bufaven i bufaven, empenyent-se l'un a l'altre amunt i avall, fins que un dia les nuvolades van quedar atrapades a les altures dels Pirineus, massa altes i massa fredes, i van quedar-se quietes com un enorme matalàs gris sobre les muntanyes.</p>

<p>Durant dies les nuvolades van romandre allà dalt, acumulant humitat i fred. El Vent del Nord les empenyia des de dalt amb les seves manasses fredes. I una nit, quan el termòmetre va baixar més que mai, les gotes de pluja dins els núvols es van transformar. En comptes de caure com gotes líquides, van caure com flocs: petits, lleugers, blancs, perfectament simètrics com flors de sis pètals.</p>

<p>El primer floc va caure en un camp de sègol prop d'un poble de muntanya. La nena que vigilava els galls va alçar el cap i va veure el cel ple d'una cosa que mai no havia vist. Va obrir la mà i el floc hi va caure, fred i suau, i es va fondre a l'instant deixant una goteta d'aigua. Va cridar els seus pares. Van sortir tots. Aviat tot el poble era al carrer amb la cara aixecada cap al cel meravellat.</p>

<p>Aquella nit va nevar tota la nit. Al matí, el paisatge havia canviat completament: tot era blanc, silenciós i lluminós d'una manera que mai no s'havia vist. Els nens van sortir corrents, van tocar aquella pols blanca freda, van fer-ne pilotes i se les van llençar rient. Un avi va observar-ho tot des del portal de casa seva amb els ulls brillants d'una emoció que no sabia nomenar.</p>

<p>Quan va sortir el sol, la neu va brillar com si mil diamants s'haguessin escampat per la terra. I als rierols i basses, l'aigua s'havia convertit en una capa de gel transparent que reflectia el cel blau. Els nens hi relliscaven i queien rient.</p>

<p>El Vent del Nord, orgullós del seu regal, va callar uns dies. El Vent del Sud, sorprès per la bellesa del que havia creat la seva disputa, també va callar. I en aquell silenci va néixer la primera pau entre els dos vents, que des d'aleshores van aprendre a turnar-se: el Vent del Sud governava la primavera i l'estiu, i el Vent del Nord tenia l'hivern per a ell. I cada any, quan arriba el desembre, ens recorda el seu poder enviant-nos aquells flocs blancs que van caure per primera vegada en aquell poble de muntanya fa tants i tants anys.</p>`

    tema:'Màgia', tags:['ocell d\'or','príncep','bosc','desitjos','bondat'],
    resum:'Un príncep generós busca el llegendari ocell d\'or i l\'allibera en lloc de capturar-lo.',
    text:`<p>Al regne de Valldaura hi havia una llegenda que es transmetia de pares a fills des de temps immemorials: en la serralada més alta del nord, en un bosc on els arbres tenien el tronc de plata i les fulles de coure, hi vivia l'Ocell d'Or. Era una criatura d'una bellesa que feia perdre el seny, amb les plomes lluents com el metall preciós que li donava el nom, la cua llarga i sinuosa com una flama i uns ulls que semblaven tenir la profunditat de l'univers. Qui aconseguís trobar l'Ocell d'Or i parlar-hi en pau rebria el do de tres desitjos.</p>

<p>El rei de Valldaura tenia tres fills. Els dos grans, en Robert i en Guillem, eren alts, forts i ben vestits, i es passaven els dies a la cort impressionant els cortesans amb les seves habilitats de cavallers. El petit, l'Arnau, era més discret, preferia llegir a la biblioteca o conversar amb els jardiners i els cuiners, i de vegades sortia sol pels camins del bosc sense cap motiu aparent excepte mirar les coses.</p>

<p>Quan el rei va anunciar que el primer dels seus fills que trobessin l'Ocell d'Or i li presentessin tres desitjos per al bé del regne succeiria en el tron, els dos grans van partir immediatament amb seqüits de cavallers, armadures brillants i mapes detallats. L'Arnau va partir uns dies després, sol, amb una bossa de pa i formatge i una capa de viatge senzilla.</p>

<p>El camí cap a la serralada del nord era llarg i difícil. Els dos grans, amb els seus seqüits, van avançar ràpidament al principi, però quan van arribar als camins de muntanya estrets, les armadures pesades i els cavalls de batalla van resultar un impediment enorme. A més, els cortesans que els acompanyaven es queixaven del fred i del menjar escàs, i aviat els dos prínceps van perdre el temps resolent disputes entre la seva pròpia gent.</p>

<p>L'Arnau, sol i lleuger, avançava més a poc a poc però sense aturades. Un dia, al cim d'un turó ventós, va trobar un vell assegut a una pedra que semblava esperar algú. Era prim, tenia la barba llarga i blanca i anava vestit amb roba tan desgastada que gairebé es confonia amb la roca. «Bon dia», va dir l'Arnau, i es va asseure al seu costat. «Tens gana? Comparteixo el meu pa.»</p>

<p>El vell el va mirar amb uns ulls que semblaven massa vius per a un cos tan vell. Va acceptar el pa i van menjar junts en silenci. Quan van acabar, el vell va dir: «Has de prendre el camí de l'est, pas de les Tres Pedres, i girar al nord quan veges el bosc que brilla. No entris al bosc de nit. I quan trobis l'Ocell, pensa bé el que vols dir-li.» Va aixecar-se i va marxar sense afegir res més. L'Arnau el va mirar marxar pensatiu i va continuar el camí.</p>

<p>Seguint les instruccions del vell, l'Arnau va trobar el pas de les Tres Pedres i va arribar, a primera hora de la tarda d'un dia clar, a la vora d'un bosc diferent de tot el que havia vist. Els troncs dels arbres brillaven amb un reflex platejat i les fulles, que haurien de ser verdes, eren d'un color coure oxidat que captava i transformava la llum. Tot el bosc vibrava lleugerament, com si tingués una música interior que estés just per sota del llindar del que l'orella humana pot escoltar.</p>

<p>Va entrar al bosc amb cura, sense fer soroll, i va caminar una bona estona per entre aquells arbres meravellosos. I llavors, a la branca més alta del roure argentat més gran del bosc, va veure una llum que no era del sol: era l'Ocell d'Or, adormit, amb les plomes replegades i la cua penjant com una cascada de llum daurada.</p>

<p>L'Arnau es va asseure al peu de l'arbre i va esperar. No va intentar capturar-lo ni agafar-lo ni fer soroll. Simplement va esperar, observant aquella criatura meravellosa amb una admiració tranquil·la. Al cap d'una hora, l'Ocell es va despertar, va girar el cap i va veure el nen assegut a baix. Va baixar, branca per branca, fins a posar-se a poca alçada d'ell.</p>

<p>«Per que no intentes agafar-me?» va preguntar l'Ocell amb una veu que semblava que sonés des de molt lluny i molt a prop alhora. «Perquè no seria just. Ets lliure i ets bonic tal com ets. Una gàbia faria de tu una altra cosa.» L'Ocell va quedar-se quiet un moment. «Els altres dos que han vingut han intentat posar-me xarxes i paranys. Tu ets el primer que no ho fa.»</p>

<p>«T'explico per que he vingut», va dir l'Arnau, i li va explicar la llegenda i el repte del seu pare. L'Ocell l'escoltà sense interrompre. Quan va acabar, va dir: «Et concedeixo els tres desitjos, però no perquè els hagis guanyat per la força. Els concedeixo perquè has demostrat que entens el valor de la llibertat.»</p>

<p>L'Arnau va pensar llargament. Va demanar salut per al seu pare, que era vell i patia dolors. Va demanar que les collites del regne fossin bones durant cent anys perquè ningú no passés fam. I per al tercer desig, va fer una pausa llarga. «El tercer desig», va dir finalment, «el guardo per a algú que el necessiti més que jo.»</p>

<p>L'Ocell d'Or va obrir les ales i va volar tres cercles sobre el cap de l'Arnau. La llum que irradiava el va banyar per un instant d'una calor daurada. Quan va marxar, l'Arnau va baixar de la muntanya saber que havia fet el que era just, no el que era convenient. I quan va arribar al palau i va explicar la seva trobada, el rei el va abraçar amb uns ulls plens de llàgrimes.</p>`

    resum:'Un moliner astut s\'enfronta a un bruixot poderós en un duel d\'endevinalles i seny.',
    text:`<p>A la vall del Molí, on el riu Fosc baixava entre roques negres i el vent sempre bufava en la mateixa direcció, hi havia un moliner de nom Bernat que era conegut a tot el districte per dues coses: la seva farina excel·lent i el seu seny extraordinari. No era un home de grans paraules ni de gestos efectistes, però quan parlava la gent s'aturava a escoltar, perquè les seves paraules sempre anaven al cor de la qüestió.</p>

<p>Al cim de la muntanya que dominava la vall hi vivia el Bruixot de la Roca Negra. Era un home antic, de cos prim i ulls profunds com pous, que s'havia instal·lat a aquell cim deia que per viure en pau, però la pau que practicava era la seva: cada any, el primer dia de tardor, enviava un missatger al poble amb una endevinalla. Si ningú no l'encertava en tres dies, el bruixot tenia dret a prendre tres joves del poble per portar-los al seu castell com a servents. I ningú havia encertat mai cap de les seves endevinalles.</p>

<p>Aquell any, l'endevinalla era: «Sóc el que sempre ha sigut i mai no canvia, però ningú no pot assenyalar-me amb el dit. Sóc en tot i en res. Qui sóc?» Tres dies de deliberació al poble, i ningú no va trobar la resposta. El bruixot va baixar de la muntanya el quart dia, satisfet, a reclamar els seus tres joves.</p>

<p>Bernat el moliner va sortir al seu davant al mig del carrer. «Bruixot, tens la teva resposta.» El bruixot el va mirar amb sorpresa i una mica de menyspreu. «Moliner, molts han intentat respondre les meves endevinalles. Has de saber que si t'equivoques, te n'emportes tu en lloc dels tres joves.» «Ho accepto», va dir Bernat. El bruixot va repetir l'endevinalla. Bernat va pensar un moment i va dir: «El temps.»</p>

<p>El bruixot va quedar quiet un instant. No era la resposta que esperava, però era correcta. «Molt bé, moliner», va dir. «Has guanyat aquesta vegada. Però ara jo faig una endevinalla. Si no la respons, et portes tu i els tres joves.» «D'acord», va dir Bernat sense immutarse.</p>

<p>El bruixot va pensar uns moments. Havia de ser una endevinalla impossibe. «Heus aquí: tinc una cosa que ningú no m'ha donat, no l'he comprada, no me l'han robada mai, i tot i així no me la quedo. Quin cosa és?» Silenci a la plaça. La gent s'havia aplegat i escoltava sense respirar.</p>

<p>Bernat va mirar el bruixot als ulls. Va mirar la gent del voltant. Va mirar el cel i els camps i el riu al fons de la vall. Va tornar a mirar el bruixot. «El nom», va dir. «El nom que t'han donat des que van néixer. No te'l van demanar si el volies, no el vas comprar, no te'l han pogut robar mai. Però no és teu: és el que diuen els altres de tu.»</p>

<p>El bruixot va empal·lidir. Era la resposta correcta i ell ho sabia. La gent va aguantar la respiració. «Ara et toca a tu», va dir Bernat, i la seva veu era tranquil·la com una nit de setembre. «La meva endevinalla és simple: quina cosa és la que, si la tens i la dones, en tens més? I si la tens i la guardes sola, se't mor?» El bruixot va fregar-se les mans, va mirar amunt, va mirar avall. Va dir coneixement. Va dir amor. Va dir paraules. Cap no satisfeia Bernat, que esperava amb els braços creuats.</p>

<p>Quan el bruixot va quedar en silenci definitiu, Bernat va dir: «La confiança. Si confies en algú i li ho dius, la confiança creix entre vosaltres. Si te la guardes sol i no confies en ningú, la confiança se't mor a dintre i et quedes sol.»</p>

<p>El bruixot va quedar-se tan sorprès i tan desconcertat que no va dir res durant un llarg minut. Llavors va fer quelcom que ningú no esperava: va somriure. Un somriure autèntic, poc practicat, però real. «Fa molts anys que ningú no m'atura ni m'enfronta», va dir. «Has guanyat els dos torns. Els joves queden lliures. I jo... potser hauria de deixar aquesta pràctica i trobar una altra manera de relacionar-me amb el poble.»</p>

<p>Va ser el principi d'un acord estrany però durador entre el bruixot de la Roca Negra i el moliner Bernat. Un cop al mes, pujaven al cim de la muntanya a jugar a endevinalles, per pur plaer, i la vall del Molí va viure en pau des d'aleshores.</p>`

    id:11, emoji:'🌊', title:'El Pescador i el Peix d\'Or',
    tema:'Valors', tags:['mar','pescador','cobdícia','desitjos','contentament'],
    resum:'Un pescador allibera un peix màgic però la cobdícia de la seva dona ho destrueix tot.',
    text:`<p>A la vora d'un mar blau i profund, en una barraca de fusta que el vent salat havia anat polint i ennegrint al llarg dels anys, hi vivia un vell pescador de nom Andreu amb la seva dona Marta. Eren pobres d'aquella pobresa tranquil·la que no fa patir, que té sempre el pa suficient i la llenya per a l'hivern, però no molt més. Andreu estimava el mar amb tota l'ànima i Marta estimava Andreu, tot i que de vegades el renyava per ser massa tranquil i conformista.</p>

<p>Un matí d'agost, quan el sol ja pujava alt i la calma xifra havia deixat l'aigua com un mirall, Andreu va pescar amb l'ham un peix que brillava com si fos de metall daurat. No era un peix que havia vist mai: les escates eren d'un groc viu que captava la llum i la multiplicava, els ulls eren de color ambre i la boca, quan es va obrir, va produir paraules humanes.</p>

<p>«Pescador, t'ho demano, deixa'm tornar al mar. Soc un peix màgic i si em alliberes et concediré qualsevol desig que em demanis.» Andreu va mirar el peix un bon moment. Era prou vell i prou savi per saber que les ofertes massa bones acostumen a portar complicacions. Però el peix li semblava sincer, i a més li feia una mica de llàstima veure aquell ésser brillant fora de l'aigua. «Torna al mar», va dir. «No et demano res.» Va alliberar l'ham i el peix va desaparèixer a les profunditats deixant una estela d'escuma daurada.</p>

<p>Quan Andreu va tornar a casa sense pesca i va explicar la història a la Marta, ella va enrabiar-se. «Ets un beneit! Un peix màgic que et concedeix desitjos i tu el tornes al mar sense demanar res? Vés-hi ara mateix i demana-li una casa nova. Mira les parets d'aquesta!» Andreu va sospirara i va tornar a la riba.</p>

<p>Va cridar el peix des de la vora del mar. L'aigua va brillar i el peix va aparèixer. «La meva dona demana una casa nova.» El peix va dir que sí i va desaparèixer. Andreu va tornar a casa i on hi havia la barraca ara hi havia una casa de pedra amb teulada nova i jardí. Marta estava contenta... durant tres dies.</p>

<p>Al quart dia va dir que la casa era massa petita i necessitaven servents i terres. «Demana-li que ens faci rics.» Andreu va tornar al mar. L'aigua estava una mica menys clara que la primera vegada, però el peix va aparèixer i va concedir el desig. Van tenir una mansió gran, criats, terres i carrosses. Marta estava contenta... durant una setmana.</p>

<p>Llavors va dir que volia ser comtessa. Andreu, cada cop amb la panxa més ennuegada de preocupació, va tornar al mar. L'aigua era ara grisosa. El peix va aparèixer però la seva veu era menys càlida. Va concedir el desig. Van ser comtes d'un gran territori. Marta estava contenta... uns dies.</p>

<p>Volia ser reina. Andreu va anar al mar. L'aigua era quasi negra. El peix va trigar molt a aparèixer i quan ho va fer semblava cansat. Va concedir el desig en silenci. Marta va ser reina, amb corona i tot, i va regnar amb una mà de ferro que no havia mostrat mai fins llavors.</p>

<p>Però al cap d'un mes, Marta va cridar Andreu. «He pensat que no n'hi ha prou. Vull ser la senyora del mar. Que tots els peixos del món m'obedeixin.» Andreu va tancar els ulls. «Marta...» «Vés-hi.» Va anar al mar. L'aigua era negra com la nit i les onades eren altes i fredes. Va cridar el peix. Va trigar molt a aparèixer. Quan ho va fer, les seves escates havien perdut tota la lluentor.</p>

<p>El peix va mirar Andreu durant un llarg silenci. Andreu, amb vergonya, va exposar la darrera demanda de la seva dona. El peix va tancar els ulls. «Ha demanat prou», va dir simplement. I va desaparèixer. L'aigua va recuperar el seu color blau natural en qüestió de minuts. I quan Andreu va girar-se per tornar a casa, va veure que on hi havia hagut la mansió, el palau, les terres i els carrosses, ara hi havia la barraca vella de fusta negra, igual que el primer dia.</p>

<p>Marta estava asseguda al llindar amb el davantal brut i la cara vermella de ràbia. Andreu es va asseure al seu costat i van quedar-se un bon rato en silenci. Finalment Andreu va dir: «Sempre havíem tingut el necessari.» Marta va mirar el mar i va respondre: «Sí.» I aquesta vegada ho deia de veritat.</p>`
  },

    id:12, emoji:'🌾', title:'La Minyona i els Cigrons',
    tema:'Valors', tags:['minyona','cigrons','paciència','treball','terra'],
    resum:'Una minyona impacient aprèn el valor de la paciència cuidant un camp de cigrons.',
    text:`<p>En un mas de la plana central, enclavat entre camps de blat i oliverars centenaris, vivien la mare Rosalia i la seva filla Agnès. La Rosalia era una dona de pocques paraules i molts fets, que havia treballat la terra tota la vida i coneixia les seves lleis millor que ningú. L'Agnès, que tenia quinze anys i era llesta i activa, tenia la virtut de voler fer les coses bé però el defecte d'esperar els resultats immediats. Quan les coses no anaven tan ràpid com volia, s'impacienta i prenia decisions precipitades.</p>

<p>Aquella tardor, els cigrons eren l'esperança de la família. Havien plantat el camp a principis d'octubre, quan la terra era banyada per les pluges de setembre, i la mare havia dit que si la collita anava bé, podrien pagar el deute al moliner i encara sobrar alguna cosa. Però els cigrons tarden. No hi ha manera de fer-los créixer més ràpid del que la terra permet.</p>

<p>Agnès anava al camp cada dia. El primer dia va observar la terra sense res visible. El segon, el tercer, el quart. Res. «Mare, no creixin», va dir. «Estan creixent», va respondre la mare. «Però no es veuen!» «Estan creixent per sota.»</p>

<p>Al cap d'una setmana van aparèixer les primeres puntes verdes, fràgils com fils, que sortien de la terra fosca. L'Agnès es va animar. Cada dia anava a veure com havien crescut. Però els cigrons creixien lentament, amb una lentitud desesperant. Un dia l'Agnès va anar al camp i va trobar que unes llavors properes no havien sortit. Va decidir ajudar-les: va treure la terra al seu voltant amb les mans per donar-los aire.</p>

<p>La mare, quan va venir a inspeccionar el camp, va veure el que havia fet la filla. Sense cridar ni renyar, va agafar la mà de l'Agnès i la va portar fins als punts on havia remogut la terra. «Mira», va dir. Les plantes que l'Agnès havia "ajudat" estaven ara exposades i el fred de la nit les havia cremades. Estaven mortes. Les que no havia tocat estaven vives, amb la capa de terra que les protegia.</p>

<p>Agnès va sentir una punyada de culpa. «Ho he espatllat.» «Has aprés», va dir la mare. «La terra sap el que fa. El seu temps no és el nostre temps. Si poses la mà on no cal, trenques l'equilibri que ella ha creat.»</p>

<p>Van passar setmanes. El camp va créixer a poc a poc, i l'Agnès va aprendre a mirar sense tocar, a observar sense intervenir. Va aprendre a reconèixer els signes bons: quan la fulla era d'un verd intens, quan la tija era gruixuda, quan les raíces s'encarregaven soles. Va aprendre a regar just el necessari i a no excedir-se. Va aprendre que cavar la terra al voltant ajudava, però que remoure-la excessivament la danyava.</p>

<p>Un vell llaurador que passava cada tarda amb el seu mul va observar la noia dia rere dia. Una tarda va aturar el mul i va dir: «Noia, he vist molts joves que venen al camp. La majoria duren poc. Tu fas dos mesos venint cada dia sense saltar-te ni un. Saps per qué és important?» Agnès va pensar. «Perquè la planta ho necessita.» «No», va dir el vell. «Perquè tu ho necessites. La planta creix sola. Però l'home que aprèn a respectar el temps de la terra, aquest aprèn a respectar el temps de tot: el temps que tarden les coses bones a arribar, el temps que necessita la gent per canviar, el temps que necessita un error per convertir-se en saviesa.»</p>

<p>Quan van arribar les primeres gelades de desembre, el camp de cigrons era ple i robust. La collita va ser excel·lent, la millor en anys. Van pagar el deute, van guardar llavor per a l'any que ve i van tenir cigrons per a tot l'hivern. La mare va cuinar el primer caldo de cigrons de la temporada i mentre menjaven al voltant del foc, va mirar la seva filla i va veure que havia canviat alguna cosa a la seva manera de moure's i mirar les coses. Havia après, de la terra i dels cigrons, que les coses que valen la pena necessiten temps.</p>`
  },

    id:13, emoji:'🌳', title:'El Gegant Egoista',
    tema:'Valors', tags:['gegant','jardí','nens','generositat','primavera'],
    resum:'Un gegant tanca el seu jardí als nens i la primavera no hi torna fins que aprèn a compartir.',
    text:`<p>Al final d'un carrer llarg i empedrat d'un poblet de muntanya hi havia el jardí més meravellós de tota la comarca. Era un jardí enorme, rere una paret alta de pedra grisa, i tot i que la paret era massa alta per veure-hi des de fora, la fragància que en sortia a la primavera omplia tot el carrer d'una dolçor que feia aturar els passants i alçar el cap aspirant l'aire amb els ulls tancats.</p>

<p>El jardí pertanyia al Gegant, un ésser enorme que havia construït la paret i la casa feia tants anys que ningú no recordava quan. El Gegant era vell i solitari, però no era malèvol per naturalesa: simplement havia crescut amb la idea que el que és seu és seu i no cal compartir-ho amb ningú. Solia estar de viatge molt sovint, visitant un ogre amic que vivia al Cornualla, i quan no hi era el jardí quedava sol i en silenci.</p>

<p>Durant les seves absències llargues, els nens del poble havien descobert que hi havia un racó de la paret on dues pedres estaven una mica separades, just prou per que un nen prim pogués ficar-s'hi. El jardí era el seu paradís secret: arbres altíssims de pomers, pruna i cireres, gespes de vellut verd, fonts petites que rarejaven entre les roques, racons ombrívols sota les bardisses. Jugaven durant hores i tornaven a casa amb les galtes vermelles i les butxaques plenes de fruita.</p>

<p>Un dia de tardor, el Gegant va tornar del Cornualla. Va entrar al jardí i va trobar-hi els nens. Va pegar un crit que va fer tremolar les fulles de tots els arbres. «Fora d'aquí! Fora immediatament! Això és propietat privada!» Els nens van fugir corrent pel forat de la paret i van desaparèixer pels carrers del poble. El Gegant va tancar el forat amb pedres i ciment, va posar una porta de ferro a l'entrada principal amb un pany enorme, i va posar un rètol: PROHIBIT L'ACCÉS. PROPIETAT DEL GEGANT. ELS INTRUSOS SERAN PERSEGUITS.</p>

<p>L'hivern va arribar aquell any com sempre, amb neu i fred. Però quan va arribar la primavera, alguna cosa estranya va passar: la primavera no va entrar al jardí del Gegant. Mentre a tot el poble les cireres floreixen i les herbes reverdien, al jardí del Gegant tot continuava cobert de neu i gel. Els ocells no s'hi aturaven, les flors no sortien, els arbres no treuien fulles. Era com si el temps s'hagués aturat en aquell rectangle de paret alta.</p>

<p>L'estiu va venir i va anar, i la tardor, i l'hivern... i el jardí del Gegant continuava igual, fred i mut. El Gegant mirava el seu jardí i sentia una fredor dins el pit que no sabia com explicar. Havia tingut el seu jardí per a ell sol com sempre havia volgut, però el jardí no era el mateix jardí. La bellesa havia desaparegut.</p>

<p>Un matí d'hivern, el Gegant va despertar-se amb un so que no havia sentit en molt de temps: un ocell cantava. Va mirar per la finestra i va veure quelcom increïble: en un racó del jardí, just al peu d'un vell pruner, un nen petit havia aconseguit ficar-se per un forat que no havia vist. Estava plantat al mig de la neu, però al seu voltant, de manera inexplicable, les herbes eren verdes i el pruner tenia brots rosats.</p>

<p>El Gegant va sortir al jardí. Normalment hauria cridat al nen perquè marxés. Però quelcom el va aturar: la manera com el nen estava plantat al mig de la neu sense por, la manera com les plantes creixien al seu voltant, la llum que semblava emanar d'aquell petit cos. Es va acostar lentament. El nen va alçar el cap i el va mirar amb uns ulls clars i sense por.</p>

<p>El Gegant va tenir una revelació sobtada, una d'aquelles comprensions que arriben de cop i que un cop les has tingut no pots desferse'n: el jardí havia estat bonic quan els nens hi jugaven. La seva rialles i les seves corredisses eren el que donaven vida a aquell lloc. Sense ells, era simplement un rectangle de vegetació morta rere una paret alta.</p>

<p>Va agafar el nen amb una mà enorme i el va aixecar fins als seus ulls. El nen no va plorar. El Gegant va dir, amb una veu que havia oblidat com s'usava per dir coses amables: «Vols jugar aquí?» El nen va dir que sí amb el cap. El Gegant el va tornar a posar al terra i va anar a buscar el martell.</p>

<p>Va tirar el rètol, va arrancar la porta de ferro, va omplir de ciment el pany i va fer caure trossos de la paret fins que l'entrada era prou gran per a tot un grup de nens. Aquella tarda, quan els nens del poble van veure la paret parcialment enderrocada, van entrar amb precaució. I el jardí, com si hagués esperat aquell moment, va florir sencer en qüestió d'hores.</p>

<p>Des d'aleshores, el jardí del Gegant va ser el jardí de tots. El Gegant aprengué a estimar el soroll dels nens que jugaven, i els nens aprengueren a estimar aquell vell gegant que els explicava els noms de totes les plantes i sabia on nidificaven els ocells. I la primavera, des d'aleshores, mai no va saltar-se aquell jardí.</p>`
  },
