    id:57, emoji:'🏺', title:'La Gerra d\'Oli de la Vídua',
    tema:'Valors', tags:['vídua','gerra','miracle','fe','generositat'],
    resum:'Una vídua pobra amb una sola gerra d\'oli experimenta un miracle de multiplicació.',
    text:`<p>En un temps de gran necessitat, en un poble de les terres baixes del Mediterrani antic, hi havia una vídua de nom Miriam que vivia amb els seus dos fills en una casa petita de pedra calcària. El seu marit havia sigut un home bo que havia mort deixant un deute considerable: havia demanat prestades moltes monedes per fer créixer el negoci familiar, i la mort l'havia sorprès abans de poder tornar-les.</p>

<p>El creditor, un mercader del poble de nom Donat, era un home de negocis que no entenia de sentiment: el deute era el deute, i si Miriam no podia pagar, s'emportaria els fills com a esclaus a treballar a les seves terres fins que la suma quedés saldada. Era la llei. Era terriblement injust, però era la llei.</p>

<p>Miriam havia intentat tot el que sabia: havia venut les joies que tenia, havia treballat de cosidora fins que els dits li havien sagnat, havia demanat als veïns ajuda que ells mateixos no tenien. I en un matí de tardor, mig mes abans del termini, es va trobar amb l'única cosa que li quedava: una gerra petita de terracuita, la meitat plena d'oli d'oliva. Oli bo, premsa pròpia, però una sola gerra petita.</p>

<p>Va anar a demanar consell al profeta Eliseu, un home de gran edat i poca aparença que vivia a les afores del poble i que la gent consultava quan no sabia a qui acudir. Eliseu la va escoltar en silenci. Va preguntar: «Qué tens a casa?» «Res, excepte mig gerra d'oli.»</p>

<p>El profeta va dir quelcom que Miriam va trobar completament desconcertant: «Vés a demanar a totes les teves veïnes i amigues totes les gerres buides que tinguin. Quantes més millor. Porta-les a casa, tanca la porta, i aboca el teu oli a cada gerra.»</p>

<p>Miriam el va mirar. Tenia ganes de dir que aquell consell era absurd, que mig gerra d'oli no pot omplir deu gerres ni vint. Però la desesperació la va fer obedient: quan no saps qué fer, proves el que et diuen. Va anar de casa en casa i les veïnes, que eren bones persones, li van donar les gerres que tenien: una gran, dues mitjanes, cinc petites, tres de formes irregulars. Va reunir-les totes al seu pati.</p>

<p>Va tancar la porta i es va quedar a soles amb els fills i les gerres. Va agafar la seva gerra mig plena d'oli i va abocar al primera gerra gran. L'oli va caure en un fil prim, com sempre. Va continuar abocant. La gerra es va omplir. Va aixecar la seva i la hi calia al seu interior: seguia havent-n'hi. Va abocar a la segona. Es va omplir. A la tercera. A la quarta. A la cinquena.</p>

<p>Els fills miraven en silenci. Miriam abocava i abocava i l'oli no s'acabava. No sabia per qué passava aquella cosa impossible, però no s'aturava: continuava abocant. Gerra per gerra, totes van quedar plenes. Quan va arribar a l'última, l'oli de la seva gerra original va quedar just al nivell de la meitat, exactament com al principi.</p>

<p>«Vine», va dir el fill gran, que havia estat comptant. «Tenim quaranta gerres plenes d'oli.» Miriam va asseure's al terra de la cuina i va plorar un bon rato sense saber si era d'alegria o de por o de meravella.</p>

<p>L'oli de quaranta gerres, venut al mercat, va ser suficient per pagar tot el deute i tenir prou per menjar durant mesos. I Miriam va guardar sempre aquella gerra de terracuita com la cosa més preuada que tenia, no perquè valgués diners, sinó perquè li recordava que quan arribes al límit del que pots fer i continues confiant, de vegades passa quelcom que no es pot explicar però que és absolutament real.</p>`

    id:58, emoji:'🔮', title:'La Pilota de Cristall',
    tema:'Màgia', tags:['pilota de cristall','princesa','tres fills','bruixa','alliberar'],
    resum:'Tres germans busquen la pilota de cristall per alliberar una princesa encantada.',
    text:`<p>Al regne de les Terres Altes, la gent parlava d'una fada malèfica que havia convertit la princesa Clàudia en un gat i la tenia captiva en un castell encantat a les muntanyes del nord. La fada no era malèvola per naturalesa, sinó per orgull ferit: la princesa li havia dit una veritat que no volia sentir i la fada, en lloc d'acceptar-la, havia decidit que la princesa havia de pagar. La llegenda deia que per alliberar-la calia trobar la Pilota de Cristall i deixar-la caure als peus del gat.</p>

<p>Tres fills d'un senyor de les terres baixes van decidir buscar la Pilota de Cristall. Els dos grans eren forts, ben armats i confiats. El petit, en Miquel, era el menys impressionant dels tres: d'estatura normal, sense habilitats especials reconegudes, però amb una paciència i una observació del món que els seus germans trobaven excessiva. «Per qué mires tant les coses?» li deien. «Perquè moltes coses s'entenen mirant», responia ell.</p>

<p>Els tres van separar-se quan el camí es dividia en tres. El gran va prendre el camí de la montanya i va trobar-hi la fada disfressada de vella. Quan no va acceptar pagar-li el peatge que ella demanava, la fada el va transformar en àliga. El segon va prendre el camí del mar i quan la fada disfressada de pescadora li va demanar que li donés el menjar que portava, i ell es va negar, va ser transformat en balena.</p>

<p>En Miquel va prendre el camí del mig, que no portava a cap lloc conegut. Caminava i caminava per una terra de roures antics i silenci profund. Passaven dies i no trobava el castell. Però en lloc de desesperarse, s'aturava, observava, aprenia: aprenia a llegir les petjades dels animals al fang per saber quins havien passat, aprenia a reconèixer les herbes pels seus olors, aprenia a trobar l'aigua seguint els ocells.</p>

<p>Un matí va trobar dos gegants que es barallaven cridant i empenyent-se al mig d'un prat. Al terra havia un barret negre. En Miquel va esperar que s'aturin. «Per qué us baralleu?» «Per aquell barret», va dir un. «Qui se'l posa pot anar a qualsevol lloc només pensant-hi.» «I com el dec repartir?» va dir en Miquel. «Fàcil: jo em quedo el barret i cap dels dos no ha de decidir.» Mentre els gegants digerien el raonament, en Miquel es va posar el barret i va pensar: «Al castell de la fada.»</p>

<p>Va aparèixer al pati del castell d'un moment a l'altre. El castell era fred i silenciós. Al saló principal hi havia un gat gran de pèl gris que el va mirar amb ulls que tenien massa intel·ligència per ser simplement d'un gat. En Miquel va buscar la Pilota de Cristall a totes les cambres del castell fins que la va trobar tancada en un cofre d'ivori. La va agafar i va tornar al saló.</p>

<p>Va deixar caure la Pilota de Cristall als peus del gat. La sala es va omplir de llum. On havia hagut un gat hi havia una noia jove amb ulls grisos i una expressió de qui acaba de despertar d'un son molt llarg. La fada, en algun lloc del castell, va fer un crit i va desaparèixer: l'encanteri trencat la privava del poder que havia usat malament.</p>

<p>En Miquel va buscar els seus dos germans, que eren àliga i balena en algun lloc del món. El barret màgic el va portar fins a ells i les paraules de la princesa alliberada, que tenia el poder de trencar encanteries de la fada, els van retornar la forma humana. Van tornar tots junts a casa. I en Miquel, que tothom havia considerat el menys impressionant dels tres, havia sigut l'únic que havia aconseguit el que tots tres havien intentat.</p>`

    id:59, emoji:'🐟', title:'El Peix de les Tres Espines',
    tema:'Enginy', tags:['peix','espines','desitjos','pesca','generositat'],
    resum:'Un pescador allibera un peix màgic que li concedeix tres desitjos a canvi de la llibertat.',
    text:`<p>Andreu pescava des dels disset anys i en tenia quaranta-quatre. Coneixia el mar de la seva costa com el palmell de la mà: sabia on hi havia les roques perilloses, sabia com canviava el color de l'aigua quan s'acostava una tempesta, sabia en quina lluna es feien millors les captures i en quina el mar era avars. Però aquella tardor havia sigut difícil: la pesca era escassa, les xarxes tornaven gairebé buides i a casa hi havia tres fills i una dona que esperaven que el pare tornés amb menjar.</p>

<p>Un dimecres de novembre, quan el sol ja baixava i Andreu estava a punt de recollir les xarxes per tornar a terra amb les mans gairebé buides, va notar que la xarxa pesava diferent de com havia pesat els últims dies. No era un pes de peixos: era un pes singular, com si hi hagués una pedra grossa, però en moviment. Va tirar la xarxa a coberta i va quedar quiet.</p>

<p>El peix era enorme, tant com el seu braç des de l'espatlla fins a la punta dels dits, i tenia les escates d'un gris verdós que semblava canviar de tonalitat a mesura que la llum li donava des de diferents angles. Però el que el feia absolutament diferent eren tres espines a l'esquena: no les espines normals dels peixos, sinó tres puntes dretes, brillants, daurades com si fossin de metall precís.</p>

<p>Andreu l'estava observant quan el peix va obrir la boca. I d'aquella boca va sortir, per primera vegada en la vida d'Andreu, la veu d'un peix: «Pescador. Torna'm al mar i et concediré un desig per cada espina daurada.»</p>

<p>Andreu va seure lentament a la banca de la barca. Tenia la conversa amb el peix que havia imaginat moltes vegades: seria una d'aquelles situacions en que la gent demana riqueses o poder. Però ara que el tenia davant, va adonar-se que el que necessitava era quelcom diferent.</p>

<p>Va agafar el peix amb les dues mans, el va portar a la vora de la barca i el va tornar al mar. «Torno't sense condicions», va dir. «El que necessito no es pot comprar.» El peix va submergir-se i Andreu va quedar mirant l'onada que havia deixat. Al cap d'un minut, el peix va tornar a la superfície.</p>

<p>«Has dit el que necessites no es pot comprar», va dir el peix. «Explica'm.» Andreu va pensar un moment. «Necessito que els meus fills creixin sans i bons. Necessito que la meva dona no pateixi. Necessito tenir prou per a la família sense que en falti mai.» El peix el va mirar un instant. «Tres desitjos, tres espines. Et concedeixo els tres.» Va saltar tres vegades i cada vegada deixava caure una espina daurada a la barca.</p>

<p>Van brillar un instant i van desaparèixer. Andreu va recollir les xarxes i va tornar a terra. La pesca d'aquell dia havia sigut miserable. Però quan va arribar a casa, la seva dona tenia un somriure que feia dies que no veia, els fills estaven jugant al pati amb aquella energia que es perd quan la preocupació pesa massa, i a la cuina hi havia un olor de guisat que feia anys que no s'havia produït.</p>

<p>«Tinc bones notícies», va dir la seva dona. «M'han ofert feina a l'hostal del port. Buena feina, bon sou.» Andreu va asseure's a la cadira de la cuina i va recordar les tres espines daurades. Va somriure. Les coses bones sovint arriben d'una manera que no semblava tan directa com esperaves, però arriben.</p>`
  },

    id:60, emoji:'🌙', title:'El Príncep dels Estels',
    tema:'Màgia', tags:['estel','príncep','planeta petit','amor','responsabilitat'],
    resum:'Un petit príncep que viu en un planeta minúscul i aprèn el valor de les coses estimades.',
    text:`<p>En un planeta tan petit que en tres passos en feies la volta, tan petit que quan s'asseia a veure la posta de sol havia de moure la cadira contínuament per seguir la llum, hi vivia un príncep tot sol. El seu planeta tenia tres volcans, dos d'apagats i un d'actiu que el príncep netejava cada matí perquè no s'embarrés i deixés d'escalfar, i tenia una rosa.</p>

<p>La rosa era l'única rose del seu planeta, potser de l'univers, i era molt presumida i molt exigent i molt dramàtica: demanava que la protegissin del vent amb un paravent de vidre, que li posessin l'aigua just a la temperatura adequada, que li expliquessin si era la rosa més bonica que existia. El príncep feia tot el que demanava, però de vegades sentia que no podia respirar, que el planeta era massa petit i la rosa era massa gran a dintre seu.</p>

<p>Va decidir marxar. Va agafar bandades de cigonyes migratòries que passaven pel seu planeta i va viatjar per l'univers. Va visitar un rei que regnava sobre un planeta on no hi havia ningú a qui regnar i que malgrat tot es creia el sobirà de tot l'univers. Va visitar un vanidós que volia que tothom l'admirés però que estava tan sol que no hi havia ningú que pogués admirar-lo. Va visitar un borratxo que bevia per oblidar que bebia.</p>

<p>Tots eren infeliços d'una manera particular que el príncep no acabava d'entendre. Fins que va arribar a la Terra i va trobar una guineu en un camp de blat.</p>

<p>«Juga amb mi», va demanar el príncep. «No puc», va dir la guineu. «No estem domesticats l'un a l'altre.» «Qué vol dir domesticar?» La guineu va explicar-li: «Vol dir crear llaços. Si em domestiques, seré única per a tu al món. Seré la teva guineu. I tu seràs únic per a mi: el meu príncep. Però demana paciència: primer t'asseus lluny i et vaig acostant dia a dia.»</p>

<p>Van fer-ho. I el príncep va aprendre quelcom mentre s'hi acostava a poc a poc: que la rosa del seu planeta era especial no perquè fos objectivament la rosa més bonica de l'univers, sinó perquè era la seva rosa, la que havia cuidat, la que havia protegit del vent, la que havia donat l'aigua. L'estimació que hi havia posat la feia única.</p>

<p>«Hom és responsable del que ha domesticat», va dir la guineu el dia que es va acomiadar. «La teva rosa és teva, no perquè et pertanyi, sinó perquè has invertit temps i cura en ella. Torna al teu planeta.»</p>

<p>El príncep va tornar. La rosa l'esperava, coberta amb el seu paravent de vidre, orgullosa i dramàtica com sempre. El príncep la va mirar amb uns ulls nous: no com una càrrega, sinó com quelcom que depenia d'ell i que ell estimava de debò. «Et cuido perquè t'estimo», va dir en veu alta per primera vegada. La rosa, per primera vegada en molt de temps, no va dir res. Va obrir un pètal més i va brillar una mica més al sol del petit planeta.</p>`
  },
{
    id:61, emoji:'🦊', title:'La Guineu i les Uves',
    tema:'Valors', tags:['guineu','uves','orgull','excuses','honradesa'],
    resum:'Una guineu que no pot arribar a les uves i inventa excuses per no admetre el fracàs.',
    text:`<p>Al final de l'estiu, quan els raïms penjaven de les parres carregats i madurs i l'olor de la verema impregnava tots els camins de la comarca, la guineu Mireia va descobrir un cep que havia crescut recolzat a la paret d'un mas abandonat. Les parres s'enfilaven per la pedra fins a una alçada considerable, i els raïms que penjaven de les branques altes eren els més grossos i perfectes que havia vist en la seva vida: grans com olives, d'un violeta fosc i brillant que prometia una dolçor extraordinaria.</p>

<p>La guineu Mireia era coneguda a tota la comarca per la seva elegància i el seu orgull. Caminava sempre amb el cap alt i la cua dreta, i li agradava que els altres animals la veiessin com un ésser superior, intel·ligent i capaç. Quan passava per un lloc, s'assegurava que la seva presència es notés. Quan feia alguna cosa bé, s'encarregava que tothom ho saphués. I quan alguna cosa no li sortia com volia... bé, aquella era la part complicada.</p>

<p>Va saltar. Els raïms eren massa amunt. Va tornar a saltar, més fort. Tampoc. Va provar des d'un angle diferent. Res. Va buscar una pedra per posar-hi els peus al damunt i saltar des de més amunt. Des de la pedra, els raïms quedaven a uns centímetres de les seves potes. Va saltar cinc vegades des de la pedra. En la cinquena va quasi tocar-los, però els raïms van bellugar-se i van tornar a quedar fora del seu abast.</p>

<p>A l'altra banda del camí, el conill Bernat l'havia estat observant tot el temps amb aquella paciència que tenen els animals que no tenen res urgent a fer. La guineu el va veure i es va aturar. La situació era compromesa: havia sigut observada fracassant repetidament, que era exactament el tipus de situació que Mireia detestava.</p>

<p>Va fer quelcom que feia molt bé quan les circumstàncies ho requerien: va compondre una expressió de serenitat total, com si allò que havia estat fent fos completament voluntari i no tingués res a veure amb el fracàs. Va mirar els raïms un moment, va fer un gest despreocupat amb la cua i va dir, en veu prou alta perquè el conill ho sentís: «Total, segur que estan agres. Probablement no han madurat bé. No valia la pena l'esforç.»</p>

<p>Va girar-se per marxar amb la dignitat intacta. Però la veu del conill Bernat la va aturar: «Guineu Mireia, fa cinc minuts que us salto observant des d'aquí. I els raïms semblen perfectament madurs des d'on soc.» La guineu es va aturar sense girar-se. «A més», va continuar el conill amb una veu completament neutral, sense cap to de burla, «si volíeu arribar-hi, potser podíeu demanar ajuda. Jo soc petit però soc àgil, i potser junts ho haguéssim aconseguit.»</p>

<p>Mireia va quedar-se quieta un moment. Havia dues maneres de respondre: podia continuar amb l'excusa dels raïms agres i marxar, salvant l'aparença però perdent quelcom; o podia dir la veritat. La veritat era incòmoda, però el conill ja l'havia vista saltar i ja sabia el que havia passat. L'excusa no enganyava ningú.</p>

<p>Es va girar lentament. «Tens raó», va dir, i les paraules li van costar perquè no estava acostumada a dir-les. «No hi podia arribar. I la excusa dels raïms agres era una estupidesa.» El conill va somriure lleugerament. «Voleu que ho provem junts?» Van provar. El conill va saltar a les espatlles de la guineu, que s'havia posat a prop de la paret, i des d'allà va poder arribar als raïms. Van caure un raïm sencer.</p>

<p>Eren dolços. Extraordinàriament dolços, tal com prometia el seu color. Van menjar-ne la meitat cadascun asseguts a l'ombra de la paret. I la guineu Mireia va aprendre aquell dia que admetre un límit propi no t'allunya de la dignitat: t'hi acosta. Perquè la dignitat real no és mai caure, sinó la manera com t'aixeques.</p>`

    text:`<p>En una ciutat de les terres de Pèrsia, enmig dels carrers sorollosos i perfumats dels mercats d'espècies, vivien dos germans de caràcter completament diferent. El gran, en Cassim, havia tingut sort en els negocis i era un home ric, respectat i satisfet de si mateix. El petit, en Ali Babà, era un llenyataire humil que es guanyava la vida portant llenya al mercat, vivia en una casa modesta amb la seva dona i tenia poques possessions però un caràcter tranquil i un ull agut per observar el que passava al seu voltant.</p>

<p>Un dia que Ali Babà tallava llenya al bosc de les afores, va sentir el soroll de molts cavalls que s'acostaven. Prudent per naturalesa, va enfilar-se ràpidament a un arbre i es va quedar quiet entre les branques. Va veure passar sota seu una colla de quaranta homes a cavall, armats i carregats amb sacs pesants. El seu aspecte no deixava dubte: eren bandits.</p>

<p>Els homes van aturar-se davant d'un penya-segat de roca que Ali Babà havia vist centenars de vegades sense trobar-hi res especial. El cap del grup, un home gran amb la barba negra i els ulls com carbons vius, va avançar fins a la roca i va cridar amb veu potent: «Obre't, Sèsam!»</p>

<p>La roca es va moure. Una porta invisible va aparèixer i s'obrí revelant una entrada fosca cap a l'interior de la muntanya. Els quaranta lladres van entrar amb els seus cavalls i els seus sacs, i al cap d'una bona estona van sortir amb els sacs buits i cares satisfetes. El cap va dir «Tanca't, Sèsam» i la porta va desaparèixer de nou. Van marxar al galop.</p>

<p>Ali Babà va esperar fins que no se sentien els cascos. Llavors va baixar de l'arbre, es va acostar a la roca, i amb el cor bategant fort va dir: «Obre't, Sèsam.» La porta es va obrir. Va entrar.</p>

<p>L'interior de la cova era immens i il·luminat per una llum que semblava venir de les pròpies pedres. Pertot arreu: or. Monedes d'or en sacs i en munts lliures. Joies. Teles de seda i brocats. Pells precioses. Els lladres hi havien guardat dècades de pillatges. Ali Babà va omplir tres sacs de roba amb monedes d'or, va carregar-los sobre els ases, va sortir de la cova i va dir «Tanca't, Sèsam».</p>

<p>Va tornar a casa, va amagar l'or sota terra al pati i va explicar tot a la seva dona. Ella, excitada i una mica nerviosa, va anar a demanar la balança a la cunyada per mesurar l'or. La cunyada, curiosa, va untar el fons de la balança amb cera. Quan va tornar, al fons hi havia enganxada una moneda d'or. Va córrer a explicar-ho al seu marit Cassim.</p>

<p>Cassim va anar immediatament a trobar Ali Babà i, amb amenaces i promeses, li va treure el secret. L'endemà al matí molt d'hora, Cassim va anar a la cova. Va entrar. Va quedar bocabadat davant de les riqueses. Va omplir deu sacs, vint, els va preparar tots. Però quan va voler sortir, l'emoció li havia borrat de la memòria la paraula màgica. Va dir «Obre't, blat!» «Obre't, ordi!» «Obre't, arròs!» Totes les cereales que coneixia, però cap no era la paraula adequada.</p>

<p>Quan els quaranta lladres van tornar i el van trobar a dins, la seva sort va ser la d'un home que havia volgut massa i havia oblidat allò essencial.</p>

<p>Ali Babà, que havia anat a buscar el seu germà en no tornar, va trobar la situació i va haver de resoldre-la amb l'ajuda de la seva criada Mardana, una dona de caràcter fort i ments àgil. Mardana va descobrir el pla de venjança del cap dels lladres, que es disfressà de mercader d'oli per entrar a la casa. Va examinar les gerres que portava i va trobar que en lloc d'oli contenien homes armats esperant el senyal de nit.</p>

<p>Mardana va actuar amb serenitat i decisió. Al vespre, va ballar davant del cap disfressat de mercader amb un ganivet a les mans, com a espectacle, i quan va ser prou prop va fer el que havia de fer. Aquella nit, els homes de les gerres van descobrir que el pla havia fallat.</p>

<p>Ali Babà, en agraïment, va alliberar Mardana i li va donar una part de les riqueses de la cova. Va viure la resta de la seva vida amb prudència i generositat, compartint la seva fortuna sense ostentació, recordant sempre que el secret de la cova havia sigut per a ell un do, no un dret.</p>`

    resum:'La reina dels contes que salva la seva vida i la de moltes altres explicant contes nit rere nit.',
    text:`<p>Al palau d'un gran sultanat de les terres orientals, hi havia un sultà que havia sigut ferit profundament per una traïció i que havia deixat que aquella ferida es convertís en verí. El sultà Xahrayar havia estimat i confiat i havia sigut enganyat, i en lloc de sanar la ferida havia decidit que el món mereixia el seu ressentiment. Cada nit prenia una nova esposa i cada matí la feia executar, convençut que d'aquesta manera ningú no tindria mai l'oportunitat de trair-lo de nou. Era una lògica terrible, però la lògica del dolor rarament és saludable.</p>

<p>El visir del sultà, que era l'encarregat d'anar buscant les noies, sofria cada vegada que havia de complir aquella ordre. Tenia dues filles: Xerazade, la gran, que havia llegit tots els llibres de la biblioteca del palau i tenia una memòria extraordinaria i un talent per explicar que feia que fins les pedres semblessin que l'escoltaven; i Dunyazade, la petita, que era simple i bona i estimava la seva germana com a la seva pròpia vida.</p>

<p>Xerazade va dir al seu pare que volia casar-se amb el sultà. El visir va pal·lidir. «Et moriràs com les altres.» «O el canviaré», va respondre Xerazade. «Deixa'm provar.» El visir va acceptar, amb el cor trencat per endavant.</p>

<p>La nit de noces, quan el sultà ja dormia i Xerazade estava desperta al seu costat, va demanar permís per acomiadar-se de la seva germana. La Dunyazade va venir i, com havien acordat, va demanar: «Germana, explica'm un conte per passar la nit.» El sultà, que no dormia del tot, va obrir els ulls. «Un conte?» «Si el sultà ho permet», va dir Xerazade amb una veu que tenia la qualitat particular de les veus que saben que allò que diuen importa.</p>

<p>El sultà va fer un gest d'assentiment. I Xerazade va començar.</p>

<p>Va explicar la historia d'un mercader i un geni, i la historia era tan plena de girs i personatges i mistèris que quan l'alba va arribar el sultà estava completament absorbit. «Com acaba?» va preguntar. «Us ho explicaré demà a la nit, si el sultà em permet viure un dia més.» El sultà va fer un gest. «Visqueu.»</p>

<p>Aquella nit Xerazade va reprendre el conte del mercader i el geni, però al mig va encadenar-hi un altre conte, i dins d'aquell altre n'hi havia un altre. Contes dins de contes dins de contes, com les capses russes, de manera que quan el fil principal semblava a punt d'acabar, n'apareixia un altre que l'allargava. I quan l'alba tornava, sempre quedava quelcom per saber.</p>

<p>Nit rere nit, el sultà va escoltar. Va escoltar la historia de Sinbad el Mariner i les seves set aventures. Va escoltar Ali Babà i els quaranta lladres. Va escoltar la història de la llàmpada màgica i el jove Aladí. Va escoltar histories d'amor i de venjança i de saviesa i de bogeria, histories de peixos que parlaven i de déus que baixaven a la terra i de genies tancats en ampolles que navegaven els mars durant segles.</p>

<p>I mentre escoltava, quelcom anava canviant al sultà. No de cop, sinó lentament, com canvia una roca sota l'acció continuada de l'aigua: les histories li mostraven el món des de perspectivas que ell no havia considerat. Li mostraven que la gent que havia cregut enemiga tenia raons que ell no coneixia. Li mostraven que la traïció que l'havia ferit era un acte humà, no la prova que tot el món era traïdor.</p>

<p>Quan van arribar a la nit mil i una, Xerazade va aturar el conte i va esperar. El sultà va quedar en silenci un moment llarg. Llavors va dir: «No necessito que continuïs. He après el que necessitava aprendre.» Va cridar el visir. «Tinc una esposa que és la dona més sàvia que he conegut. I teniu una filla de la qual podeu estar molt orgullós.»</p>

<p>Xerazade havia guanyat. No amb armes ni amb poder, sinó amb el que sempre ha sigut la força més gran del món: la capacitat de contar una historia que fa que l'altre es vegi a si mateix d'una manera nova.</p>`

    resum:'Un mico astut escapa d\'un cocodril que el volia menjar amb un engany intel·ligent.',
    text:`<p>A les ribes d'un riu gran i lent que travessava una selva antiga, hi havia una figuera que tenia les arrels enfilades a la riba i les branques esteses sobre l'aigua. El mico Simó havia triat aquell arbre com a casa seva no per casualitat: era el millor lloc del riu per a un mico, amb fruita abundant tot l'any, ombra fresqueta a migdia i una visió excel·lent de tot el que passava a l'aigua i a la riba.</p>

<p>El cocodril Dragot vivia al fons del riu, just sota la figuera. No era un mal cocodril en el sentit filosòfic, però era un cocodril, i els cocodrils necessiten menjar, i un mico gras de figues és un àpat considerable. El problema era com arribar-hi: el mico mai no baixava a l'aigua, i el cocodril no podia enfilar-se a l'arbre.</p>

<p>Dragot va decidir que la solució era l'amistat. Va començar a aparèixer a la riba cada tarda i a parlar amb el Simó. Al principi el mico el mirava amb recança, però el cocodril era pacient i amable i parlava de coses interessants: de les corrents del riu, dels peixos que havia vist, de les aus que nidificaven a les canyisseres. El Simó, que era curiós i sociable, va acabar per trobar el cocodril una companyia agradable.</p>

<p>Van fer-se amics, o allò que el cocodril entenia per amistat. Simó llençava figues a l'aigua i Dragot les agafava al vol. Dragot explicava les seves aventures al fons del riu i Simó escoltava fascinat. Passaven les tardes junts a la riba, un a l'aigua i l'altre a les branques, conversant.</p>

<p>Un dia, el cocodril va anar a casa seva al fons del riu i va trobar la seva mare esperant-lo amb un aspecte poc saludable. «Fill», va dir la mare cocodril, «estic malalta i el metge del riu diu que l'únic que em pot curar és el cor d'un mico. Necessites portar-me el cor del teu amic.»</p>

<p>Dragot es va trobar en un conflicte que no esperava: entre la mare i l'amic. Va pensar molt. I al final, la lògica del cocodril va guanyar: la mare era la mare. Va tornar a la riba i va dir al Simó: «Amic, la meva mare vol conèixer-te. Vols venir a casa meva al fons del riu? Puja a la meva esquena que t'hi porto.»</p>

<p>El Simó va hesitar. Pujar a l'esquena d'un cocodril i entrar al riu era exactament el tipus de cosa que un mico prudent no fa mai. Però Dragot era el seu amic, i els amics confien els uns en els altres. Va pujar.</p>

<p>Quan eren a mig riu, el cocodril va dir: «Simó, et dec una explicació. La meva mare necessita el teu cor per curar-se. Ho sento.» El Simó va quedar un moment en silenci mentre el riu passava als seus costats. Llavors va dir quelcom que el cocodril no esperava: «Oh, quina llàstima! M'ho havies de dir abans!» «Per qué?» «Perquè el cor el deixo sempre penjat a la figuera. Soc un mico molt ordenat. Torna'm a l'arbre i el recollim.»</p>

<p>El cocodril, que no era el més intel·ligent dels animals del riu, va girar i va tornar a la riba. Quan van arribar a la figuera, el Simó va saltar a la branca més ràpidament del que havia fet mai en la seva vida i va enfilar-se fins a la copa. Des de dalt va mirar el cocodril.</p>

<p>«Dragot», va dir, «has de saber dues coses. Primera: els micos no podem treure el cor i penjar-lo als arbres. Segunda: no podré ser mai més el teu amic, perquè m'has demostrat que la teva amistat tenia un preu que jo no sabia. Espero que la teva mare es recuperi d'una altra manera.» Va desaparèixer entre les branques.</p>

<p>El cocodril Dragot va quedar a la riba mirant l'arbre. Havia perdut el dinar i havia perdut l'amic. Va entendre, potser per primera vegada, que l'amistat que es fa amb un propòsit ocult no és amistat: és una trampa, i les trampes sempre s'acaben tornant contra qui les ha posat.</p>`

    text:`<p>En el Japó antic, quan els bambusars cobrien les muntanyes i els vells sabien llegir el futur en el vol dels ocells, hi havia un vell tallador de bambú de nom Sanuki no Miyakko que havia passat la seva vida treballant els boscos de bambú dels afores del seu poble. Era un home bo i treballador, casat amb una dona igualment bona, però els anys havien passat i no havien tingut fills, i aquella absència era la tristesa silenciosa que portaven tots dos dins.</p>

<p>Un matí de primavera primerenca, quan els bambusars estaven plens de nous brots verds que ressaltaven contra el cel blau clar, el vell va trobar un bambú que brillava amb una llum interior. No era una llum forta, era tènue i suau, però era indubtablement una llum que venia de dins de la canya. Va tallar-lo amb precaució i, al seu interior, enganxada en les parets vegetals com si hagués cremat allà per sempre, hi havia una figura minúscula: una nena tan petita que cabia al palmell de la mà, perfecta en cada detall, amb uns cabells negres i uns ulls que semblaven tenir el cel de la nit a dins.</p>

<p>Va portar-la a casa. La seva dona va plorar de joia. Van cuidar-la com la cosa més preciosa del món, i la nena va créixer a una velocitat prodigiosa: en tres mesos ja era alta com un adolescent, en sis mesos era una jove d'una bellesa que no s'havia vist en aquella comarca ni en les properes. La van batejar Kaguya-hime, la Princesa Lluminosa.</p>

<p>La fama de la seva bellesa va córrer per tot el país. Cinc prínceps dels més nobles del Japó van venir a demanar la seva mà. Kaguya-hime, que era tan sàvia com bonica, va posar a cadascun una prova diferent: havia de portar-li un objecte llegendari que probablement no existia. El primer havia de trobar l'bol de pedra del Buda. El segon, la branca d'or de Horai. El tercer, la vestidura de pell de rata de foc. El quart, la joia de colors del dragó. El cinquè, el petxolí d'andorí.</p>

<p>Cap dels cinc va poder complir la prova. El primer va intentar enganyar-la amb una rèplica falsa; Kaguya-hime la va reconèixer immediatament. Els altres quatre van patir aventures terribles i van tornar amb les mans buides. Ni l'Emperador, que va voler conèixer-la i es va enamorar d'ella, no va aconseguir que acceptés anar al palau imperial.</p>

<p>Però els pares adoptius de Kaguya-hime van notar, a mesura que passaven els anys, que la noia estava cada cop més trista. Especialment les nits de lluna plena, quan la mirava llargament i els seus ulls s'omplien de llàgrimes que no acabaven de caure. «Qué et passa?» li preguntaven. «Res», deia ella. Però la tristesa seguia allà.</p>

<p>Una nit de lluna plena de tardor, Kaguya-hime va reunir els seus pares adoptius i els va dir la veritat: «No soc d'aquí. Soc de la lluna, i he de tornar-hi quan arribi la vuitena lluna plena d'aquest any. Ho enyoro tot aquí: la terra, el menjar, la calor, vosaltres. Però no puc quedar-me.»</p>

<p>Els pares van plorar. L'Emperador va enviar guàrdies per protegir-la. Però quan va arribar la nit de la vuitena lluna plena, cap força de la terra podia aturar el que havia de passar. Una processó de llum va baixar del cel, com un pont entre la lluna i la terra, i figures lluminoses van arribar a la casa del vell tallador de bambú.</p>

<p>Kaguya-hime va vestir el mantell blanc que li portaven, que feia oblidar tot el que havia passat a la terra. Però abans de posar-se'l, va escriure una carta per a l'Emperador i va donar als seus pares adoptius un pot petit d'elixir d'immortalitat.</p>

<p>«Preneu-lo», va dir amb les llàgrimes finalment corrent. «Viureu per sempre.» El vell va negar amb el cap. «Una vida sense tu no és una vida que vulgui que duri per sempre.» Va guardar el pot sense obrir-lo.</p>

<p>La processó va pujar de nou al cel. La terra va quedar fosca i silenciosa. L'Emperador, quan va rebre la carta, va llegir-la al cim de la muntanya més alta del país i va cremar el pot d'elixir allà dalt. El fum va pujar cap al cel i va arribar fins a la lluna. I diuen que des d'aquell dia, la muntanya més alta del Japó, el Fuji, fuma perquè porta al cor la carta d'una princesa que va estimar la terra però va haver de tornar al cel.</p>`

    text:`<p>En un país de camps fèrtils i vinyards extensos, un home ric i just tenia dos fills que no podien ser més diferents. El gran, en Bartomeu, havia treballat la terra al costat del pare des de petit, era responsable i metòdic, coneixia cada pedra i cada planta de la propietat, i tenia una concepció del món construïda sobre la feina consistent i el respecte als acords. El petit, en Miquel, tenia el caràcter dels que s'avorriren amb el que coneixen i volen sempre el que no han provat: era inquiet, imaginatiu, impulsiu i tenia aquell encant particular dels que viuen completament al present sense preocupar-se del futur.</p>

<p>Un dia, en Miquel va anar al seu pare i li va dir: «Pare, la part de l'herència que m'hi correspondrà quan moreu, doneu-me-la ara. Vull veure món mentre soc jove.» El pare va mirar el fill durant un moment llarg. Va sentir moltes coses al mateix temps: dolor per la partida anticipada, preocupació per la immaduresa del fill, però també el reconeixement que un home lliure ha de poder prendre les seves decisions, fins i tot les equivocades. Va dividir els béns i li va donar la part que li corresponia.</p>

<p>En Miquel va marxar cap a terres llunyanes amb el cor ple d'aventura i la bossa plena d'or. Durant mesos va viure una vida que havia somiat: banquets, festes, amics nous cada dia, dones belles, espectacles i diversions de tota mena. L'or no durava, però sempre n'apareixia més perquè tothom estimava la seva companyia quan pagava les consumicions. Era fàcil ser popular quan tenies diners.</p>

<p>Però els diners van acabar-se. I amb els diners van acabar-se els amics. En Miquel va descobrir que l'home que havia pagat tantes nits de festa de sobte no coneixia ningú que pogués ajudar-lo. Va intentar trobar feina, però en aquell temps va arribar una gran fam al país i la feina escassejava. L'única cosa que va trobar va ser guardar porcs en una granja de les afores de la ciutat.</p>

<p>El guardià de porcs és una feina respectable, però en Miquel l'havia après a deshora i en les pitjors condicions: guardava porcs d'un home dur que li pagava tan poc que el que menjava ell era menys que el que menjaven els porcs. La fam el rosegava per dins, i amb la fam venia la claredat que dóna la misèria quan no hi ha manera d'evitar-la.</p>

<p>Un vespre, assegut a la riba del llot on els porcs dormien, en Miquel va tenir el que podríem dir el primer pensament completament lúcid i honest de la seva vida adulta: «Els criats del meu pare mengen millor que jo. Tinc un pare bo que tracta bé a tothom que treballa per a ell. Jo vaig triar marxar, vaig triar malgastar, vaig triar no escoltar. Tinc el que he triat.» Va aturar-se. «Però puc tornar. Puc demanar-li que m'accepti com a criat, no com a fill. No soc digne de ser el seu fill. Però potser soc digne de ser el seu criat.»</p>

<p>Va marxar aquell mateix vespre, a peu, cap a casa del seu pare. Va trigar setmanes a arribar, passant fred i fam, però caminant sempre. Estava molt prim i brut i les seves robes eren estripades. Molt lluny de casa, quan la propietat del seu pare era encara un punt a l'horitzó, va veure una figura que venia corrend cap a ell.</p>

<p>Era el seu pare. El vell havia pujat cada dia a la torre de la casa a mirar el camí, esperant. I aquell dia havia vist una silueta que tenia la manera de caminar del seu fill petit, tot i les robes estripades. Va córrer. Va abraçar en Miquel abans que ell pogués dir res, i va plorar d'aquella manera en que ploren els pares que han esperat massa i que finalment tenen el fill als braços.</p>

<p>«Pare», va dir en Miquel, «he pecat. No soc digne de ser el vostre fill.» El pare ja cridava als criats: «Porteu la roba millor! L'anell de la família! Les sandàlies! Feu festa! El meu fill estava mort i ha ressuscitat, estava perdut i l'hem trobat!»</p>

<p>En Bartomeu, el fill gran, tornava del camp i va sentir la festa. Quan va saber el que passava, es va enfadar. Va dir al pare: «Jo he treballat sempre i mai no m'heu fet festa. Ell ha malgastat tot i li feu festa.» El pare va sortir a trobar-lo. «Fill, tu sempre has estat aquí, i tot el que és meu és teu. Però la teva mare i jo érem morts de tristesa per ton germà. Ara hem tornat a la vida. No us dic que el que va fer estava bé. Us dic que ha tornat i que el seu retorn val una festa.»</p>

<p>La historia no diu si en Bartomeu va entrar a la festa o no. Però diu molt sobre el pare, que va demostrar que el perdó no és una debilitat sinó la forma més alta de força que pot tenir un cor humà.</p>`
  },

    tema:'Valors', tags:['mussol','saviesa','animals','consell','escolta'],
    resum:'Un mussol vell que ensenya als animals del bosc que la saviesa comença per saber escoltar.',
    text:`<p>Al bosc de Can Torrent, que s'estenia per les faldes d'un turó suau entre camps de conreu i pinedes joves, hi havia un mussol vell de nom Senentès que vivia en el forat més gran del roure centenari del centre del bosc. El mussol tenia uns ulls grocs i profunds que veien perfectament a la foscor i que de dia semblaven mirar endins en lloc d'enfora, com si la major part del que veia interessant no estigués al món exterior sinó en el terreny dels pensaments i les connexions entre les coses.</p>

<p>Els animals del bosc el consultaven de manera informal: quan tenien un problema que no sabien com resoldre, pujaven al roure i parlaven amb el Senentès. Ell escoltava, feia algunes preguntes, i de vegades deia quelcom útil i de vegades simplement escoltava fins que l'animal que havia vingut a consultar-lo s'adonava sol de la resposta.</p>

<p>Un dimarts de tardor, la guineu i el conill van arribar junts al roure, cosa que en si mateixa ja era inusual perquè guineus i conills no acostumaven a anar junts a cap lloc. Tots dos parlaven alhora i cada un deia la seva versió d'una mateixa disputa que havia crescut fins a ser un problema seriós: la guineu deia que tenia dret a passar per una zona del bosc que el conill reclamava com a part del seu territori; el conill deia que havia criat els fills en aquella zona durant tres anys i que era seva per dret d'ús; la guineu deia que cap dret d'ús no prevaleixia sobre la llibertat de moviment.</p>

<p>Tots dos parlaven en to elevat i gesticulaven, i cada argument del un feia que l'altre trobés tres nous arguments per respondre. El Senentès els va escoltar en silenci total, cosa que va obligar als dos animals a parlar cada cop més fort per omplir aquell silenci. Finalment van quedar-se sense arguments nous i van callar, esperant.</p>

<p>El mussol va fer una pausa llarga. Llavors va dir: «Tinc una pregunta per cadascun. Guineu: de qui és aquell tros de bosc?» La guineu va obrir la boca per dir «de ningú, per tant de tothom», però va tancar-la. Era la resposta que justificava el seu argument, però era honesta? «De... del bosc», va dir finalment, una mica sorpresa de la seva pròpia resposta.</p>

<p>«Conill», va dir el mussol, «de qui és aquell tros de bosc?» El conill va fer el mateix procés intern. «Del bosc», va dir també.</p>

<p>«Doncs», va dir el mussol, «tots dos d'acord sense que jo hagi de decidir res.» Els dos animals es van mirar. «Però llavors», va dir el conill, «com regulem qui hi passa i quan?» «Aquí sí que podeu necessitar ajuda», va dir el mussol. «Però les millors regulacions les fan entre ells els qui han de conviure, no els jutges externs. Heu de parlar vosaltres dos. Comenceu ara, si voleu.»</p>

<p>Van quedar-se al peu del roure una bona estona parlant. El mussol va pujar al seu forat i va tancar els ulls. Quan els va tornar a obrir, la guineu i el conill havien arribat a un acord sobre les hores en que cadascun tenia prioritat a aquella zona. No era perfecte, però era seu i el complirien perquè l'havien fet ells.</p>

<p>Un altre animal que estava esperant el seu torn va dir al mussol: «No heu dit gairebé res. Com sou tan savi si no parleu?» El mussol va tancar els ulls de nou. «La saviesa no és parlar molt», va dir sense obrir-los. «És saber quan callar perquè els altres puguin trobar la seva pròpia veu. La majoria de les persones ja saben la resposta. Simplement necessiten un lloc tranquil on poder escoltar-se.»</p>`
  },

    id:68, emoji:'🎁', title:'El Do de la Cigala',
    tema:'Màgia', tags:['música','cigala','hivern','regal','generositat','do'],
    resum:'Una cigala sense provisions a l\'hivern descobreix que la seva música és el seu veritable tresor.',
    text:`<p>Era el desembre més fred en vint anys. La neu havia caigut tres vegades en un mes, cosa inusual per aquelles terres mediterrànies, i el bosc estava cobert d'un silenci blanc i espès que feia que fins i tot els sorolls normals semblessin fets de cotó. Els animals que no havien migrat o no dormien l'hibernació es movien poc i menjaven menys, guardant l'energia per a un hivern que prometia ser llarg.</p>

<p>La Cigala Cantarina, que havia passat l'estiu cantat sense parar i l'havia passat meravellosament, es trobava ara en la situació que la Formiga li havia advertit mesos enrere: no tenia provisions, no tenia refugi adequat i el fred l'estava afectant d'una manera que les cigales, criades per al sol i l'estiu, no estan preparades per suportar.</p>

<p>Va anar a la porta de la Formiga. La Formiga va obrir. Va fer el que havia de fer: li va dir que no, però sense crueltat, amb aquella sencillesa de qui té unes regles clares i les compleix. «A l'estiu cantaves mentre jo treballava. Les meves provisions estan calculades per a mi sola. No n'hi ha per a dues.» Va tancar la porta, però suaument.</p>

<p>La Cigala va seure a la neu al costat de la porta i va pensar. Havia pres males decisions, és cert. Però les males decisions ja estaven preses i el fred continuava. La pregunta rellevant no era per qué estava en aquella situació, sinó qué podia fer ara.</p>

<p>Va anar a la porta de la Guineu. La Guineu tenia menjar sobrant: era una caçadora eficient i havia previst bé l'hivern. «Puc donar-te menjar», va dir la Guineu, «però res no és gratis. Canta per a mi tota la tarda i et daré un bon sopar.» La Cigala va acceptar. Va cantar tota la tarda, i la Guineu li va donar un sopar decent.</p>

<p>L'experiència li va donar una idea. La seva veu era l'únic que tenia, però potser era suficient. Va anar per totes les cases del bosc oferint el mateix: cantava, i a canvi demanava el que li podien donar. L'Ós li va donar una mica de mel dels seus pots. El Corb li va donar accés a un racó del seu amagatall sec. El Teixó, que era dur però just, li va deixar escalfar-se a la porta de casa seva dues hores al dia a canvi d'una cançó del matí.</p>

<p>Però va passar quelcom que la Cigala no havia calculat: el bosc necessitava la seva música. L'hivern era pesat i trist, i quan la Cigala cantava, les hores semblaven menys llargues i el fred menys intens. Fins i tot la Formiga, que sentia la música filtrar-se per les parets del formiguer, treballava amb més ànim quan la Cigala cantava a fora.</p>

<p>Un dia la Formiga va obrir la porta. «Vine», va dir simplement. «Fa massa silenci aquí dins.» La Cigala va entrar al formiguer càlid i va cantar per a totes les formigues aquella tarda. Les formigues li van donar menjar, i la Cigala va dormir aquella nit al formiguer, al costat de la llar de les formigues que generava una calor suau i constant.</p>

<p>Va sobreviure l'hivern gràcies a la seva veu. I va aprendre quelcom que canviaria la seva vida: que el do que tens no és mai inútil, però de vegades has de trobar la manera de posar-lo al servei dels altres en lloc de guardar-lo per a la teva sola satisfacció. La música que havia tocat per pur plaer propi a l'estiu era, a l'hivern, un servei real a la comunitat del bosc. Havia canviat de funció, però continuava sent el seu do.</p>

<p>A la primavera va sortir del formiguer i va cantar amb més profunditat que mai. L'hivern li havia afegit quelcom que l'estiu sol no pot donar: la comprensió que les coses belles valen més quan es comparteixen amb els qui les necessiten.</p>`

    id:69, emoji:'🌸', title:'La Flor de Neu',
    tema:'Natura', tags:['flor','neu','hivern','primavera','esperança','galanthus'],
    resum:'La llegenda de com la primera flor del món va créixer sobre la neu a l\'hivern.',
    text:`<p>El primer gran hivern de la historia del món va ser molt pitjor del que ningú havia previst. Les neus van caure a l'octubre i no van parar fins ben entrada la primavera, cobrint tots els camps i boscos d'una capa blanca tan gruixuda que els arbres vells crujien sota el pes. Era un hivern de contes, dels que la gent recorda durant generacions i explica als fills com si fos un avís.</p>

<p>Les flors, que eren joves en aquell primer hivern del món, no estaven preparades per a una nevada tan llarga. Havien viscut dos estius sencers d'abundància i color, i quan va arribar l'hivern van pensar que duraria poc, com els hiverns anteriors. Però les setmanes passaven i la neu no parava, i les flors, sota la terra congelada, anaven perdent la força.</p>

<p>La Fada de la Primavera, que tenia la responsabilitat de despertar les flors quan el temps era adequat, estava atrapada sota la neu igual que les flors. Havia quedat tancada a les profunditats de la terra quan la nevada havia sigut inesperadament gran i ràpida, i des d'allà havia intentat cridar el Sol perquè vingués a alliberar-la. El Sol, que era jove i no coneixia prou bé el seu poder, no la sentia des de tan lluny.</p>

<p>La Fada va cridar el Vent. El Vent bufa per tot el món i podia portar el seu missatge al Sol. Però el Vent d'Hivern, que governava aquella temporada, bufava massa fort per escoltar res. La Fada va cridar la Lluna. La Lluna la sentia, però no tenia el poder de fondre la neu.</p>

<p>Va passar molt de temps en aquella foscor sota la neu. Les flors que l'envoltaven anaven apagant-se una per una, i la Fada sentia com la seva pròpia força es reduïa. Va arribar un moment en que podia fer una sola cosa, i havia de triar-la bé perquè seria l'última.</p>

<p>Va posar tota la seva energia en la llavor més propera: una llavor petita i dura que havia resistit millor que les altres el fred llarg. Li va transmetre tot el que tenia: la memòria de la primavera, l'olor de la terra humida quan es descongela, la temperatura del sol de març, la música dels ocells que tornen del sud. Tot el que definia la primavera, comprimit en aquella llavor petita.</p>

<p>La llavor va notar el calor de tot aquell amor concentrat. Va desvetllar-se. Va posar arrels cap avall, cap a la terra menys freda. Va treure un brot cap amunt, perforant la terra gelada mil·límetre a mil·límetre amb una determinació que no era seva sinó de la Fada que vivia ara dins seu.</p>

<p>Va arribar a la superfície nevada. El brot va empènyer la neu des de sota, lentament però sense aturar-se, fins que la va perforar i va aparèixer a l'exterior. El fred de l'aire era intens, però el brot tenia la calor de la Fada a dins i el fred no el podia trencar.</p>

<p>Van obrir-se sis pètals blancs, blancs com la neu que els envoltava però vius, amb aquella qualitat de cosa viva que la neu mai no té. Era una flor petita i humil, però era la primera flor que havia florit sobre la neu en la historia del món. El Sol, que tot ho veu des del seu lloc al cel, va veure aquella flor blanca i va comprendre que la primavera el necessitava. Va escalfar una mica més i la neu va començar a cedir.</p>

<p>La Fada de la Primavera va poder sortir de la terra quan el gel es va fondre. Va trobar la seva flor, la galanthus, la flor de neu, i la va abraçar com s'abraça quelcom que has creat posant-hi tot el que tens. Des d'aleshores, cada any, la galanthus és la primera flor que apareix, fins i tot quan la neu no ha acabat. Perquè porta dins la memòria d'aquell primer hivern llarg, i sap que la neu no l'aturarà.</p>`

    id:70, emoji:'🏺', title:'El Geni de la Làmpada',
    tema:'Aventura', tags:['geni','làmpada','desitjos','Aladí','paraula donada'],
    resum:'El jove Aladí troba una làmpada amb un geni i aprèn que la lleialtat val més que els desitjos.',
    text:`<p>En una ciutat de les terres de la Xina antiga, en un carrer estret prop del mercat de les espècies, vivia un noi de nom Aladí amb la seva mare vídua. Eren pobres de la pobresa que no és deshonra sinó simplement circumstància: no tenien quasi res, però el que tenien era seu, i la seva dignitat era intacta. Aladí era jove, inquiet, amb aquella energia dels que volen molt de la vida però no han trobat encara el camí per aconseguir-ho.</p>

<p>Un dia un home va arribar al seu carrer dient ser un oncle llunyà. Era un mag marroquí que havia localitzat Aladí després de molts anys de recerques: necessitava un noi de caràcter determinat per entrar a una cova especial i recuperar una làmpada vella. El mag va tractè Aladí com un rei, li va comprar roba nova i li va omplir l'estómac, i quan el noi estava prou confiat li va proposar l'aventura.</p>

<p>Van sortir de la ciutat i van caminar fins a un lloc del desert on el mag va fer uns gestos rituals i la terra es va obrir. Davall hi havia una escala que portava a una cova plena de meravelles: arbres d'or amb fruites de pedres precioses, estanys d'aigua perfumada, sacs de monedes de tota mena. Al final de la cova, sobre un pedestal de marbre, una làmpada de bronze vella i mig rovellada.</p>

<p>«Agafa la làmpada i porta-me-la», va dir el mag des de dalt. «No agafis res més.» Aladí va baixar meravellat entre totes aquelles riqueses, va agafar la làmpada i va pujar de tornada. Però quan va arribar a la boca de la cova, el mag li va demanar la làmpada abans d'ajudar-lo a sortir. Aladí, instintivament, no va voler donar-la fins que fos a fora. El mag, furiós, va tancar la cova.</p>

<p>Aladí va quedar-se a les fosques, sol, a la cova. Va seure i va pensar. Sense saber per qué, va fregar la làmpada per netejar-la. Un fum dens va sortir i del fum va aparèixer una figura enorme: el Geni de la Làmpada, un ser de llum i poder amb els braços creuats i una expressió que podia significar moltes coses. «Soc el Geni de la Làmpada. Et concediré el que demanis.»</p>

<p>Aladí va demanar sortir de la cova. Va aparèixer al desert. Va demanar menjar per a ell i per a la seva mare. Va demanar roba decent. Amb cada desig, el Geni obeïa amb una eficiència sense emocions: era un poder enorme però sense voluntat pròpia, lligat a la làmpada i a qui la tingués.</p>

<p>Va veure la princesa Jasmine una tarda al mercat i se'n va enamorar. Amb l'ajuda del Geni va presentar-se com un príncep, va construir un palau i va guanyar la confiança del sultà. Les coses anaven bé fins que el mag marroquí va tornar, va trobar Aladí al palau i va aconseguir enganyar la princesa perquè li donés la làmpada vella a canvi d'una de nova i brillant.</p>

<p>El mag es va emportar el palau sencer, amb la princesa, a l'Àfrica. Aladí tenia només un anell que el Geni de la Làmpada li havia donat com a protecció, amb un geni menor. Va usar l'anell per arribar fins a la princesa. Junts van planejar recuperar la làmpada.</p>

<p>Quan van aconseguir-ho i el mag va ser neutralitzat, Aladí tenia de nou la làmpada. Li quedava un desig. La seva mare li deia que demanés riqueses eternes. La princesa li deia que demanés que el seu estatus de príncep fos real. Aladí va pensar en el Geni: un ser de poder infinit que havia sigut esclau de la làmpada durant mil anys, que complia ordres sense voluntat i sense descansc.</p>

<p>«Geni», va dir, «et concedeixo la llibertat.» El Geni va quedar-se quiet un moment. Mil anys portava sense sentir aquelles paraules. «No necessites demanar res per a tu?» «Tinc el que necessito. Tu portes mil anys esperant algú que et digui el que acabo de dir-te. Ets lliure.»</p>

<p>El Geni va plorar, i era un plor que semblava venir de molt molt lluny. Va desaparèixer entre el fum cap al cel, lliure per primera vegada. I Aladí, que havia renunciat al poder de tenir un Geni per alliberar-lo, va descobrir que quelcom havia canviat dins seu: havia après que alliberar algú altre és el desig que fa lliure qui el demana.</p>`
  },
  {
    id:71, emoji:'🐑', title:'El Pastor i el Llop',
    tema:'Valors', tags:['pastor','llop','mentides','credibilitat','paraula'],
    resum:'El noi que cridava llop per broma fins que ningú no li va creure quan era veritat.',
    text:`<p>A les planes del Vallès, on els ramats de merines i xais pasturaven des de la primavera fins a la tardor en els camps que quedaven en guaret, hi havia un mas on un pastor jove de nom Guillem tenia la responsabilitat de vigilar el ramat familiar durant les hores que els pares treballaven als horts. Era una feina que requeria paciència i atenció, dues qualitats que Guillem tenia en quantitat insuficient per a la seva edat.</p>

<p>Les ovelles menjaven tranquil·les, el sol escalfava, el vent bufava suau, i Guillem s'avorrida. Mirava el cel, comptava les ovelles, tornava a mirar el cel. Dos hores d'aquell ritme eren suportables. Cinc hores eren llargues. Set hores eren una eternitat.</p>

<p>Un dia de juliol, quan el sol era alt i els veïns i els parents treballaven als camps propers, Guillem va tenir una idea que en aquell moment li va semblar brillant: va posar-se dret, va agafar el seu bastó de pastor i va cridar amb totes les forces: «Llop! Llop! Hi ha un llop al ramat!»</p>

<p>Els resultats van ser immediats i espectaculars: homes amb eines, dones amb bastons, el veí del mas del costat amb una forca. Tothom va deixar el que feia i va córrer. Quan van arribar i van trobar les ovelles tranquil·les pasturant i Guillem intentant no somriure, la decepció i la irritació van ser considerables. «Era una broma», va dir Guillem. «Volia veure la vostra cara.» Ningú no va riure. Li van renyar i van tornar als camps.</p>

<p>La setmana següent, Guillem va tornar a cridar el llop. Altra vegada tothom va córrer. Altra vegada res. Aquesta vegada els renyaments van ser més seriosos i algú va dir la frase que s'havia de dir: «Si tornes a fer-ho i no és veritat, quan cridi de debò ningú no vindrà.» Guillem va fer el gest de qui escolta però no entén del tot.</p>

<p>Tres setmanes més tard, un capvespre quan la llum baixava i les ombres s'allargaven per la plana, un llop de debò va aparèixer a la vora del ramat. Era gran, gris, amb els ulls grocs fixats en les ovelles que pasturaven descuidades. Guillem va notar aquell fred a l'estómac que ve quan de sobte la realitat supera tot el que havies imaginat.</p>

<p>Va cridar: «Llop! Llop! És de debò! Ajudeu-me!» La seva veu va arribar als camps del voltant. I als camps del voltant, la gent va aixecar el cap, es va mirar i va continuar treballant. «És el Guillem», van dir. «Altre cop.» Ningú no va córrer.</p>

<p>El llop va atacar el ramat. Va matar tres ovelles abans que Guillem, que no tenia prou força ni experiència per enfrontar-s'hi sol, aconseguís fer prou soroll per espantar-lo. Quan finalment va venir gent, el llop havia marxat i tres ovelles estaven mortes.</p>

<p>Guillem va seure al terra del camp i va mirar les ovelles mortes. Va plorar, no de por sinó de comprensió tardana: havia jugat amb la confiança de les persones del seu entorn fins que aquella confiança s'havia trencat, i quan l'havia necessitada de debò no hi era. Les ovelles mortes eren la prova concreta d'una lliçó abstracta que ningú havia pogut fer-li entendre amb paraules.</p>

<p>El seu pare va arribar i va veure la situació. No va cridar. Va seure al costat del fill i va estar-se en silenci una bona estona. Finalment va dir: «La confiança és com el fil d'una xarxa. Cada mentida en trenca un. Amb prou fils trencats, la xarxa no aguanta res. I les mentides que truquen la confiança de tothom a la vegada trenquen molts fils alhora.» Va aixecar-se. «Ara has d'anar a demanar perdó a cada persona que va córrer per les teves bromes.»</p>

<p>Va ser la tarda més llarga de la vida de Guillem. Però va complir-la sencera, de porta en porta. I des d'aleshores va guardar el ramat en silenci i atenció, i quan cridava ajuda era perquè la necessitava.</p>`

    id:72, emoji:'🌺', title:'El Jardí de les Delícies',
    tema:'Imaginació', tags:['jardí','paradís','imaginació','somnis','creativitat'],
    resum:'Un noi descobreix un jardí màgic que existeix en l\'espai entre la vigília i el somni.',
    text:`<p>En Biel tenia onze anys i una qualitat que la majoria dels adults de la seva vida trobaven desconcertant: podia estar quiet durant hores. No quiet d'avorriment, sinó quiet de presència, assegut a la finestra de la seva habitació o al banc del jardí o al terra del seu cuarto mirant un punt de l'espai que no era exactament aquest espai, com si estigués veient quelcom que els altres no veien.</p>

<p>«En qué penses?» li preguntava la seva mare. «En res», deia ell, que era la resposta honesta però que no satisfeia a ningú. La veritat era que no pensava: escoltava. Escoltava el silenci que hi havia just sota els sorolls normals de la casa i el carrer, aquell silenci particular que és diferent de la mera absència de so.</p>

<p>Una nit de febrer, quan la pluja queia suau sobre el teulat i la llum del passadís s'havia apagat, en Biel estava al llit completament despert però completament quiet, escoltant aquell silenci. I per primera vegada en la seva vida va notar quelcom que no havia notat mai: just en el moment en que la son arriba però abans que arribi del tot, hi havia una porta. No una porta física, sinó una qualitat de l'espai que era diferent dels espais normals.</p>

<p>Va posar-hi el peu, per dir-ho d'alguna manera. Va creuar-la.</p>

<p>El jardí era immens i il·luminat per una llum que no era del sol ni de la lluna sinó d'alguna cosa intermèdia, càlida i suau. Els arbres eren alts i les seves fulles tenien colors que no existien al jardí normal: no eren simplement vermells o grocs o verds, sinó colors que eren tots aquests colors alhora i cap d'ells. Les flors olien d'una manera que feia que el cervell intentés recordar tots els olors agradables de la vida alhora. I el silenci del jardí no era buit: era ple d'una presència que no tenia forma però que se sentia com la presència d'un amic molt antic.</p>

<p>Un home vell treballava entre les plantes amb unes eines petites i precises. Va aixecar el cap quan en Biel va entrar. «Has trigat», va dir amb un to que suggeria que ho havia esperat però que no havia tingut pressa. «On soc?» va preguntar en Biel. «Al jardí que tots porten a dins», va dir el vell. «La majoria no hi arriben mai perquè per arribar-hi cal aprendre a estar quiet de la manera que tu has après.»</p>

<p>En Biel va caminar pel jardí tota la nit, o el que equivalia a tota la nit en aquell lloc on el temps es movia de manera diferent. Va descobrir que cada raconet del jardí contenia quelcom que li pertanyia específicament a ell: un arbre que tenia a les branques totes les preguntes que s'havia fet i que es faria, un estany que reflectia no la seva imatge sinó la seva versió millor, un camí que portava a un horitzó que canviava constantment perquè era el futur obert.</p>

<p>Quan l'alba va arribar al món de fora, en Biel va trobar-se al llit. La pluja havia parat i el cel era d'aquell rosa clar del primer matí. Va seure, va mirar per la finestra i va saber quelcom que no havia sabut abans: que el silenci que escoltava no era buit sinó que era la porta d'entrada a la part d'ell mateix que era capaç de crear quelcom que no havia existit mai.</p>

<p>Des d'aleshores va anar al jardí sovint. No cada nit, perquè el jardí no s'obria per voluntat sinó per disposició: quan la ment estava prou tranquil·la i prou oberta, la porta apareixia. I cada vegada que hi anava tornava amb quelcom: una idea, una comprensió nova, l'esboç d'una historia o d'una imatge o d'una solució a un problema que el preocupava. El jardí no li donava les respostes: li donava l'espai per trobar-les.</p>`
  },

    id:73, emoji:'🌊', title:'La Balena que Va Empassar en Jonàs',
    tema:'Llegenda', tags:['Jonàs','balena','Nínive','obediència','fe'],
    resum:'El profeta Jonàs que fuig del seu destí i es troba a la panxa d\'una balena.',
    text:`<p>En les terres antigues de la Mediterrània oriental, en aquell temps en que els profetes caminaven els camins de terra seca i portaven als ulls una visió del món que els altres no podien veure, un home de nom Jonàs va rebre una crida que no va saber acceptar. La crida era clara: havia d'anar a la gran ciutat de Nínive, la capital de l'Assíria, i dir-hi als habitants que els seus camins eren tortuosos i que havien de canviar.</p>

<p>Nínive era enorme i poderosa i els seus habitants no eren precisament coneguts per la seva docilitat davant dels missatgers estrangers. Jonàs coneixia prou el món per saber que arribar a una capital poderosa amb un missatge de censura no era la manera més segura d'assegurar-se una vellesa tranquil·la. Va mirar el camí que portava cap al nord, cap a Nínive, i va decidir que hi havia d'altres camins al món.</p>

<p>Va anar al port de Jaffa i va embarcar en el primer vaixell que trobà, que anava en sentit completament contrari: cap a Tarsis, a les terres de ponent, tan lluny de Nínive com era possible anar. Va pagar el passatge, va buscar un lloc a la bodega del vaixell i va intentar adormir-se amb la satisfacció del qui ha pres una decisió.</p>

<p>Però al mar la calma és sempre provisional. Quan el vaixell va ser prou endinsats a les aigües, una tempesta va aixecar-se amb aquella rapidesa particular de les tempestes mediterrànies d'octubre que no avisen. Les ones eren altes com cases, el vent escupia escuma salada, i els mariners, que eren homes de totes les religions i procedències que els mars antics reunien en els vaixells mercants, cadascun pregava al seu déu particular.</p>

<p>El capità va baixar a la bodega i va trobar Jonàs dormint. «Com pots dormir?» va cridar per damunt del soroll de la tempesta. «Pregui al teu déu! Potser el teu déu ens salvarà!» Jonàs es va despertar i va sentir la tempesta i va saber, amb aquella certesa que no necessita explicació, que la tempesta tenia a veure amb ell.</p>

<p>Els mariners van fer un sorteig per esbrinar qui havia portat la dissort al vaixell. Va tocar Jonàs. «Qui ets? D'on vens? Qué has fet?» Jonàs va explicar la seva historia amb una honradesa que li feia honor: havia rebut una missió i havia fugit. «Llenceu-me al mar», va dir. «La tempesta s'aturarà.» Els mariners van intentar arribar a terra remant, però les ones eren massa fortes. Finalment, amb una pregària als seus respectius déus demanant que no els carreguessin la mort de Jonàs, el van llençar a les aigües negres.</p>

<p>La tempesta va parar immediatament. El mar va quedar pla com un mirall. Els mariners van quedar en silenci davant d'aquell miracle i van resar amb un respecte nou.</p>

<p>Jonàs s'enfonsava a les aigües fredes quan una boca enorme el va engolir. No era la mort: era el ventre d'una balena gran, càlid i humit, fosc com la nit sense lluna. I allà dins, Jonàs va fer el que havia hagut de fer des del principi: va resar. No per por, sinó perquè no li quedava cap altra cosa a fer i havia après que de vegades quan no et queda res, la pregària és l'única honradesa que pots tenir.</p>

<p>Va estar tres dies i tres nits a la panxa de la balena. Va pensar molt. Va entendre coses que la vida còmoda i la fugida no li havien deixat entendre: que les crides que evitem no desapareixen, que allò de que fugim ens segueix, que la valentia no és l'absència de por sinó fer el que cal tot i la por.</p>

<p>Al tercer dia, la balena va arribar a una costa i va escopir Jonàs a la riba. Va quedar estirat a la sorra, mullat i esgotat, mirant el cel. Llavors es va aixecar, es va sacsegar la sal dels cabells, i va agafar el camí cap al nord. Cap a Nínive.</p>

<p>Va arribar a la gran ciutat i va entrar-hi. Va caminar pel mig del mercat i va cridar el missatge que li havien demanat. Es va esperar el pitjor. Però la gent de Nínive el va escoltar, i quelcom en la seva veu, potser la sinceritat absoluta de qui ha passat tres dies a la foscor pensant en la veritat, va fer que la gent s'aturés i escoltés de debò. I van canviar els seus camins.</p>

<p>Jonàs va quedar desconcertat: havia esperat una catàstrofe que no va arribar perquè la gent s'havia penedit. Era difícil d'acceptar que la missió que havia fugit a complir havia funcionat millor del que havia esperat. Però la balena i la foscor li havien ensenyat quelcom: que les missions que ens costen de complir solen ser les que més importen.</p>`
  },

    id:74, emoji:'🦁', title:'El Lleó Encantat',
    tema:'Màgia', tags:['lleó','encanteri','princesa','amor','aparença'],
    resum:'Una princesa descobreix que el lleó del seu jardí és un príncep encantat que espera ser estimat tal com és.',
    text:`<p>Al jardí del palau del comte de Bellver, entre els tarongers i els parterres de lavanda, hi havia una gàbia gran de ferro forjat on vivia un lleó. No era qualsevol lleó: era enorme, de crinera densa i rogenca, amb uns ulls d'un color ambre que semblaven tenir molt més a dins que la simple intel·ligència animal. Tothom al palau li tenia por. El comte el feia servir per impressionar els visitants. Els criats l'alimentaven amb el pal més llarg que tenien i procuraven no posar-s'hi a prop.</p>

<p>Però la filla del comte, la princesa Aura, que tenia setze anys i havia crescut al palau sense l'oportunitat de tenir moltes amistats de la seva edat, havia après a estimar els animals del jardí com a companys. Estimava els gossos de caça que li llepcaven les mans, els cavalls als quals parlava mentre els pentinava, les tortugues que vivien a la bassa. I d'aquell lleó que tots temien, ella en tenia una curiositat profunda que no l'assustava.</p>

<p>Cada tarda anava a la gàbia i s'asseia en una cadira de ferro al costat dels barrots. No massa prop, però prou per parlar-hi. Li explicava el que li havia passat aquell dia, les converses que havia sentit entre els criats, els ocells que havia vist al jardí. El lleó l'escoltava sense moure's, amb aquells ulls ambres fixats en ella d'una manera que no era la mirada d'un animal sinó la d'algú que entén tot el que li dius.</p>

<p>Un vespre de finals de tardor, quan el jardí estava buida i la llum s'esmorteïa, la princesa Aura va sentir una veu. No va saber d'on venia fins que va mirar la gàbia i va veure que els llavis del lleó es movien. «Princesa», deia la veu, suau i profunda, «perdona'm per parlar. Normalment no puc, però hi ha nits en que el silenci del jardí deixa sortir quelcom que durant el dia ha de quedar quiet.»</p>

<p>La princesa va quedar immòbil. «Pots parlar?» «Amb tu, de vegades sí. Has vingut aquí cada tarda durant dos anys sense tenir por de mi. Això és diferent.» Va fer una pausa. «El meu nom és Oriol. Soc el fill d'un duc d'un país llunyà. Un encanteri em va transformar fa tres anys per un acte de vanitat que vaig cometre. La condició per trencar l'encanteri és que algú m'estimi per allò que soc, sense saber el que he sigut.»</p>

<p>La princesa Aura va processar aquella informació. «I jo us he estimat sense saber que éreu un príncep», va dir finalment. «M'heu semblat interessant i profund, i algú a qui m'agradava parlar. El que sou per fora no ha canviat el que he sentit.»</p>

<p>«Precisament», va dir el lleó. «Però has de dir-ho en veu alta. L'encanteri requereix paraules.»</p>

<p>La princesa Aura va mirar el lleó durant un moment llarg. Va pensar en totes les tardes a la gàbia, en les converses que havia cregut que eren imaginàries, en la manera com els ulls ambres la miraven com si la coneguessin del tot. Va dir: «Us estimo per allò que sou, no per allò que heu sigut ni per allò que podeu ser.»</p>

<p>La llum de la gàbia va canviar. El lleó va créixer i va canviar de forma, i on havia estat l'animal hi havia un jove de cabells rossos i ulls ambres, agenollat a terra, amb la roba del temps en que havia sigut encantat, una mica rígida i vella però intacta. Es va posar dret i va mirar la princesa a través dels barrots. «Podeu obrir la gàbia?» va dir amb un somriure que tenia molt de la dignitat tranquil·la del lleó.</p>

<p>La princesa va trobar la clau a la seva butxaca: havia sigut la guardiana sense saber-ho. Va obrir la porta. Oriol va sortir al jardí i va respirar l'aire de la nit amb els ulls tancats durant un moment. «Tres anys dins d'una gàbia», va dir. «Tenia por que mai no trobés ningú que em mirés de debò.»</p>

<p>«Jo us mirava cada tarda», va dir la princesa simplement. El comte va sortir al jardí alarmat pels sorolls i va trobar la gàbia buida i el seu visitant inesperat. Va costar molt d'explicar. Però la princesa Aura va ser molt clara i el seu pare, que la coneixia prou bé per saber quan parlava de veritat, va acabar per escoltar. I Oriol, que era duc per dret, va ser rebut amb els honors que li corresponien.</p>`
  },

    id:75, emoji:'👑', title:'La Princesa i el Pèsol',
    tema:'Màgia', tags:['princesa','pèsol','sensibilitat','autenticitat','prova'],
    resum:'Un príncep busca una princesa de veritat i la prova amb un pèsol sota vint matalassos.',
    text:`<p>Al regne de les Terres Altes, on els hiverns eren llargs i les nits de tempesta eren el moment en que la gent es reunia al voltant del foc a explicar histories, hi havia un príncep de nom Feliu que tenia un problema que els seus consellers consideraven menor però que ell trobava essencial: volia casar-se amb una princesa de veritat, i resulta que distingir les princeses de veritat de les que simplement deien ser-ho era una tasca considerablement difícil.</p>

<p>Al llarg dels anys, moltes joves de famílies nobles havien vingut al palau presentant-se com a princeses. Algunes portaven papers que acreditaven el seu origen, però els papers podien ser falsificats. Altres tenien modals refinats, però els modals podien ser apresos. Altres eren bellíssimes, però la bellesa no era cap garantia. El príncep Feliu sabia que hi havia princeses de veritat al món, però no sabia com reconèixer-les.</p>

<p>La seva mare, la reina Margarida, que era una dona de bon seny i molts anys d'experiència en la vida de cort, el va observar patir la seva incertesa durant una temporada i finalment li va dir: «Feliu, crec que puc ajudar-te. Però hauràs de fiar-te de mi.» El príncep va dir que sí.</p>

<p>Una nit de tardor, quan la tempesta feia tremolar les finestres del palau i el vent portava la pluja en ràfegues horitzontals, va trucar a la porta del palau una jove sola, completament empapada, amb la roba enganxada al cos i els cabells pegats a la cara. La va obrir el majordom, que va portar-la davant de la reina.</p>

<p>La jove va dir que era una princesa d'un regne llunyà, que havia quedat separada del seu seguici en una tempesta i havia caminat hores buscant refugi. Ho deia amb la veu tranquil·la de qui no necessita convèncer ningú de res, simplement explica el que és. La reina la va mirar uns moments i va dir que seria benvinguda aquella nit.</p>

<p>Mentre els criats preparaven una cambra per a la jove, la reina va fer quelcom que ningú no va veure. Va agafar un pèsol petit i verd de la cuina i va pujar a la cambra que preparaven. Va posar el pèsol directament sobre el matalàs base, i sobre el pèsol va posar vint matalassos de llana, un sobre l'altre, fins que el llit semblava una torre. I sobre els vint matalassos, vint edredons de ploma.</p>

<p>La jove va ser conduïda a la cambra. Va mirar aquell llit altíssim sense dir res, va pujar amb l'ajuda d'una escala de mà que li van posar, i va desaparèixer entre les robes. Tothom va anar a dormir.</p>

<p>Al matí al dejuni, la reina va preguntar a la jove com havia dormit. La jove, que era educada per naturalesa i hauria preferit dir que bé, va hesitar un moment i va dir la veritat: «Us agraeixo molt l'hospitalitat, i la cambra era meravellosa. Però he de confessar que he dormit molt malament. Hi havia quelcom dur sota el llit, no sé exactament qué, però m'ha tingut tota la nit movent-me i buscant una postura. Avui tinc el cos com si hagués dormit sobre pedres.»</p>

<p>La reina va somriure. Va cridar el seu fill. «Feliu, vine.» Va explicar la historia del pèsol davant de la jove, que va quedar sorpresa. «Ningú que no fos una princesa de veritat hauria pogut notar el pèsol a través de vint matalassos i vint edredons», va dir la reina. «La sensibilitat és un do que no s'aprèn, es porta de naixement.»</p>

<p>La jove va quedar un moment en silenci processant aquella informació. «Podria demanar una cosa?» va dir finalment. «Que no torneu a fer aquesta prova a ningú.» La reina i el príncep la van mirar sorpresos. «No perquè no funcioni», va continuar la jove, «sinó perquè la sensibilitat que detecta un pèsol sota vint matalassos és la mateixa que fa que la vida sigui intensament dolorosa quan les coses van malament. No és sempre un do. De vegades és un pes.»</p>

<p>El príncep Feliu va mirar aquella jove empapada del dia anterior, ara seca i tranquil·la, i va pensar que una persona que en el moment de ser revelada com a princesa pensava primer en els altres potser era exactament la persona que havia estat buscant. Es van casar aquella primavera. I el pèsol va ser guardat en una capsa de cristall al museu del palau, no com a trofeu sinó com a record d'una nit de tempesta i una veritat dita en veu alta.</p>`
  },

    tema:'Valors', tags:['nen de fusta','nas','mentida','Gepetto','sinceritat'],
    resum:'Un nen de fusta que vol ser de veritat i aprèn a través de la vida que la bondat és el camí.',
    text:`<p>En un carreró de la Toscana, on les cases eren de pedra antiga i les finestres tenien geranis tot l'any, vivia un vell artesà de nom Gepetto que es guanyava la vida tallant figures de fusta. Era un home sol, sense família, però no era un home trist: tenia les seves figures, el seu taller amb olor de serradures i vernís, el seu gat vell i el seu peix daurat a la greixonera. Era una vida petita però completa.</p>

<p>Una nit d'hivern, mentre tallava un tronc de pi que li havia portat la tardor, Gepetto va parlar en veu alta sense pensar-s'hi: «Que bonic seria tenir un fill.» No era la primera vegada que ho deia, però aquella nit el tronc de pi era d'una qualitat especial, lleuger i de gra fi, i les mans de Gepetto van treballar amb una inspiració que no sempre tenia. Al final de la nit, a la taula del taller hi havia una figura de nen de fusta tan perfecta que semblava gairebé viva.</p>

<p>Semblava gairebé viva, i de fet ho era: quan Gepetto va apagar la llum per anar a dormir, la figura va moure un braç. Quan es va despertar al matí, la figura estava asseguda a la taula amb les cames penjant i el cap girat cap a ell. «Bon dia, pare», va dir la figura amb una veu petita però clara.</p>

<p>Gepetto va quedar parat. La Fada del pi blau, que havia vist la bondat del vell artesà i havia sentit el seu desig honest, havia donat vida a la figura. «Es dirà Pinotxo», va pensar Gepetto, i Pinotxo es va dir des d'aleshores.</p>

<p>La Fada va donar a Pinotxo una condició: podia convertir-se en un nen de carn i ossos si demostrava ser bo de debò. I li va donar un senyal extern de la seva relació amb la veritat: quan mentia, el nas li creixia. No molt, però prou per que es notés.</p>

<p>Pinotxo va resultar ser el nen més difícil i entranyable del món alhora. Estimava Gepetto profundament i volia ser bo, però era distret, curiós fins a l'imprudència, i tenia aquella tendència a fer el que convenia en el moment sense pensar en les conseqüències. Faltava a l'escola, seguia els que prometien aventures fàcils, i cada vegada que intentava amagar el que havia fet amb una mentida, el nas li creixia fins que Gepetto sabia tot sense necessitat de preguntar res.</p>

<p>Les aventures de Pinotxo van ser moltes i variades: va anar a un País dels Jocs on els nens que no estudiaven es convertien en ases, va ser capturat per un titereter, va acabar a la panxa d'una balena enorme on va trobar el seu pare Gepetto que havia anat a buscar-lo i hi havia quedat atrapat.</p>

<p>A la panxa de la balena, en la foscor i la quietud forçada de aquell lloc impossible, Pinotxo va tenir temps de pensar sense distraccions. Va mirar el seu pare, que era vell i prim i que havia arriscat la vida per buscar-lo, i va entendre quelcom que ningú no li havia pogut explicar amb paraules: que l'amor de Gepetto era real i constant i incondicional, i que ell li havia donat moltes preocupacions i poc de la tranquil·litat que mereixia.</p>

<p>Van sortir de la balena gràcies a l'enginy de Pinotxo, que va fer estornutar la bèstia encenent un foc dins seu. Van nedar fins a la riba. Gepetto estava tan feble que Pinotxo el va portar a les espatlles fins a terra i el va cuidar durant dies mentre el vell es recuperava, buscant menjar, netejant les ferides, vetllant a la nit.</p>

<p>La Fada va veure aquell canvi. No el canvi de les paraules, sinó el canvi de les accions: el Pinotxo que es preocupava pels altres, que suportava dificultats sense queixar-se, que cuidava en lloc de ser cuidat. Una nit va aparèixer al racó on dormien Gepetto i Pinotxo. «Has demostrat el que necessitava saber», va dir. «Demà et despertaràs diferent.»</p>

<p>Al matí, Pinotxo tenia les mans de carn. Les cames de carn. El cos viu i càlid d'un nen de debò. Es va mirar les mans durant un moment llarg i va sortir a despertar el seu pare. Gepetto el va veure i va plorar i riure al mateix temps, d'aquella manera que només fan els pares quan han vist el fill convertir-se en la millor versió de si mateixos.</p>`
