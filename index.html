    id:96, emoji:'🎵', title:'La Nana dels Pirineus',
    tema:'Son', tags:['Pirineus','nana','muntanya','son','tradició'],
    resum:'La cançó de bressol que les mares pirinenques cantaven als fills i el seu origen llegendari.',
    text:`<p>A les valls dels Pirineus, on els pobles s'aferren als vessants de les muntanyes com a bolets a l'escorça i els hiverns duren sis mesos i les nits son tan llargues i silencioses que el silenci es pot sentir, les mares tenien una cançó. No era una cançó que s'hagués escrit en cap paper, que tingués autor conegut o data de composició: era una cançó que s'havia transmès de boca a boca, de mare a filla, de filla a néta, des d'un temps tan antic que ningú ja no recordava quan havia cantat la primera. La gent del pla l'anomenava la Nana dels Pirineus, però les dones de la muntanya simplement la deien la Cançó, com si no pogués haver-n'hi cap altra.</p>

<p>La llegenda del seu origen diu que la va aprendre la primera pastora del Pirineu d'un esperit de la muntanya. Era una nit d'hivern antic, quan la neu cobria fins els senders que els pastors coneixien de memòria, i la pastora havia quedat perduda buscant una ovella. Va trobar-se en un clot entre roques, protegida del vent, i mentre esperava que la boira s'aclarís va sentir una veu.</p>

<p>No era la veu d'una persona ni la veu d'un animal. Era la veu de la muntanya mateixa, si la muntanya pogués parlar: profunda, lenta, feta de la suma de tots els sorolls que una muntanya fa al llarg dels segles: l'erosió de la roca, el creixement dels arbres, el pas de l'aigua, el vent als cims. Aquella veu cantava quelcom.</p>

<p>La pastora va escoltar fins que la nit va aclarir i va poder tornar al poble. Quan va arribar a casa seva, el fill petit que havia deixat dormint s'havia despertat i plorava. Va agafar-lo en braços i sense pensar-s'hi va cantar el que havia sentit a la muntanya. El nen es va calmar immediatament i va tornar a dormir.</p>

<p>La cançó parlava de coses que adormen el món de nit: la neu que cau i cobreix els sorolls, la lluna que puja lentament i pinta les muntanyes de plata, els rius que descansen sota el gel i somien el camí que tornaran a fer a la primavera. Els llops que dormen als seus caus amb els llobatons al costat. Les àligues que dormen als nius de les roques altes. Els abets que dormen drets amb la neu als braços. Tota la muntanya dormint alhora, respiran lentament en la nit.</p>

<p>I al final, com si la cançó s'adrecés directament al nen que s'havia d'adormir: «Tu també ets part de la muntanya. Les teves arrels baixem fins on baixen les arrels dels arbres. El teu son és el son de tot el que és viu. Quan dorms, la muntanya respira amb tu. Quan somies, la muntanya somia amb tu. Dorm, petit. La muntanya et guarda.»</p>

<p>Diuen que si cantes aquesta nana a un nen inquiet, fins i tot sense saber la melodia original, fins i tot amb les paraules aproximades, el nen s'adorm. No per màgia en el sentit de l'espectacle, sinó per màgia en el sentit de quelcom que és veritat i que quan ho sents el cos ho reconeix: que ets part d'un món gran que continua existint mentre dorms, que el món et guarda mentre tu descanses, que el son no és una interrupció de la vida sinó una part essencial d'ella.</p>

<p>Bona nit, petit. La muntanya et guarda.</p>`
  },
{
    id:97, emoji:'🌸', title:'La Fada Tardor',
    tema:'Natura', tags:['tardor','fada','fulles','colors','estacions'],
    resum:'La fada que cada any pinta les fulles dels arbres amb els colors meravellosos de la tardor.',
    text:`<p>Hi ha una veritat que els botànics expliquen amb paraules de clorofil·la i pigments i temperatura, i que és completament certa en el sentit científic. Però hi ha una altra veritat, que no contradiu la primera sinó que hi afegeix una capa de sentit diferent: que la Fada Tardor arriba cada any de les terres del nord quan l'estiu comença a cansar-se, portant una bossa plena de pinzells i pots de color, i que és ella qui decideix quins colors tindrà cada fulla, cada arbre, cada vall.</p>

<p>La Fada Tardor és la menys vistosa de les quatre fades de les estacions. La Fada Primavera arriba amb flors i ocells i tothom l'espera i la celebra. La Fada Estiu arriba amb el sol i el mar i les festes i tothom la vol. La Fada Hivern arriba amb la neu i el gel i la gent la rep amb una resignació respectuosa. Però la Fada Tardor arriba en silenci, de nit, quan la gent dorm, i treballa sense que ningú la vegi. Per això és la menys coneguda i potser la més meravellosa.</p>

<p>Ve del nord amb la seva bossa de colors el primer dia que el sol comença a baixar a l'horitzó abans que els dies s'hagin acabat del tot. Els humans no ho noten immediatament: s'estan banyant a les últimes platges de l'estiu o tornant de les vacances i pensant en les obligacions de la tardor. Però la Fada Tardor ja ha arribat i ha obert la bossa.</p>

<p>Groc de pera madura, que és un groc càlid i suau que no crida però que quan el veus a la llum del capvespre fa que el cor s'aturi un segon. Vermell de magraner, que és un vermell intens i gairebé violent que contrasta extraordinàriament amb el cel blau dels primers dies de setembre. Taronja de carabassa, que és el color més característic de la tardor, el que fa que la paraula tardor evoqui immediatament una imatge visual. Marró de castanya, que no és un marró trist sinó un marró ric i profund que sembla tenir tota la terra del bosc a dins. Ocre de terrissa, un or vell i mat que els artistes han intentat reproduir des de sempre sense acabar d'aconseguir-ho del tot.</p>

<p>La Fada treballa de nit per dues raons. La primera és que la llum del dia canviaria la percepció dels colors mentre pinta: necessita veure el resultat final en condicions neutres. La segona és que és tímida. No ho admetria, però ho és. Ha vist massa vegades com la gent passa per davant d'un arbre que ha pintat amb totes les seves forces i no el mira. I ha après que és millor fer la feina sense audiència.</p>

<p>Va d'arbre en arbre amb una atenció que cap pintor humà podria mantenir: cada fulla és una decisió individual. No posa el mateix color a totes les fulles d'un arbre: dins del mateix arbre hi ha variacions de to, combinacions, gradients que passen d'un color a un altre sense que es pugui dir exactament on acaba l'un i comença l'altre. I cada any varia: no pinta el mateix bosc de la mateixa manera dues tardors seguides. Té infinita paciència per a la variació.</p>

<p>El nen Arnau, que tenia nou anys i vivia a la vora d'un bosc de suredes a la Selva, havia decidit aquell any quedar-se despert per veure la Fada Tardor treballar. Els adults li havien dit que no existia. Però ell havia vist que les fulles canviaven de color de nit i no de dia, i que a ell li semblava una bona prova de que quelcom les pintava mentre dormia.</p>

<p>Va seure a la finestra de la seva habitació embolicat en una manta la primera nit de setembre en que la temperatura havia baixat prou. Va esperar. Va esperar molt. Estava a punt de rendir-se quan va veure al bosc una llum suau que es movia entre els arbres: no la llum d'una llanterna, sinó quelcom més difús, com si la llum sortís directament de l'aire al voltant d'una figura petita.</p>

<p>La figura s'aturava davant de cada arbre uns moments i llavors continuava. On s'havia aturat, quan la llum s'allunyava, les fulles tenien un color lleugerament diferent del que havien tingut a la tarda. L'Arnau va observar amb tanta atenció que no va adormir-se fins que la primera llum de l'alba va fer desaparèixer la figura del bosc.</p>

<p>Al matí va sortir a inspeccionar. Les fulles del bosc estaven lleugerament més daurades que el dia anterior. I a la base d'un surí jove que estava just davant de la seva finestra, va trobar una cosa petita: un pinzell minúscul, de pèl fi com seda, amb les puntes taques de vermell i ocre i or. El va agafar i el va guardar. Era la prova que necessitava, no per demostrar-ho als altres, sinó simplement per saber-ho ell.</p>`
  },
  {
    id:98, emoji:'🌙', title:'La Lluna i el Llop',
    tema:'Natura', tags:['llop','lluna','udolar','amor','llegenda'],
    resum:'La llegenda de per qué els llops udulen a la lluna plena des del principi dels temps.',
    text:`<p>Hi ha sons que pertanyen a la nit d'una manera que no pot explicar-se racionalment. El cant del grills a l'estiu. El cant del rossinyol a la primavera. I l'udol del llop a la lluna plena: un so que quan l'escoltes als boscos o a les muntanyes de nit et fa sentir quelcom que no és exactament por i no és exactament admiració sinó quelcom entre els dos, quelcom antic que el cos humà reconeix des de molt enrere de la memòria conscient.</p>

<p>La llegenda que explica l'origen d'aquell udol és una llegenda d'amor, que és la categoria a la que pertanyen les coses que no es poden explicar racionalment però que existeixen de totes maneres.</p>

<p>En el primer hivern del món, quan les nits eren llargues i fredes i les criatures que habitaven la terra estaven aprenent a sobreviure en un medi que encara era nou, un llop jove va quedar sol. Havia perdut la seva manada en una tempesta de neu, una d'aquelles tempestes que canvien el paisatge en pocs hores i fan que els llocs coneguts semblin desconeguts. Va buscar-los dies sencers i no els va trobar.</p>

<p>Va quedar-se sol a la muntanya nevada. No era la mort: un llop sa pot sobreviure sol, pot caçar i menjar i trobar refugi. Però la soledat és una cosa diferent de la mort, i de vegades és pitjor. El llop va aprendre a viure sol, però cada nit, quan s'estirava al seu cau, sentia aquell pes particular que és l'absència de calor al costat.</p>

<p>Una nit de lluna plena, quan la neu brillava d'una manera que feia que el paisatge semblés il·luminat des de dins, el llop va sortir del seu cau i va mirar el cel. La lluna era enorme i blanca i semblava propera, i tenia aquella qualitat de les coses belles de nit que fan que el cor es mogui d'una manera que de dia no es mou.</p>

<p>El llop va mirar la lluna durant molt de temps. No pensava: els llops no pensen de la manera que pensen els humans. Però sentien, i el que sentia aquella nit era quelcom que no tenia nom en cap llengua però que qualsevol persona que hagi estimat i perdut quelcom pot reconèixer immediatament.</p>

<p>Va obrir la boca. Va voler dir quelcom, o potser expressar quelcom, o potser simplement fer sortir cap enfora allò que tenia a dins. I va sortir l'udol: llarg, profund, ple de totes les notes que pot tenir una veu animal quan porta quelcom gran a dins. Un udol que pujava cap al cel com si anés cap a algun lloc concret.</p>

<p>La lluna el va rebre. No amb paraules, però d'alguna manera el llop va sentir que havia estat rebut, que allò que havia enviat havia arribat. I la lluna va brillar una mica més, aquella nit particular, com si donar llum fos la seva manera de respondre.</p>

<p>Des d'aleshores, els llops udulen a la lluna plena. No tots els llops estan sols quan ho fan: de vegades hi ha tota la manada que udola junta, que és quelcom diferent, una celebració comunitaria. Però l'udol individual, el de la bèstia que es posa als quarts de la nit davant del cel i envia el seu so cap a dalt, és sempre el mateix que aquell primer udol: una manera de dir a la lluna que el món segueix aquí, que la vida continua malgrat tot, que l'amor i la pèrdua i la soledat i la bellesa coexisteixen en la mateixa criatura en la mateixa nit.</p>

<p>I si alguna nit de lluna plena, assegut a la vora d'una finestra o d'un camp obert, sents un udol llunya que ve dels boscos o les muntanyes, atura't i escolta. No és el que la gent anomena un so trist: és un so complet, que conté la tristesa i la bellesa i la presència alhora. És el so d'un ésser viu que mira la lluna i li diu que existeix.</p>`
  },
  {
    id:99, emoji:'⭐', title:'L\'Estel Caigut',
    tema:'Màgia', tags:['estel','desig','caure','màgia','esperança'],
    resum:'Quan cau un estel, porta el desig d\'algú que l\'ha demanat de tot cor.',
    text:`<p>Hi ha una creença que comparteixen cultures de tots els continents, des de les més antigues fins a les modernes, des de les que es diuen religioses fins a les que es diuen científiques: quan veus caure un estel, pots demanar un desig. La creença sobreviu la racionalitat. Fins i tot les persones que saben perfectament que un estel fugaç és un meteorit que es crema en entrar a l'atmosfera, que és un fenomen físic completament explicable, en veure un estel caure tanquen els ulls i demanen un desig. Perquè hi ha coses que el cos sap que la ment no ha après del tot.</p>

<p>La veritat que les àvies saben i que les enciclopèdies no expliquen és aquesta: els estels no cauen per accident. Cauen perquè algú, en algun lloc de la terra, ha demanat quelcom de tot el cor. Un desig veritable, no una capritxe ni un voler tenir més del que ja es té, sinó una d'aquelles necessitats profundes que no sempre es poden articular amb paraules però que es senten com un pes al pit. Quan aquell desig és prou sincer i prou profund, un estel al cel s'engega i cau.</p>

<p>La nena Mia tenia set anys i una necessitat que no sabia com dir en veu alta: la seva millor amiga s'havia mudat a una altra ciutat feia tres mesos, i Mia tenia aquella tristesa particular de les amistats trencades a l'edat en que les amistats ho son tot. No hi havia manera racional de solucionar-ho: les famílies vivien lluny, les nenes eren massa joves per viatjar soles, i l'internet existia però no era el mateix que estar assegudes juntes a l'herba del jardí.</p>

<p>Una nit d'agost, quan la mare li havia dit que havien de dormir però Mia no podia perquè tenia el pes al pit i no li trobava nom, va anar a la finestra. El cel era ple d'estrelles, d'aquelles nits d'agost en que la Via Làctia es veu com un núvol de llum al centre del cel. Mia no coneixia els noms de les constel·lacions, simplement mirava. I va veure caure un estel: una ratlla de llum que va durar un instant i va desaparèixer.</p>

<p>Va tancar els ulls i va demanar el desig. No «que Sara torni», perquè sabia que aquell desig no era possible. Va demanar quelcom diferent, que era el que realment necessitava: «Que Sara i jo puguem continuar sent amigues tot i estar lluny.» Va obrir els ulls. El cel era el cel, les estrelles eren les estrelles, i res no havia canviat visiblement.</p>

<p>Però l'endemà al matí, quan va baixar a esmorzar, la mare li va dir que la mare de Sara havia trucat per proposar una visita de cap de setmana. Sara vindria dissabte. I no perquè l'estel ho hagués organitzat de manera sobrenatural: sinó perquè la nit anterior, al mateix temps que Mia mirava el cel, Sara havia estat plorant per l'enyorança i la seva mare havia decidit que cal fer quelcom. Les dues nenes havien tingut el seu dolor alhora, i els adults que les estimaven havien respost.</p>

<p>Les coses funcionen així de vegades. No és màgia en el sentit de l'impossible: és la coincidència de les necessitats sinceres que es troben en l'aire de la nit i produeixen efectes en el món real. L'estel no va moure la mare de Sara. Però Mia, demanant el desig, va trobar la pau suficient per dormir, i dormint va créixer prou per enfrontar el dia amb menys pes. I la gent que t'estima, quan estàs bé, sol trobar el moment de cuidar-te.</p>

<p>Els avis diuen que les llàgrimes de Sant Llorenç, aquella pluja d'estels de la nit del deu d'agost, no és simplement un fenomen astronòmic. És la nit en que els estels cauen en massa perquè és la nit en que més desitjos sincers hi ha en el cor de la gent: l'estiu acaba, el setembre ve, i tothom sent quelcom que necessita enviar al cel.</p>`
  },
  {
    id:100, emoji:'🌙', title:'Bona Nit, Món',
    tema:'Son', tags:['dormir','nit','somnis','descans','pau'],
    resum:'El conte final per adormir, quan tots els éssers del món es posen a dormir junts.',
    text:`<p>Quan el sol s'acomiada darrere les muntanyes i el cel s'omple de tots els colors que té —el taronja del primer adeu, el rosa de l'últim moment de llum, el violeta que anuncia la nit, el blau fosc que ve quan les estrelles comencen a sortir— el món sencer comença, molt lentament, a preparar-se per dormir.</p>

<p>Les flors són les primeres. Les margarides tanquen els pètals amb una precisió sorprenent, com si cadascuna tingués un petit mecanisme intern que sap exactament quan el sol ja no és prou fort. Les roselles s'enrosquen sobre elles mateixes. Els girasols, que han seguit el sol tota la jornada girant lentament com ballarins pacients, baixen el cap cap al llevant per estar a punt per a l'alba del dia següent. Les flors saben que la nit és per descansar i la fan servir bé.</p>

<p>Els ocells van callar primer els que canten de dia: els merles, les caderneres, els pardals. El seu silenci crea un espai que de seguida omplen els ocells de la tarda i el crepuscle: els tudons amb les seves notes greus i repetides, les orenetes que fan els últims cercles ràpids sobre els camps buscant insectes amb una urgència que sembla de qui té molt a fer i poc temps. Quan les orenetes aterren als cables elèctrics o als ràfecs de les cases, és que la nit ja és a prop.</p>

<p>Els peixos baixen als llocs tranquils del fons. No dormen exactament com ho fan els humans, però troben els racons de roca o herba on el corrent és suau i l'obscuritat és bona, i s'aturen allà amb el cos quiet i els ulls oberts però la ment en un estat de qui descansa. El peix gran de sota el pont, el que viu allà des de fa anys i que el pescador respecta sense pescar-lo mai, es posa al seu forat de sempre i la tarda l'engoleix.</p>

<p>Les mamàs dels llops apleguen els llobatons al cau. Potser hi ha una mica de remor, de protest dels més joves que voldrien continuar jugant, però la mare té autoritat i els llobatons s'enrosquen els uns sobre els altres fins que no es distingeix on comença l'un i on acaba l'altre. La calor comuna els adorm ràpidament. El llop pare fa una última volta al territori amb el nas a terra, comprobant que tot estigui en ordre, i torna.</p>

<p>Les vaques s'estiren als camps amb aquella placidesa particular de les bèsties grans que no s'inquieten per res petit. Els cavalls dobleguen les potes davanteres i s'estiren o es queden drets si el dia ha sigut tranquil, oscil·lant lleugerament en el son vertical que els equins coneixen. Les gallines pugen als seus pals disposant-se en un ordre que només elles entenen. El gat, que era al jardí fent el que fan els gats quan creuen que ningú els mira, decideix que ja és prou i torna a la llar, i s'enrosca al costat del foc o als peus del llit com si no hagués marxat mai.</p>

<p>I els nens. Un per un, en cases de tota mena, en ciutats i pobles i masies i apartaments i cases grans i cases petites, els nens van tancant els ulls. Alguns lluiten contra la son uns minuts, fins que la son guanya com guanya sempre. Alguns s'adormen de cop, de l'esgotament de la jornada. Alguns necessiten que algú els expliqui un conte, que és com dir que necessiten quelcom que els porti de la vigília al somni amb suavitat, com un pont sobre el riu.</p>

<p>I quan tots els nens dormen, la nit és completa. El món ha complert el que havia de complir avui: ha estat viu, ha tingut llum i color i soroll i moviment i amor i conflicte i resolució. I ara descansa. Les pedres descansen. La terra descansa. Les estrelles, que han esperat tota la jornada a l'altra banda del cel, brillen sense pressa per a ningú en particular, simplement perquè és el seu moment.</p>

<p>Tu, que has escoltat aquest conte, has escoltat molts contes, has viatjat molt amb la imaginació avui. Has estat a la panxa d'una vaca i als núvols sobre els gegants i a la cova del bruixot i a la roca on dormia la princesa. Has après coses que no sabies i has recordat coses que sabies però havies oblidat. Has rigut i potser t'has emocionat una mica i has pensat.</p>

<p>Ara és el teu moment. Com les flors i els peixos i els llops i el gat. Tanca els ulls. Respira a poc a poc, tres vegades: una per a tot el que ha sigut avui, una per a tot el que serà demà, una per a aquest moment precís en que estàs a punt de descansar. Pensa en una cosa que estimes molt. Just una.</p>

<p>El món continua mentre dorms. Les estrelles brillen. El Vigilant de la Nit fa la seva ronda. La lluna puja lentament. I tu, en algun racó dels teus somnis, continues vivint aventures que demà potser recordaràs i potser no, però que mentre passen són tan reals com qualsevol cosa que has vist avui desperta.</p>

<p>Bona nit. Fins demà.</p>`
  },

    id:101, emoji:'🐻', title:'Blancaneus i els Tres Óssos',
    tema:'Aventura', tags:['óssos','porridge','casa','nena','respecte'],
    resum:'Una nena entra a la casa dels tres óssos mentre no hi són i aprèn sobre el respecte a la propietat aliena.',
    text:`<p>A la vora d'un bosc espès i verd on els óssos havien viscut des de generacions, hi havia una casa petita i endreçada que els tres óssos havien construït amb les seves pròpies mans al llarg de mesos pacients. El pare ós era gran i fort i havia tallat els troncs. La mare óssa era meticulosa i havia cosat les cortines i disposat els mobles. I el bebè ós, que tenia quatre anys i una determinació notable per a la seva edat, havia ajudat en tot el que li havien deixat ajudar, que era menys del que ell hauria volgut però prou per sentir que la casa era seva.</p>

<p>La família tenia uns rituals establerts que donaven forma als dies. Cada matí, la mare óssa preparava el porridge: una papilla espessa de civada amb mel i fruites del bosc que els tres óssos estimaven moltíssim i que requeria exactament el temps que tardaven en fer el seu passeig matinal pel bosc per refredar-se fins a la temperatura adequada. Massa calent cremava. Massa fred perdia el gust. Just bé era perfecte.</p>

<p>Aquell matí d'octubre, quan l'aire del bosc tenia ja aquella frescor que anuncia les primeres gelades, els tres óssos van sortir a passejar mentre el porridge es refredava. Van seguir el camí habitual: la drecera fins al rierol, la volta pels faigs grocs, el retorn per la senda dels bolets. Trenta minuts exactament, que era el temps que el porridge necessitava.</p>

<p>La nena Blancaneus no es deia exactament així: es deia Blanca per la seva pell clara i els adults l'havien rebatejada amb aquell sobrenom que tant li agradava. Tenia set anys i una curiositat que els seus pares admiraven quan estava ben orientada i que trobaven problemàtica quan la portava a llocs on no havia d'anar. Aquell matí havia sortit a buscar bolets amb la seva cistella i, seguint un camí que creia conèixer, havia acabat en un indret del bosc que no reconeixia, davant d'una casa que no havia vist mai.</p>

<p>Va trucar a la porta. Ningú no va respondre. Va tornar a trucar. Silenci. Va pensar que potser no hi havia ningú. La porta estava tancada però no tancada amb clau: era el bosc, i al bosc la gent no tancava amb clau perquè tots es coneixien i la confiança era la norma. Va obrir la porta i va entrar, sense pensar que entrar a casa d'algú sense permís, per molt que la porta estigui oberta, és quelcom que no s'hauria de fer.</p>

<p>A la cuina hi havia tres tazones de porridge. La primera, la gran, bufava vapor: massa calenta. Va cremar-se la punta de la llengua i va deixar-la. La segona, la mediana, estava una mica freda i espessa. La tercera, la petita, estava perfecta: temperada, suau, amb el sabor exacte de la mel barrejada amb la civada i les fruites del bosc. Se la va menjar tota sense deixar-ne ni una cullerada.</p>

<p>Va explorar la sala. Hi havia tres cadires. La gran era massa alta per ella. La mediana era còmoda però massa rígida. La petita era perfecta de mida i de comoditat, i va seure-hi amb tanta energia que les potes van cruixir i la cadira es va trencar sota seu. Va quedar asseguda al terra amb les potes de la cadira al voltant, una mica avergonyida.</p>

<p>Va pujar les escales. Tres llits. El gran era massa dur. El medià era massa tou i s'enfonsava excessivament. El petit tenia la duresa i la suavitat en la proporció exacta. S'hi va estirar per provar-lo i va quedar-se adormida en qüestió de minuts.</p>

<p>Els tres óssos van tornar. Van trobar la porta oberta. Van entrar i van veure el porridge. «Quelcom ha tastat el meu porridge», va dir el pare ós. «Quelcom ha tastat el meu porridge», va dir la mare óssa. «Quelcom ha tastat el meu porridge», va dir el bebè ós, «i se l'ha menjat tot!» La seva veu tenia una queixa genuïna que era comprensible: aquell havia sigut el seu esmorzar.</p>

<p>Van trobar la cadira trencada del bebè ós, que va posar cara de tristesa perquè li agradava aquella cadira. Van pujar les escales. Van trobar la nena adormida al llit petit. La nena es va despertar quan el bebè ós va cridar i es va trobar mirant tres óssos que la miraven: un gran, un medià i un petit. La por la va despertar del tot i va saltar pel finestró que hi havia sobre el llit i va sortir corrents pel bosc fins a arribar a casa seva.</p>

<p>Als óssos els va costar una bona estona refer el porridge, reparar la cadira i tornar a la normalitat. Però aquella tarda, el pare ós i la mare óssa van tenir una conversa llarga amb el bebè ós sobre la importància de les coses pròpies i com és de molest que algú les faci servir sense demanar permís. I segurament, en algun altre lloc del bosc, els pares de la Blancaneus van tenir una conversa similar sobre la importància de no entrar a casa d'altri sense invitació.</p>`
  },

    id:102, emoji:'🌹', title:'La Rosa Blanca i la Rosa Vermella',
    tema:'Màgia', tags:['roses','germanes','ós encantat','bondat','amor','confiança'],
    resum:'Dues germanes molt différents s\'enfronten al misteri d\'un ós que resulta ser un príncep encantat.',
    text:`<p>En un poblet de la muntanya, en una casa petita amb un jardí on creixien dos rosers costat a costat —un de roses blanques i un de roses vermelles— vivien dues germanes amb la seva mare. La gran es deia Neus i tenia el temperament tranquil i profund de les persones que pensen molt i parlen poc. La petita es deia Roig i tenia l'energia expansiva de les persones que viuen completament al present i que omplen qualsevol espai que habiten amb vida i moviment.</p>

<p>Eren molt différents però s'estimaven d'aquella manera que només es possible entre germanes que s'han crescut juntes i que han après que les diferències no separen, simplement fan el quadre més interessant. La Neus estimava les roses blanques per la seva subtilesa. La Roig estimava les vermelles per la seva intensitat. I les dues estimaven la seva mare i la seva casa i aquell petit jardí que era el cor de la seva vida senzilla.</p>

<p>Un hivern particularment fred, una tarda que la neu tapava el jardí fins amunt del banc de pedra, van sentir trucar a la porta. La mare va anar a obrir i va trobar un ós enorme a la porta, amb els ulls intel·ligents brillant en la cara fosca. La mare va quedar paralitzada. L'ós va dir: «Perdoneu la intromissió. Faig molt fred i tenia esperança que podríeu deixar-me escalfar-me una estona.»</p>

<p>La seva veu era la d'un home, clara i educada. La mare, que era una dona de molt seny, va pensar que un ós que parlava com un home mereixia el benefici del dubte. Va deixar-lo entrar. L'ós va ocupar tot el racó de la llar de foc i les dues germanes el van mirar des del banc amb la curiositat diferent de cadascuna: la Neus amb atenció callada, la Roig amb preguntes immediates.</p>

<p>«Com es pot ser que parléis?» va preguntar la Roig. «És una historia llarga», va dir l'ós. «Podeu quedar-vos si voleu», va dir la mare. «L'hivern és llarg i la calor es comparteix millor.» L'ós va acceptar.</p>

<p>Va viure a la casa aquell hivern. Les germanes van acostumar-s'hi ràpidament: la Roig jugava amb ell, li pentinava la pell espessa, el feia córrer pel jardí nevat. La Neus el tractava amb una amabilitat tranquil·la, li portava menjar sense haver-li de demanar dos cops, parlava amb ell de nit quan tothom dormia. L'ós escoltava la Neus d'una manera particular, amb aquella atenció completa que és rara fins i tot entre persones.</p>

<p>Quan la primavera va arribar, l'ós va dir que havia de marxar. «Tinc obligacions que m'esperen», va dir sense explicar-les. «Tornareu?» va preguntar la Roig. «Potser», va dir. Va mirar la Neus un moment i va marxar al bosc.</p>

<p>Durant l'estiu, les germanes van trobar al bosc un nan de mal humor que estava atrapat en un arbre. L'arbre tenia la seva barba llarga enganxada a una escletxa de l'escorça. El van ajudar a alliberar-se tallant la barba. El nan, lliure, va insultar-les i va marxar sense agrair res. El van trobar dues vegades més en situacions similars: sempre el van ajudar, sempre els va insultar.</p>

<p>A finals d'estiu van trobar el nan per quarta vegada, però aquesta vegada no estava en cap problema: estava admirant un munt de pedres precioses al mig d'un camí. I darrere seu, entre els arbres, va apareixer l'ós. El nan el va veure i va intentar fugir, però l'ós va ser més ràpid.</p>

<p>En aquell moment, el nan va quedar-se quiet i llavors va transformar-se: va créixer, va canviar de forma, i on havia hagut un nan hi havia un home de cara rodona i ulls malèvols que va desaparèixer entre els arbres cridant coses incomprensibles. I l'ós va transformar-se: va créixer dret, va canviar de forma, i on havia hagut un ós hi havia un jove de cabells daurats amb roba de príncep que mirava les seves pròpies mans com si les veiés per primera vegada en molt de temps.</p>

<p>Va explicar-ho tot: el nan era un ésser malèvol que l'havia encantat. Havia robat les pedres precioses del seu palau i havia transformat el príncep en ós per tenir-lo allunyat mentre sacsejava el robatori. Amb la transformació trencada, totes les pedres tornarien soles al palau.</p>

<p>El príncep va mirar les dues germanes. Va mirar la Neus especialment. «Durant tot l'hivern», va dir, «vau tractar-me com quelcom que mereixia respecte i atenció, no com un animal de companyia ni com un perill a suportar. Em vaig sentir vist.» La Neus va dir: «Sempre heu parlat com algú que tenia molt a dir. Semblava just escoltar.»</p>

<p>El príncep i la Neus es van casar aquella tardor. La Roig va anar a viure al palau amb ells i va trobar allà un germà del príncep que tenia la mateixa energia expansiva que ella i amb qui aviat es va entendre meravellosament. I les roses del jardí de la seva mare, la blanca i la vermella costat a costat, van continuar creixent any rere any, indiferents a les histories humanes, simplement bellíssimes.</p>`

    tema:'Imaginació', tags:['vapor','màquina','nen','futur','inventar'],
    resum:'Un nen fascinat per les màquines de vapor que imagina el futur i acaba fent-lo realitat.',
    text:`<p>En l'any 1882, al barri de la Barceloneta de Barcelona, on els pescadors i els obrers de les fàbriques vivien paret a paret en cases estrets i la boina de les fàbriques tenyia el cel d'un gris productiu, un nen de deu anys de nom Ramon Vidal passava totes les tardes que podia al costat de les màquines.</p>

<p>El seu pare treballava a una fàbrica de teixits on les màquines de vapor s'havien instal·lat feia pocs anys, substituint el treball manual de telers de tota la vida. Alguns obrers les odiaven per les feines que havien eliminat. El pare del Ramon les respectava sense estimar-les. Però el Ramon les estimava d'una manera que no podia explicar: quan se les mirava, veia quelcom que els adults que les operaven ja no veien perquè s'havien acostumat, la maravella fonamental de que foc i aigua, combinats en una seqüència precisa, produïen moviment.</p>

<p>«Pare», li preguntava el Ramon mentre el seu pare sopava cansat, «si el vapor pot moure el teler, per qué no pot moure un cotxe?» El pare el mirava. «Hi ha carrils de ferro pels trens, fill.» «Sí, però si hi hagués una màquina prou petita que portés el vapor amb ella...» El pare li donava un tros de pa. «Menja i ves a dormir.»</p>

<p>El Ramon tenia un quadern on dibuixava màquines que no existien. No eren dibuixos infantils: eren dibuixos tècnics, amb mesures aproximades i anotacions sobre com funcionaria cada part. La seva mestra, la senyoreta Dolors, havia descobert el quadern un dia i en lloc de renyar-lo l'havia mostrat al director de l'escola, que l'havia mostrat a un enginyer amic seu que venia a fer una conferència.</p>

<p>L'enginyer, un home de quaranta anys de nom Francesc Codina que havia estudiat a Paris i havia vist les primeres màquines de combustió interna, va mirar el quadern del Ramon amb una atenció que el nen no esperava. Va fer preguntes. Va escoltar les respostes. Va tornar a mirar el quadern.</p>

<p>«Noi», va dir finalment, «alguns d'aquests dissenys no funcionen perquè la física no ho permet en la manera que tu ho has imaginat. Però uns quants sí que funcionarien, o quelcom molt semblant. D'on has tret les idees?» «De mirar les màquines», va dir el Ramon. «I d'imaginar que podrien fer altres coses.»</p>

<p>L'enginyer va parlar amb el pare del Ramon. Proposava que el nen continués l'escola però que pogués venir al seu taller els dissabtes. El pare va acceptar, sorprès que algú de categoria s'interessés pel seu fill.</p>

<p>Durant els anys que va passar al taller de l'enginyer Codina, el Ramon va aprendre que les idees bones necessiten coneixement per fer-se realitat, que la imaginació és el punt de partida però no el destí. Va aprendre física, matemàtiques, mecànica. Va aprendre a construir models petits de les seves màquines per provar si funcionaven. Va aprendre de les fallades, que eren moltes, que val tant o més que dels èxits.</p>

<p>Als vint-i-cinc anys, Ramon Vidal va presentar a l'Exposició Universal de Barcelona un prototip de vehicle de propulsió automàtica que funcionava. No era perfecte i no era el primer del món: els alemanys i els francesos havien anat per davant. Però era el seu, construït des de la Barceloneta amb les idees d'un nen que havia mirat les màquines de vapor del seu pare fins que les havia vist des de dins.</p>

<p>Al costat del vehicle, a l'exposició, hi havia el seu quadern de dibuixos de quan tenia deu anys. La gent el mirava i veia en els dibuixos infantils la forma aproximada del que ara era una màquina real. El mestre Codina, que havia anat a l'exposició, el va abraçar emocionat. «Ho has aconseguit», va dir. «El cavall sense cavall», va dir Ramon, recordant com l'havia imaginat de nen. «Exactament», va dir el mestre.</p>`

    id:104, emoji:'🦄', title:'L\'Últim Unicorn',
    tema:'Màgia', tags:['unicorn','màgia','mar','llibertat','solitud'],
    resum:'L\'últim unicorn del món busca els seus semblants i descobreix el valor de la pròpia naturalesa.',
    text:`<p>En un bosc de faigs antics que ningú no havia tallat ni trepitjat des de feia molts anys, hi havia un unicorn que era blanc com la llum dels matins clars i que tenia una banya de color marfil que llançava una llum pròpia en l'obscuritat. No sabia que era l'últim. Els unicorns no porten el compte dels seus semblants, igual que les persones no compten constantment quants exemplars de la seva espècie existeixen. Simplement viuen.</p>

<p>Però un dia va escoltar dos humans que parlaven al límit del bosc, sense saber que l'unicorn els escoltava des de darrere d'un faig. Parlaven d'una llegenda, la de l'últim unicorn: una criatura que vivia sola en un bosc del nord mentre tots els altres unicorns del món havien sigut captius pel Rei Roig, que els tenia tancats darrere de les ones del mar perquè deia que les coses belles havien de ser controlades i guardades i no deixades campar lliurement pel món.</p>

<p>L'unicorn va quedar quiet darrere del faig molt temps després que els humans marxessin. Llavors va sortir al camí i va seguir la direcció que havien pres els humans. No perquè els seguís a ells, sinó perquè aquell era el camí cap al sud, i al sud hi havia el mar, i al mar hi havia, si la llegenda era certa, els seus semblants.</p>

<p>El camí va ser llarg. Va trobar una bruixa que el va capturar per al seu circ i l'hi va exhibir com a raritat. Va ser alliberat per un mag vell de nom Schmendrick que tenia un poder irregular però sincer. El mag i la seva companya Molly van acompanyar l'unicorn en el seu viatge.</p>

<p>Van arribar al castell del Rei Roig, un home que havia decidit que el poder sobre les coses belles era suficient substitut per al fet de no ser ell mateix bella. El Rei Roig tenia un toro de foc que foragitava tot el que trobava cap al mar: era amb el toro que havia aconseguit reunir tots els unicorns darrere de les ones.</p>

<p>L'unicorn va haver d'enfrontar-se al toro. En aquell moment va sentir por de debò, una por que els unicorns, que no moren de les causes normals i que no han hagut mai d'enfrontar-se a cap poder equivalent al seu, rarament experimenten. La por li va ensenyar quelcom: que la vida tenia valor perquè podia perdre's, que la llibertat per la que lluitava era important precisament perquè podia ser treta.</p>

<p>Va llançar-se contra el toro de foc. Havia temut morir i havia decidit que era millor córrer el risc que no fer res. El toro va cedir davant d'aquella llum blanca que no s'apagava malgrat les flames. El toro va recular cap al mar. I les ones, quan el toro hi va caure, van obrir-se i en van sortir els unicorns: desenes, centenars, tots blancs i lluminosos, corrent per la platja fins als camps i els boscos.</p>

<p>L'últim unicorn va quedar a la platja mirant els seus semblants marxar. El mag Schmendrick li va dir: «Has fet el que havies de fer. Ara ets com ells: no l'únic, sinó un entre molts.» L'unicorn va pensar en aquelles paraules. Hi havia quelcom que havia perdut en deixar de ser únic. Però havia guanyat quelcom que no tenia nom en la llengua dels unicorns però que s'assemblava molt al que els humans anomenen comunitat.</p>

<p>Va marxar al bosc antic on havia viscut. Però ara sabia que el bosc no era una presó de soledat sinó un lloc on viure, i que al món hi havia d'altres llocs on d'altres unicorns vivien les seves vides. No els veia, però sabia que existien. I saber que existien era suficient per que el bosc es sentís diferent: no buit, sinó part d'un món més gran.</p>`

    tema:'Enginy', tags:['molí','vent','farina','invent','pagès','ingeniositat'],
    resum:'La llegenda de l\'invent del primer molí de vent per un pagès genial que escoltava el vent.',
    text:`<p>Al pla de Lleida, on el vent de ponent bufa sense obstacles des de les terres d'Aragó fins a topar amb les primeres estribaciones dels Pirineus, la feina de moldre el gra era una de les més feixugues que existien. Es feia a mà o amb animals: les pedres de moldre necessitaven una força constant i regular, que els brços humans podien mantenir molt poc temps i que els animals podien mantenir més però a un cost d'alimentació i cuidado considerable. El gra que alimentava el poble costava en esforç molt més del que semblava quan el pa sortia de l'forn calent i olorós.</p>

<p>El pagès Isidor Molins —el cognom no era coincidència, portava segles a la família— havia passat la seva vida observant el vent d'una manera que els seus veïns trobaven excessiva per a algú que tenia feines més concretes a fer. Però Isidor creia fermament que l'observació és el primer pas de qualsevol invenció útil, i el vent del pla era quelcom que s'observava fàcilment: bufava gairebé sempre, en la mateixa direcció general, amb una força que variava però que mai no desapareixia del tot.</p>

<p>Va notar que el vent movia coses. Les fulles, evidentment. Les veles dels carros coberts de lona quan anaven en la direcció adequada. Les moltes del camp que bufaven i es giraven. I una tarda va observar quelcom que li va donar la idea: el moliner del poble proper havia penjat les robes al vent per assecar-les, i les robes penjades en aquell ordre particular creaven quan el vent les movia una rotació involuntària al voltant de la corda que les sostenia.</p>

<p>Va passar tres mesos fent dibuixos i models petits. El primer model era una cosa de fusta i tela que queia quan el vent bufava fort. El segon era més robust però les aspes no giraven bé. El tercer, amb una geometria diferent que havia après veient com els ocells usaven les corrents d'aire, girava de manera estable i produïa al seu eix una rotació regular.</p>

<p>Va portar el tercer model al moliner del poble. El moliner el va mirar, va mirar el vent, va mirar el model. «Si fos gran», va dir lentament, «i si l'eix estigués connectat a les pedres de moldre...» «Exactament», va dir Isidor. El moliner va quedar quiet un bon rato. «Quant costaria construir-ne un de gran?» «Menys del que costa alimentar un ase durant un any», va dir Isidor, que havia fet els càlculs.</p>

<p>Van construir-lo entre els dos, amb l'ajuda d'alguns veïns que van afegir-s'hi per curiositat i es van quedar per entusiasme. Va trigar tres setmanes. Era alt, de fusta, amb quatre aspes grans de tela reforçada que captaven el vent del ponent. L'eix central connectava, a través d'un engranatge que Isidor havia dissenyat amb molta paciència i molt d'assaig i error, a les pedres de moldre de sota.</p>

<p>El dia que van deixar anar les aspes per primera vegada, el vent bufava com solia bufar al pla de Lleida: fort i constant. Les aspes van girar. Les pedres van girar. El gra que van posar a la tremuja va baixar entre les pedres i va sortir per l'altra banda com a farina: blanca, fina, exacta. Tot el poble estava allà mirant. Un vell que havia passat la vida movent pedres a mà va plorar sense vergonya.</p>

<p>Isidor va mirar el molí girant al vent i va pensar en tots els anys d'observació que hi havia darrere d'aquell moment. «Jo no ho vaig inventar», va dir a qui li ho preguntava. «El vent ja movia coses des del principi del món. Jo simplement vaig escoltar prou temps per entendre qué em deia.» Aquell molí va ser el primer de molts. Al cap de vint anys, el pla estava ple de molins de vent que convertien la força de l'aire en farina i en vida. I cada cop que el vent bufava i les aspes giraven, era com si el pla recordés un pagès que havia tingut la paciència d'escoltar.</p>`
  }
];

const temes = ['Tots',...new Set(contes.map(c=>c.tema))];
let temaActiu='Tots', searchQuery='';
const temaEmojis={Tots:'📚',Aventura:'⚔️',Màgia:'✨',Valors:'💛',Natura:'🌿',Llegenda:'🏔️',Enginy:'💡',Imaginació:'🎨',Son:'💤'};

function filteredContes(){
  return contes.filter(c=>{
    const matchTema=temaActiu==='Tots'||c.tema===temaActiu;
    const q=searchQuery.toLowerCase();
    const matchSearch=!q||c.title.toLowerCase().includes(q)||c.resum.toLowerCase().includes(q)||c.tags.some(t=>t.toLowerCase().includes(q))||c.tema.toLowerCase().includes(q);
    return matchTema&&matchSearch;
  });
}

function renderCats(){
  const bar=document.getElementById('catBar');
  bar.innerHTML=temes.map(t=>`<button class="cat-pill ${t===temaActiu?'active':''}" data-tema="${t}">${temaEmojis[t]||'📖'} ${t}</button>`).join('');
  bar.querySelectorAll('.cat-pill').forEach(btn=>{btn.onclick=()=>{temaActiu=btn.dataset.tema;renderAll();};});
}

function renderGrid(){
  const list=filteredContes();
  document.getElementById('stats').textContent=`${list.length} conte${list.length!==1?'s':''} trobat${list.length!==1?'s':''}`;
  const grid=document.getElementById('grid');
  if(!list.length){grid.innerHTML='<div class="no-results"><span class="big">🔍</span>No hem trobat cap conte amb aquesta cerca</div>';return;}
  grid.innerHTML=list.map(c=>`<div class="card" data-id="${c.id}"><span class="card-emoji">${c.emoji}</span><h3>${c.title}</h3><div class="card-meta"><span class="badge theme">${temaEmojis[c.tema]||'📖'} ${c.tema}</span><span class="badge">~4 min</span></div><p>${c.resum}</p></div>`).join('');
  grid.querySelectorAll('.card').forEach(card=>{card.onclick=()=>openConte(+card.dataset.id);});
}

function renderAll(){renderCats();renderGrid();}

let currentConte=null;
const synth=window.speechSynthesis;
let utterance=null;
let keepAliveTimer=null;

function openConte(id){
  currentConte=contes.find(c=>c.id===id);
  if(!currentConte)return;
  document.getElementById('mEmoji').textContent=currentConte.emoji;
  document.getElementById('mTitle').textContent=currentConte.title;
  document.getElementById('mBadges').innerHTML=`<span class="badge theme">${temaEmojis[currentConte.tema]||'📖'} ${currentConte.tema}</span>${currentConte.tags.map(t=>`<span class="badge">${t}</span>`).join('')}`;
  document.getElementById('storyText').innerHTML=currentConte.text;
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('overlay').classList.add('open');
  stopSpeech();
}

function closeConte(){document.getElementById('overlay').classList.remove('open');stopSpeech();}

function stopSpeech(){
  if(keepAliveTimer){clearInterval(keepAliveTimer);keepAliveTimer=null;}
  if(synth)synth.cancel();
  utterance=null;
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('btnPlay').textContent='▶ Escoltar';
}

document.getElementById('btnClose').onclick=closeConte;
document.getElementById('overlay').onclick=(e)=>{if(e.target===e.currentTarget)closeConte();};

document.getElementById('btnPlay').onclick=()=>{
  if(!currentConte)return;
  if(synth.speaking&&!synth.paused){synth.pause();document.getElementById('btnPlay').textContent='▶ Continuar';return;}
  if(synth.paused){synth.resume();document.getElementById('btnPlay').textContent='⏸ Pausa';return;}
  const text=document.getElementById('storyText').innerText;
  utterance=new SpeechSynthesisUtterance(text);
  utterance.lang='ca-ES';
  utterance.rate=parseFloat(document.getElementById('speedSel').value);
  const totalChars=text.length;
  utterance.onboundary=(e)=>{if(e.name==='word'){document.getElementById('progressFill').style.width=Math.min(100,(e.charIndex/totalChars)*100)+'%';}};
  utterance.onend=()=>{
    if(keepAliveTimer){clearInterval(keepAliveTimer);keepAliveTimer=null;}
    document.getElementById('progressFill').style.width='100%';
    document.getElementById('btnPlay').textContent='▶ Escoltar';
  };
  utterance.onerror=()=>{stopSpeech();};
  synth.speak(utterance);
  document.getElementById('btnPlay').textContent='⏸ Pausa';
  // Workaround bug Chrome: la síntesi es talla als ~15s
  keepAliveTimer=setInterval(()=>{
    if(synth.speaking&&!synth.paused){synth.pause();synth.resume();}
    else if(!synth.speaking){clearInterval(keepAliveTimer);keepAliveTimer=null;}
  },14000);
};

document.getElementById('btnStop').onclick=stopSpeech;
document.getElementById('speedSel').onchange=()=>{if(synth.speaking){stopSpeech();document.getElementById('btnPlay').click();}};
document.getElementById('searchInput').oninput=(e)=>{searchQuery=e.target.value;renderGrid();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeConte();});

// Minimitzar barra d'àudio
document.getElementById('btnAudioToggle').onclick=()=>{
  document.getElementById('audioBar').classList.toggle('collapsed');
};

// Banner instal·lació Chrome/Android
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  deferredPrompt=e;
  if(!localStorage.getItem('pwaDismissed')){
    document.getElementById('bannerAndroid').classList.remove('hidden');
  }
});
document.getElementById('btnInstall').onclick=async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt=null;
  document.getElementById('bannerAndroid').classList.add('hidden');
};
document.getElementById('btnDismissAndroid').onclick=()=>{
  document.getElementById('bannerAndroid').classList.add('hidden');
  localStorage.setItem('pwaDismissed','1');
};
window.addEventListener('appinstalled',()=>{
  document.getElementById('bannerAndroid').classList.add('hidden');
});

// Banner instal·lació Safari/iOS
const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
const isStandalone=window.navigator.standalone||window.matchMedia('(display-mode: standalone)').matches;
if(isIOS&&!isStandalone&&!localStorage.getItem('iosDismissed')){
  document.getElementById('bannerIOS').classList.remove('hidden');
}
document.getElementById('btnDismissIOS').onclick=()=>{
  document.getElementById('bannerIOS').classList.add('hidden');
  localStorage.setItem('iosDismissed','1');
};

renderAll();

// Registra Service Worker (offline + PWA)
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js'));
}
</script>
</body>
</html>
